body:
  text: 周易口義宋胡瑗撰繫辭上周易言繫辭者按周易始于伏羲畫為八卦至于文王定為六爻演為六十四卦又作卦下之彖辭以解釋一卦之義曲盡天地之道總包萬事之冝而又周公作其爻辭以釋逐爻之義然而聖人作卦其道至大以至纎至悉之事無不備載雖有爻彖之辭以解釋之然其辭義深逺其理精微至淵至奧不可以易曉則于常常之人固難知矣是故孔子復作十翼以釋之欲使後世之人可以達聖人之淵奧知聖人之行事也所謂十翼之名者曰上彖下彖大象小象文言上繫下繫説卦序卦雜卦凡此十翼以釋六十四卦之義上下彖以解文王卦下之辭大象以釋一卦之名義小象分于六爻之下以解周公之爻辭文言以文釋乾坤二卦之理此繫辭以統言天地之淵奧人事之終始説卦以陳説八卦之德業序卦以序六十四之次敘雜卦以辨衆卦之錯雜此上繫是夫子十翼之中第六翼自天尊地卑而下至篇末分十一章各列于後今隨文而解之然按先儒周氏云上繫辭凡十二章自天尊地卑為一章聖人設卦觀象為二章彖者言乎其象為第三章精氣為物為第四章顯諸仁藏諸用為第五章聖人有以見天下之賾為第六章初六藉用白茅為第七章大衍之數為第八章子曰知變化之道為第九章天一地二為第十章是故易有聖人為第十一章子曰書不盡言為第十二章虞翻分一章以大衍之數并知變化之道共為一章取之然分義之段數未盡意隨文而别解之然繫辭有二説是聖人繫屬其辭于爻卦之下故此篇第六章云繫辭焉以斷其吉凶第十二章云繫辭焉以盡其言是繫者取其繫屬其辭于卦下故謂之繫辭也天尊地卑乾坤定矣義曰此言天地之道者也自此乾坤定矣而下至天下之理得而成位乎其中矣為一章以釋聖人法天地之義也夫易之所始始於天地天地之判混元廓開而萬物之情皆生于其間既萬物之情皆生于其間是故聖人仰以觀于天文俯以察于地理于是畫為八卦以類萬物之情以盡天地之道人事之理以盡乾坤水火風雷山澤之象是易之卦始於天地者也然則天尊地卑者何也夫天是純陽之氣積於上而為尊地以積隂之氣居於下而為卑剛陽居上而有尊髙之象柔隂居下而有卑下之分二氣始交分為剛柔是以交錯以至生成萬物覆載萬物大無不包細無不有其形狀故天地為乾坤之象乾坤為天地之用天地尊卑既分則乾坤之位因而可以制定也然則首言天地尊卑者蓋萬事之理萬品之類皆自乾坤為始故先言天地尊卑也卑髙以陳貴賤位矣義曰卑者謂地體卑下高者謂天體高上夫天地卑高既定則人事萬物之情皆在其中故六十四卦三百八十四爻各有貴賤高卑之位是以君臣父子夫婦長幼皆有其分位矣若卑不處卑高不處高上下錯亂則貴賤尊卑君臣父子夫婦長幼不得其序夫如是無髙卑之分位矣故此貴賤之分皆自髙卑之位既陳然後從而定矣動靜有常剛柔斷矣義曰夫天以剛陽居於上則為動地以柔隂居於下則為靜天地之道生成萬物各有常度動而有常則為剛靜而有常則為柔動靜既有常分生成各有常理則剛柔可以斷矣以人事言之夫君以剛德居於上為動臣以柔道居於下為靜君出其令而臣行之臣納其善而君聽之君臣動靜既有常理則剛柔之分可以斷矣若動而不常則剛道不成靜而不常則柔道不立夫如是則剛柔不可以斷定也然則此經雖論天地之性然亦兼總萬物之動靜也方以類聚物以羣分吉凶生矣義曰此已下言聖人法天地之象也方者道也天君子之人同道而齊術道同於已者則相推而類聚之君子則以君子為朋偶小人則以小人為類黨為士者則以士為同道為濃者則以農為族黨為工者則以工為同道為商者則以商為類聚是皆以同道為之共處各隨其類族矣物以羣分者上既言君子小人各從其類此又言萬品之物亦各以其羣類而為黨也至如飛者則以飛者為羣走者則以走者為羣以至昆蟲草木巖穴之物各從其羣各從其分也吉凶生矣者夫上言方以類聚物以羣分此言吉凶生矣者何哉夫吉凶生於異類善惡由夫影響同逍齊術者則為吉非其類者則為凶若君子同於君子之人則吉小人入於君子之黨則凶是吉凶之道生於非類無所分别若平其所趣則凶是以生焉若順其所同則吉是以生焉是吉凶之道生於非類者也在天成象在地成形變化見矣義曰象謂日月星辰也形謂山川草木也夫天以剛陽之氣居於上而生物地以柔隂之氣在於下而承天在於天者則為日月星辰之象在於地者則為草木山川之形是天地之道生成之理自然而然也變化見矣者上既言在天成象在地成形此復言變化見矣者何哉蓋天地之道生成之理有全體而化者有久大而化者有驟然而化者千變萬化皆有形象而人莫能究其實但知其自然而然也是故剛柔相摩八卦相蕩義曰此已下明天地隂陽相推蕩之事也夫天本在上地本在下及夫天氣下降地氣上騰陽極則變而為隂隂極則反而為陽陽剛而隂柔隂消而陽伏剛柔互相切摩更相變化然後萬物之理得矣夫八卦之始本於天地剛柔二體法於隂陽剛則為陽爻柔則為隂位爻位相錯雜然後以成八卦推蕩於天地之間若十一月一陽生而推去一隂五月一隂生而推去一陽是八卦相推蕩於天地之間所以成於六十四卦也鼓之以雷霆潤之以風雨義曰鼓者動也雷者隂陽二氣相激搏則其聲為雷霆者怒雷則謂之霆風所以生萬物雨所以潤動植也此至一寒一暑重明上文變化見矣及剛柔相摩八卦相蕩之事也夫天地二氣相蕩而成八卦之象相推而成萬事之理又鼓之以震雷離電滋潤以巽風坎雨使天下之物無不遂其性者天地之道也然而風亦言其潤者蓋風者是生成之氣能滋生於萬物故亦言其潤也日月運行一寒一暑義曰日者太陽之精月者太隂之精寒者是純隂之氣暑者是純陽之氣也夫天地之道生成萬物既鼓動以雷霆又滋潤以風雨以日而煦育之以月而照臨之及夫日月運行以成晝夜以成寒暑之候以盡生成之功者天地之道也然而直云震巽離坎不云乾坤艮兊者蓋乾坤之道上下備言艮兊非鼓動運行之體故不言之其實亦雷電風雨出於山澤故亦兼包其義焉乾道成男坤道成女義曰道者自然而生也此言乾坤之道也夫天以純陽在上故為乾地以純隂在下故為坤乾主乎剛健坤主夫柔順乾自然而為男則為君為父為長為上坤自然而為女則為臣為子為婦為少乾居於上則為尊坤居於下則為卑二氣交感以生萬物故有男女之象然則坤必言成者蓋乾因隂而得為男坤因陽而得為女故言成也乾知大始義曰大始者是隂陽始判萬物未生之時也乾者天之用也夫乾以天陽之氣在於上故萬物莫不始其氣而生莫不假其氣而成得其生者春英夏華秋實冬藏承其氣而成者則胎生卵化蠕飛動躍是乾知大始起於無形而入於有形也坤作成物義曰坤者是地之形也物者萬品之物也夫地以純隂之氣在於下上承於天陽之氣以生萬物無所不載無所不育是乾始於無形而坤能載之以作成萬物之形狀也然乾言知坤言作者蓋乾之生物起於無形未有營作坤能承於天氣已成之物事可營為故乾言知而坤言作也乾以易知坤以簡能義曰夫乾之生物本於一氣其道簡略不言而四時自行不勞而萬物自遂是自然而然者也坤以簡能者夫坤之生物假天之氣其道亦簡略其用省默而已不假煩勞而物自生不假施為而物自遂是自然而然者也然則乾言易知坤言簡能者何也蓋乾體在上坤道在下萬物始於無形而乾能知其時下降而生之坤道在於下而能承陽之氣以作成萬物之形狀其道凝靜不須煩勞故乾言易知坤言簡能也若夫生成之道於物艱難則不為易知若於事煩勞則不為簡能也易則易知簡則易從義曰此復説上乾以易知也夫天之道寂然不見其用杳然而不知其為及夫四時之代謝萬物之生殺不待煩勞而自然者也夫人君居兆民之上為生靈之主天下之事固不可以一言而盡也然而必當法此乾道簡易之德以總萬事之要目則天下之道亦自然簡易而知也簡則易從者復解上坤以簡能也夫地以純隂之氣上承於天以生萬物不在煩勞而自然簡易天下之物各遂其性者也夫為臣之道為國家之梁棟作士民之冠冕必當法此地道之簡易承君之命宣君之化敷布於天下簡其萬事之要則天下可易從矣易知則有親易從則有功義曰此二句論聖賢法此乾坤簡易之理也親者親比也言聖人法此天道簡其萬事之要不假繁冗屑屑於治體惟在廣其仁義生成之道以及於天下昭蘇萬有養育萬民夫如是則天下之人皆悅而親比之也易從則有功者言人臣之道法此地道奉君之命行君之事不在繁冗使天下之人於事易從不在冗屑而其功易成也有親則可久義曰此二句論人法乾坤久而益大也物既和親無相殘害故可久也言聖人既能法天之生物順其萬物之情成其至道之要施之無窮傳之萬世天下之人既親比之久而不朽此聖人之道至大者也有功則可大義曰事業有功則積漸可大此言為臣之道既能法地之道承事其君以成其功業至大至廣使人易從可久則賢人之德義曰夫天之所以覆而不知所以覆之義地之所以載而不知所以載之理浩浩然其神之所為者天地之功也聖人顯諸仁藏諸用若日月之照臨而不知照臨之迹者聖人之功也然聖人之操心積慮法天地簡易之德以生養天下使天下之人不可名狀以成其德也可大則賢人之業義曰此言賢人之分則見所為之迹也夫為臣之道既能法地之簡易以成久大之功業垂之萬世而不朽此賢人之業也然則此聖人言德為臣者言業何也蓋聖人代天理物法天行事施其德澤以滋生於天下順其物情以至昆蟲草木皆蒙其澤無所不燭故其功不可以形狀如天之無不覆如地之無不載故稱曰德為臣之道法地之理以承君之命行君之事執其柔順之道順從於人以成其功然出一令行一事皆稟君上之命而可以形狀故謂之業也然此不言聖人而言賢人者何也此聖人垂教之法也言賢人亦可以法天之簡易而行事以生成於天下恐後世之人止謂聖人可以法天之行事故不言聖人而言賢人也且賢人尚可法之則聖人固可知也易簡而天下之理得矣義曰言聖人既能從其簡易不在煩勞發號施令廣布德澤以成天下之功使天下之人天下之物長幼上下尊卑貴賤各得其分如此則天下無為而治聖人之理得矣天下之理得而成位乎其中矣義曰言聖人既能順其簡易之道順其萬事之理使君臣父子夫婦長幼各得其序則天地之位皆由此矣聖人設卦觀象義曰此已下至自天祐之為一章上既言易之所起始於乾坤故首言天地之道然天地始判而萬物之情已在其間故易之所始因萬物之情而作故曰易始於天地此又言聖人設六十四卦之事夫天地既判而萬物之情已見於其間是故聖人仰則觀象於天俯則觀法於地揆人事之理盡萬物之情乾坤水火風雷山澤之象設為六十四卦以通天地鬼神之情狀以為萬世之法也繫辭焉而明吉凶義曰六十四卦既設其道至大其理至深聖人若不繫之以辭散於諸爻之下則後世之人不能曉聖人設卦之意也然則卦爻之中有剛有柔分隂分陽隂陽相推蕩於其間則有凶有吉有失有得故六爻之下皆繫屬其辭得其正者則其辭吉失其處者則其辭凶剛柔相推而生變化義曰此已下言天地人事之理也夫天地既判剛柔二氣互相推蕩以生成萬物有全體而化者有漸而化者有胎而生者有卵而化者千變萬化自然而然皆由剛柔之氣互相推蕩以成變化也如乾之初九交於坤之初六其卦為震是故吉凶者失得之象也義曰此總明諸卦象不同之事也夫吉凶生於非類悔吝生於動靜故六十四卦三百八十四爻有剛有柔有正有不正若辭之吉者是得之象也辭之凶者是失之象也合於道而不失其正者為吉不合於道悖於其理者為凶是吉凶者失得之象也然觀六十四卦之中言吉凶者義有數等或吉凶之事據文可知或不須明言吉凶而吉凶自見若乾之九五飛龍在天尋文考義是吉可知也故不須云吉也若剝之不利攸往離之九四突如其來如焚如死如之屬據其文辭其凶可見故不言凶也亦有爻處吉凶之際吉凶未定行善則吉行惡則凶若乾之九三君子終日乾乾夕惕若厲無咎若屯之六二屯如邅如乘馬班如匪冦婚媾女子貞不字十年乃字是吉凶未定故不言吉凶也有直言吉者若坤之六五黃裳元吉以隂居尊嫌其不吉故直言其吉有直言其凶者若剝之初六剝牀以足蔑貞凶若有一卦之內或有一爻之中得失相形須言吉凶若大過九三棟橈凶九四棟隆吉是一卦相形也屯之九五屯其膏小貞吉大貞凶是一爻相形也亦有一事相形終始有異若訟卦有孚窒惕中吉終凶有有咎而能改之者若豫之上六曰冥豫成有渝無咎悔吝者憂虞之象也義曰事之小小己過其意有可追悔者曰悔事之微小可為鄙吝者曰吝夫人始於得失微小之事雖不至於大咎然亦當憂虞思慮之不可謂之微小不思之故事之小者必至於大惡之漸者必至於著惡積而不可掩罪大而不可解者皆自細微以成之也故易中所言吉凶者是得失之象言悔吝者是憂虞之象也變化者進退之象也義曰夫物之生有全體而化者有漸而變者此皆是進退之象也夫進退之象有盛衰之理生死之道吉凶之驗皆自於盛衰故來則為盛往則為衰故六爻之中有剛有柔或從始而上進或居終而倒退往來不窮互相推蕩以成進退之象也若乾之上九言亢龍有悔復之初九言不逺復無祗悔元吉剛柔者晝夜之象也義曰夫聖人設卦分其剛柔以明人事之要以盡萬物之宜剛則為陽為明為晝柔則為隂為幽為夜剛柔相推以成晝夜幽明之理變通之道以成吉凶悔吝憂虞之象也故總言之也然推觀其上文始總言繫辭焉而明吉凶剛柔相推而生變化此又别言吉凶者失得之象悔吝者憂虞之象變化者進退之象剛柔者晝夜之象者何也蓋吉凶悔吝失得晝夜之象皆由剛柔相推蕩而致者故得失有重輕變化有小大合之則同分之則異故始云剛柔相推而生變化不云晝夜者是總變化而言也上文云吉凶者失得之象下文又云悔吝者憂虞之象者蓋吉凶之事皆由得失而成得失之本皆由悔吝而成悔吝之本皆由憂虞而有也六爻之動三極之道也此復明變化進退之義也夫易卦之中則有六爻故下二爻以象地中二爻以象人上二爻以象天是六爻之中三才之道畢矣然六爻之道有變有動有凶有吉有得有失若動而合于道則為吉動而悖於事則為凶是六爻之動互相推蕩則是天地人三才窮極之事故有吉凶悔吝得失變化之道也是故君子所居而安者易之序也自此已下言君子觀聖人設卦作易之意以為修身之法也夫易卦之中有凶有吉有否有泰有悔有吝有變有化有得有失有剛有柔夫君子之人觀此剛柔變化吉凶得失悔吝憂虞之象知其易之以序以修其身以行其事以之居處進退不惟尊卑貴賤貧困之間皆得以安止也至如乾之初九言潛龍勿用是言君子之人可隱則當隱也九二則言見龍在田是言君子之人可進則當進之又如居泰之時則君子可引類而進於朝居否之世則有否塞不通之象居於家人則行治家之法居旅之時則為行旅之事如此之類皆是用得其時不失其道不惟尊卑貴賤貧困窮極安處進退之間皆可行之是易之序也所樂而玩者爻之辭也義曰夫君子之人既能知易之以序以為居處之術又當樂玩其六爻之辭夫六爻之辭有凶有吉有否有泰有得有失皆隨時而變通是故君子之人必當愛樂而耽玩之見其善則思齊其事見其惡則思懼而改趣其治而去其亂向其安而舍其危以至吉凶之事悔吝之道至纖至悉無不備於爻辭之間故君子所樂而玩者爻之辭也是故君子居則觀其象而玩其辭義曰夫爻卦之間有凶有吉有失有得君子之人故當居處之間觀其設卦之象明其萬事之理以耽樂六爻之辭以知事之吉凶明其事之得失以至死生之道變通之理則無咎過之事動則觀其變而玩其占義曰夫易以變而為占自六爻之中皆變而為占故古者取其蓍草之數隨其變而占之以明休咎之事以究鬼神之奧故君子若觀此六爻之變凡於動靜興作之間必知其休咎之驗矣是以自天祐之吉無不利義曰言君子之人既能居則觀其辭動則玩其占以奉順易象則身無有凶害如此則自上天之所祐助鬼神之所協吉何所不利也彖者言乎象者也義曰疏以為自此至死生之説為一章則非也今觀其文辭當從辭也者各指其所之為一段自易與天地凖而下至盛德大業為一章是也彖者言乎象者也自此以下至辭也者各指其所之為一章上章既言吉凶悔吝聖人設卦繫辭之義細意未盡此復言文王作彖分於諸卦之下以釋一卦之義雖然有周公爻辭散於諸爻之下然文王之彖其義淵深孔子復作彖辭以解之彖者總論一卦之象如乾之彖元亨利貞曰大哉乾元坤元亨曰至哉坤元屯元亨曰屯剛柔始交而難生蒙亨曰蒙山下有險是皆解一卦之辭也故曰象者言乎其象也爻者言乎變者也義曰夫六爻之設內外二體有變有動有凶有吉各隨時而變改之然文王之作彖辭以釋一卦之象然其義亦有未盡周公復作爻辭散於諸爻之下總人事之要道明萬事之吉凶隨其爻而通變之各順其用吉凶者言乎其失得也義曰夫爻象之設有凶有吉有剛有柔若陽居陰位則不得其正或陰居陽位則或失其常或近而不相得或逺而有所比合於道者則吉乖於道者則凶故吉凶之端失得之義盡在於爻辭之間矣上文吉凶者失得之象也悔吝者言乎其小疵也義曰疵者病也夫人禍發於細微姦生於隱暗事有至小而可以追悔者行有至微而可以鄙吝者故當憂慮而戒慎之夫小惡不改以至於大惡小善不積以至於大凶至乎鄙吝之道皆由微小而生也故君子之人觀此爻象之辭則知動靜之理積其小善以成於大善積其小惡以至於大惡捨其失而處其得悖其凶而從其吉故悔吝之來皆由微小而至矣無咎者善補過也義曰夫人所以有咎者蓋由操心積慮過為其事小惡不改以成乎大惡小過不防以至乎大過所以有咎如噬嗑上九屨校滅趾之類是也此言無咎者蓋言人之有失者善能自改之故六爻之中有能改過而無咎者若豫之上六曰冥豫成有渝無咎隨之初九曰官有渝貞吉從正則吉也是故列貴賤者存乎位義曰位者即六爻之位夫一卦之中凡有六爻分其上下有尊有卑有小有大若九五則言君位九三則言臣位是尊卑大小各有其分則貴賤之位從而定矣齊小大者存乎卦義曰夫陽主剛明而有生成之德故其德大陰主柔順而有消剝之行故其德小故六十四卦皆本陰陽剛柔之理以定其位也故有大有小君子必當明辨之至如乾之與坤泰之與否損之與益小過與大過既濟與未濟是皆所用不同有小有大各隨時而用之也辨吉凶者存乎辭義曰辭者卦爻之下所繫之言辭也夫六十四卦有陽居陽位陰居陰位有以陽居陰位者有以陰居陽位者有以臣居君位者有以君居臣位者如此之爻位多矣聖人若不繫之辭則凶吉無由見矣至如比之六二居得其正則其辭曰比之自內貞吉小畜之初九以陽居陽則其辭曰復自道何其咎吉隨之九四以陽居隂則其辭曰隨有獲貞凶觀之初六以隂居陽則其辭曰童觀小人無咎君子吝噬嗑之上九以陽居隂曰何校滅耳凶是吉凶之文皆在於所繫之辭也君子之人若明辨吉凶之事觀其辭則可知矣憂悔吝者存乎介義曰介者纎介也悔吝者小疵病也夫人小惡不改以成於大惡小疵不補以成於大疵勿謂小善無益而不為勿謂小惡無傷而弗去及夫惡積而不可掩罪大而不可解以至何校滅耳喪身夷族然後悔之亦其晚矣故聖人凡小疵病鄙吝之事必先憂虞之所以獲其無咎也然則萬事之理皆始自纖芥故聖人豫防之故坤卦曰履霜堅氷者則聖人教人防微杜漸之深戒也震無咎者存乎悔義曰震者動也悔者過也夫人所以舉動而無咎者蓋有剛明之才有至正之德知其吉凶之道明其得失之迹事之小疵者預憂虞之事之將失者心改悔之所以舉動而無咎者蓋存乎悔也是故卦有小大辭有險易義曰其道光明則謂之大其道消散謂之小夫六十四卦之設有大有小有通有塞故六爻之中有變有動有險有易若履得其正居得其中行事無過則卦爻之下亦有和易之辭若履非其正居非其位行事失其中則卦爻之下亦有險難之文至如居泰之時則言君子道長居否之時則言君子道消明夷之時則言明有所傷大壯之時則言大者壯也以至吉凶悔吝善與不善惡與不惡卦爻之下各繫其辭以明之故上文所謂齊小大者存乎卦者是也辭也者各指其所之義曰言六十四卦所繫之辭各指事而言也至如適於泰卦則其辭和易適於蹇卦則其辭艱險適於謙卦則其辭巽順適於離卦則其辭文明是各指其事之所變而言也易與天地凖義曰自此已下至鼓萬物而不與聖人同憂盛德大業至矣哉為一章上既言卦爻辭理之義此又廣明易道深逺可以與天地相參凖也夫天地之道福善禍淫善者則祐助之惡者則傾覆之以至生成萬品之物皆以簡易之道自然而然也夫易之道本始於天地故六十四卦三百八十四爻所以統三才而妙萬物也故爻之善者則其辭善爻之惡者則其辭惡得其正者則其辭吉失其正者則其辭凶以至總包萬事之理皆以簡易之道自然而然也是大易之道之可以凖擬於天地也至乾以健而法天坤以順而法地之類是也故能彌綸天地之道義曰彌者縫也綸者經也言易道微妙包含萬象知鬼神之情狀明人事之終始上可以彌縫補合於天道下可以經綸牽合於地理無所不載無所不備者也仰以觀於天文俯以察於地理義曰天文者則是日月星辰布設懸象成文章故稱文也地理者則謂山川原隰高卑上下各有條理繁盛於地故稱理也夫易之本始始於天地聖人仰以觀於天文俯以察於地理揆萬物之情盡人事之理以至纎至悉無所不包無所不備是易之道也是故知幽明之故原始反終故知死生之説義曰幽者無形之謂也明者有形之義也明則為晝為陽幽則為夜為隂夫聖人之作易本凖擬於天地下總括於事物鬼神之情狀吉凶之萌兆隂陽之運動幽明之義理莫不統包於其間矣原始反終故知死生之説者夫易道深逺知幽明之故以原究事物之終始反復天人之本末萬物之榮枯四時之變化吉凶之兆動靜之理以至死生之説莫不知之精氣為物逰魂為變義曰精氣者則為隂陽精靈之氣也氤氲積聚而為萬物也遊魂者伸為物之積聚歸為分散之時則謂遊魂夫天地之道隂陽之精氣萃聚而生萬物於萬物之間受隂陽之精氣而靈者則為人人受隂陽之精氣萃之於身則有耳目口鼻心知髮膚而為之體魄也合於人身則謂之魂故口能言目能視耳能聽心能思慮則謂之神故用思慮心知才能則謂之變得精氣之多者則為神得精氣之少者則為魄及夫思慮既久精神已倦心知已勞髮膚漸衰用之太過及其死也體魄降於地骨肉斃於下精神散之於天則為神體魄散之於下則為鬼是天地之精氣萃聚於人身則為精神體魄矣故左氏載子産之言曰心之精爽是謂魂魄魂魄去之何以能久是言凡人得精氣之多者為神受精氣之少者為魄神魄萃之於身久而必去則精氣歸於天則為神骨肉斃於下散而無所之則為鬼又禮記祭義曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也衆生必死死必歸土此之謂鬼骨肉斃於下隂於野土其氣發揚於上為昭明焄蒿悽愴此百物之精也神之著也是言人之生則精氣聚而為神死則骨肉散而為鬼而精魂改變去形離體則為變化之道也是故知鬼神之情狀義曰鬼神者不疾而行不言而信視之弗見聽之弗聞者鬼神之道也夫鬼神之道本諸精氣體魄聚之而生亦由骨肉體魄散之而有冥冥然不知其所在聖人以其為無則曰不仁以其為有則曰不知其有形狀可覩哉然此言知其形狀者蓋言易道至大通於天地達於幽明不惟幽隱章顯之間而易道可以見矣與天地相似故不違義曰此已下言易道廣大盡生死之理幽明之故也夫天地之道春生夏長秋殺冬藏包含萬彚無小無大高者下者飛者走者莫不生育之故不可以一言而盡也夫大易之道陽剛隂柔窮幽極逺總括萬事從無入有至纎至悉莫不總明之故不可一言而盡也推其本原大易之道皆聖人窮神盡性而作也上則凖擬於天地下則包言于人物前乎天地則其道不過後乎天地則其道不異中於天地之間則其道若合符契而無違越是易之道與天地相似者也知周乎萬物而道濟天下故不過義曰聖人無物不知是知周也天下皆養是道濟天下也萬事皆得其宜是不過也夫聖人以仁知之德才能思慮周及萬物至於纎介之類皆蒙被之又以仁義施及天下使萬品之物天下之人皆得其所皆獲其濟而又所行之事合於大中無過無不及之事旁行而不流義曰夫聖人中天下而立正南靣而居拂其己之私邪去其已之阿黨所行之事中立而不倚正行而不邪以天下為一家以萬民為一情凡所動作莫不會合大中之道而行之此言旁行而不流者蓋言聖人非善於一身以至正之德上符於天下合於地中合於人無私無枉無所不契雖旁行於天下之間亦無私邪淫過流蕩之事所以然者蓋至公至正而致然也樂天知命故不憂義曰順天施化是樂天識物始終是知命夫聖人順天施化識物始終以其不可改者天命也由是推測天道以知己命至於富貴夀考貧賤夭折皆繫於天是以心無憂恤雖在貧賤亦不為險詖之行雖在富貴不為奢侈之心故孟子曰莫之為而為者天也莫之致而至者命也是言人之性命之理死生之道皆本於天固無可奈何然則富貴稟於天死生繫乎命既無可奈何則宜順從於天道樂天而知命原始而思終安靜而居則無憂恤也安土敦乎仁故能愛義曰安者靜也愛者養也夫聖人稟天地之全性五常之道皆出於中天下有一物不被其賜者若已內於溝壑由是推己之性以觀天下之性推己之仁以安天下之物使天下之人萬品之物皆安土而定居矣人能安土物既遂性則父母兄弟親疏上下遞相親睦而敦仁愛之心矣範圍天地之化而不過義曰範謂模也圍謂周也過者違也夫聖人粹天地之靈中天地而立觀天地之性然後正己之性觀天地之情然後正己之情凡所行事皆模範於天地隂陽之端至如樹木以時伐禽獸以時殺春夏則生育之秋冬則肅殺之使物遂其性民安其所是範圍天地之化而無過越也曲成萬物而不遺義曰曲者曲屈委細而成就萬物也遺者棄也夫聖人宅天下之廣居司萬物之性命模範天地以施化輔相天地以保民雖事物之微昆蟲之細亦皆以仁信屈曲而成就之至如綱罟以時不麛不卵是皆物之微細而不遺棄也通乎晝夜之道而知義曰通者無所不通之謂也書則為明為陽也夜則為幽為隂也夫聖人得天之正性秀出於人上與天地合其德與日月合其明通曉隂陽之宜默運鬼神之奧雖晝夜之道幽明之理無所不知無所不曉至如寒暑之代謝星晷之相旋隂陽之晦明風雨之凄暴未有不先知之矣自此已上皆言神之所為精氣為物逰魂為變之事聖人能極神盡慮推幽測隱無所不知也故神無方而易無體義曰神者隂陽不測幽微不可以測度故曰神無方者不見所處運動不息是無方也易者即周易也無體者唯變所適往來不窮是無體也夫天地之道妙用無門鬼神之道寂然無迹春生夏長藏往知來故不可以方隅而論之夫大易之道總括天地包含萬象惟變所適道無常用既不可以象類索又不可以形器求是亦不可以定體而論之也是大易之道與天地之道相凖如鬼神之妙用也一隂一陽之謂道義曰道者自然之謂也以數言之則謂之一以體言之則謂之無以開物通務言之則謂之通以微妙不測言之則謂之神以應機變化則謂之易總五常言之則謂之道也上既言天地之神大易之道窮變盡神妙用無方不可以方隅形體而求之此又言天地生成之道夫獨陽不能自生獨隂不能自成是必隂陽相須然後可以生成萬物故於冬至之日陽氣下施散而為春夏以生成萬物以至洪者纎者髙者下者皆遂其生以盈滿於天地之間然萬物既生不可不成之故於夏至之日隂氣下施散而為秋冬以成就萬物以至洪者纎者髙者下者皆遂其性以成就於天地之間是一隂一陽互相推蕩天覆而地載日照而月臨所以謂之道也繼之者善也義曰夫天地之道隂陽之功生成萬物千變萬化以盈滿於天地之間使高者得其髙之分卑者得其卑之理聖人得天地之全性繼天地生成之功以仁愛天下之物以義宜天下之衆使居上者不陵於下在下者不過其分是聖人繼天養物之功以為善行也故乾卦曰元者善之長是言天以一元之氣為衆善之長聖人繼其元善之功以理於物也成之者性也義曰性者天所稟之性也天地之性寂然不動不知所以然而然者天地之性也然而元善之氣受之於人皆有善性至明而不昏至正而不邪至公而不私聖人得天地之全性純而不雜剛而不暴喜則與天下共喜怒則與天下共怒以仁愛天下之人以義宜天下之物繼天下之善性以成就己之性既成就己之性又成就萬物之性既成就萬物之性則於天地之性可參矣是能繼天地之善者人之性也仁者見之謂之仁知者見之謂之知義曰夫聖人得天性之全故五常之道無所不備賢人得天性之偏故五常之道多所不備或厚於仁而薄於義或厚於禮而薄於信是五常之性故不能如聖人之兼也夫大易之道卦於伏羲重於文王爻辭於周公是三聖人垂萬世法則之書其間寫天地水火風雷山澤之象本凖擬於天地統鬼神之妙用惟變所適量時制宜故不可一義而求之也若仁者見之則知聖人之仁知者見之則知聖人之知是各資其分而已矣百姓日用而不知故君子之道鮮矣義曰夫聖人得天地之正性繼天地之行事故無所不知無所不明賢人得天地之偏又可以仰及於聖人之行事然聖人之道至深至奧賢人尚可以偏窺之至於天下百姓常常之人得天性之少者故不可以明聖人所行之事夫大易之道載聖人之行事包乾坤之生育鬼神之妙用人道之終始無不備於其間聖人體其用成其功業發見於天下則天下之人咸戴而行之莫知所以然而然也然而聖人君子雖能體易道以為用觀易道以施化然能悟君子之道者亦鮮矣顯諸仁藏諸用義曰上言神之所為此論易道之大與神功不異也顯諸仁者言道之為體顯見仁功衣被萬物是其顯也藏諸用者謂潛藏功用不使物知是藏諸用也夫天地之道乾剛坤柔日臨月照春生夏長秋殺冬藏使萬物綿綿而不絶者天地生成之仁也然不知天地生成之用也夫聖人之道恩涵澤浸政漸仁煦薄賦輕役恤孤軫貧使百姓安其土而不遷勸其功而樂事者聖人生成之仁也然不知聖人生成之用也夫大易之道寂然不見其體杳然不見其形以之悅懌生民功業萬世施為德澤則可以衣被萬物是顯諸仁也及夫推究原本測度云為不見其迹是藏諸用也是大易之與天地鬼神無以異也鼓萬物而不與聖人同憂義曰夫天地之道以時而生以時而殺雷霆以鼓動之風雨以滋潤之使萬物洪者纎者髙者下者皆遂其性或萬物之中有夭折暴亡凶荒札瘥者皆任自然之理不能憂恤之夫聖人代天牧民繼天之善以仁義之道生成於天下物之夭折暴亡凶荒札瘥者常如己內於溝壑之中是天地之道但能鼓舞於萬物而不能憂恤於萬物也聖人能生成於萬物又能憂恤於萬民也惜乎聖人所不得者天地之權也故大易之道載天地生成之理而不能與聖人同憂也老子曰天地之道氣猶槖籥以萬物為芻狗者此也盛德大業至矣哉義曰此已下至隂陽不測之謂神為一章此是十翼之中第五章今注疏之説皆以謂顯諸仁藏諸用而下至道義之門為一章今觀顯諸仁藏諸用鼓萬物而不與聖人同憂三句皆言上文天地不測之事故自此盛德已下至隂陽不測之謂神為一章自夫易廣矣大矣而下至易簡之善為一章盛德大業至矣哉者夫天地之道無所不生無所不育以生成之功言之其德至廣而其功至大也聖人法天之用廣生成之道萬物由之而通政教由之而理而又作工巧以便器用立商賈以通有無為之綱罟則以畋以漁為之耒耜則以耘以耨天下之人至於昆蟲草木無不被其賜者是聖人充盛之德廣大之業至極矣哉然必云盛德大業者蓋施於行則為德行於事則為業也富有之謂大業義曰自此已下覆説大業盛德因廣明易與乾坤之事夫天之生物盈滿於天地之間則謂之富聖人法天之行事布其德澤施其教化竭天下之財用聚天下之民物以為之富有富有天下措當世於不拔故謂之大業也日新之謂盛德義曰夫天地之道日往月來隂極陽生四時更變寒暑相推一日復一日其德愈新以至生成萬物日日而盛大聖人法此天地之道增修其德持循政教適時之變量事制宜使其德日日盛大生生之謂易義曰生生者隂生陽陽生隂也天地之道聖人之德以富有言之則謂之大業以日新言之則謂之盛德而又生成之道變化死生生而復死死而復生使萬物綿綿而不絶者天地聖人之德業也夫大易之道盡七九八六之數寫天地水火雷風山澤之象總隂陽生殺之理包人事萬物之宜變而必通終而復始隨時之變因事制宜凖擬天地之間則其功不異是生生相續而不絶也成象之謂乾義曰乾者健也夫天以一元之氣仰而望之其色蒼蒼然下周於地其狀如倚杵南樞入地三十六度北樞出地三十六度一書一夜凡行九十餘萬里自古至今未嘗有毫釐之差忒亦未嘗有分毫之不及以至生成萬物皆以乾健而神其用以成就萬物之形狀非剛健之功則不能如是也故伏羲始畫乾卦皆取健用為象也效法之謂坤義曰坤者順也夫坤地之道承天之氣而始終萬物無所不載無所不生皆效天而生育之故伏羲畫坤之卦亦皆取效坤順之義而名曰坤然則必言成象之謂乾效法之謂坤者蓋萬物之生必由天道剛健然後成其形象地道柔順必得陽氣然後順其物理以人事言之乾則為君之象坤則言臣之道天下之事非君不能立庶政之設非臣不能行也極數知來之謂占義曰夫大易之道總包天地動賾鬼神天下之事不言而自知吉凶之道未萌而先見皆聖人以蓍象之數占其事物之理逆知來事之意考其行事之驗以成其文也故下文所謂將有為也問焉而以言其受命也如響此之謂也通變之謂事義曰夫暑往則寒來陽生則隂伏物之所以理事之所以通生而後滋周而復始皆自於變化之力也故黃帝通其變使民不倦神而化之使民宜之易窮則變變則通通則久是皆自通變之道然後成天下之事也隂陽不測之謂神義曰夫萬物之生皆由天地隂陽之功以生成之然生成之道周而復始極而復生不言而信不疾而行以至變化之理及究其生育之形不可得而知也夫易廣矣大矣義曰自此已下至易簡之善配至德為一章此十翼之中第六章贊明大易之道至廣而至大也夫易變化極於四達是廣矣窮於上天是大矣故下文云廣大配天地是也以言乎逺則不禦義曰逺者四逺之外而不禦止也夫大易之道至廣而至大極天地之淵蘊盡人事之終始推於天下則天下之事無不備施之萬世則萬世之事皆可知窮於四逺則四逺之處不能以禦也以言乎邇則靜而正義曰邇謂近也夫邇近之地目所可覩耳所可聞思慮之所可及之處也故大易之道雖於邇近之間窮理盡性耳目之所覩思慮之所及寂然不見其形杳然不見其迹雖邪僻之不能干至於幽至於靜默然而得其正者大易之道也以言乎天地之間則備矣義曰言大易之道至廣而至大以言乎遐逺之間則不可禦止以言乎邇近之處則其道靜默以言乎天地變化之道則無所不備矣夫乾其靜也専義曰乾者天之用也夫乾之體至剛至健一晝一夜凡行九十餘萬里其剛健之德也如此夫然而生育之時雖純隂用事而坤道承陽之氣以發生萬物雖當純隂用事之時而陽氣凝然靜默任其専一之道以生於物也其動也直義曰直謂正直也言乾之用雖未生萬物之時其靜也専及其陽氣下降於地以生萬物其運轉則四時不忒寒暑無差剛而得正是以大生焉義曰言天地之道以其専一至靜之德運動而不失其正是以能大生於萬物也夫坤其靜也翕義曰翕者斂也夫坤之道凝然在下承天陽之氣以生於萬物當陽氣未降之時則翕斂其氣閉藏其用也其動也闢是以廣生焉義曰夫坤之道凝然在下翕斂其氣閉藏其用而不動及其陽氣下降之時開闢其用承陽之氣以生於物是以其生育之道至廣而無限極也廣大配天地義曰此已下申明大易之道也言大易之道至廣而至大無所不包無所不備上可以配之於天下可以周之於地其道至深而至逺也變通配四時義曰夫易之道至幽至賾惟變所適生而不絶周而復始變通之道無所常定亦可以配於四時至如乾坤之道生殺之理春則生之生之不已必夏長之長之不已必秋成之成之不已必冬幹之是四時生殺皆有其時而變通易有變通之理所以配於四時也隂陽之義配日月義曰夫易之中有隂陽猶乾坤之有日月夫日者是至陽之精照於晝而為明月者是至隂之精照於夜而為明故大易之道變通之理有剛有柔有隂有陽猶乾坤之有日月運其寒暑以成晝夜易簡之善配至德義曰夫大易之道包含萬象至纎至悉無所不載然而其道簡易不尚煩勞可以配天地之至德也子曰易其至矣乎義曰此已下至成性存存道義之門為一章此贊美易道至大至廣也夫易聖人所以崇德而廣業也義曰夫大易之道至廣而至極上可以括天之髙明下可以包地之博厚聖人用之可以增崇其至德廣大其功業也知崇禮卑義曰夫萬物之理萬事之原不能出於聖人之知然聖人之知必由禮而修飾之故知崇則如天之高至貴而人莫能及故禮卑如地之下至微而人不能出是至崇者不能及於知之髙至卑者不能出於禮之用也崇效天卑法地義曰言聖人之知崇而上效于天禮卑而下法於地知以幽逺為上則為崇禮以卑退為本故為卑也天地設位而易行乎其中矣義曰夫天以純陽之氣積於上地以柔隂之氣積於下天地初判二位既設則大易之位萬物之情以行於天地之間矣成性存存道義之門義曰性者天所稟之性也存存者不絶之貌也夫人稟天地之善性至明而不昏至正而不邪至公而不私若能觀天之性而成就己之性則可以生成於天下以盡萬物之性使萬物之性存存而不絶而道義之門自此塗而出也若夫不能觀天之性以正己之性則陷於邪佞而放僻之事從而至矣如是則不能成其道義之門不能開通其物故此大易之道凖擬於天地至公至正無私無曲成其治性之道存存而不絶成其道義之門為人之所出入而取法也聖人有以見天下之賾而擬諸其形容象其物宜義曰自此已下至負且乘致寇至盜之招也為一章注以謂至其臭如蘭則非也上既言易道變化神理不測此又明聖人見天下之賾以成萬物之形象也賾者幽賾也人之難見者也言聖人推測天下之幽賾以擬度萬事之理以凖擬萬物之形容以象萬物之所宜使皆各得其宜各順其性至如剛之理則擬乾之形容柔之理則擬坤之形容艮之性則言其止震之性則言其動陽物則言其剛隂物則言其柔若泰卦則言泰之形容象其泰之物宜若否卦則言否之形容象其否之物宜其六十四卦之中皆有所象矣是故謂之象義曰此已上結成卦象之義也夫言聖人因擬度萬物之形容以象萬物之所宜是故謂之象象者即文王所作彖辭以明一卦之象也則謂之象然六十四卦之中皆謂之象故前章云卦者言乎其象也是言聖人因推測天下之理以明萬物之宜故謂之象也聖人有以見天下之動而觀其會通以行其典禮義曰動謂變動也會合也通謂通變也言聖人觀此諸卦爻之變動明其吉凶得失之要以觀天地萬物會合變通之事其有合於理通於道者則為之常禮而行之其有悖於理違於道者則舍而去之是聖人明六十四卦動靜之理變通之事會合其典禮者也繫辭焉以斷其吉凶是故謂之爻義曰夫六十四卦有剛有柔有變有動會合於典禮者則為吉不會合於典禮者則為凶然而其義幽微常常之人不能明曉耳是以聖人於諸卦諸爻之下各繫屬其文辭以解釋之若陽居隂位則言其吉若隂居陽位則言其凶或近而相得則言其吉或逺而不相比則言其凶或居泰之時而行君子之事則吉或居夬之時而行剛壯之道則凶是皆觀天下之變動合剛柔之常理而繫屬其辭以斷定其吉凶之效也是故謂之爻爻者效也效諸物之變動明萬事之常理得其正者為吉失其位者為凶是吉凶之效自爻之動靜而見也故上章云爻者言乎變者也言天下之至賾而不可惡也義曰此覆説上文聖人見天下之賾也夫小人之性為讒為諂常有害君子之心然君子之人凡所作事使小人不得間而窺不得伺而疑故所行之事坦然而行小人不能以惡忌也故大易之道廣之如地高之如天君子小人之道無不備載於其間然雖有黜小人之辭然無心専在於小人但人事得失皆備言之故雖小人之心亦不能惡大易之道也言天下之至動而不可亂也義曰此覆説上文聖人見天下之動也夫天下之動吉凶是非姦邪情偽莫不錯雜於其間既姦邪情偽錯雜於其間則天下從而亂矣今此大易之道亦無心於聖人惟天地之通變人事之終始有會合於典禮者則為吉悖亂於常道者則為凶其文皆散在諸爻之下以明變動之理雖小人之情偽亦不能錯雜而紛亂之擬之而後言議之而後動擬議以成其變化義曰擬之而後言者此覆説上文天下之至賾而不可惡也議之而後動者此覆説上文天下之至動而不可亂也言聖人觀天下之運動明人事之得失一言之出必深思逺慮然後行之何哉蓋言之有善有不善若擬而出之則其言必善若不擬而出之則其言或有不善必須擬而出之則言滿天下無口過故云夫人動靜之間亦須合於道若議論而動之則無悔吝矣若不議論而動之則悔吝有時而至焉若議而動之雖行滿天下亦無怨惡也若能言動之間擬之而後為議之而後行則深思逺慮久而必精則可以通天下之變化為天下之法則者也鳴鶴在隂其子和之我有好爵吾與爾靡之義曰上既言擬議於善則善應之擬議於惡則惡應之是猶鳴鶴之在隂其同類者必相應之也夫鳴鶴在隂者此中孚之卦九二之爻辭也夫中孚之九二上應於九五當中孚之時二五以至誠相應用心不私然雖為六三六四以隂柔間厠於其間進無所適退無所遇二五雖不得相會然至誠相待終得其應此中孚之時卦象之如此也是猶鳴鶴之在幽隂之中而聲聞於外其子從而和之也我有好爵吾與爾靡之者亦是言至誠相待之故也夫美好之爵不自獨有宜與爾同類之人共分而靡之是言結之深用心不私至公至正也然此引而證之者蓋明聖人之言行當擬議而行之言之善者則善者應之言之惡者則惡者應之子曰君子居其室出其言善則千里之外應之況其邇者乎義曰此孔子因言聖人之言出於其近以行於逺出於其內以及於外出於其身以行於人也故君子之人凡居其室出一善言可以為天下之法可以興天下之利雖千里之逺而人皆從之況於邇近之人乎居其室出其言不善則千里之外違之況其邇者乎義曰言君子之人凡居其室出一言不善則不可為天下之法不能除天下之害不能興天下之利則千里之人皆違而不從之況邇近乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機義曰樞者户樞司其通塞之道機者弩牙主其矢之中否也夫言户樞之發或明或暗主其通塞之道弩牙之發或中或否主其發矢之中猶君子之人言行有善有不善者也夫君子之言行出之於身行之於外自邇而及逺由中而及外若發而為善則天下從而法則之若發而不善則天下從而違去之是言行之出為命為令有得有失若尸樞之主通塞猶弩牙之有中否中則為天下之榮否則為天下之辱是言行者君子之樞機也樞機之發榮辱之主也義曰言行者本由君子之出發之中與不中是榮辱之主也言行君子之所以動天地也可不慎乎義曰夫君子之言行有善有不善必當思慮之若思之不精慮之不深則言之不善矣善與不善皆動之於天地也故書曰天聰明自我民聰明天明威自我民明威言天體雖髙而下聼於卑矣夫君子之言善則為號令以除天下之害以興天下之利天下之人和樂而從之民既和之則善聲動於天善聲動於天則上天降其福若言之不善不能興天下之利不能除天下之害則天下之人嗟怨而不從之天下之人既嗟怨而不從之則怨氣瀆於天怨氣瀆於天則上天降之以禍是君子之言行出則動乎天地必當精心而致思之可不戒慎乎同人先號咷而後笑義曰此是同人九五之辭言同人之九五下應於六二然有九三九四為己之寇難六二以至誠相待雖為三四寇難終得為正應也然此引之者凡易之辭有理義未盡者孔子復引而明之言同人之九五始為三四寇難不得與二為應是先號咷也然二五至誠相應終得會遇是後笑也故因此言行陳其至誠之道故引以為義也子曰君子之道或出或處義曰夫君子之人懷才抱道有經邦濟世之才若遇其時遇其君則進登王者之朝以濟天下之民故曰或出若不遭其時不遇其君則守其至正之道待時而動故曰或處或默或語義曰夫君子之人凡居於室不可以妄語但寂然不言默然不語或當可言之時必精思而慎慮之然後可言也夫如是雖言滿天下無口過行滿天下無怨惡使天下之人莫不恱而從之而其心一歸於大中之道也然則君子之人同類相應同心相得不必同其道然後言之至如禹稷事於堯朝憂天下之飢如己之飢憂天下之溺如己之溺又顔子一簞食一瓢飲在陋巷人不堪其憂孟子謂禹稷顔回同道又如箕子佯狂殷紂微子去之比干諫而死是皆其心異而其道同也惟君子之言必當擬而後言議而後動則語默出處自然合於道矣二人同心其利斷金義曰金者至堅之物也夫君子之人推誠以待物則物以至誠待於己凡是同心同類之人皆感悅而從之不必求同於己之道者但其心一同則可也至如二人同心合謀共慮成天下之能事雖至纎至悉之利亦可以斷截堅剛之金是同心之人至利者也同心之言其臭如蘭義曰臭者香氣也蘭者香草也言君子之人既能同心同德合謀共慮吐言發語有馨香之臭氣如芝蘭之馥郁芬芳以達於天地之間也初六藉用白茅無咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也義曰自此已下當連上文為一章注疏以此為第七章之始非也當連上文則是此是大過初六之爻辭也夫大過之時政教陵遲紀綱廢墜上下失道本末衰弱惟是有大才德之人過越常分以拯救之然聖賢之人雖過越常分以拯救天下之事然居事之始不可不慎重之苟不能慎重之則害於成事而以災其身夫置器於地必安全而無傾覆之事今置器於地又以潔白之茅薦藉之是過慎之至也既過慎之則安全而無傾覆也故孔子因論君子擬議其言行故以此明慎事之始如置器於地又藉以白茅是慎之至也何咎之有乎夫茅之為物薄而用可重也慎斯術也以往其無所失矣義曰夫茅之為物雖柔弱菲薄然祭祀之時必取而為用以薦藉宗廟之靈雖為物甚微然有潔白柔順之質其用也重矣聖人因其慎事之始又取茅之所用之重以明慎重之術以此而往則無所失且天過之事尚且如此况於小小之事乎勞謙君子有終吉義曰此是謙卦九三之爻辭也夫謙之九三以陽居陽在下卦之上以位言之則居得其正以身言之則在人臣之極位上奉於君下在百官之上其責至重其職非輕是以上則勞謙以事於君下則勞謙以接於人不以勤勞為慮常惟曠官之責夫如是是勞謙君子有終者也然則必言君子之終者何也夫小人之性亦有謙順之時然其心易變朝行而夕改不能終始而行之唯其君子之人慎始至終有其本末故云君子終吉也在古之時惟周公可以當也夫周公是文王之子武王之弟成王之叔當周之時而相武王伐紂一戎衣而天下定逮夫成王幼弱己居三公之責攝天子之位握天下之重權位非不尊也權非不重也天下非不歸也而周公盡人臣之忠節竭人臣之思慮以事於沖君復制禮作樂朝諸侯於明堂天下臣民陶然而歸之然周公之心猶且吐哺握髮以下白屋之士上盡忠節以奉於君下盡謙恭以下於人自古至今未有如周公之德者也子曰勞而不伐有功而不德厚之至也義曰此孔子因言君子勞謙以成功業又不自矜伐其功逞已之德稱為己善者也在古之時惟夏禹可以當也夫夏禹事於堯舜之朝洪水滔天浩浩懷山襄陵下民昏墊天下之人物幾魚鱉矣而禹獨以聖人之德盡已之力竭己之謀慮周行天下疏河決導尋源分派以通水之性成其功業天下之人得免魚鱉之患此禹功之最大者也自古至今天下莫有及禹之功者也然禹不自以為功故舜舉之曰汝惟不伐天下莫與汝爭功汝惟不矜天下莫與汝爭能是大禹不自矜伐其功德也此是德厚至極者也語以其功下人者也義曰上既言勞謙君子有終有功而不德故此大易之道語説謙卦之九三能以謙順之功卑下於人者也德言盛禮言恭義曰夫君子之德以盛為本苟不盛大之則不足以為德故德言盛者取其日新之謂也禮言恭者夫君子之行禮必以謙順為本以恭敬為先苟不能恭敬而行之亦不足謂之禮故禮言恭者取其恭順之謂也謙也者致恭以存其位者也義曰夫君子之人在人臣之極位處百官之上必當盡恭順之節以事於君懷恭順之誠以接於下然後可以存乎其位也若居人臣之極位在百官之上不能盡恭順之節以事於君不能懷恭順之誠以接於下則不能保其祿位也必須致恭然後可存其位也亢龍有悔子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也義曰上既明謙德保位此明無謙則有悔也故引乾卦上九之辭以證之夫乾之上九處一卦之極過於九五在窮極之地是知進而不知退知存而不知亡也夫君子之人若能居富貴之位不自髙亢執其謙順則可保其位而獲吉也若不能謙順是為亢龍之悔咎矣子曰貴而無位髙而無民者夫人君之位止於九五今上九之爻過於九五失其中道而在窮極之地是天下之民不與也故云貴而無位髙而無民者夫欲率天下之民莫非有才有位然後可以無悔今上九已過中道越於九五雖居德位之尊奈何天下之民皆歸於九五上九之爻則是髙而無民也賢人在下位而無輔是以動而有悔也者夫天下之賢患乎不用既得其用患乎不才既有其才患乎無君既有其君即盡忠竭節以事之今上九之爻過於九五在窮極無位之地則是無權之人也雖天下賢才至衆但甘於藜藿處於蒿萊不輔於上九過亢之人也是以上九動靜之間必須有其悔吝也不出户庭無咎義曰此節卦初九之爻辭也上既言乾之上九不知進退恃其崇髙之位生其驕亢之心以至其道窮極動有悔吝此又言聖賢語默之間必當周密故引此節卦初九之辭以證之夫節之為道節人之情防人之欲禁民之非止民之偽天下之所惡聞人情之所不願者也凡君子之人為節之道必當慎重而周密不可使人窺覩若一漏泄其幾則人之情偽姦詐萬狀叢然而生壞於成事如是則法出而姦生令下而詐起耳故君子凡節天下不可不周密之苟能周密慎重不露其芒角使小人不得間而窺則可免其過咎矣子曰亂之所生也則言語以為階義曰階者梯階人之所履也夫亂之所生也皆言語以為之梯階夫君子之人排斥姦邪創立制度必當慎其言語苟言之不慎則亂之所由矣是故亂之生皆自言語以為之梯階也君不密則失臣義曰夫為臣之道盡忠竭節以諌於君成興天下之利或除天下之害或斥言姦邪或指陳僭忒與君同謀共慮君不能慎密彰露其事為衆所共聞則人生嫉妬之心以至失臣之身也臣不密則失身義曰夫人欲興天下之利除天下之害成一時之功為萬世之法以鼎新天下之法制者必當慎其幾藏其密也苟言行之有虧失聞之於外為人之所疾害則是自害失其身也幾事不密則害成是以君子慎密而不出也義曰言君子之人幾密之事不可不慎苟一漏泄其幾為小人之所窺覩則姦邪互生情偽交作害廢於成事敗壞於法制如是則天下從而亂矣是以君子凡立成事謀議姦邪不可不為之慎密是以君子慎密而不出也子曰作易者其知盜乎義曰此又言人之愛惡相攻逺近相取盛衰相變情偽相易釁隙相乘而成寇盜之事故孔子因言易中知寇盜之事乎故發而問之曰作易者其知盜乎易曰負且乘致寇至義曰此解卦六三之辭也夫解難之時承蹇難之後君子有才有位者則可以釋天下之難六三之爻以隂柔之質居於陽位以位言之則不中也以身言之則不正也夫以隂柔不中不正之小人而居君子之位行其諂佞之行荼毒良民不可以久居其位必為盜之所奪人之所不與焉故曰負且乘致寇至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣義曰負者是負擔之小人乘者君子所乘之車也夫人臣之位佐君澤民須賢者居之則天下之人受其賜而太平之功可致矣夫君子之器必君子居之若以負擔之小人而乘君子之器不惟天下之所厭棄抑亦為寇盜之所爭奪也上慢下暴盜思伐之矣義曰夫小人居君子之位驕慢在下之人暴虐為政不唯盜之所奪抑亦為盜之侵伐矣然則居人臣之位處百官之上必當任賢使能以居其位今小人居君子之位此蓋在上之人不能選賢任能遂使小人乘時得勢而至於髙位非小人之然也蓋在上者選之不精也慢藏誨盜義曰夫爵祿之位寶器之物必當慎而藏之苟不能自寶藏之常守不謹則是教誨竊盜之人以取之是自己之招也非盜賊之然也冶容誨淫義曰冶者天冶也夫強暴之男不能侵人之正女今女子不能內守閨門之行反自妖冶其容粧麗其色使外人之窺覩而生不軌淫欲之心是教誨淫者使侵于己也此蓋非外物之然蓋己身之不正所招也至如小人在位不能慎守其身貪殘荼毒恃其崇髙耽其驕慢以至為寇之所奪亦由已之所招也故復引易負且乘云易曰負且乘致寇至盜之招也義曰言小人乘君子之位必為盜之所奪者蓋由己身不正而然也然則上文首尾皆稱易曰負且乘者蓋欲人慎重其事故再言之大衍章釋義義曰按此一章有脫落之處亦有倒錯之文何以知之按下文云子曰知變化之道其知神之所為乎下文又不言變化之道又一章言天一地二天三地四天五地六天七地八天九地十下文又不言天地之事大衍之數五十有五而經文止言四十有九以此推之則此文倒錯而脫漏矣今當先言子曰知變化之道者其知神之所為乎次言天一地二天三地四天五地六天七地八天九地十又次言天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之數也次言大衍之數五十有五其用四十有九分而為二以象兩挂一以象三揲之以四以象四時歸竒於扐以象閏五歲再閏故再扐而後挂是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣顯道神德行是故可與酬酢可與祐神矣子曰知變化之道者其知神之所為乎義曰此言大易之道知變化之理知神所為也夫天地生成之道變化萬品春生夏長秋殺冬藏自然而然莫知其變化神用之理故大易之道知其變化之理其知神之所為乎天一地二天三地四天五地六天七地八天九地十義曰此言天地生成之數也夫天以一生水生數一地以二生火生數二天以三生木生數三地以四生金生數四天以五生土生數五此是天地之生數也如是則隂無匹陽無耦故地以六成水故成數六天以七成火故成數七地以八成木成數八天以九成金成數九地以十成土成數十隂陽有匹而物乃成故謂之成數也然數之所起本起於隂陽隂陽往來見於日道十一月冬至日南極陽來而隂往冬水位也以一陽生為水數五月夏至日北極隂進而陽退夏火位也當以一隂生為火數隂不名竒數必以耦故以二隂生為火數也自冬至以及夏至當為陽來正月為春木位也三陽已生故為木數夏至以及冬至當為隂進八月為秋秋金位也四隂已生故四為金數三月春之季季土位也五陽以生故五為土數此其生數之由也故五行始於水而終於土者此也然則天是純陽故為竒而稱九地是純陰故為偶而稱十是竒偶之數以分陰陽之象故陽數竒者一三五七九是也陰數偶者二四六八十是也故天地竒偶之大數總而言之五十有五陽數竒故其數二十有五陰數偶故其數三十是以天一加天三是四四又加其天五是九九又加其天七是十六十六又加其天九是二十五數也地數自二者自二加其地四是六六又加其地六是十二十二又加其地八是二十二十又加其地十是地數三十也是以天地之數五十有五以成變化之道以盡生成之數所以成天下之務故天之數合而成二十有五地之數合而三十自天一至五是天之五數自地二至十是地之五數也故言天數五地數五天數五地數五五位相得而各有合義曰自天一合於地之六為水自地二合於天之七為火自天三合於地之八為木自地四合於天之九為金自天五合於地之十為土是五位相得而各有合者也天數二十有五義曰言天之數竒自一三五七九合為二十五也地數三十義曰言地數偶自二四六八十合而為三十也凡天地之數五十有五此所以成變化而行鬼神也義曰此已下聖人因其揲蓍以考天地幽賾之事明其天地萬物之理故以蓍草之數占之以明隂陽之用也言天地之數自二十五至三十總而合之則有五十五數以成隂陽竒耦之數成其變化之道萬品之數而行乎鬼神之幽賾者也乾之策二百一十有六義曰夫乾坤二卦隂陽之象陽爻竒故一爻有三十六策隂爻偶故一爻有二十四策自乾坤而下凡三百八十四爻隂陽之數相半故陽爻一百九十二隂爻亦一百九十二總而言之有三百八十四爻故乾為老陽一爻有三十六策二爻是七十二策三爻是一百單八策四爻是一百四十四策五爻是一百八十策六爻是二百一十有六策也坤之策百四十有四義曰夫坤爻偶故一爻有二十四策二爻有四十八策三爻有七十二策四爻有九十六策五爻有一百二十策六爻有一百四十四策是乾坤之十二爻竒偶之策總而言之有三百六十是故聖人因其乾坤竒偶之數成為一歲凡三百六十日也凡三百有六十當期之日義曰夫乾坤之策凡三百有六十聖人因之以成為一歲一歲之內凡三百有六十日然天之有三百六十五度四分度之一故月行速一月一周天日行遲一歲一周天若以全數言之則一歲三百六十日餘其六度又一歲有六小月三年之中餘三十六日故為一閏一閏之中又餘六日又於五年之中積其二十四日合前六日成三十日又為一閏是五歲再閏也此言期之日為一歲之期也二篇之策萬有一千五百二十當萬物之數也義曰二篇者言乾坤上下之二篇也夫伏羲畫八卦已後文王重為六十四以其易道廣大卦義淵深乾坤能始生萬物故以乾坤為上經之首以坎離而終之故為上篇之終自咸恆明人事之大故為下篇之首以既濟未濟而終之故為下篇之終凡此上下二篇有三百八十四爻隂陽之數各半故乾之爻一百九十二坤之爻亦一百九十二凡陽爻三十六策十爻是三百六十策一百爻是三千六百策二百爻是七千二百策却於二百爻中退八爻三八二十四除却二百四十策又六八四十八又除四十八策是乾之爻一百九十二爻都總策數是六千九百一十二策隂爻亦一百九十二爻每一爻策數是二十四策十爻是二百四十策一百爻是二千四百策二百爻是四千八百䇿却於二百爻內除了八爻二八一十六是一百六十策又四八三十二又除三十二策內有一百九十二爻都總策數是四千六百八策也以乾之六千九百一十二策合坤之四千六百八策都合為一萬一千五百二十策以象萬物之數矣然則隂陽奇耦之數其中有萬有千有百有十故可以極天下之務成天下之事夫萬物之數無所不備矣然此皆是老隂老陽之數也而乾坤之間亦有少隂少陽之數也故少陽之數七四七二十八是少陽之數也少隂之數八故四八三十二是少隂之數也自二十八至十爻二百八十一百爻是二千八百二百爻是五千六百策又於二百爻內除八爻二八一十六一百六十䇿又八八六十四是六十四策除了二百二十四策內有五千三百七十六䇿少隂之數三百二十爻三百二十一百爻三千二百二百爻六千四百䇿却於二百爻內除了八爻三八二十四二百四十䇿又二八一十六一十六策內有六千一百四十四䇿共計少隂少陽之數一萬一千五百二十當萬物之數是少隂少陽與老隂老陽其數皆一也此不言少隂少陽止言老隂老陽者蓋易以變為占言其變則神其用舉其大則明其小蓋老隂老陽少隂少陽其數皆一亦有萬一千五百二十當萬物之數故但言老隂老陽而少隂少陽從可知矣然必曰老陽老隂少陽少隂者蓋陽以老為尊隂以少為貴大衍之數五十其用四十有九義曰按此大衍之數當有五十有五何以明之按上文言天一地二天三地四天五地六天七地八天九地十是天數二十有五地數三十總而五十有五也今經文但言五十者蓋簡編脫漏矣然則天地生成之道始於太極是故聖人因其天地生成之道自然之理積其成數總而五十有五以明天地之大法今注疏之説但言其用五十殊不知天地生成之數上言天一地二天三地四天五地六天七地八天九地十之數上文既言五十有五之數豈得止言五十哉此注疏之非也歷代以來言之者甚衆京房則五十者謂十日十二辰二十八宿也凡五十其一不用者天之生氣將欲以虛來實故用四十九焉馬季長云易有太極是北辰也太極生兩儀兩儀生日月日月生四時四時生五行五行生十二月十二月生二十四氣北辰居位不動其餘四十九轉運而用也荀爽則曰卦各有六爻六八四十八加乾坤二用凡有五十乾初九潛龍勿用故用四十九也鄭康成則曰天地之數五十有五之數五十有五者其六以象六畫之數故減之用四十九王弼則曰演天地之數所賴者五十其一不用者以其虛無非所用也子夏則曰其一不用者太極也無可名之謂之太極此皆殊無所據獨鄭康成姚信董過三人皆言天地之數五十有五然而又不知四十九之用今注疏之説但言聖人推測天地之數止用五十非數而數以之通不用而用以之成又言虛一以象虛無之氣此皆近於莊老空空之説以惑後世今止取五十有五之數以其上文既言天數二十五地數三十是天地生成之數自然之理萬有一千五百二十隂陽竒耦之數天下人事之理萬事之情萬品之物無不總此生成自然之數然而其所賴者四十有九何則夫天數二十五地數三十是老隂老陽之數也以數言之隂數多於陽數而隂者是臣之象也陽者是君之象也今地數三十隂之盛於陽臣之盛於君子盛於父卑盛於尊此至逆之象也是故聖人因其天地生成之數自然之理酌其老隂老陽之數以其隂不可過於陽臣不可盛於君故於地數三十之中去其六策又合於坤之一策二十四遂以地數以卑為尊故去其六數止以二十四合於天數二十五共為四十九數取其隂下於陽臣下於君子下於父卑下於尊此是至順之道也故其用四十有九然後可以神其用矣分而為二以象兩挂一以象三揲之以四以象四時義曰夫大衍之數始本五十有五然其所賴者四十有九然四十九數未分之時則為一以象太極天地未判之際次分而為兩以象隂陽分剖之理於左手則為陽於右手則為隂然隂陽既分而人事未備又於左手之中挂其一於小指之間以象三才言天地人事萬品之類皆備於其間又揲數之以象四時者又以左右手握之四數之以象天之有春夏秋冬四時運轉寒暑往來不絶之義也歸竒於扐以象閏五歲冉閏故再扐而後挂義曰言既揲數之其有餘者則歸之於左手所挂一之處以象其閏然則天之有三百六十五度四分度之一日行遲一歲一周天月行速一月一周天以全數言之則日一年行三百六十度餘有六度是故聖人因此大衍天地生成之數推測幽隱以其揲蓍之數四數之其有歸餘殘竒之數則歸於所挂小指之間以象其閏既取歸餘殘竒之數以象其閏然於二年之中為閏又其數未備於三年之中為一閏又其數出剩遂於五年冉閏則其數始足故一歲之間所剩六度又有六小月是十二日也三年之中凡三十六日故閏一月又剩六日遂於五年之中積為二十四日加此六日即為三十日故五年冉閏也然揲蓍之數歸餘殘竒零止有一二三為殘竒今注疏之説以謂四為殘竒則非也且四四數之是全數也若以全數為殘竒則無所據但止有一二三為殘竒也若無餘則冉扐而後挂之然後見成閏積分之數也然謂冉扐而後挂者蓋上言歸竒於扐以象閏五嵗冉閏故再扐而挂之是也是故四營而成易義曰是故者連上文也四營者則謂四度經營而成變易也四營者則謂上揲之以四以象四時歸竒於扐以象閏五歲再閏故冉扐而後挂是也凡此四度經營然後成其變易之道十有八變而成卦義曰凡言一爻凡三度揲之則為一爻一卦六爻三六一十八是十有八變而成一卦也八卦而小成義曰言伏羲所畫八卦乾坤艮巽震離坎兌是也八卦既立寫其天地水火山澤風雷之象水火山澤風雷之象既立是以健順動止明入陷説之性畢備此八卦之小成者也引而伸之觸類而長之天下之能事畢矣義曰言文王因此八卦小成之後遂引伸八卦為六十四卦又因其事物萬品之類而增長之若觸剛之事類以次增長其剛若觸柔之事類以次增長其柔是以天地之性萬物之理天下之情偽萬物之本至纎至悉天下之能事無不畢載於其間顯道神德行義曰上既言天地之數天下之能事畢載於易故可以顯明其萬物之理萬事之情原其所由不知所以然而然又可以神其德行莫見其迹也是故可與酬酢可與祐神矣義曰酬酢者謂報答之辭也言易之道既言天地幽賾之事又顯明萬事之理又以蓍數明其吉凶之事知其未來明其已往使人占兆之知其吉凶之驗使人從善而去惡從吉而背凶若響之應聲而應對之也可與祐神者言易道既言吉凶之事使人占之從吉而懼凶是可以祐明神之德而行事者也易有聖人之道四焉義曰此已下至易有聖人之道四焉此之謂也為一章言大易之道探賾索隱以成其道故所用之道有四焉以言者尚其辭義曰言則謂大易之中所述之言辭也言聖人探賾索隱作為大易聖人之情顯見於言辭之間故君子之人欲觀大易之意必觀聖人諸卦爻所繫屬之文辭見聖人之情意也以動者尚其變義曰動則謂諸卦諸爻也變動也言聖人仰觀俯察作為大易設為六十四卦其爻有得位者有失位者有變有動有正有不正有中有不中有應有不應者是諸卦之爻有變動者也既有變動則吉凶悔吝生乎動矣有動而悖於理者則凶有動而合於道者則吉是故君子之人凡欲知其吉凶悔吝存亡之幾必先觀其諸卦諸爻之變動然後可以知吉凶之事悔吝之虞變通之理然後趨其善而背其惡向其吉而避其凶所以致身於無過也以制器者尚其象義曰象則謂大易之中聖人所設六十四卦之法象也至如伏羲作結繩而為網罟蓋取諸離神農作耒耜取諸益宫室取大壯􅋃矢取諸睽如此之類皆是尚其法象也故君子欲觀制器之用必觀聖人設卦制器之法象也以卜筮者尚其占義曰筮則謂蓍策龜兆之占筮也夫凡人之生必有疑二之事得失之理不得以前知是故聖人作為大易設為六十四卦有變通之理有吉凶之驗以其凡人不能無疑不能無吉凶然吉凶之道雖聖人有所不知聖人既有所不知必謀之於鬼神以明得失吉凶之事然鬼神之道至幽至隱不可以形覩不可以象窺冥冥然莫知其所與人有異然聖人必謀之者是故假其至誠取其蓍龜之數審之於天地之數明諸卦諸爻變動之理以明過去未來之事則必以卜筮占策然後可以前知矣是以君子將有為也將有行也問焉而以言其受命也如響義曰言君子之人既能觀此四者之事凡有所施為凡有所行往必先問焉而以言考其蓍龜之靈占筮之策通變之理吉凶之道然後其受命也如響之應聲無有逺近幽深遂知來物義曰言此大易之道告示於人無有遐逺邇近幽邃深密之間皆前知其吉凶禍福之驗天地隂陽之理將來之事已往之失皆前知矣非天下之至精其孰能與於此義曰言大易之道若非至極精妙通達天下其孰能與於此哉參伍以變錯綜其數義曰參則謂三也伍則謂伍也言天一之數有三有五至如天之一下交於地之六生水地之十上交於天之五生土是天地之數三五通變上下錯雜綜統以成萬物之數通其變遂成天地之文義曰言天地隂陽之道通變之理化裁之迹老隂老陽之數交而相雜以成天地之文若剛柔晝夜之道寒暑往來之功青赤交雜之類二百一十有六以定乾之老陽之象一百四十四策以定坤之老隂之象如此之類他皆可知也極其數遂定天下之象義曰言聖人窮極天下之數隂陽之策萬事之理纎介之微然後可以定天下之法象也非天下之至變其孰能與於此義曰言大易之道極窮天地之數以成天下之法象若非天下至變至通之道其曷能與於此哉易無思也無為也寂然不動感而遂通天下之故義曰言大易之道能極盡天下之數極盡天下之事然而易之道不假思慮任用自然不須經營任用自動寂然不見其迹默然不見其形若聖人以至誠之心感而行之則通變之理萬事之宜自然而達矣非天下之至神其孰能與於此義曰夫非忘象者則無以制象非遺數者無以極數至精者無筮策而不可亂至變者體一而無不周至神者寂然而無不應斯蓋功用之母象數所由立也言大易之道若非道極微妙變化如神極深研幾探賾索隱其孰與於此哉夫易聖人之所以極深而研幾也義曰此以下又明聖人作易之道極窮幽隱識照幾先而作其易者也深者則謂未有其理未見其形而聖人極深其用者也幾則謂有其理未形則謂之幾也言聖人作易以極其有理未形之幾也唯深也故能通天下之志義曰夫人之深未有其理未有其形而又天下之心億兆其心而聖人以己之深可以通天下之志何也蓋天下之心雖億兆之心而聖人以己之心可以見天下之心以己之志可以見天下之志何則夫人情莫不欲飽暖而惡其飢寒人情莫不欲夀考而惡其短折人情莫不欲富貴而惡其貧賤人情莫不欲安平而惡其勞苦是故聖人以己之心推天下之心億兆之衆深情厚貌皆可以見矣雖億兆之心至多而難見而聖人但以一己之心一身之勞逸雖未見其理未顯其形則天下之心自然而見矣唯幾也故能成天下之務義曰幾者是有理未形之謂也夫君子之人欲極天下之務必先博學之審問之慎思之明辨之篤行之既能如是則雖天下之務萬事之微盡可見矣所謂知至知終者是也唯神也故不疾而速不行而至義曰夫大易之道極深研幾無思無為寂然不動能通天下之志能定天下之務是其功如神不疾而速不行而至者也子曰易有聖人之道四焉者此之謂也義曰此又言大易能通微妙以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占故天下之能事畢矣然則首尾俱言聖人之道四者蓋為此一章之中所陳者三事一曰非天下之至精二曰非天下之至變三曰非天下之至神皆是廣言大易之道然三事之中亦不出於聖人之道四故首尾總而結之也子曰夫易何為者也義曰自此以下至民咸用之謂之神為一章此十翼之中第十子曰夫易何為者此蓋孔子歎大易之道其功深賾故假設此發問之辭以問之曰夫易者何為者也夫易開物成務冒天下之道如斯而已者也義曰此夫子自釋易之體用也開者通也冒者覆也言大易之道其功宏博能開通於萬物之志成就夫天下之務覆冒夫天下之物也至如泰卦則言財成之義履卦則言履素之宜革卦則言治厯之事鼎則言鼎新之旨旅則言無敢折獄遁則言遁尾之厲大壯則言君子用罔乾卦則言亢龍有悔者如此之類是皆開通萬物之志成就天下之務覆冒天下之道如斯之道則大易之體用也故云如斯而已是故聖人以通天下之志義曰夫大易之道其功廣大是故聖人以此之故以通達天下之志者也然則天下之人心志至衆至繁而聖人以大易之道以通天下之志者何也蓋聖人有深幾之見極未形之理以已之心可以見天下之心以已之志可以見天下之志雖天下之人心志至衆至繁然聖人以已之幾深度人之情偽利害極未形之理可以見天下之志者也以定天下之業義曰言聖人以此大易之故極其幽深研幾成天下之務冒天下之道以定天下之功業也以斷天下之疑義曰言大易之道通於人事一卦六爻有得位失位者然吉凶悔吝雖聖人亦有所不知於人事之間不能無疑是故聖人雖以其蓍策占筮之然亦不能無疑惑之心而又謀之於鬼神謀之於天地以成其卦爻又於卦爻之下繫屬其文辭以決斷天下之疑也至如乾之初九言潛龍勿用離之六四言突如其來如此是斷其疑也是故蓍之德圓而神義曰夫蓍策之數未占已前其吉凶悔吝人皆不可見無有窮極無有定止其通變之道天地之宜其用如神運而不窮周流通暢也卦之德方以知義曰言蓍策之數未占之時雖其用如神其吉凶悔吝周流通變運而不窮及其揲蓍之後布成其卦卦有六爻卦爻之下有得位有失位有中有正有凶有吉有悔吝皆繫屬而不可變動故言方以知者是知其過去未來之事極其未形之理其情偽利害盡可見矣然則必言蓍德圓而神卦德方以知者蓋神以知來是來無方也知以藏往是往有常也物既有常猶方之有止數無常體猶圓之不窮故蓍之變通則無窮神之象也卦解爻分有定體知之象也知可以識前言往行神可以逆知將來故蓍以圓象神卦以方象知也六爻之義易以貢義曰貢者告也言聖人因蓍策之數以布設六十四卦卦有六爻以盡萬物之理然爻有應有不應有正有不正其間吉凶悔吝皆不能告諭於人故大易之道極未形之理知過去將來之事故六爻之下皆繫屬文辭以貢告於人也至如比之初六言吉大過上九言凶如此之類是皆告於人使人從善而去惡從吉而去凶也聖人以此洗心義曰夫大易之道至公至正極天地之理盡人事之宜其吉凶悔吝皆繫屬於諸卦爻之下聖人觀之可以洗蕩其心至如萬物有疑則卜之是洗蕩其疑心行善則吉行惡則凶是洗蕩其惡心也既洗蕩己之心然後可以洗蕩萬物之心也退藏於密義曰言此大易之道索隱窮神能蕩滌萬民之心雖有吉凶悔吝之變仁義之術而人不知自用是其功如神之藏密也故上文所謂顯諸仁藏諸用者此也吉凶與民同患義曰夫人之生愚夫愚婦者甚衆其性昏蒙憧憧然不知所以然而然舉動之間雖有凶咎悔吝之事而不知自止是故聖人以此大易之故明示其吉凶憂患使趣其善者舍其惡向其吉者背其凶是大易之道與民同憂患也神以知來義曰言大易之道知其未來之事明其未形之理故其用如神也知以藏往義曰言此大易之道因蓍之策知其過去已形之理其妙皆知之也然則必言知來藏往者蓋蓍定數於始於卦為來卦成象於終於蓍為往其孰能與於此哉古之聰明睿知神武而不殺者夫義曰言大易之道神以知來知以藏往非此之故其孰能與於此哉惟是古者聰明睿知之人可以與之耳無所不聞故曰聰目無所不見故曰明思無所不通故曰睿才無所不及故曰知言惟是聰明睿知之人有文有武既能察微又有剛斷故於大易之間卦爻之下各隨動靜神其吉凶之事明其威福之理示人以信則人自然而威服之至如􅋃矢取諸睽刑罰取諸噬嗑如此之類皆是神其威武不用刑殺而天下自然威服也是以明於天之道而察於民之故是興神物以前民用義曰言聰明睿知之人既能神其威武而不殺是以大明天地隂陽變化之道大察天下情偽利害之故又以神靈之物明其吉凶之驗以前萬民之用至於未來之事皆繫屬其辭使人通曉之趣其善而去其惡者也聖人以此齋戒義曰洗心則謂之齋防患則謂之戒言聖人以此大易之道齋心防戒其患害之事使憂虞悔吝不能及於己至幽至微之處皆得以先知也以神明其德夫義曰言聖人既能以大易之道齋戒而防患又能觀易道幽深以神明其德使天下之人不知所以然而然也是故闔户謂之坤義曰此以下又廣明大易自乾坤而來也夫坤者隂也主夫地然坤之道主夫生成萬物若陽降其氣則坤能成而生之若陽氣不降則地道闔閉主其收藏如户之閉也闢户謂之乾義曰乾者陽也主夫天夫天陽之氣下生萬物使萬品之物皆遂其生者是乾為開闢之端如戶之開通者也然則先言坤而後言乾者蓋凡物先藏而後出故先言坤而後言乾也一闔一闢謂之變義曰言隂主其閉闔又主其收藏陽主其開闢又主其施散是一闔一闢以成變化之道春生夏長秋成冬幹者也往來不窮謂之通義曰言天地之道生成之理往來之間循環不絶周而復始無有窮極常自通流是謂之通也見乃謂之象義曰言天地之道隂陽之功生而不已自十一月建子陽氣下復至於丑寅之位萬物顯見於世有其形狀故謂之象也形乃謂之器義曰言天地之道生成不已故萬物始有其形形之不已乃可成於器用是故聖人因此大易六十四卦之形象凡創制器用必觀其形象為之凖範然後成其法式也制而用之謂之法義曰言聖人裁制其物凡所施用垂為範模後世以之為法式也至如宫室取大壯網罟取諸離書契取諸夬弧矢取諸睽如此之類皆是聖人制成器用為後世之法利用出入民咸用之謂之神義曰言聖人既制器用或出於此或入於此使天下之人用之皆得其利天下之人既皆得其利是聖人之妙用如神而人不知所以然而然也是故易有大極是生兩儀義曰此以下至自天祐之吉無不利為一章易有太極者言大易之道始於太極太極者是天地未判混元未分之時故曰太極言太極既分隂陽之氣輕而清者為天重而濁者為地是大極既分遂生為天地謂之兩儀兩儀生四象義曰言天地之道隂陽之氣自然而然生成四象四象者即木金水火是也故上文謂天一下配地六生水地二上配天七生火如此之類是天地隂陽自然相配生成金木水火之象然此止言四象而不言土者蓋天地既判生為五行然二氣既分則自然生而為木金氷火則地之道本於土而成但言四象則土從可知矣四象生八卦義曰言水火木金互相生成而成八卦至如水生於坎火生於離金生於兌木生於巽土生於艮如此之類是四象五行之所生也是故伏羲因此五行所生畫為八卦也八卦定吉凶義曰言伏羲既畫八卦之後又繫屬其爻辭於諸爻之下明吉凶之變凡事之得者為吉事之失者為凶言於得失之間以成吉凶之事使人退省其身日修其德趨其吉而悖其惡從其善而去其凶也吉凶生大業義曰夫吉凶之兆也皆在於六十四卦爻位之中得其正者為吉失其位者為凶聖人又繫屬其辭以明吉凶之驗使人知自修省人既知自修省則能保守其分位以成其大業故大業之成必自吉凶而生矣是故法象莫大乎天地義曰法象則謂吉凶之理得失之迹也夫天地之大萬物之理皆由二體互相推蕩而生也至於髙者有其分下者有其理善者福之惡者禍之此常理也聖人仰觀俯察為之法象善者賞之惡者罰之然其功其理皆本始於天地故云莫大乎天地變通莫大乎四時義曰言天地之道隂陽之氣變通之道生成之功春秋冬夏生而不已是以成之成之不已又殺之殺之不已又生之是其天地之氣生殺之功千變萬化皆由四時之氣推蕩而成也縣象著明莫大乎日月義曰言天地之道布懸其法象星辰其於著明運行不息無所不照者莫大乎日月也崇髙莫大乎富貴義曰上既言天地之道隂陽之理變通之事日月之明此後言以富貴而繼屬之者何也蓋聖人非以恃其崇髙極侈其位夸恃其富貴是故天地之道但能生成萬物不能生成天下之人是故君子有大才大德凡居崇髙極盛之位代天理物能以仁義教化生成天下之人若無富貴之位則其功不能以及於天下也是故其所以重富貴者非重其位也蓋重其行道於天下故下繫曰聖人之大寶曰位是言聖賢所保重者曰位惟在行道而已故以富貴次於天地日月之後也備物致用立成器以為天下利莫大乎聖人義曰備物致用者備天下之物致天下之用也立成器者則謂建立成就天下之器用以便於天下也凡能便利天下者無出於聖人也聖人則無所不通故能成天下之利也至如包羲氏結繩為網罟以佃以漁神農斫木為耜揉木為耒耒耨之利以教天下又如弦木為􅋃剡木為矢􅓡矢之利以威天下又如黃帝刳木為舟剡木為楫舟楫之利以濟不通又如宫室取大壯掘地為臼斷木為杵臼杵之利萬民以濟如此之類皆是備物致天下之用立器為天下之利也故唐元次山曰吾人之苦兮山幽幽網罟設兮山不幽吾人之苦兮水深深網罟設兮水不深是言聖人凡所創立其器雖山川滄海之深逺而聖人所作其器無逺無近無幽無深皆得其利故水之深而網罟不深山之幽而網罟不幽其功如是之廣而人用之皆得其利也非聖人孰能如此哉探賾索隱鈎深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜義曰探謂探尋賾謂幽隱難見之處言至幽至逺至隱至近之處鈎深極逺之事天地幽隱之處過去未來之吉凶惟是聖人以卜筮之占皆得以知之也若事得於道者為吉失於理者為凶以其吉凶之事告示於人使人趨善從吉去惡避凶雖愚者昧者皆勉勉而知勸夫如是定天下之吉凶成天下之亹亹者皆由蓍龜之占筮也是故天生神物聖人則之義曰神物者則謂神靈之物蓍龜是也灼龜以為卜揲蓍以為筮言天之所生者蓍龜之靈知人之休咎明人之得失是故聖人取之為法則考人之行事也天地變化聖人效之義曰言天地之道隂陽之氣生殺之理春生夏長四時代謝千變萬化聖人效法之當賞則賞之當刑則刑之事之久者必改其弊器之泥者必革其新是聖人法效天地之變化也若據疏説以為賞以春夏刑以秋冬則非也天垂象見吉凶聖人象之義曰言天之垂象以示人之吉凶若隂陽之慘舒日星之災變風雨之不節霜雪之不時如此之類皆是天垂象以示於人聖人必當象之或祥之來則象其吉災之來則應以凶或修其德而平其政也河出圖洛出書聖人則之義曰按此河圗是天之大瑞也若聖人在上至德動於天地天下之人和洽則和氣充塞於天地之間則河出圗洛出書以為瑞應之驗也是故聖人所以法則之者蓋法其時而行事故曰聖人則之也然按諸儒之説以謂河圗洛書出見於世伏羲因得之而畫成八卦感上天之美應者也且上古洪荒之世典章法度未立伏羲以聖人之才德居位是以經綸天地畫成八卦以為萬世之法則若河圗洛書未出見之時伏羲亦當畫為八卦以為後世之法且河圖洛書是天之大瑞若果河圖洛書已有八卦則八卦不當言伏羲所畫也又按洛書賜禹是亦八卦更有聖人所畫矣且按下繫曰古者包羲氏之王天下仰則觀象於天俯則觀法於地觀鳥獸之文近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情此八卦自是伏羲觀天地取諸物而畫成八卦也又豈得謂伏羲感河圖洛書而畫八卦哉若果河圖洛書已有則孔子不當言伏羲仰觀俯察而成八卦也又如孔子曰鳳鳥不至河不出圖吾已矣夫是孔子因其鳳鳥而為書也又曰龜龍在郊藪河出圖洛出書是亦因龜麟而至矣此蓋孔子言麟鳳者天之瑞物難見者也若聖人在上錫五福於人庶政行於國和氣充塞於天地則河圖洛書龜麟龍鳳出為瑞應之驗是以聖人法則其時以行其事也故云聖人則之今鄭康成以春秋緯云河圖有九篇洛書有二篇孔安國以為河圖為八卦洛書有九疇皆失之矣易有四象所以示也義曰按此四象有二説一説以謂天地自然相配水火金木以為之象所以示也又一説吉凶者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也是言大易之道有此四象所以示人之吉凶疏莊氏謂六十四卦之中有實象有假象有義象有用象則非也又何氏以為天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圗洛出書聖人則之亦非也繫辭焉所以告也義曰上既言天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圗洛出書聖人則之易有四象所以示人之吉凶此言又繫屬其辭明其得失所以貢告於人使人知憂患之慮也定之以吉凶所以斷也義曰言既繫屬其辭以明得失又定其吉凶之驗以斷天下之疑惑使人知其象趨其吉而背其凶也易曰自天祐之吉無不利義曰此大有上九之爻辭也言易有四象所以示也繫辭焉所以告也又定之以吉凶所以斷也言天下之人既知其吉凶之驗禍福之理又引此大有上九之爻辭以證之言大有上九居大有之世天下富盛諸爻皆乘於剛已獨下乘於隂六五有厥孚交如之吉已獨乘之是以得自天祐之吉無不利也此大有之時如此也子曰祐者助也天之所助者順也人之所助者信也履信思乎順人以尚賢也是以自天祐之吉無不利也義曰此孔子解釋之辭也言大有上九所以得自天祐之者蓋由己以陽承于六五柔順之君天之所以祐之者助其順也人之所以助之者信也言六五居中有信於天下而上九承之是履其信也既已履信則天下之人亦助以信也既履其順又履其信則是崇尚賢德矣夫既為崇尚賢德之人則上天之所祐助鬼神之所協吉天下之人皆所信助夫如是何所不利哉子曰書不盡言言不盡意然則聖人之意其不可見乎義曰自此以下至默而成之是夫子總言大易之道當連上文為一章書不盡言者言聖人之言出則為天下之則為天下之令然於簡牘之中所載必不能盡聖人之言也言不盡意者言聖人之意思慮宏達無逺無近無幽無隱故三百八十四爻之間雖皆聖人之言必不能盡其聖人之意也如是則書不盡言言不盡意於聖人之意其不可見乎此孔子歎美聖人之言聖人之意幽深宏逺不可以見之耶故假發問之辭疑而問之子曰聖人立象以盡意義曰此夫子釋聖人之意有可見之理也言聖人之言書不能盡其言言又不能盡其意惟是大易之道六十四卦之中可以明之至如天之道以乾為名取其天體剛健生成不息地之道以坤為名取其地體柔順能承順於天是聖人設乾坤之象以盡聖人之意宏功妙用惟乾坤之象可以盡之設卦以盡情偽義曰言聖人之言出則為天下之則然既言不能盡意又立象以盡意既立物之形象以盡其意又觀萬物之象萬事之理天下得失之迹設為其卦以盡人之情偽以盡物之得失也繫辭焉以盡其言義曰言聖人雖立象以盡其意設卦以盡其情偽又於三百八十四爻之下有得位失位者有正有不正者皆繫屬其辭散於卦爻之下以盡其言使人通曉其意也變而通之以盡利義曰夫萬事之理萬物之情若無其通變之道以至窮極必至於敗壞也惟是聖人立象以盡意設卦以盡情偽繫辭焉以盡其言而又裁制創立千變萬化隨時措置立成其事無有壅滯量時制宜變而通之以盡天下之利也鼓之舞之以盡神義曰此總結立象盡意設卦盡情繫辭盡言之意言聖人以其仁義之道以盡天下之情偽以説天下之心又鼓發之致天下舞樂之然則鼓舞何以為發樂之義蓋聖人以仁義之道教化之術漸染於天下之人天下之人雖冥然無所知識然被上之教化其心康樂不知手之舞之足之蹈之也既不知手之舞之足之蹈之自不知聖人之道所以然而然是聖人之道漸染於人如神之功乾坤其易之縕邪義曰上既言聖人立象盡意此又言大易之道本始於天地縕者藏縕也言天地初判之時而大易之道已縕藏於天地之間然天地之道萬物之形象萬事之理皆藏縕於大易之道是大易之道本始於乾坤故乾坤為大易縕積之根源也乾坤成列而易立乎其中矣義曰言天地設立隂陽之端萬物之理萬事之情以至寒暑往來四時代謝日月運行皆由乾坤之所生然乾坤既設而大易之道變通之理以立乎中矣是大易之道本始於天地也乾坤毁則無以見易易不可見則乾坤或幾乎息矣義曰言大易之道皆本起於乾坤凡是天地之道萬物之理變化之道皆在大易之中至如乾生三男坤生三女而為八卦變而相重為六十四分為三百八十四爻易之根源皆自乾坤而來故乾坤成而易道變化建立乎其中矣若乾坤毁棄則無以見易之用夫易既毁則無以見乾坤之用如是則乾坤或幾乎息矣是故形而上者謂之道義曰言天之道始於無形而終於有形皆由道之所生道者人可以為之法由而通之謂之道前乎天地則混於元氣散乎方隅則潛於象類浩然而不局於器用推於天下則無所不通舉而措之則曲盡其變茲乃道之本也然始於無形而終於有形也形而下者謂之器義曰器者是有形之實言天始於無形而生於有形故形於下者則為其器器者則為有形之用但可止一而用之也故在形之外者謂之道在形之內者謂之器也化而裁之謂之變義曰言聖人因其無形之道有形之器推而化之裁制創立設為仁義教化以至凡所器用以利天下無有窮極無有凝滯故謂之變推而行之謂之通義曰言聖人因其天地隂陽之道思之於心緼之為事業推而行之無有壅滯皆得其亨故謂之通舉而措之天下之民謂之事業義曰言聖人因其變通之道措置其用施之於天下各從其時以成天下之功業也是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象義曰此以下皆覆言上文聖人立象以盡意設卦以盡情偽繫辭以盡其言明言以為教化之術也象者萬物之形象也言聖人推其天地之理萬物之形容以象萬物之宜故謂之象也至如乾為龍之象坤為地之象離為日之象艮為山之象如此之類皆是推廣形容而為之也聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻義曰言聖人以見天下之變動觀萬物之形容有會合通變之道以行典常之禮又於諸卦之下繫屬其文辭有合於道則為吉有悖於理則為凶以定其吉凶得失之理以示於人故謂之爻也爻者效此者也極天下之賾者存乎卦義曰言聖人窮極天下之幽賾萬物之情偽以存諸卦之中使人觀之以為法則也鼓天下之動者存乎辭義曰鼓謂發揚天下之動有得有失有吉有凶存於爻辭之間使人觀之知其吉凶之如此也化而裁之存乎變義曰言聖人觀此萬事之理萬物之情天地之道日月之經創制裁度立成其器施為仁義道德千變萬化以及於天下故存乎變也推而行之存乎通義曰言聖人觀此大易變化之道推而行之隨時措置無有窮極無有凝滯故存乎通也神而明之存乎其人義曰言聖人既能極天下之賾存乎卦鼓天下之動存乎辭化而裁之存乎變推而行之存乎通以成其易若章顯其功則其用如神仁者見之謂之仁知者見之謂之知無有窮極是存乎其人矣默而成之不言而信存乎德行義曰德行者則謂聖人素蓄其德業行實也言聖人素積其德素蓄其行內存忠恕外有全德如此則默而成之雖不言而人自信從之故中庸曰不怒而民威之如鈇鉞者也此蓋素蘊德行之如此也周易口義繫辭上
