body:
  text: 周易口義卷六宋胡瑗撰下經咸艮下兊上咸亨利貞取女吉義曰夫有天地萬物男女夫婦君臣上下莫不有感之道然後得其理故聖人作易以通神明之德以類萬物之情分乾坤坎離為上經取咸恆既濟未濟為下經以盡天道人事之理咸感也天地之大經夫婦之大倫故為下經之首也亨利貞者言天地不交則萬物無以化生男女不感則人倫之道廢是皆有感而後亨也然既交感不可邪諂必利以正道則盡感之義故曰亨利貞也取女吉者言感之為道莫速于男女男女相感然後萬物化生故此卦上兊而下艮在説卦云艮三索而得男故謂之少男兊三索而得女故謂之少女言以少男取于少女則人倫正而天地之義畢故咸之道利取女吉也彖曰咸感也柔上而剛下二氣感應以相與止而説男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣義曰夫柔者子也臣也婦也女也至賤也剛者父也君也夫也男也至貴也貴上賤下人之常道也人之交感之義也夫女守正靜男以禮下之則夫婦道成而父子之親可見也如賢者懷道義君以禮下之則君臣之義行而上下之禮興也或賢者以道自處君不能以禮下之則君臣之分廢矣是女守而男不以禮下之則夫婦之道亦罔克成也何則天以髙而自處其上地以卑而自處其下天不降氣于下則地氣無由而升如是則隂陽之道無以變萬物四時無以成也夫天地尚爾況于人乎故感道貴以尊先卑男下女故曰咸感也柔上而剛下二氣感應以相與至取女吉也悉如前義天地感而萬物化生者此言天氣降于下地氣升于上二氣升降而交通則萬物以生以育而各遂性命是知交感本自然之理故無所不生無所不成也聖人感人心而天下和平者言聖人享天下之貴勢藉天下之重器而天下之人均感恱而化之者是必推誠信之道使其仁義教化藏人之肌膚淪人之骨髓然後感恱于心而歸之也是非由勞神役思諄諄然取其心而求感之也咸感也卦不名感而名咸者聖人不以心求感于人而人自感之亦如天地二氣自然交通而萬物化生也觀其所感而天地萬物之情可見矣者天地交感然後萬物生男女交感然後天下化凡此類是天地萬物之情狀因其所感而可見也象曰山上有澤咸君子以虛受人義曰按左傳云澤竭則山崩是澤之氣通于山則萬物得其濡潤而遂其生成此相感之義也故君子法此山澤通氣之象必虛其心推其誠以仁義之道行之于身而加之于人則天下之人自然感恱而歸慕之也是非假役役以求人之感也故曰君子以虛受人初六咸其拇象曰咸其拇志在外也義曰夫感之為義貴于深當以聖賢之道施為仁義之教禮樂之化以漸以摩使之入人之肌膚藏民之骨髓然後天下之人皆合心畢慮感恱于上也上下交相感恱是由感之道深故也今咸其拇夫拇者足之趾不能自動者也蓋初六居艮之始處卦之下不能自有所動是所感止及于趾感之道不深而淺末者也故曰咸其拇也象曰志在外也者言初六之應在于九四是其所感之道不及于他而志在于應四而已志在外也六二咸其腓凶居吉象曰雖凶居吉順不害也義曰腓者拇之上股之下躁動之物也夫感恱之道根諸至誠可也今六二居下卦之中始能離初之拇不以至誠感人而務在躁動是不能使天下之人自然而感如足之腓躁動不常速凶之道也居吉者言六二居中得正夫能以道自處不務躁動以求感于人但居其所推至誠以及人則天下之人自然感而歸之故曰居吉也象曰雖凶居吉順不害也者言六二所感之道雖未能深感人心而有凶然若以道自處則得其吉是能順于道而不至有害者也九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也義曰股者上體之下下體之上隨足而動者也九三以剛處下卦之上而應在上六但志于隨人故若股之為物不能自主足動則動足止則止是其志淺末者也執其隨者言九三不能以道自處徒欲觀人之顔色察人之辭意以為感恱之道是所執之志在于隨人而已以此而往鄙吝之道故曰執其隨往吝也象曰志在隨人所執下也者言九三之志止務隨人以求感恱不能髙尚其為是所執卑下也九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也義曰九四居股之上處脢之下心之象也夫感之道所利者正今九四以陽居隂失其正道本有悔也然猶能履尚謙沖若守之以正則吉可獲而悔可亡也憧憧者往來不絶之貌也以天下之大生靈之衆不可家至户曉在聖人推至誠之道仁義之化以廣洽之則自然感恱而歸之是聖人感人之心必在虛己之心也今九四憧憧然往來勞苦其思慮而求人之恱但顧已之私應不能感于天下惟已之朋黨則從爾之思慮而歸之是不能盡感之道也故曰憧憧往來朋從爾思也象曰貞吉悔亡未感害也者言能守正得吉是所感未至于害也憧憧往來未光大也者按繫辭曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉往者屈也來者伸也屈伸相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此以往未之或知也窮神知化德之盛也今九四不能虛心以感于人乃憧憧以求之是其道未光大也九五咸其脢無悔象曰咸其脢志末也義曰脢者心之上口之下夫居至尊之位必須謙沖禮下于臣民擴仁義之道使教化行于天下德教深被于四海則天下之人自然感恱于上今九五以陽居陽不能禮下于臣民以尊而自恃以貴而自驕不能盡感恱于天下者也夫以心感物猶未為得況過于心之上乎其不盡感之道明矣無悔者以其居中得正處于尊位猶可以無悔也象曰咸其脢志末也者夫為感之主而不能盡感之道其存志淺末可知也上六咸其輔頰舌象曰咸其輔頰舌滕口説也義曰輔者口輔也上六處一卦之終以人體言之輔頰之象也言上六不能施仁義至誠之道自然感恱于天下徒戚施面柔以甘言美辭求感于人是所感在于口輔故曰咸其輔頰舌也象曰滕口説也者言不能感人以至誠但滕口頰以語言求感而已恆巽下震上恆亨無咎利貞利有攸往義曰序卦云夫婦之道不可不久故受之以恆恆常久也言男下于女故能成夫婦之道夫婦之道既成則能成家君下于臣故能成君臣之道君臣之道既成則能成國國家既成不可不久故受之以恆也然謂之恆者巽為長女震為長男二長相與故恆久不息以成家也然咸以二少恆以二長者蓋始則所感之道貴于速故以二少言之男女既别夫婦既成則不可不久故以長言之取長久之義故曰恆也亨無咎者言夫婦之道君臣之義既皆久而不變以至于亨既獲其亨何咎之有利貞者夫常久之道所利者貞久而不貞與不久同也夫婦既久欲成一家之事者不可不貞君臣既久欲成天下之治亦不可不貞夫婦君臣無所不正則常久之道成矣利有攸往者言人之所守能至誠不息執節不變積日纍月積月成歲以至終而復始無有窮已則無所往而不利是故為君子為學能常久而不已則可至于賢聖為君臣為治能常久而不變則可以施仁義禮樂以化成天下故行之一身行之一家行之一國以至行之天下均能不變所守則其道大成道既大成則所往何不利之有彖曰恆久也剛上而柔下雷風相與巽而動剛柔皆應恆恆亨無咎利貞久于其道也天地之道恆久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久于其道而天下化成觀其所恆而天地萬物之情可見矣義曰震上為剛至貴也巽下為柔至賤也貴賤有别尊卑有序而常道已成言之一家則男正位乎外女正位乎內言之一國則君以尊而位乎上臣以卑而處其下內外上下之分定故國家之道成矣雷風相與者夫雷得風則益威風得雷則愈盛二者相資故能助天地生成之功也以人事言之則猶夫婦相與而人倫正君臣相與而教化成蓋取其相資益而成長久之道也巽而動者此解二卦之體也上體震震為動下體巽巽為順以巽而動是猶夫義而婦聽君義而臣忠常久不已以成其道也剛柔皆應恆者蓋此卦剛柔皆相應而不失其常亦猶婦事夫臣事君皆常久不易之道也恆亨無咎利貞久于其道也者此言凡人之作為皆能至誠不息悠久其道則得亨無咎利貞之三德也天地之道恆久而不已也者夫天以髙明運行升降晝夜未嘗休息地以博厚容載萬物亦未嘗休息天地之道運行容載久而不變故且髙且大也利有攸往終則有始也者義見前日月得天而能久照四時變化而能久成者夫日往則月來月往則日來日月往來而能臨照天下之物無論巨細而皆燭之蓋由所麗在天故能久明而無有過差也天地之大隂陽之運在于四時故春以生之夏以長之秋以成之冬以終之或代或謝周而復始故能生育萬物以成歲功久而不易也故曰日月得天而能久照四時變化而能久成矣聖人久于其道而天下化成者夫天地至大日月運焉四時行焉久而不變故照臨四方生育萬物久而不易無有窮已也聖人有天下之大居天下之尊發政施仁亦必久于其道然後賞罰有常號令有信天下之人莫不仰而歸之以成其風化故曰聖人久于其道而天下化成也觀其所恆而天地萬物之情可見矣者夫日月臨照四時變化萬物代謝皆久于其道無有窮已則天地萬物之情常久而可見象曰雷風恆君子以立不易方義曰震陽為雷巽隂為風隂陽相合雷風相資生成萬物久而不已以成其道也故君子觀雷風之象所作所為由中而不易其道故能常久而成天下之治行天下之道無施而不可方猶道也言其所立不離于道也初六浚恆貞凶無攸利象曰浚恆之凶始求深也義曰浚深也天下之事必皆有漸在乎積日纍久而後能成其功是故為學既久則道業可成聖賢可到為治既久則教化可行堯舜可至為朋友既久則契合愈深為君臣既久則諫從言聽而膏澤下于民若是之類莫不由積日纍久而後至固非驟而及也今此初六居下卦之初為事之始責其長久之道永逺之效是猶為學之始欲亟至于周孔為治之始欲化及于堯舜為朋友之始欲契合之深為君臣之始欲道之大行是不能積久其事而求常道之深故于貞正之道見其凶也無攸利者言居事之始欲深于常道以此而往必無所利孔子曰欲速則不達是也九二悔亡象曰九二悔亡能久中也義曰夫天下之道得其大中則萬世所不能變易今九二以陽居隂是失正而本有悔也然以居下卦之中其所行無過無不及使賢者可俯就之不肖者可企及之如此是得天下之常道而萬世所矜式也又何悔之不亡象曰九二悔亡能久中也者言九二以陽剛之德而能居下卦之中是久于中道而無所變易故悔亡也九三不恆其德或承之羞貞吝象曰不恆其德無所容也義曰夫尊卑貴賤內外上下不失其本分則可以為常久之道今九三居上六柔弱之下是卑者先于尊賤者先于貴不常之人也或承之羞者言尊不尊卑不卑內外混淆貴賤汨亂此則羞辱之事隨之也貞吝者言德既無常其于永久貞正之道誠足鄙吝也象曰不恆其德無所容也者言九三既失其常久之道則所往皆不容也故孔子曰人而無恆不可以作巫醫巫醫鄙賤之徒也其無常德者尚不可為況其他乎是則于所處固無容也九四田無禽象曰久非其位安得禽也義曰田獵也凡禽獸可擒者通謂之禽夫常久之道必本于中正今九四以陽居隂是不正也位不及中是不中也不中不正不常之人也以不常之人而居大臣之位是無德忝位者也至于為治則教化不能行至于撫民則膏澤不能下是猶田獵而無禽可獲也象曰久非其位安得禽也者言九四于常久之時處非其位猶田獵而無禽必無所得也六五恆其德貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也義曰貞貞固也文言曰貞固足以幹事是也夫為天子之尊有四海之廣民物之繁必使仁義教化流于天下不可執一道守一方必也臨事制宜隨時應變則無施不可也今六五居至尊之位以柔弱不正之資私一已之應是固執常德不使流通于天下也婦人吉夫子凶者婦人處閨門之內守一而已可也夫子處閨門之外則必臨事應變大有所為可也今六五執守一德不能大有所為但繫私應是以此道施之婦人則吉而施之夫子則凶也象曰夫子制義從婦凶也者婦人之事固執其正繫于一人則吉也夫子則當制義而不可泥于一也若夫子從婦人之道不能以義制事則凶之道也夫以夫子不能制義尚以為凶況尊為天子有四海之大者乎凶可知也上六振恆凶象曰振恆在上大無功也義曰振動也謂君子可動則動可進則進可靜則靜可退則退動靜進退皆不失正則聖人之道畢矣今上六處恆之上居震之極是深求妄動之人也以深求妄動必不明進退動靜之理若以此而往凶之道也象曰振恆在上大無功也者言動靜既不適時而進退失常于道既凶又何功之有遁艮下乾上遁亨小利貞義曰按序卦云物不可以久居其所故受之以遁遁者退也言天時人事盛久必衰進久必退存久必亡自然之理也此卦所以名遁者蓋二隂浸長進得其位以剝羣陽是小人道長君子道消之時也故君子當此之時則晦迹潛光懷仁卷義以道自容不使小人得窺其所為所謂遁也遁亨者由遁而後亨也夫君子時有通塞道無損益故孟子曰雖大行不加焉雖窮居不損焉分定故也是君子所得在內所志在道道充乎內則無所不通得其位則行道于天下非其時則修身見乎世故遁之時必晦迹潛光以逺小人之害則已之道自得其亨通也小利貞者夫否之卦三陽在上三隂浸長于下君臣隔絶之時故卦辭言否之匪人不利君子貞剝之卦五隂盛長一陽在上故曰勿用有攸往是否剝之時全不可以有用至此遁二隂在下四陽在上君子之道猶小可行故曰小利貞彖曰遁亨遁而亨也剛當位而應與時行也小利貞浸而長也遁之時義大矣哉義曰遁而亨也者言因遁而得亨也剛當位而應與時行也者剛謂九五也應謂六二也九五以陽居中是剛明中正之君子然而下應于六二之小人者蓋君子之道無固無必可遁則遁此六二之為小人然能以中順之道附結于已不須遁也故與之應是君子之心通變能與天時俱行故可止則止可行則行若仲尼皇皇于衰周孟子歷遊于戰國是皆欲已道之行故小人有能以道附結于已者亦不拒也小利貞浸而長也者言君子所以不得大有為于世而惟小利于貞者蓋以下之羣隂浸長而小人之黨漸盛也遁之時義大矣哉者遁之道不可遁而遁則道不可行可遁而不遁則必罹小人之害是必隨時適變可遁而遁可也惟明智之人為能居之其時義至大故先聖重嘆美之象曰天下有山遁君子以逺小人不惡而嚴義曰乾上天也艮下山也山雖髙峻亦不能陵于天故假象得遁之義也猶君子逺遁小人不能加害也夫君子之道得行則小人必見誅逐放斥而不得行于朝廷之上苟君子之道不得行則必逺避小人而全身逺害也然今居遁之時若漠然無畏而以嚴厲加于小人而欲亟斥之則必反罹害于己雖然亦不可枉尺直尋依違苟從以求自免但不加害于小人常使已自有威嚴使小人不敢侵害于已可也初六遁尾厲勿用有攸往象曰遁尾之厲不往何災也義曰遁之時貴于先也尾者處于後也凡卦以上體為外以下體為內今此卦二隂在內小人得位而君子在野之象也初六處卦之內最居卦下是衆賢皆遁而已獨在後是不能先時而遁至此始欲亟逺小人則必反為小人之所制是有危厲也勿用有攸往也者言當是時惟宜依違自守危行言孫檢身修已以逺小人之害可也故聖人于此戒之象曰遁尾之厲不往何災也者言既居遁之後有危厲之事果能依違自守不復更有所往何災之及也六二執之用黃牛之革莫之勝説象曰執用黃牛固志也義曰黃者中也牛者柔順之物也六二雖居羣陽之中在小人之黨然居中履正有中正柔順之德達于事理以上有剛明中正君子為己之應故已用此中正柔順之道往固執之不使逺遁于已故曰執之用黃牛也莫之勝説者夫賢人君子于道無所固必但以仁義為心而已今已能以中順之道往固執之則九五以何辭勝辨而可遁哉然此句上之革二字乃羡文也革之初有鞏用黃牛之革故此誤有之也推求無義可通注謂革者固也此臆為之説爾象曰執用黃牛固志也者言用大中正順之道使賢者不逺于己所以固賢者之志也九三係遁有疾厲畜臣妾吉象曰係遁之厲有疾憊也畜臣妾吉不可大事也義曰為遁之道在乎逺去小人則吉今九三居內卦之上切比六二之隂不能超然逺遁是有係于小人也有疾厲者夫小人之心常以疾君子為心而又畏君子之刑戮故一得其志則首欲害之今九三既為六二所係而不能逺去是有疾病而危厲者也畜臣妾吉者言九三既不能逺小人而不可逺遁然後以畜羣小臣妾之道即得其吉蓋臣妾至賤者也可以逺則逺之可以近則近之如此則吉可獲也象曰畜臣妾吉不可大事也者言九三雖以臣妾而畜羣小人而獲吉然但施于此事則可也如其立天下之大道臨天下之大事則不可以有與也九四好遁君子吉小人否象曰君子好遁小人否也義曰好者中心之所欲也九四處外卦之初離內卦之隂當此之際志欲遁而難制奮然而好遁者也蓋君子之人以君民為心得其位則可以致君澤民躋天下于平治若其小人道長不可有為之時則必知幾達理不為世俗所誘不為貧賤所動超然逺遁以避其難而須其時也是以乾之文言曰遁世無悶中庸曰君子之道費而隱故小人則不然惟富貴是欲惟貧賤是恥不知廉隅不顧禮義苟一失位則蹙然溢于面目而不能自勝故太玄充之首曰君子得位則昌失位則良小人得位則橫失位則喪當此之時小人必不能遁故曰君子吉小人否也九五嘉遁貞吉象曰嘉遁貞吉以正志也義曰君子之道毋固毋必彼能以善加于己己志可通己道可行斯受之矣今九五下應于二二雖在小人之中然能以中順之道來固于己己則從之若小人虧于中順己可超然而遁也如此者蓋君子知時達變可行則行可止則止以嘉美之道而遁者也貞吉者言五既應于二二雖以中順之道固于己然亦不可屈己之貞戚施面柔以恱小人當執至正之道然後可以獲吉也象曰嘉遁貞吉以正志也者言二以中順之道來固于五五必以貞之道待于二者所以正二之志也上九肥遁無不利象曰肥遁無不利無所疑也義曰肥遁者優饒充裕之謂也上九處一卦之上是超然逺遁不應係于小人其憂患不能纍于己綽綽然有餘裕凡往而無所不利又何疑之有大壯乾下震上大壯利貞義曰按序卦云物不可以終遁故受之以大壯蓋言遁者二隂浸長于內四陽陵剝于外是小人道長君子道消也然小人之道雖長終不能久而必為君子之所剝此大壯所以次于遁也大壯者二月仲春之時四陽長于內二隂消于外君子道長小人道消也君子之道既長則能興天下之治除天下之害生育天下之民物以至其道大行而盛壯也故曰大壯然以天下之廣生靈之衆一賢不可獨治故必羣賢進于朝廷則可大行其道是以聖人設為學校教育天下之材然後登之朝廷之上任之以天下之事故事無不濟而至于盛大也利貞者君子之道既已盛大則必以正而處之乃利也若壯而不正則陽過于暴是故壯必正而後可也彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣義曰夫陽為大隂為小今四陽盛長二隂將消是大者壯也以人事言之則是小人之道既以消君子之道得以壯是亦大者壯也剛以動故壯者言乾下剛也震上動也夫君子將興天下之利除天下之害則必動而有剛明之才可也若有剛明之才守正靜而不動何所施用哉故剛以動則其道盛大而強壯也大壯利貞大者正也者言陽長而隂退若君子之道盛大而強壯則所利在于正也故大壯之時惟此大才大德之人則能以正道而行也正大而天地之情可見矣者夫天地之運行晝夜不息此則剛健正大而然也以人事言之則聖賢之道亦如天地之生成而無有偏私是觀聖賢正大之道則可以見天地之情矣象曰雷在天上大壯君子以非禮弗履義曰雷者威動之物而又行于天上則其勢愈盛是大壯之象也君子之人有此大壯之德則必恭慎和順外執以謙而內秉其直非禮之事不敢履非禮之言不敢言動作出處周旋之間皆合于禮然後可見君子之壯也若小人則不然已有剛壯之德必不能慎密于內以至發之于外而終為驕恣縱肆恃強作威表裏皆見故終不能保其全德也是有壯而不能終其壯者也惟君子則能外執以謙內秉以直故人莫得而窺測其道久而愈光也初九壯于趾征凶有孚象曰壯于趾其孚窮也義曰趾足也夫壯之道必須以順為履今初九居一卦之下最處事始位之卑者也為壯之始處位之卑不能謙順而行且躁妄而動以至陵犯于物不知其止以此而往凶之道也有孚者言以此強壯之道不能謙順行之是信有此凶咎必然之理也象曰壯于趾其孚窮也者言居事始而慕躁進是往則必有其凶而信至于窮困者也九二貞吉象曰九二貞吉以中也義曰凡卦爻有隂陽居失其位未有不凶者也大壯之時是君子之道強大而盛壯聖人以其既壯且大不可怙其剛威以陽居隂則皆獲吉故今九二以陽居隂能履尚謙順而又行不失中是君子得其為正之道不自滿盈不自強恃能全其美如是故獲正中之吉也象曰九二貞吉以中也者言九二所以得正之吉者以其履得其中所以無過無不及動靜皆入于中道而得其禮也故若人臣一命而傴再命而僂三命循墻而走愈尊而愈謙益盛而益戒是能盡為壯之道而得其中也九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也義曰凡居壯之時謙則得其道今九三處下卦之上當乾健之極以陽居陽是強壯不謙之人也以小人乘此則必恃剛強陵犯于人雖至壯極而不已是用壯者也君子則不然但固守謙順雖壯而不自矜雖大而不自伐惟欲道行而致之于君加之于民而已故君子當此則罔而不用其壯也貞厲者言小人不能用謙于大壯進而不知退于正道是有危厲也羝羊觸藩羸其角者羊者剛狠之物羝者狠而又狠者也小人居強壯之時動則過中進則不顧是猶剛狠之羊雖藩籬在前亦觸突而進以至反羸其角進退不能凶之道也如小人欲掩害君子終不能為君子之纍而反自及其身也九四貞吉悔亡藩決不羸壯于大輿之輹象曰藩決不羸尚往也義曰九四有剛陽之才德而居隂柔之位是亦尚謙者也然其位過中本亦有悔今若守之以正又謙以濟之則獲吉而悔亡也藩決不羸者夫處大壯之時既能守剛明謙順之德則衆歸之而物所不拒以此而往何不利之有故雖有險阻在前亦濟而通矣若羊之進雖有藩籬在前亦開決而無羸繫之患也壯于大輿之輹者大輿者任重致逺之象也壯于輪輻是以之致逺則可以行道所往無不利也象曰藩決不羸尚往也者此聖人立象垂訓使人居大壯之時必以謙退為先故君子之事父雖剛明之才正直之德可以納父于無過而克其家亦必以柔和之容婉順之貌父有一過則必婉容以諫之諫之不從而又諫之又不從則號泣而隨之如是則父反而思之必遷于善也臣之事君亦然但內持剛德外示謙容則所往無有不利也六五喪羊于易無悔象曰喪羊于易位不當也義曰羊本剛狠之物夫居大壯之時以陽居隂則得謙之道故可獲吉若以陽居陽然雖得位猶恐謙而有咎況以隂居陽則其傲狠而招禍可知也今六五乃是以隂居陽又處至尊之位則是好剛之甚以至反失之于容易之地羊性羝言其剛也無悔者以其居至尊之位能喪其剛狠之道故得無悔也上六羝羊觸藩不能退不能遂無攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也義曰上六處一卦之上居震動之極是躁動強壯之過甚者也過而不知所止猶羝羊之進不顧藩籬之在前以至羸礙其角而不能措也不能退不能遂無攸利者既壯動而不止則是不知進退存亡之道以至欲退而不能退欲進而不能進則進退皆無所利也艱則吉者言能艱難自守則可以獲吉也象曰不能退不能遂不詳也者夫君子之進必量時度勢可以有為而進之則無纍也若小人之進必不能量時度勢不詳其事而驟行以至進退不能也艱則吉咎不長也者言雖不詳其事而躁進妄動以至不能退不能遂今若能艱難自守則其咎禍不久而可解也晉坤下離上晉康侯用錫馬蕃庶晝日三接義曰按序卦云物不可以終壯故受之以晉晉者進也蓋言物之壯而不已則必至於見挫必以柔順之道上進也然此卦坤在離下猶日出地上以順而進至于大明故曰晉也康美也錫馬言賞賜之重也曲禮所謂三賜不及車馬是也蕃盛也庶衆也言此卦以三隂上進而至于明顯如賢人君子以柔順之道上進于君致之祿位而行道于天下有康美之德著之于君既有康美之德君則厚加寵錫故其馬蕃盛而衆多以至晝日之間三接見之以咨天下之事也是凡人臣之進必有道義之實功業之美然後登于朝廷之上則道可行身可顯如不才不德無功無業妄求寵幸者不有人禍必有天殃故君子不可以不慎也彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也義曰此卦名晉者是大賢君子以功以德上進于君也明出地上者此以二體言之也坤下地也離上明也若明出于地則升進而臨照天下萬民皆瞻仰如賢人君子出于微賤升進而立于朝廷之上致君澤民使天下皆仰觀之也順而麗乎大明者言日之出于地順麗乎天故其明所以久也猶賢者以柔順之道而進輔于大明之君故其道可以行也柔進而上行者夫君子之在上必須有至明之德以旌别賢不肖而黜陟之也苟上不明使賢不肖混淆則賢者必退避不樂于仕矣是必君有至明之德使賢者持人臣之節柔順之道附于君而其道上行也既能以賢明之德出于下柔之道行于上故可以受寵優之厚故曰是以康侯用錫馬蕃庶賞之重也晝日之間凡三接之待之厚也象曰明出地上晉君子以自昭明德義曰言賢人君子法此之象是以進修其德博學審問明辨篤行然後位朝廷之上使仁義施于天下功業垂于後世以自昭顯其至明之德也初六晉如摧如貞吉罔孚裕無咎象曰晉如摧如獨行正也裕無咎未受命也義曰摧抑也初六處晉之始有心乎晉者也然居下卦之下處衆隂之末猶君子道未得行志未得伸于始進之時必見摧抑者也故曰晉如摧如也貞吉者言君子既進而有所摧抑固不可躁求妄動以覬君上之信固當守之以正則可以獲吉也孟子曰鄉為身死而不受今為宫室之美而為之鄉為身死而不受今為妻妾之奉而為之鄉為身死而不受今為所識窮乏者得我而為之是亦不可以已乎此之謂失其本心蓋戒其不可徇情而苟幸言進退當以其道也罔孚裕無咎者夫初六處于最下位卑言輕上未信于其君下未澤于其民事未施于當世道未行于天下苟如是固不可隕穫己志而當綽綽然寬裕樂道不自咨嗟怨憤而不失其本心如此則乃可免其悔咎也象曰晉如摧如獨行正也者夫君子于求進之初其位卑言輕而有所摧抑然不自為損以道自處蓋其所守獨在于正也裕無咎未受命也者言處于卑下而自寬裕者是未受君之命也六二晉如愁如貞吉受兹介福于其王母象曰受兹介福以中正也義曰夫晉之為言以之一身是進用其道以之一時是進用其君愁憂也六二以隂居隂履得其正然處內卦之中未見君之所信道未能行是以進而有憂愁也然君子之心不以一身一家為纍動其心必以君民為志雖進焉未見信于君而有憂然亦不可隕穫躁動常以正道而行則得其吉也受兹介福于其王母者王母內之貴者也夫六二處中居內以位言之至卑之象以時言之至暗之象處是時則當懷道畜義居仁守正以自寬裕居是位則當隨事制宜臨機應變使無不通濟則必受其逺大之福通于王母至深至密之地蓋由至誠而行自暗而受其介福若鳴鶴在隂其子和之是也象曰受兹介福以中正也者六二雖未見君之信任蓋以中正之道而行雖天地鬼神無不祐之以至暗然而受其介福也六三衆允悔亡象曰衆允之志上行也義曰允信也夫六三以隂居陽過于六二不中不正之位其本有悔也然而居下卦之上為衆隂之長三隂同心上進而為其先是道義可以行于時事業可以致其用故衆隂同心見信而上行其悔可以亡也象曰衆允之志上行也者言居晉之時衆隂皆欲上行而已處其先是為衆所信同志而進也九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也義曰鼫鼠者田中食稻粱貪殘剝刻之物也當晉之時衆君子以柔順之道上進于君九四以陽居隂不正而進者也既以不正而進上又切近于君是當尊大之位附上罔下刻剝天下之民蠱壞天下之事如鼫鼠然無益于民但傷殘于物故天下賤之如鼫鼠然也以此而往則必讒諂佞媚苟取于君上是于正道危厲也六五悔亡失得勿恤往吉無不利象曰失得勿恤往有慶也義曰六五履不得正有悔者也然處至尊之位居離明之中能擴大明之道旌别衆賢而信任之衆賢者類進而輔己故其悔所以亡也失得勿恤往吉無不利者夫以天下之廣萬幾之細其間未必不無一失今六五既能旌任賢者賢者皆進而輔之故其政教無有不舉若萬物之中苟有失得亦不必憂恤之也夫既是失得皆不須憂恤則是所往無有不吉不利者也象曰失得勿恤往有慶也者言六五所以失得勿恤者蓋由其能任賢者使賢人進輔于己故其教化舉行仁義興作以此而往故不惟止獲其吉而又且有美慶之事也上九晉其角維用伐邑厲吉無咎貞吝象曰維用伐邑道未光也義曰角者最極之象也夫上九處進之極過明之中已在角而猶進故曰進其角惟用伐邑者在角猶進過亢不已不能端拱無為物皆不服必須攻伐其邑然後服之故曰惟用伐邑也厲吉無咎貞吝者兵者凶器伐而服其物是由危乃得吉則無咎以此雖正亦已賤矣象曰惟用伐邑道未光也者用伐乃服雖得之其道未光也明夷離下坤上明夷利艱貞義曰按序卦云晉必有所傷故受之以明夷夷者傷也晉卦是明出地上而升于天明照于天下然晉極必衰故明反入于地中是明有所傷也以人事言之則猶君子之始進于朝廷之上佐君澤民立功立事于天下然至于荒耄之年精力倦怠是宜以功成事立而退全身致政求其安息則其明終始無有所傷也若功成年耄復進而不已則必有所傷也惟聖人為能終始一德如周公佐周是也凡下于聖人者至于耄年宜知退其身而不可終于求進也此聖人所以著萬世君臣之戒也利艱貞者夫明夷之世則是君子之明已有所傷而小人在上便巧得志君子處此之時固當艱難守正不使小人之能窺測則可以免其患害也彖曰明入地中明夷內文明而外柔順以蒙大難文王以之利艱貞晦其明也內難而能正其志箕子以之義曰明入地中明夷者此釋明夷之義也內文明而外柔順者此以二體言之下卦是內離為文明上卦是外坤為柔順君子之人能內守文明之道外修柔順之德當明夷之世蒙冒大難而不為小人所賊害若古之人有行之者文王是也文王當紂之亂世衆小人在紂之左右前後讒諛佞幸皆欲害于君子而文王居為西伯三分天下有其二終能外執柔順之德內晦文明之道雖小人衆多終不能窺見其所為故免其禍患也表記曰文王有君民之大德有事君之小心故雖蒙大難而終無所傷也利艱貞晦其明也內難而能正其志箕子以之言內難者親之至也夫明夷之世暗主在上人臣有處夫至親之地而終不見害者若箕子是也箕子之于紂以位言之父師也以親言之庶兄也以庶兄之親而居父師之位是處至親之地所謂內難者也然左右前後讒佞諂媚皆欲害之而箕子獨能蒙冒之以正其志蓋由內能全晦其明不使有所暴之于外而小人不能窺見也象曰明入地中明夷君子以蒞衆用晦而明義曰君子法此之象而臨蒞于衆則當內晦其明外示以柔也何則蓋君子性無不明事無不通好善而嫉惡苟不慎密而宣之于外則小人見已之明詐善而罔于己己何由而知之如是則為小人之所窺測而必罹小人之害也是以君子務全其道默運其明則物不能蔽欺外示柔則不傷其苛察如此始可蒞衆也初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也義曰明夷于飛垂其翼者言明夷之時小人得志皆欲殘害君子初九處卦之下猶患難之始也然明夷之主在于上初最逺之君子有剛明之德能韜光晦迹不為小人之窺見若鳥之髙飛而又垂斂其翼是超然不可得而見之也君子于行三日不食者言君子能先幾知變以小人得志慮其加害于己欲超然逺遁心急于行故至三日之間不遑暇食也有攸往主人有言者言當明夷之時愚民盲俗不悉君子之心見君子遁去之速以至三日不食而有所往者雖至親之人為己之主亦皆有猜二之心誹謗之言也象曰君子于行義不食也者言君子不苟遁去必見小人之害故行而不食者于義有所不可也六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也義曰夫人之股肱右者為便左者為輕六二履得中道至于有位漸近明夷之主故必小有所傷但傷左股至輕之處也用拯馬壯吉者言君子既于明夷之時小有所傷若不速務遁去則必見害愈深故當決然拯其壯馬而行外順小人而使不能見其所為然後可以獲吉也象曰六二之吉順以則也者六二以隂處隂至順者也而又處中行正是動有法則者也既順而又有法則故小人終不能害之以至得吉故文王見囚于羑里終能脫禍解難以全其身也九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也義曰南者至明之地狩者獵之名大首者元惡也九三居離之極有至明之性以陽居陽有至剛之德夫以剛明大正之德居明夷之時暗主在上殘虐生靈塗炭天下不忍坐視故不得已往而征之以蘇民于水火救民于溝壑故如獵狩之事但取其害于民者誅之耳孟子曰誅其君而弔其民若時雨降民大恱又曰武王伐殷謂其民曰無畏寧爾也非敵百姓也若崩厥角稽首征之為言正也是但誅其首惡而已不可疾貞者夫聖賢之所以往伐首惡者將以正天下之民也其惡既除其民始蘇固不可加之暴猛峻之嚴刑以益苦之也何則夫民之被害既已久矣染惡亦已深矣故非亟而可拯也必須化之以漸撫之以慈與之解其倒懸然後以漸而正之可也故孟子曰簞食壺漿以迎王師此無他避水火也如水益深如火益熱亦運而已矣是正天下于虐暴之後不可亟欲成俗也象曰南狩之志乃大得也者言聖賢之人以至明之道往伐其元惡者所以救民而正天下今既獲之則已之志大有所得也六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也義曰凡手足以右為便心腹之間以左為順六四以隂居隂履得其位上近明夷之主是小人而得志者也夫以小人得志又附于昏暗之主以甘言美色柔邪佞媚從君之情迎君之欲納之于惡依違曲順入于左腹之間復得明夷之主之心也左腹言能順于心也于出門庭者言小人之輔暗主內既迎逢其惡外又不能慎密固蔽之君未有一過則揚之為大過君未有纖惡則宣之為大惡以至騰播天下罪形萬世皆小人之所致也若崇侯飛廉惡來之類是也門庭者言宣露于外也六五箕子之明夷利貞象曰箕子之貞明不可息也義曰明夷之主在于上六則左右前後皆小人矣惟六五以柔順之道處得其中非小人之謂也推象意以求之則箕子之道矣故聖人特以箕子明此爻也何則箕子當紂之時尊為父師親為庶兄是至近至親之位也然紂之左右前後皆小人而箕子之道不得行是明有所傷也然當是時箕子能自晦其明自蒙其德雖在紂之近密而終無所害以至佯狂為奴以全其身是所利者惟能自晦而居正也象曰箕子之貞明不可息也者以箕子切近于紂而終不為其所害者蓋由能以正道自守故其明不可得息也上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也義曰不明晦者言上六處羣隂之上居一卦之極明夷之主也不能以明德臨照天下而左右前後信任小人自致隂暗柔弱不有其明故云不明晦也初登于天者夫天尊且髙人君之位也此上六以繼世而立于人君之位為天下之主故云初登于天也後入于地者夫既居人君之位為天下之所瞻仰則當大明以臨照天下今反昏暗暝昧放恣殘賊而不用其明是入于地也象曰後入于地失則也者言上六失為君之法則不能明照天下而終于昏暗貽祖宗之羞也家人離下巽上家人利女貞義曰按序卦云傷于外者必反于家故受之以家人言人之有所傷于外則必反于內以求其安故家人所以次于明夷也然此謂之家人者蓋聖人以此為治家之法也利女貞者夫家人之道以女正為始何則夫女子之性柔弱無常而好惡隨人故凡君子欲治其家必正其身以正其女以正其閨閫之內父子之列尊卑長幼之序各得其正家既正然後施之為治天下皆可得而正也故大學曰欲治其國先齊其家然則治家之道在女正為始也彖曰家人女正位乎內男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣義曰女正位乎內者謂六二也六二以柔順之質處內卦之中若貞正之婦治閨門之內也然婦人之道不可預聞外事但以致整于內而已故書曰牝雞無晨牝雞之晨惟家之索故女必正位乎內也男正位乎外者謂九五也九五以剛明之德處外卦之中是男子以義治外其父子有禮兄弟有序尊卑上下各正其位也然以義制事則不可從于婦人故恆卦曰夫子制義從婦凶也所謂男女正天地之大義也者夫天以至剛之德至尊之體處于上地以至柔之德至卑之質位乎下此天地自然之常分也以人言之女正位乎內男正位乎外男女之位正是得天地之大義也家人有嚴君焉父母之謂也者夫君總生殺之權操富貴之柄四海之內莫不畏懼羣而歸之故謂之君若父母之尊則一家之事皆主焉故不可專任其慈而無所斷制必又加之以威嚴董之以禮節使一家之內有畏懼之心如君之尊而又如君之嚴則家道可以成也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣者夫為父有父道為子有子道以至兄弟夫婦各有其道是以父盡其嚴子盡其孝兄盡其友弟盡其恭夫盡其義婦盡其順如此則家道正矣家道既正天下斯定矣故堯聖人也先親九族然後平章百姓文王亦聖人也先刑于寡妻至于兄弟以御于家邦是君子之治天下必先正家正家而天下定矣象曰風自火出家人君子以言有物而行有恆義曰風自火出家人者王通謂明內而齊外有家人之象是也物事也君子觀此之象治其家使言有其事行有其常一言一行無有妄動此治家之本在于正身也故孟子曰身不行道不行于妻子是也初九間有家悔亡象曰間有家志未變也義曰間者寬而防之之謂也凡人之情愛之極則無疑親之至則無防故君子之人治其家必當思慮未及于邪耳目未接于私之時預為之防曲為之備不然使醜惡已彰姦邪已萌而始為之防是非家人之罪乃已陷家人于有過之地也今初九以陽居陽處一卦之初是治家之始有剛明之德而能于思慮未動私邪未萌之前以為之防故悔亡也象曰間有家志未變也者夫君子防間其家待姦邪而後防之惡彰而後治之則無及矣必于家人志慮未變之前豫防間之則所謂治家之道也六二無攸遂在中饋貞吉象曰六二之吉順以巽也義曰遂者專也夫婦人之事雖治于閨門之內皆稟命而行也今六二以隂居隂處內卦之中履得其正是婦人之得正者也但處于內而無所自專故云無攸遂也在中饋貞吉者夫自古以來上至天子之后妃下逮庶人之妻妾其所職之事不過于奉祭祀饋飲食而已故禮后有瑶爵之獻奠盎之事詩有關雎采蘩皆后夫人之職也六二處內任婦職而無所專所主在于饋食而已職此而又處其正故得吉也象曰六二之吉順以巽也者言六二所以得吉者以居中履正順而且巽上能稟九五之命也九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也義曰嗃嗃過嚴之貌也嘻嘻和樂之貌也夫治家之道不可專任其慈雖至過嚴終亦無所傷矣今九三以陽居陽有剛明至正之德居下卦之上為一家之主者也故為家之主若嗃嗃然嚴肅使家人內外上下皆有畏懼之心故雖有悔吝之事危厲之道亦得吉也婦子嘻嘻終吝者夫婦子人之所愛也若為一家之主而私于所愛不能嚴正其治使婦子嘻嘻然和樂則姦惡由此而萌矣夫如是至于終竟必有鄙吝之道也象曰未失也者言雖嗃嗃嚴厲未失治家之道也失家節也者若婦子嘻嘻而和樂是失其治家之節也六四富家大吉象曰富家大吉順在位也義曰夫初九既以剛明之德居卦之初能防微杜漸使閨門之內不接于私邪得正家之初也六二又能以柔順之體居服勤之職九三又能過嚴以畏懼其家人是家道已成至六四居大臣之位是君子既正已之家至此則佐君以正天下之家故有君之爵祿之富以富其家而得其大吉也象曰富家大吉順在位也者六四家道已成之後當大臣之位上近于君是順在其位以治家之道移于國也故孝經曰居家理故治可移于國也九五王假有家勿恤吉象曰王假有家交相愛也義曰九五以剛明中正之德居于君位是謂王者能假此治家之道以治于天下者也故先正其家使閨門之內莫不一于正正家而天下定是為君者以此道而行則不必憂恤而自得其吉也象曰王假有家交相愛也者言聖人能推恩愛于天下之家父父子子兄兄弟弟夫夫婦婦各以和順之道交相愛樂也上九有孚威如終吉象曰威如之吉反身之謂也義曰孚者由中之信威謂威嚴可畏上九以剛明之才居家人之極當家道之成是能先正其身發其信于中而外兼之以威嚴終成家道使閨門之內肅然有序而畏敬之故獲其吉也象曰威如之吉反身之謂也者言上九所以有威信而使人畏敬之者蓋能先修其身而後加于人也周易口義卷六
