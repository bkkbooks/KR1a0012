body:
  text: 周易口義宋胡瑗撰繫辭下義曰此十翼之中第七翼也然按上繫下繫之説先儒議者多矣何氏則曰上篇明無故曰易有太極下篇明幾故曰知幾其神或曰上篇論易之大理下篇論易之小理皆失之蓋以簡編重大故分為上繫下繫也八卦成列象在其中矣義曰自此已下至禁民為非曰義為一章言伏羲始畫八卦取天地水火山澤風雷之象畫為乾坤艮巽震離坎兊之卦八卦既成列而天地萬物之象莫不在於八卦之中也因而重之爻在其中矣義曰夫伏羲始畫八卦以盡天地水火風雷山澤之象然於萬物之情萬事之理在伏羲之時世質民淳情偽未遷利害未作雖八卦之設三畫可以盡人事之宜逮乎後世民欲叢生巧妄交作則八卦不能盡吉凶之變文王囚於羑里極天地之淵藴明人事之終始是以取伏羲所畫之八卦因其數而重為六十四卦分為三百八十四爻以盡天地之賾人事之理有得有失有吉有凶有應有不應有正有邪有利有害盡在此卦爻之中然則爻者效也使後世之人效而法之故卦爻之中有情偽之理有是非之道有變通之常有動靜之事有剛柔之限凡人觀其爻則知其效法此象而行事也然重卦之説先儒議者多矣或曰伏羲所重或曰神農所重或曰夏禹所重皆失之蓋見下文包犧氏之王天下作結繩而為網罟蓋取諸離神農氏作斫木為耜楺木為耒耒耨之利以教天下蓋取諸益又因尚書之文有洛書錫禹之言故有此説殊不知繫辭是仲尼所作蓋仲尼因其聖人制立器用以取合於聖人之卦以其結繩為網罟蓋合德於離卦取其有附麗之義因其耒耜有益於人蓋合德於益卦以其有相資益之義先儒不究原本故疑而有此説也且六十四卦既是伏羲神農所重則文王何心哉不然何以仲尼曰易之興也其於中古乎作易者其有憂患乎且伏羲之時又非中古神農之時又非憂患推此以言文王重卦之心又可見也剛柔相推變在其中矣義曰剛者陽也柔者隂也夫六十四卦之中卦有六爻陽為剛隂為柔陽主其生隂主其殺故剛柔之位則有變有通有動有靜故事之久靜則動物之久動則靜動靜之道則有變有通是故聖人因其剛柔二氣互相推蕩於六爻之間然後成其生養之道也故上繫曰剛柔相推而生變化者是也然則不言隂陽相推而止言剛柔者蓋隂陽者天地之氣剛柔者是隂陽之體言剛柔則隂陽之功可見矣繫辭焉而命之動在其中矣義曰言聖人既因剛柔二氣互相推蕩而為生成之道又恐後世之人難曉故於諸卦諸爻之下各繫屬其文辭以明得失之道吉凶之變情偽之端萬事之理使人觀其得則可以知其失趨其吉則可以明其凶逆順之道動靜之理在所命之辭皆可見矣吉凶悔吝者生乎動者也義曰夫六十四卦有六爻有吉有凶有悔有吝皆由爻位之動者也若動而合於理則為吉動而昧於道則為凶有事之微小可以追悔者有事之萌兆可以鄙吝者皆繫在於卦爻之變動也是故聖人因卦爻之變動明人事之大體推其情偽之端明其得失之迹使人觀之不失於動靜之道也剛柔者立本者也義曰言伏羲始畫八卦始窮變於天地隂陽之理以成剛柔之道以為萬事之大本以成天下之大法天下之人皆本此以為法則也故六十四卦之所本君臣父子之所法皆由此剛柔之象為之根本者也至如剛定體為乾柔定體為坤陽卦兩隂而一陽隂卦兩陽而一隂是立其卦本而不遺也變通者趣時者也義曰凡六十四卦卦有六爻一卦之體象其一時一爻之義象其一人六爻之道上下相應而成變通所以趣就一時者也至如屯之卦言天下屯難之時故其卦體以象其屯故初六居卦之始當屯難之時而磐桓利居正利建侯以蘇息天下之人至於六二言女子貞不字言女子守正應於九五雖為初九九六寇難然専應於五不改其節至於六四乘馬班如退守其正待時而行如此之類是皆一卦則言其一時其諸爻各言其一人以趣就其時也然則君子之人凡所動作必從其時不失其中故中庸曰君子而時中是言君子之人動作之間皆從其時也吉凶者貞勝者也義曰貞者正也夫有動者則未免乎纍殉吉者則未免乎凶盡會通之變而不纍於吉凶者其唯貞勝者故六十四卦之內人事之端情偽之作吉凶之驗無不備載於其間若爻位之吉又能行其大正之道則其事愈吉若居爻位之凶而能行大正之道則其事不至於凶惟是貞正之道則能勝於凶吉也天地之道貞觀者也義曰觀者為天下之所仰觀則謂之觀夫天本在上地本在下天地之性本不相得及夫天以純陽之氣降於下地以純隂之氣騰於上二氣上下交相通感然後以成生長之道是天地之道生成之理皆本正一故為物之仰觀者也日月之道貞明者也義曰夫日為陽德月為隂精運行四時晝夜不息者日月之明也然而往來不停照臨下土不混其光者蓋各得貞一而明有所一也天下之動貞夫一者也義曰夫少者多之所貴寡者衆之所宗故天下之情偽人事之動靜皆歸一而後可正也然則天下之廣周於萬里人心至衆萬孔千狀執一何由而治哉蓋萬化一術也天下一統也若以至正之道純一之德而治之則天下自然而治矣若不以純一之德而治之則天下自然而睽乖矣故王輔嗣嘗曰夫衆不能治衆治衆者至寡者也夫動不能制動制動者貞夫一者也是天下之動必由寡之所治貞其一而已夫乾確然示人易矣義曰此又言天得一之道也確者則謂剛健者也夫乾以剛健之德運行不息生成萬物示人以和易由其得一之故也故無為而物成不言而時化是示人易也夫坤隤然示人簡矣義曰隤然則謂柔順者也此言地之得一也夫坤之道以柔順之德承天之氣生成萬物不煩而物成不勞而物遂者亦由其得一故也故不須經營而萬品自化是示人簡也若乾不得専一之道或有隤然則不能示人易矣若坤不得専一之道或有確然則不能示人簡矣且以乾坤之道生成之理確然隤然示人易簡况為天下之君者哉夫尊為聖人必法此乾之剛健之德生成天下不至於煩勞則天下從而治矣夫為人臣者必法此坤之柔順之德承君之命行君之事則天下不勞而治矣若為君為臣能法易簡之道則天下國家可正也爻也者效此者也義曰夫六十四卦分三百八十四爻有動有靜有邪有正有凶有吉有是有非故通變之道皆在諸爻之中為人之所效法也故所謂爻者效物之變動者也象也者像此者也義曰夫六十四卦之象皆法於天地水火風雷山澤之象也如乾以天為象坤以地為象艮以山為象坎以水為象如此之類是皆象其卦之所本之像也注所謂象此物之形狀也爻象動乎內吉凶見乎外義曰夫六十四卦之象三百八十四爻爻象之間有正有不正有應有不應有善有不善有吉有不吉若爻象之發動於一卦之內則吉凶之事顯見於一卦之外也功業見乎變義曰言聖人用此大易之道觀其卦爻之變動可行則行可止則止推而求之以立成天下之功業以通天下之心志聖人之情見乎辭義曰辭者則爻象之辭也夫六十四卦之中有情偽之端得失之理其吉凶悔吝皆在爻辭之間欲知聖人設卦之情意者觀其爻象之辭則可見矣至如乾之初九言潛龍勿用則聖人勿用之情可知矣比卦上六曰比之無首凶則聖人無首之情可見矣如此之類皆在爻辭間可見矣天地之大德曰生義曰夫天地之大德者惟是隂陽二氣上下相交生成萬物周而復始無有限極故其德常大若生之不常運之有極則所生之道不廣也聖人之大寶曰位義曰寶者愛也位者所守之位也夫聖人之大寶者惟在其位然則聖人之大寶何以在乎位蓋聖人之有才德若無其位則其功不能及於天下若有其至尊至寶之位則其功可以及於天下無有逺近皆被其澤皆被其功德也是故聖人重德行道於民故大寶其位也何以守位曰仁義曰言聖人既有才德又能大寶其位何以守其位哉必須法天元之德以仁愛之道生成於天下使天下之人皆被己之仁德然後父子有禮上下相親也何以聚人曰財義曰夫聖人何以萃聚於人哉必曰財而已財者使衣食豐足用度常備仰有所奉俯有所畜則天下有戴君之心若其衣食不足用度不備則不能萃於天下之民是故古之聖人修其水火金木土五行之事正德利用厚生使天下之人各得其所如是則父子兄弟遞相親睦矣至於為農者勤於耕為商者勤於貨為工者勤於器如此之類則可以保六親六親既相保則親族內外自相親愛如是是聚人曰財也理財正辭禁民為非曰義義曰言聖人既能守位以仁又能聚人以財使天下父子各有所養各得其所然而貨財之道必主於均平使多者不得積其私少者皆得盡其養又須與正其辭為之節制以禁民之有非僻者使皆合於義而得其宜矣然則所謂義者蓋裁制合宜之謂義也古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物義曰自此已下至蓋取諸夬為一章言包犧氏以聖人之才德以王天下為天下之主然於上古洪荒之世典章法度未立而包犧氏仰則觀象於天俯則觀法於地既觀察天地之象又觀鳥獸之文與地之宜以畫成其八卦也然則上既言觀法於地下又言與地之宜既言觀鳥獸之文下又言逺取諸物者何哉蓋上文言仰則觀象於天俯則觀法於地者蓋是伏羲始觀象之初也此又言鳥獸之文者蓋東方之宿則為蒼龍南方之宿則為朱鳥西方之宿則為白虎北方之宿則為龜蛇如此之類是伏羲仰觀天之垂象之宿鳥獸之文又觀其地之動植山川丘陵之象萬物所生之宜既觀天之垂象之文又觀地之所生之宜然後近取諸身者至如乾為首坤為腹震為足艮為手又近取人之一身其有思慮口鼻之屬如此之類是近取諸身也既近取諸身又逺取諸萬物之象若乾為龍坤為馬山澤風雷之類是也於是始作八卦義曰作者起也言伏羲因此天地萬物之象然後興起八卦以象動植之宜也以通神明之德義曰神明即謂天地之道隂陽之運變通不測之宜吉凶未兆之事如此之類則謂之神明是八卦通此神明之德也以類萬物之情義曰夫萬物之情狀至繁至衆故不可得而知之也聖人作此八卦取其天地水火山澤風雷之象以類聚萬品之情偽皆可見也作結繩而為罔罟以佃以漁義曰網罟者取魚獸之物也言伏羲既畫八卦以通神明之德以類萬物之情以至天地之始終人事之淵藴無不畢備於其間然而於人事之間未有所食之物是故伏羲又結繩以為網罟以佃以漁使人取其魚獸以為所養蓋取諸離義曰蓋者疑之之辭也離者麗也言山之髙而禽鳥麗之水之深而魚鱉麗之然則山之髙水之深而人莫能及之而聖人創立其事結繩而為網罟使人用之雖禽鳥居山之髙魚鱉居水之深皆得而取之是使人麗而用之也然謂之蓋者即疑之辭也言聖人創立其事不必觀此卦而成之蓋聖人作事立器自然符合於此之卦象也非準擬此卦然後成之故曰蓋取諸離包犧氏沒神農氏作斫木為耜楺木為耒耒耨之利以教天下蓋取諸益義曰言包犧氏既沒之後又有神農氏以聖人之才興起於世以其人既得其網罟以佃以漁然而未有飲食之道神農氏是以朴斫其木以為之耜耜者博五寸其首有華觜以為耕作之用又揉其曲木其曲有鉤以為之耒耒耨之利以教於天下之人使四時耕作之種其禾黍之利以為飲食之養蓋取諸益益者取其有益於人為萬世之利也日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑義曰言於日中為其市以貿遷於貨財以萃聚於天下之人使皆貿易之相交民之無者從而有之民之有者從而散施之既貨財交易貿遷有無天下之民各得其所各得其宜故曰市也然必取於日中者蓋日之早而逺者必不能及若日之晚而又失其時必於日中之時取其逺近之人皆得以及矣故於日中為市也然則蓋取噬嗑者以其噬嗑之卦上體是離下體是震震動於下離明於上是下動而上明聚之則為之市也又頥中有物曰噬嗑凡頥中有剛梗之物必囓而去之也然後得其通而物有所合也神農氏沒黃帝堯舜氏作通其變使民不倦義曰夫法之久則必弊弊則物有所不通法既不通則人情多至怠情而有厭倦之心是故神農既沒之後復有黃帝以聖人之才德繼世而興起能通人事之理以其伏羲既結繩而為網罟而斫木為耜楺木為耒又聚天下之民財以交易之為之市然事之久必有其弊壞故黃帝能通其變化而裁之引而伸之隨其物之變通因其時而更造之以為萬世之法使民宜之皆得其利用民既得其利用則無怠倦之心也神而化之使民宜之義曰神而化之使民宜之者言天下之民既得其利用則不知聖人之制作所以然而然也既不知所以然而然則所作為用皆得其宜也易窮則變變則通通則久義曰言黃帝既能通其變使民不倦神而化之使民宜之如此者蓋得大易通變之道也夫大易之道窮極而復變變極而必通天地生成之道人事終始之理無有限極周而復始無有窮際可以永久為萬世通行之法也是以自天祐之吉無不利義曰言黃帝之法如此為萬世久行之道則自天而下至於鬼神皆祐助之在鬼神尚且祐助況於天下之人乎鬼神人民既以祐助則盡善盡美之功所往之處何所不利哉故引易文而證之黃帝堯舜垂衣裳而天下治蓋取諸乾坤義曰自此已下凡有九事皆黃帝堯舜因象而立制也夫上古之時世質民淳民皆敦朴則上如稿枝下如野鹿則上下自然而正矣逮黃帝堯舜之世垂衣裳而天下治以其乾有剛陽之德在於上故為尊坤有柔隂之德在於下故為卑爰作衣裳以分尊卑上下貴賤之等此蓋取乾坤之象也然則黃帝堯舜連言之者蓋衣裳之起始於黃帝成於堯舜之時故以黃帝堯舜而通言之也刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸渙義曰刳者謂刳木之中虛其中以為舟也以濟於水使人乘載之以濟不通免其沈溺之患也剡木為楫者又剡削其木以為舟之用也凡人有川險之深而不可以涉之而黃帝能刳木之中為舟又剡削其木為楫以濟川險之患使人乘之皆得以濟致逺之處皆得以利蓋取諸渙者蓋渙之卦上是巽下是坎巽為木坎為水故其彖辭曰利涉大川乘木有功也是言巽木為舟有涉川之象也又曰渙者散也能散釋其民難令為舟以濟於天下使人免其沈覆之患故此亦得變通之一端也服牛乘馬引重致逺以利天下蓋取諸隨義曰夫物之重者人力不能及之地之逺者人力不能至之是故聖人服習其牛調習其馬使重者得以及之逺者得以至之然則牛馬本無知之物而聖人能馴服之使其至重之物亦得以行之至逺之地亦得以至之重者引之逺者利之天下之人皆得其利蓋取諸隨也然則隨者是動作必隨於人以之逺則亦隨於人以之近則亦隨於人是動作所在皆隨於人也重門擊柝以待暴客蓋取諸豫義曰夫治平之世不能無姦宄之人是故聖人用其兩木相擊昏夜之間擊其聲以為之警備使其姦人暴客不能踰越也然而必取諸豫者蓋豫者樂也按豫卦雷出地奮豫言雷自地奮出以發生萬物物既生各遂其安故曰豫樂也此重門擊柝以待暴客而云蓋取諸豫者蓋言凡人居治平之時外既有警備則姦人不能犯姦人既不能犯則在內者自然安矣斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過義曰言聖人既能教民以粒食五穀然又不能精治其五穀以為飲食之養是故後世聖人復斷其木為杵又掘其地為臼以其臼杵之利以精治其五穀夫既精治其五穀則天下之萬民皆得以濟故取諸小過焉然則必取小過者蓋小過之卦聖賢之人過為其事以矯過於人今此杵臼而取小過者蓋聖人既教人粒食以自養又教人精治其五穀是小有過為其事故也弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽義曰夫治平之世不能無姦暴之人堯舜之代不能無逆命之人是故聖人雖立刑罰之事以懲戒之然其間亦有不庭不軌之人非刑罰之威可以懲也是故復以弦繫於木上以為弧弧者即弓也既以弦於木為弓又剡削其木取其矯厲故為矢以中於人弧矢既成以威中於不庭不軌之人威既中於不庭不軌之人則天下之姦暴者皆畏而懼矣然蓋取諸睽者蓋睽者離也言人心之乖離者必用弧矢以威之至如蠻夷之人當奉於中國反抗衡於中國有離叛之心又如諸侯當尊奉於王者今不能貢賦反有倍於王者之心又如姦猾之俗不能歸奉於上反有離二之心如此之人聖人因其有睽離之心故制􅓡矢以威服之故云蓋取諸睽也然則弧矢杵臼服牛乘馬舟楫皆云利者此蓋器物有益於人故稱利也然重門擊柝不言所利者蓋擊柝之事止以禦暴客是亦利之異名也垂衣裳不言利此亦隨便立義故云天下治治亦利也此皆義便而言故不可一例取也上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯義曰夫上古之時未有宫室當此之時人但冬則居營窟夏則居層巢人既安居然於風雨之時無可禦止是故後世聖人易之以宫室上隆其棟下為之宇以待風雨有所棲止故取諸大壯也然必取諸大壯者以其制度宏壯有便於人故取大壯也古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過義曰夫上古之時凡人之死不能蔽蔭其尸但厚衣之以薪及葬之中野之間又不能封土為墳是不封也又不能種樹為别是不樹也及其哀戚又無時而止但哭除則止喪之期制又無其日月之限是無數也其於死者知耶不知耶是故後世聖人以木合為之棺椁以蔭庇其尸又封其土以為之墳又種其樹以為之别又立五服之制三年之喪使其哀戚有時者也然則蓋取諸大過者原大過之卦是聖人大有所為過越常分以拯救天下則為之大過今此人之死不能蔽蔭其尸而取此大過者何也蓋聖人重人之生孝子哀戚之情以其人之生必有其死蓋死者是人之終人之既終孝子之大事重其死者人之大事故過為棺椁以蔭庇其尸又封土以為之墳種樹以為之别立其五服之制又立饗祀之禮其事過越至大故取諸大過也上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬義曰夫上古之時世質民淳情偽未遷凡人有事必結其繩而取信若有大事則結之以大繩若有小事則結之以小繩逮及後世情偽已遷利害漸作巧詐萬狀不可以救正之是故後世聖人易之以文書成之以契券文書所以取其信驗契券所以取其要約文書既立契券既明則百官之事皆得其治萬民之情皆得以察然而蓋取諸夬者蓋夬者決也能明決其事驗人之情偽以決斷之自此而後民之利病事之姦詐不可以隱也是故易者象也義曰自此已下至小人之道為一章夫大易之道皆本諸萬物之形象而成至如乾為龍坤為馬艮為山兌為澤如此之類皆是本於物象也象也者像也義曰言聖人立六十四卦之象皆因其物像而名也至如兼山艮麗澤兌巽為木坎為水離為火如此之類皆是本諸象也彖者材也義曰彖者即六十四卦下彖辭也如乾元亨利貞坤元亨利牝馬之貞此類皆聖人設其彖辭以象一卦之材德而成之也爻也者效天下之動者也義曰夫六十四卦一卦則象其一時一爻則象其一人然而爻有變動位有得失變而合於道者為得動而乖於理者為失人事之情偽物理之是非皆在六爻之中所以象天下之動使人效法之也是故吉凶生而悔吝著也義曰夫六十四卦之爻有得位有失位者有凶有吉者皆繫於爻之動靜也若動得其道則吉動失其道則凶然動靜之間有可追悔者有可鄙吝者若能慎於動靜則凶害不生矣若不能慎於動靜則凶咎著焉是吉凶悔吝著見於外皆繫於爻之變動也故上文所謂吉凶悔吝生乎動者也陽卦多隂義曰陽者即剛也隂者即柔也夫八卦之設有純陽之卦有純隂之卦有一卦有二陽者有一卦有二隂者至如坎之一卦上下二隂而一陽在其中矣艮之一卦一陽在上而二隂在其下矣震之一卦二隂在上而一陽在其下矣是陽卦多隂也隂卦多陽義曰夫八卦之中有隂卦而多陽者至如離之卦二陽在外一隂在內矣兌之一卦一隂在上而二陽在下矣巽之一卦二陽在上而一隂在下是隂卦多陽也其故何也義曰此是孔子疑問之辭也言陽卦多隂隂卦多陽其故果如何多也陽卦竒隂卦偶義曰此是孔子復陳陽卦多隂隂卦多陽各有本末也言陽卦所以多隂者蓋陽卦純一故多竒也隂卦多陽者蓋隂卦純二故多偶也是故聖人因其竒偶之數所以如此也其德行何也義曰此孔子又發問之辭言陽卦所以多竒隂卦所以多偶其於德行果如何哉陽一君而二民君子之道也義曰此是孔子又自釋陽卦竒隂卦偶之所由也言陽之卦是君隂之卦是民一陽在上則衆隂歸之一君在上則二民歸之猶天下一統衆歸於一主則成邦國之道是至治之本此是君子之道者也隂二君而一民小人之道也義曰言隂者是小人之象也夫二隂在上而一陽歸之是由二君在上而在下之人無所的從在下之人既無所的從則天下不能統一如此則乖邦國之道是致亂之本此是小人之道也易曰憧憧往來朋從爾思義曰自此已下至德之盛也為一段憧憧往來朋從爾思者此是咸卦九四之爻辭凡易卦中有義理深逺卦爻之內未能盡其義者孔子特引於此而明之言天地之道生成之理不能感於物蓋物自然而咸感之聖人之道亦不求感於人蓋但任仁義之道以行於世則天下之人自然而歸之今九四以陽居隂位是不正也當咸感之時以不正之身不能任以仁義之道以感於人反自思慮其朋以求所感故所感之道不廣但其憧憧然朋從爾思之惟是己之朋黨者則感之也子曰天下何思何慮天下同歸而殊塗義曰此孔子自釋九四之辭言天下之大萬宇之廣為感之道聖人未嘗思之但任其仁義之道以感於天下則天下雖廣而人自感悅而隨之故云同歸而殊塗一致而百慮義曰言人之百慮雖然煩多及其歸也終歸於一致也天下何思何慮義曰此重言之者言聖人凡有天下之衆為感之道不在思慮以感於人如是則所感之道至廣也日往則月來月往則日來日月相推而明生焉義曰此已下又明天地之道隂陽之端人事之理萬物之情亦自然而然也言日往則月來月往則日來日月之道互相推蕩於天地之間而晝夜之道自然明矣然則日月之道不求照耀於人而天下之人物自然感日月之照臨也寒往則暑來暑往則寒來寒暑相推而嵗成焉義曰夫天地之道晝則為陽夜則為隂以隂陽之道互相推蕩而成寒暑寒暑之道互相推蕩而成嵗功然則寒暑之道非自求成其嵗功蓋嵗功自然而隨於寒暑也往者屈也來者信也屈信相感而利生焉義曰此一節又明萬事之理亦皆本於自然而然也屈者去也信者進也往者既去來者求進屈信之間而利害生焉是利害自然而生於屈信也尺蠖之屈以求信也龍蛇之蟄以存身也義曰夫尺蠖之屈雖一本於天賦然而凡於動靜之間非自樂也蓋所以求其信也龍蛇之蟄潛其所處蓋所以求其安身也精義入神以致用也義曰夫人得天性之自然稟五常之至正然而有服君子之事者有服小人之事者何也蓋曰操心積慮學而致諸善不學而致諸不善也惟是聖人得天地之全性凡所動作精思逺慮以合於義以通神妙及發於外也可以措天下之用興天下之利也至如網罟取諸離書契取諸夬宫室取諸大壯凡百所為之事有利用於民者皆由聖人精義入神然後能也利用安身以崇德也義曰言聖人既能精義入神以致天下之用又能宴樂以安其神飲食以養其體居富貴而不自充詘在貧賤而不自隕穫如此則安於身而崇大其德業也過此以往未之或知也義曰言聖人舍其精義入神以致用利用安身以崇德舍此二道而往則雖聖人亦不能知之也窮神知化德之盛也義曰言聖人既能精義入神利用安身如是則可以窮極鬼神之情狀通曉變化之終始此是德之至盛者也易曰困于石據于蒺藜入于其宫不見其妻凶義曰此是困卦六三之辭也言六三之爻以隂居陽位是不正也在下卦之上是不中也夫君子之人凡欲求進必須俟其時今此六三居困之時其性動而欲上進是故為九四之所止故困於石也既上不能進復退其居又下乘九二之剛故曰據於蒺藜上既無所進下既無所適是猶入於其宫不見其妻凶之道也夫妻者至親之人亦不可得而見之況於他人乎子曰非所困而困焉名必辱義曰此已下是孔子之辭言此六三所以困於石者非是所困而困焉蓋六三居困之時躁而求進為九四之所止然君子之名必求榮今為九四所困是其名必辱也非所據而據焉身必危義曰夫君子之人進必以道動必合義不惟澤天下之人又且先安其身而不陷於過惡也今六三既下乘九二之剛為九二之所據為九四之所止是必不能安全其身而自必自至於危厲也既辱且危死期將至妻其可得見邪義曰言六三既非所困而困非所據而據既辱且危是不知死期將至也既死期將至雖屬至親之人必不可得而見也易曰公用射隼于髙墉之上獲之無不利義曰此是解卦上九之辭也隼者貪殘之禽也墉者牆也言解難之時而六三以隂柔不正之身居於下卦之上是不正之小人也夫居解之時而以小人居君子之位是猶貪殘之禽居於墉牆之上必為人之所射而獲之既射而獲之則何所不利哉子曰隼者禽也弓矢者器也射之者人也義曰夫弓矢之事皆是威天下之器除天下之害者也今君子之人欲去貪殘之禽必以弓矢而射去之然後可也君子藏器於身待時而動何不利之有義曰言君子之人凡去小人必須有其才有其德有其時有其位然後可以有所施為有所動作也若無才德無時位欲去非類之人必自取敗亡之道是故君子之人必當藏畜其器韜光其業於身待其時而動之則所往必有所獲也動而不括是以出而有獲語成器而動者也義曰括者結也夫君子之人凡能畜積其德韜藏其器則無有括結凝滯之事如是則沛然莫之能禦也以至凡有所施為有所動作必有所獲所在必有所成功是語成其器而動者也子曰小人不恥不仁不畏不義義曰此已下又言小人之道也夫小人之性不常亦不知仁義不知亷恥不以刑法威之則不畏不義是故古者聖人設其鞭朴之事刑法之威者蓋為小人不恥不仁所以設之使知畏而為義也不見利不勸義曰言小人之心専在於利凡事不見其利則不知有所勸勉也是故聖人立為㕓市使得交相貿易立農桑使得互相耕養而有所勸也不威不懲義曰夫小人以小善為無益而弗為也以小惡為無傷而弗去也但恣縱其心而放僻邪侈之事無不至矣若不以刑而懲之則不知懲戒者也小懲而大誡此小人之福也義曰言君子之人既以刑懲於小人亦非君子之素心也蓋為小人不恥之故也然雖小有所懲而若能戒懼不為大惡此亦小人之福也易曰屨校滅趾無咎此之謂也義曰此是噬嗑初九之爻辭也夫噬嗑之卦是先王用刑以去剛梗之俗今此初九居卦之初是受刑之始也然居受刑之始其罪未至大其惡未甚著故但屨校其足滅沒其趾而能改之所以無咎今此小人若小懲而能戒慎之則其罪亦不至於大此是小人之福故引此噬嗑之初九而證之故曰此之謂也善不積不足以成名惡不積不足以滅身義曰言凡人若能積小善以至於大善積之不已以至著見於外則可以成萬世之名也若小善不積則不能以成其名也若以小惡為無傷而弗去及小惡積之已久反成大惡及其著見於外不惟受戮亦致滅沒其身也小人以小善為無益而弗為也義曰夫小人之性以小善不能益於身是以因因循循至於老耄不能修飾而不為以致喪身取咎自取滅亡之道也以小惡為無傷而弗去也義曰言小人以惡為無傷積小惡以至大惡從微至著日復一日不能悛改而弗去以至惡大罪深也故惡積而不可掩罪大而不可解義曰言小人既不能積其小善反自為其小惡小惡之積久而不已及夫惡大而彰顯於外不能以掩閉罪大而及於身不可以解脫如是則滅身受戮也宜矣易曰何校滅耳凶義曰此是噬嗑上九爻辭也言初九居受刑之始而屨校其足其罪亦未甚大至此上九居受刑之終不能悛改其惡但以小惡為無傷以至惡積罪深而其身受戮滅沒其耳何校其首此是大凶之道也子曰危者安其位者也義曰夫君子之人所以危者蓋由安然居位恃其泰不為之備恃其安不知其亂以至泰久必否安久必亂所以致其不安而社稷之危也若能居安慮危居治思亂然後可以保其位而不失也亡者保其存者也義曰夫人之所以亡者蓋由恃其安不思其危恃其存不思其亡任其放僻邪侈之事所以致其身之危亡基業之隕墜也若能常自深思逺慮不為奢侈之行則可以保其存而不亡也亂者有其治者也義曰言人居安平之時但恃其天下之治不能思慮存亡之機不能憂恤天下之人恣其驕盈之志不知亂之所生也是故君子安而不忘危義曰言君子之人若能居於安平之時常自戒慎恐有傾危之事則可以獲吉也存而不忘亡義曰言居平易之時能常思其危亡之事所以保其存而不亡也治而不忘亂義曰言居治平之時當自恐懼修省鑒其前車之覆則無禍亂之事也是以身安而國家可保也義曰言君子之人既能安而不忘其危存而不忘其亡治而不忘其亂夫如是其身可以安其國家社稷可以永保也易曰其亡其亡繫于苞桑義曰此是否卦九五之爻辭也言當否塞之時小人在下皆失其道獨九五能休去天下之否常思其社稷之危亡言我其亡乎我其亡乎是猶繫其社稷於苞桑之上者也桑者即是其根深固而不拔苞者即是叢生之類言九五既居否塞之時能休去天下之否常自思慮戒懼是猶繫其社稷於苞桑之上而其根深固不可以拔也子曰德薄而位尊義曰夫居君子之位必有才有德然後可以居也若才之薄德之寡而居於尊貴之位必不可也知小而謀大義曰言人之才知之小反欲謀國家之大事是必不可也然居幽暗之時尚不免其誅戮而況居於明盛之時其有不受君之誅戮者鮮矣是小知者不可謀國家之大事也力小而任重鮮不及矣義曰夫小力之才必當任其輕小之用若任以國家之重器其勝任者亦鮮矣易曰鼎折足履公餗其形渥凶言不勝其任也義曰此是鼎卦九四之爻辭言九四以陽居隂位是不正也夫以不正之身居於大臣之位而才力之不勝其職是猶鼎之折足而傾覆公家之美實而又且汚染其鼎也然則君子之人凡居髙位必須有其才有其德然後可以稱國家之大任也若無才無德而居大位是猶鼎之九四以不才之身而居國家之重位而傾覆公家之美實敗壞國家之綱紀是大凶之道也如此之人所謂不勝其任也然則謂之言不勝其任者此是孔子引此鼎卦之辭以釋德薄位尊知小謀大力小任重之人故以此爻而結言之子曰知幾其神乎君子上交不諂下交不瀆其知幾乎義曰此一節是孔子釋豫卦六二之辭子曰知幾其神乎者幾者是有理之形之謂也神者妙微無方之謂也夫君子之人有先幾之識深思逺慮凡有所施為必能極未形之理未萌之兆者也既未形之理未萌之兆皆先知之是其知如神之妙用而通於靈也君子上交不諂者夫常常之人凡於有權位之人則必行苟諛佞媚甘言巧語以求其説以求其進是故君子之人知其諂諛佞媚之道不可以求進是以守其正自潔其身切問近思博聞強識待時而動不以邪佞之道以求其進不以甘言巧語以説其上也下交不瀆其知幾乎者夫常常之人凡見其下交之人必以強暴之性苟悅之道以瀆亂於下是故君子之人凡居上位雖於下交亦以中正之道至正之德以待於下未嘗敢以柔邪苟媚之道以瀆亂於下者也言如此之人既上交不諂下交不瀆又極於未形之理未萌之兆是知幾之人也幾者動之微吉之先見者也義曰言人知其有理未形之事極其禍福萌兆之來則於動靜之間戒其微小之事動得其道則吉動失其道則凶是以從其吉而背其凶去無道而就有道是幾者吉之先見者也君子見幾而作不俟終日義曰君子之人既知未形之理慎其微小之事夫如是則吉凶之變不俟終日之間而可以明見矣易曰介于石不終日貞吉介如石焉寧用終日斷可識矣義曰此是豫卦六二之爻辭也言豫之時九四以剛陽之德居上卦之下是居人臣之極位者也夫居人臣之重位必為在下之所歸向是故初六以隂柔之質居豫之初為九四之正應當豫之時不能守其正道但以柔邪諂媚以説於上以求其進故為九四之所見從但有聲名虛譽以聞於外然既有聲名傳聞於外是虛譽也故其爻辭曰鳴豫凶至於六三比於九四居豫之時在下卦之上履非其位上承於九四亦以柔邪諂媚之道以悅於九四故其爻辭曰盱豫悔惟此六二以隂居隂居得其正不為富貴以易其志不為貧賤以易其心堅然守一介之節確然守不變之心履得其中居得其正雖下比於初六亦未嘗敢以非道而褻瀆雖近於九四亦未嘗敢以柔順而苟求但堅執其心不苟其進故其心如石之堅不能變動不待終日而獲其貞吉然則六二既能上交不諂下交不瀆動靜之間幾微之事未嘗不知之既幾微之事未嘗不知之則吉凶之來又寧用於終日之間而斷可見矣此是知幾之人也若見事於己萌之後則是不知幾也然則介如石焉寧用終日斷可識矣者此是夫子解釋六二之爻辭也言六二有如此之美故仲尼稱美之也君子知微知彰義曰此已下至無祗悔元吉為一節以解復卦初九之辭也言君子之人凡所施為動作之間必慎其微小之事夫微者亦是幾微之事有理未形者也唯君子之人凡所動靜凡有思慮吉凶之兆禍福之理未萌之前而已知之既知之則舍其凶而趨其吉此是知微也既知其微逆知禍福雖有其理未有其形更不可使彰露顯然而著聞於外如此是知彰也知柔知剛萬夫之望義曰夫事之萌漸必始於柔小得失之理亦自於幾微以至凡百之事皆是自小而至大自柔而至於剛也是故君子之人極未形之理既知其本又知其末本末之間不使吉凶之道形著於外夫如是則可以為萬夫之所瞻望天下之所仰賴也子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也義曰此孔子言知微知彰知柔知剛也自古已來惟顔子一人而已其庶幾可以近之夫顔氏之子者即孔門之髙弟亞聖之上賢能知禍福之萌吉凶之兆有不善未嘗不知有一惡未嘗不悟及其知也便從而改之未嘗復行於事業故孔子曰有顔回者好學不遷怒不二過不幸短命死矣是言顔子能修其身能深其慮凡有吉凶不善之事未嘗不知既知之亦未嘗復行故唯顔子庶幾可以近乎易曰不逺復無祇悔元吉義曰此是復卦初九之爻辭夫復之初九以陽之德居復之初當羣隂用事之時獨以一陽而反於地下以萌生萬物是復之初九而來復之速者也亦猶賢人君子得天之性凡思慮之間亦有不善之事則能早辨之明其心復其性使過惡不形於外所行之事皆合於中道自古聖賢之中惟顔氏之子知有不善未嘗不速改之以復於善道故三千徒中惟此顔子一人而已故孔子特稱舉之曰不逺復無祗悔者惟顔子一人而已天地絪緼萬物化醇義曰此已下至言致一也解損卦六三之爻辭絪緼者蓋薰蒸之貌夫天地之道隂陽之氣二氣相薰蒸而成交感之象是以萬物皆得以亨通也男女構精萬物化生義曰言男女相構和會而萬品之物亦得以變化而生也易曰三人行則損一人一人行則得其友言致一也義曰此損卦六三之辭也夫損之時損下以益於上損民以益於君今此六三六四六五以三隂上進歸於上九之陽是其志不能醇一也必損於上九之陽者也然則天地之道皆尚於醇一故一隂一陽之謂道男女相遇亦在於醇一今若以三隂上進必損上九之陽若但六三獨往之則得正應之道然後得其友也子曰君子安其身而後動義曰自此已下至立心勿恆凶解益卦上九之爻也君子安其身而後動者言君子之人凡欲動作施為必先安其身若身不安則行事之失是必凡所施為必先安靜其身然後動作施於行事則無有所失者也易其心而後語義曰言君子之人凡欲形於語默必先平易其心安靜其志深其思慮然後形於言語夫如是則言無可擇所出皆中於節所行皆合於道也定其交而後求義曰言君子之人凡欲求進必須先定其交觀其人之可否量其人之賢愚可與之求則求之不可與之求則退之其或不觀人之可否不量人之賢愚不素定其交分躁而求之則自取窮辱之事君子修此三者故全也義曰言君子若能安其身而後動易其心而後語定其交而後求能修此三者故所行之事得其全者也危以動則民不與也義曰言君子之人若不能安其身而以危而動必為民之弗與也此復解上三者之事也懼以語則民不應也義曰言君子之人若於言語之間不能安易其心深思逺慮反自以言語之間自恐自懼所出之言必為民之所弗應也無交而求則民不與也莫之與則傷之者至矣義曰言君子之人若不能先定其求素結其分妄而求之必為人之所不與也既為人之所不與則傷害之事從而至矣易曰莫益之或擊之立心勿恆凶義曰此是益之上九之辭也當益之時損上以益於下損君以益於民今此上九當益之時反自求於下既求於下心又無厭故為人之所不與也故云莫益之或擊之者言不惟所求之人不與抑亦為人之所擊棄也既為人之所擊棄如此者蓋是立心勿恆所求無益之故也子曰乾坤其易之門邪義曰此已下至其當衰世之意邪為一章言天地初判乾坤已有形狀而大易亦已行於其中矣是故大易之道變化之理皆由乾坤而出是以聖人迹乾坤而成諸卦之名是乾坤者其為易之門户也乾陽物也坤隂物也隂陽合德而剛柔有體義曰言乾體剛健為陽物也坤體柔順為隂物也是以隂陽二氣上下相配合而成生育萬物之道若乾坤上下不相配合則萬物不生故隂陽相配合則萬物得以生萬物得以生則其剛柔之體上下之象自然而成也以體天地之撰義曰撰者數也言隂陽相配合而生萬物自然而成剛柔之體以是而分隂陽竒耦之數由此而成也以通神明之德義曰神明之德者即為妙用無窮不可測度也今此大易之道變化之理生成之道可以通於神明之德窮於萬事之理也其稱名也雜而不越義曰言大易之道其爻卦錯雜物理煩碎其稱名也雜然雜而各有倫理不相干亂不相踰越也於稽其類其衰世之意邪義曰稽考也類物類也言上古之時世質民淳情偽未作典章法度未立伏羲畫為八卦以為萬世之法歷夏及商世漸澆漓民欲叢生是故文王以伏羲所畫之八卦重為六十四卦盡其天地人事之道變通之理吉凶悔吝之由無不盡載於諸卦諸爻之間然稽考其義類其皆因衰世之意邪夫易彰往而察來而微顯闡幽義曰自此已下至以明得失之報為一章夫大易之道至深至粹明其吉凶之理得失之迹彰明已往未來之事皆由易道可明也既彰明已往未來之事至於微小幽暗之理凡事不可以明者亦皆由此易道而顯闡之故曰微顯闡幽開而當名辨物正言斷辭則備矣義曰開謂開釋爻象各當諸卦之名辨其事物之理正謂正其聖人之言斷定其吉凶悔吝之事皆繫屬之爻辭無所不備矣其稱名也小其取類也大義曰言諸卦之名皆取其類而稱之至如乾則稱龍坤則稱馬然則龍與馬皆天下之一物耳雖稱名也小然其取類也至大故於人事則為君臣父子夫婦兄弟長幼之道天地之理隂陽之端無不備於此矣其旨逺其辭文義曰旨者意也言其易之旨至近至逺其理雖委曲然於其辭則有文采不尚質朴者也至如龍戰於野是近明龍戰之事逺明隂陽鬬爭之理是其旨逺也又如坤言黃裳元吉不直言居中得位乃言黃裳者是其辭文也其言曲而中義曰言變化無恆不可為體例其言必隨物之屈曲而各中其理其事肆而隱義曰肆者陳列也言易之所載之事於爻象之間雖其文皆陳列其事然其義幽隱不可驟然而曉之因二以濟民行以明失得之報義曰二則謂吉凶二理也言得失之理吉凶之道二者之理以濟萬民之行事然萬事之理有得位得正者為吉有失位不得正者為凶失則有凶報正則有善應因此二者之理以濟民之行事以明得失之報使人趨其吉而背其凶向其善而違其惡也易之興也其於中古乎作易者其有憂患乎義曰自此已下至巽以行權為一章夫易之起始於伏羲上古之時世質民淳情偽未形巧妄未作世凝然而不撓當此之時雖八卦亦盡萬事之情歷夏及商至於桀紂暗君在上情偽漸遷巧妄已作澆浮崇尚不可勝説文王罹於憂患之中有聖人之才上懼君之見去下慮民之情偽是以取伏羲所畫之八卦重為六十四卦以盡天地之淵藴以明人事之終始至於吉凶之道得失之理憂虞之象悔吝之事無不備載於其間使人知其吉而背其凶向其善而捨其惡以為萬世之法使人防患於未萌也是故履德之基也義曰此已下九卦是修身防患之術也然則六十四卦皆是防患之術何以特取此九卦者蓋此九卦最是修德之基為人事之先故特陳此九卦也履者禮也言人踐行其禮敬事於上不失其尊卑之分如此是履德之基也謙德之柄也義曰柄者人之所以操持也夫人雖有爵祿之分崇髙之位若無謙順之德恃其驕盈必至於傾失是故君子之人若能居爵祿之位必當持謙順之德則雖危而不失雖髙而不危如此是謙德之柄也復德之本也義曰言君子之人若能復其性明其心至於思慮之間有不善之事必先改之如此是復其性為德之根本也恆德之固也義曰言為德之時常能執守終始不變如此則其德固故恆卦為德之堅固也損德之修也義曰言君子之人若能謙損以自增新降損其志此是修身之本也益德之裕也義曰裕者寬大也言人凡所作事能利益於人日新一日則其德寬裕而有所包容也困德之辨也義曰言君子之人居於治平之時恣其安逸之性多不知艱險之事惟是居困否之時備歷艱苦知其君子小人之道然後能明辨困否之事者也井德之地也義曰夫君子之身可貴可賤可貧可富而其志不可易其心不可變其德不可改猶井之居地不可遷改也巽德之制也義曰夫愚民之性蚩然而無所識其非辟姦偽無所不至矣是故聖人必行號令以示其法制然行號令之始必以權變之術而巽入於人心然後民可制也此已上九卦各與德為用也履和而至義曰此已下又復明九卦之德也履者禮也言人有恭敬之德有剛直之行必須與人和同既與人和同則可以至於道也謙尊而光義曰夫人有其才有其德雖在崇髙之勢必須謙恭以自卑謙遜以接下如是則德益大而身益光也復小而辨於物義曰物者萬物之理也言人於性之初吉凶未形之時始於為小之事有其不善便從而改之使無能為之咎也恆雜而不厭義曰言君子之人能守其常道不改其操不變其節雖錯雜混處於小人之間亦其心不厭倦於事損先難而後易義曰言凡人若不能謙損於己反欲他人謙損而奉於己則失為人之道是故君子之人必須先減損其身謙讓其己以及於他人是損己以益於下損身以尊於人是先難也及其性既復行既成所言皆合於道所行皆中於禮不失其法度是後易也益長裕而不設義曰言君子之人先求仁義以益於身身既益則其仁義之道可以推及於天下然其仁義既及於物則可長裕於天下因其所利而利之不待先為施設而行之而天下之人自有其餘者也困窮而通義曰言君子之人雖居困窮之時身即困窮而其道得以亨通也井居其所而遷義曰言井之道居其所不可以遷改而其澤可以遷施於人猶君子之德固不可遷易不可變改而其道可以濟人巽稱而隱義曰巽者是聖人之權也言聖人以權變之術行其號令以及於天下而人不知所以然而然也履以和行義曰言凡人有剛直之性溫良之行必以禮而和之故論語曰禮之用和為貴者是也謙以制禮義曰言人性能謙順自卑尊人則可以裁制其禮法而行之也復以自知義曰言人既於事微小之初知其不善而能改過是自知也恆以一德義曰言人能守其常道不變其節終始不移雖居富貴而不自恃雖居貧賤而不自移是純一其德者也損以逺害義曰言人能自降損其身謙沖其德以尊於人則無患害之事也益以興利義曰言人能以仁義之道自益於身又益於他人因其所利而利之也困以寡怨義曰言人居困窮之時守節不移上不怨天下不尤人但守其正而已井以辨義義曰言井之道居其地而不移其濟天下之義故於井之道可以明辨其義也巽以行權義曰權者反經而合道也言聖人凡發號施令則以巽順之德而行之以順其物性以洽於人心也既能順時故能行權也易之為書也不可逺義曰自此已下至道不虛行為一節言大易之道其為書言天地隂陽之事吉凶之理萬事之情偽人事之終始無不備載於其間然於人之行事也不可逺之故上文謂吉凶悔吝生乎動是故君子所居而安者易之序也所樂而玩者爻之辭也君子居則觀其象而玩其辭動則觀其變而玩其占是言易之為書也不可逺也若一逺之則是吉凶悔吝所生者也為道也屢遷義曰屢者數也言易之為道效法隂陽其變化之理爻象之間數有遷易也變動不居義曰言六爻之位互相更變無有定止或隂居陽位或陽居隂位是變動不居也周流六虛義曰言一卦六爻有隂有陽上下周遍互相更易在於六位之間也上下無常義曰言六爻之位位無常定或上或下也若九月剝卦一陽在上十一月一陽在下復是也剛柔相易義曰言六爻之位交相錯雜或剛或柔剛柔之道互相推蕩於其間或陽易隂位或隂易陽位是也不可為典要義曰言大易之中剛柔二氣既互相推蕩於六爻之間則不可為常典不可為要約隨時所變而已故也唯變所適義曰言隨其六爻之變動以適萬事之用也其出入以度義曰言大易之道六爻之位周流六虛上下無常剛柔相易不可為常典不可為要約既上下無常不可為典要然其或出或入或居或處皆不失其法度皆不失其倫理若明以處暗豐不至奢是皆出入以度者也外內使知懼義曰言大易之道明其吉凶之理得失之道以至過去未來之事朕兆之間使人自內自外觀此大易之道皆知戒懼而不敢為非僻之事明其用捨則趨其吉而背其凶也又明於憂患與故義曰言此大易之道不惟言天地隂陽之理亦言人之憂患之事使人明曉之不敢為非也無有師保如臨父母義曰言大易之道其卦爻之辭言其萬事之理吉凶之朕兆其教人也雖無師保之嚴如有師保之教也如臨父母者自上而下為之臨言大易之道其示人也雖無父母之教如臨父母之慈使人一歸於善道也初率其辭而揆其方義曰率循也揆度也方道也言人初能率循大易之文辭則可以揆其大易之道而知典常之理明其義之所歸也既有典常義曰言人既能率循其大易之文辭則知變化之理典常之道也苟非其人道不虛行義曰言人既能率循大易之文辭又揆度其道知其常典是易之道得行於世然大易之文皆聖人所用之道若非通聖之人則不能曉達易之道理則大易之道不虛行也易之為書也原始要終以為質也義曰自此已下至觀其彖辭則思過半矣為一章質體也言大易之道其為書也不獨明人之得失之理憂患之事而又原其萬事之始要其萬物之終至如乾之初九曰潛龍勿用上九曰亢龍有悔坤之初六曰履霜上六曰龍戰於野此是原始要終之大本也既原始要終則窮其大本以為大易之體質以成諸卦之用也六爻相雜唯其時物也義曰言一卦之中六爻之位剛柔上下交相錯雜唯其時物之事得失之理皆隨其時事而言之若屯之初九言磐桓利居貞六二言屯如邅如如此之類是隨其時而言之其諸卦諸爻皆由此而可明也其初難知其上易知本末也初辭擬之卒成之終義曰言一卦之始始於細微雖一卦之大義吉凶之理情偽之端皆始於初始之間然其爻象未備萬事之理雖有其理雖有其意然於人事未能顯見矣是難知也其上易知者上則謂上卦之上也言一卦之事雖有其理在於初爻則其道難見至於上九之時其下五爻皆布列其位剛柔之體得失之理吉凶之道有正有不正者可見矣是其道已成其理已定其爻象以正也是易知矣本末也者言大易之道既原其始又要其終原其始終則知本末是初難見則為本終易知則為末已下終始之間本末可見也初擬其辭者言六爻之位剛柔之體始雖擬度其萬事之宜萬物之理而成其辭是始於微而至於著者也卒成之終者言至終之時卦之上是卒成之時者也夫卒成之時而其象以分卦體以定而吉凶悔吝之道皆可見矣是事之卒了成就皆在於上也若夫雜物撰德辨是與非則非其中爻不備義曰此又言六爻之義六爻之位上下之體交相錯綜雜聚天下之物撰數聖人之德辨定是之與非則非中爻而不可明也中爻者則六二六五九二九五是也夫得之與失正之與邪惟在二五之爻斷可明矣故初則不及其中三則又過於中過於中者則凶危之道有時而至矣不及中者悔吝之事亦有時而至矣唯在二五之爻居得其中履得其正雖有其失必不至於大咎也至如乾之九二曰利見大人九五曰飛龍在天利見大人又坤之六二曰直方大六五曰黃裳元吉是皆中爻可以辨攝一卦之是非也然則一卦六爻各主其物各主其事惟是中爻即可明辨其得失也噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣義曰噫者歎美之辭也言凡欲知其存之與亡凶之與吉則其在中之一爻所居之位則可知矣若失其中則是凶而不知其吉亡而不知其存如此是大凶之道也惟欲知吉凶存亡但觀中爻所居之位則可知矣知者觀其彖辭則思過半矣者言大易之道一卦之理以至萬事之端皆在於卦下所屬之彖辭然彖辭之間雖未能盡萬事之理一卦之情偽然知者觀其彖辭則一卦之大義吉凶之理思慮之間已知一卦之本末已過半矣然則謂之彖者則如乾則言元亨利貞坤則言元亨利牝馬之貞如此之類皆是卦下之彖辭若聰明賢智之人觀之則一卦之理已過半矣二與四同功而異位其善不同二多譽四多懼近也義曰自此已下至其剛勝邪為一章言六十四卦之中一卦六爻六爻之內惟二與四皆是隂位而得其位者故當以隂爻而居之是同其隂功也然而異位者言二則在下卦之中四則在上卦之下是異位也其善不同者言二居下卦之中是居得其中行得其順不失其中正之道故其善也大矣四居上卦之下失其中道故其善與二不同也二多譽者譽者謂嘉美之譽也言二居中而不失其正又所行之事無過無不及故有嘉美之譽以傳聞於外也四多懼者言六四居上卦之下上比於五是至尊之位也下在九三之上是權臣之上也上則逼近於君下則逼近於臣故當恐懼之是四多所懼也故言四多懼也柔之為道不利逺者其要無咎其用柔中也義曰此覆解上四多懼之意也夫獨隂不立必須比附於陽則其功可以成若逺於陽則其道不能利若欲要其無咎必須用其柔中之道則可也若非居得其中履得其正則必有咎也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪義曰言九三與九五皆是陽位故其功同也然而三在下卦之上五在上卦之中是異位也三多凶者三在下卦之極失於中道故多凶咎之事五多功者五在上卦之中而有人君之位其功德可以被於天下為天下之所歸向是多功也五為貴三為賤是貴賤之等也五與三俱是陽位若以剛陽居之則克勝其任若以柔隂居之則失其所處而必至於傾危也易之為書也廣大悉備有天道焉有人道焉有地道焉義曰自此以下至吉凶生焉為一章言大易之道至廣至大無不悉備於其間也有天道人道地道者言伏羲始畫八卦以三爻為一卦故上一爻以象天中一爻以象人下一爻以象地三爻既立則天地人之事萬物之理無不備載於其間也兼三才而兩之故六六者非它也三才之道也義曰言伏羲畫卦始以三爻為一卦天地之事萬物之理無不畢備後世聖人又從而兩之為二體兩而為六爻故上二爻以象天中二爻以象人下二爻以象地所以六之者非他也蓋象三才之道也道有變動故曰爻義曰言六爻之內有變有動動而合於道者為吉動而悖於理者為凶變動之間必合於道也故曰爻爻有等故曰物義曰物者類也言六爻之位有隂有陽有貴有賤有等有差至如乾之爻稱龍故為陽物坤之爻稱馬故為隂物如此之類故曰物也物相雜故曰文義曰言萬物之類皆在六爻之間六爻之間有隂有陽有柔有剛互相錯雜而成文章以顯著於外也文不當故吉凶生焉義曰言剛柔錯雜而成文章若文妨於事則有凶有吉有邪有正若文當其事則吉凶不生若不當位則遺於道者為凶順於理者為吉吉凶之道皆生於文不當矣易之興也其當殷之末世周之盛德邪當文王與紂之事邪義曰自此以下至易之道也為一段明易之興起在紂之末世者也夫大易之道始於伏羲仰觀俯察而成八卦以為萬世之法以盡天下之事然而寫其乾坤健順之性天地之大象人事之大紀無不畢備於其間是以歷夏及商至於桀紂之世民欲叢生巧詐互起左右前後皆非正人端士小人在朝君子在野天下紛然不可以整之文王有大聖人之才罹於憂患之中極天地之淵藴極天下之能事民之情偽吉凶之理無不備載於其間故曰易是易之興也其當殷之末世焉是故其辭危義曰言文王演其大易之道因其桀紂之君無道在上故使天下之人思慮之間姦偽互起以至天下大亂文王罹於憂患之中作為大易盡萬民之情偽極天下之險阻以至憂患之事無不備言於諸卦之下是其辭危也然則卦下之辭至簡至約然有四德者有一德者有三德者如此之類推究卦義是其辭危也危者使平易者使傾義曰言易之道六爻之位有凶有吉有得有失皆在爻辭之間若人觀此大易之道見其凶事能小心畏慎者則危者使之平易其文辭亦言其平易若人觀此大易之道見其吉事而慢易者則易者使之傾喪則其所繫之辭亦言其凶是使人舍凶從吉趨善背惡也其道甚大義曰言此大易之道示人之吉凶明人之情偽其為道至廣而甚大也百物不廢義曰言大易之道無所不包至纎至悉之事百種之物皆無有廢棄如泰卦曰包荒用馮河不遐遺者是也懼以終始其要無咎此之謂易之道也義曰言大易之道若人觀其六爻之位吉凶之理若能觀其始而知懼慎其終而思戒終始之間極其思慮常自戒慎如此則要其無咎此是大易之道也夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻義曰自此以下至篇末為一章總明健順之美兼明易道愛惡相攻之事夫乾天下之至健也乾有剛健之德以一元之氣下生萬物故德行常易不至於煩勞而知艱險之事夫坤天下之至順也承天之氣以時而生成萬物故德行常簡不至於煩勞而知艱阻之事以天地之道至健至順簡易之德生成之理自然不言而四時成不勞而萬物得而知險阻之事其生成之理故可知矣能説諸心能研諸侯之慮義曰按此能研諸侯之慮其侯之二字蓋是後人習慣其言而傳寫之誤也若順其文而言之則能研諸侯之慮於義無取當言能研諸慮也言聖人作此大易之道能自悅美其心又能研究人之思慮使其情偽之道不作憂虞之理不生也注疏之説皆失之矣定天下之吉凶成天下之亹亹者義曰言聖人作易既能悅懌諸心又能研精諸慮又定天下之吉凶有得其理者為吉失其理者為凶既定吉凶於諸卦爻之中則成天下之亹亹者使人勉勉而從善不陷於邪佞也是故變化云為吉事有祥義曰言大易之道有變有化有施有為若合於道則吉違於道則凶若行得其吉則有嘉美之祥而應之也象事知器占事知來義曰言人觀此大易之象則知作器之方觀其占策之數則知未來之事是大易之中總此諸德者也天地設位聖人成能義曰言天地設其上下之位而生成萬物聖人由是乘天地之正以生成天下以成就天地生成之功者也如泰卦所謂財成天地之道輔相天地之宜是也人謀鬼謀百姓與能義曰言聖人凡欲施為凡所舉動之時必先與衆謀其得失之理謀之卿士謀及庶人詢及衆庶謀及鬼神以明其得失以别其吉凶然而鬼神之道至幽至隱不可以形見而聖人與之為謀者蓋聖人取其卜筮之兆占蓍之策以考於天地鬼神然後思慮之間不煩憂戚決然而行之又與百姓參合而行則得其吉而不凶向其善而獲福夫如是則天下之百姓樂推而與之百姓既與之能則不勞探賾而吉凶自見不役思慮而得失自明以至萬物之情偽自然而見矣八卦以象告義曰言伏羲所畫八卦寫其天地水火風雷山澤之象凡吉凶之事皆以象告於人知其吉而背其凶也爻彖以情言義曰此又明卦爻剛柔變動情偽相感之事也言伏羲畫八卦之後文王重為六十四卦爻為三百八十四爻又於諸卦之下繫屬之彖辭以明險阻之事得失之理憂虞之端皆以人之情偽而言之也剛柔雜居而吉凶可見矣義曰言六爻之內有剛有柔剛柔之位上下錯雜有得有失有正有不正得於理者為吉逆於理者為凶吉凶之道自然可見矣變動以利言義曰言六爻之內有變有動皆以利告於人使人由而勸之以盡天下之利以利天下之物也吉凶以情遷義曰言大易之道爻象之內有變有動有凶有吉動而合於道則吉變而失其理則凶然則吉凶之道變動之理皆由人之情偽遷移者也是故愛惡相攻而吉凶生義曰言吉凶所生皆由人之情性有所貪愛有所忿憎兩有所攻或愛攻於惡或惡攻於愛是吉凶之道由此生矣逺近相取而悔吝生義曰逺謂內外兩卦上下相應之類也近謂爻位相比近也言六爻之內有近而相得者有近而不相得者有逺而有應者有逺而無應者逺而有應近而相得則為吉逺而無應近而不相得則為悔吝悔吝之道皆由逺近相資取而生也情偽相感而利害生義曰言人之情實感物而動得其理則為利人之虛偽感物而動失其理則為害情者則情實也偽者則虛偽也是情偽相感而利害生於其間者也既利害生於情偽之間則吉凶之事由此而至矣凡易之情近而不相得則凶義曰言大易之道六爻之情有近而相得者則吉有近而不相得則凶故吉凶之道生於爻位之間也或害之悔且吝義曰夫凶咎之道亦有輕重人之情偽亦有淺深雖爻位相近亦有不相得者然不至於大咎或有害之者或有可悔之者或有可鄙吝之者如此雖有失必不至於大咎也將叛者其辭慙義曰言人之情或有叛違於己者則其辭不同位雖相親而其容常有慙赧之色其辭不以實告於人也中心疑者其辭枝義曰言人中心之間有所疑惑則言辭各異其心不定其辭一出紛然有異若樹之有枝葉紛然盛多者也吉人之辭寡義曰言吉善之人其辭寡少不在言語但默而成之安而行之者也躁人之辭多義曰言剛躁之人其辭繁多不假思慮而言辭紛亂而出者也誣善之人其辭遊義曰言誣罔善人之人其心矯詐其言虛誕架虛為實從無入有自然其言辭遊蕩虛浮者也失其守者其辭屈義曰言人居失其時失其所守不遂其志志無所伸必其辭屈撓者也凡此六事皆大易之中六爻之位述此之意者也周易口義繫辭下
