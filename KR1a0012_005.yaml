body:
  text: 周易口義卷五宋胡瑗撰上經剝坤下艮上剝不利有攸往義曰按序卦云飾然後亨則盡矣故受之以剝剝者言五陰盛長一陽居其上勢微力弱始由一陰之生漸至于盛以削剝羣陽㡬至於盡而萬物衰破之時也其在人事則小人盛長而君子消剝之時也不利有攸往者夫君子之所務上思忠于君下思利于民其一謀一慮必以天下之利存于心小人則不然其意日以殘賊良民侵削君子為務今剝之時君子消剝小人盛長之際也君子若復有所往必見害于小人也彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虚天行也義曰剝者剝落之義柔陰也剛陽也夫天地之所以成嵗功者在于陽也今隂氣盛長陽氣消剝則萬物衰落而嵗功无成也人君所以共天位治天下者君子也今小人盛長以至專權得勢而侵削君子也不利有攸往小人長也者夫聖賢之爲心以仁義爲心故三月无君則皇皇如也以天下之民失其所而安在己也小人之意日在于殘賊故其氣不相合道不相同今君子之所以不可進者以小人長也順而止之觀象也者此以二體而言艮爲止坤爲順言小人道盛君子言必見危動必見害故當觀其象量其勢先時知幾素位而行居易俟命而外順小人内則止而不行故可以全身遠害也中庸云天下有道其言足以興天下无道其黙足以容言君子儉德避難之道也又若小人道盛君子之人欲屏去之必當外順其行以漸而止之則可以去也何則夫小人既盛而君子若遽欲絶之則其勢必爲小人之所害故當遜順其所爲觀其勢使之不能窺見其迹然後止之則无有不可也君子尚消息盈虚天行也者天之道至神也有隂陽之舒慘寒暑之往來四時之運行晝夜之明晦消久則息盈久則虚以天道之大猶不免于此君子之人道有通塞時有否泰理固然也是以可進則進可退則退當消而消當息而息出處語黙皆以時而動是如天之所行也象曰山附于地剝上以厚下安宅義曰宅居也山本至髙地本至下今山反附著于地是剝落之象也猶君子之道消而天下生靈失所不得其安故凡居上者當此之時必先厚于其下所謂厚下者蓋以仁義之道務農重本輕徭薄賦天下之人衣食充足財用豐實而又安其所居使各得其所如此是可謂治剝之道也何哉蓋國以民爲本本既不立則國何由而治哉初六剝牀以足蔑貞凶象曰剝牀以足以滅下也義曰牀者人之所藉以安身也足居牀之下初六最處一卦之下民之象也言小人得位乘時藉勢恣其姦惡以剝削于天下然爲剝亦有漸故自微而至于著自下以至于上剝之始先剝于民夫民者君所賴爲本也在書曰民惟邦本本固邦寧今小人在上肆其姦惡奪民之財困民之力使之舍安而就危去存而卽亡父母不能保而離散兄弟妻子不相守而逃亡怨氣交而上下不通是其本已弱矣其本既弱則君子之正道微蔑而不行是凶之極也六二剝牀以辨蔑貞凶象曰剝牀以辨未有與也義曰按初六居一卦之下是民之象故曰剝牀以足六四處上卦之下切近于君故曰剝牀以膚六二居膚足之間是上下分辨之際以人事言之則是居君民之間臣之位也始旣剝于民至此則剝于臣也夫臣者國家之倚毘君所賴以安者也在詩曰濟濟多士文王以寧今小人得勢侵迫于其君子使君子言不得通道不得行國家斯无倚毘而君不得其所安故至正之道消蔑而其凶愈大也象曰剝牀以辨未有與也者夫君子之人在位而行道則天下之民物得其生而受其賜故詩曰愷悌君子民之父母是民必得君子而後生也今小人始既剝于民民被剝而已困故不能爲助于君子至此君子又爲小人之所剝也夫臣民既皆被其剝而受其害則此小人者天下之所共惡衆人之所不與故象曰未有與也六三剝之无咎象曰剝之无咎失上下也義曰剝之卦五隂盛長小人衆多同心協力以殘賊良民侵剝君子爲意上九有剛明之才獨居一卦之外而无有助之者今六三居下卦之上爲上九之正應而能出乎其類獨異于羣衆不爲侵剝而有好賢樂善之心應于上九之君子是于小人之中獨不爲小人之行故雖在剝之時而得无咎也象曰剝之无咎失上下也者言上下羣隂皆以侵剝爲志而獨六三能上應于君子舍去小人之行而不與上下羣隂同志六四剝牀以膚凶象曰剝牀以膚切近災也義曰膚謂及其身也小人之爲剝自小以至大由外而及内始則剝天下之民使皆墜于塗炭而不得其安次又剝天下之賢使皆困躓而不得進臣民既已剝盡遂及君子之身此凶之極也象曰剝牀以膚切近災也者剝道愈㴱而災害愈切蓋天下之臣民既已盡剝至此以及其身是災之切也故凡居上位者必在知人賢者進之不肖者黜之使君子在上而小人削迹自然侵剝之道无自入而不能行也故聖人戒之六五貫魚以宮人寵无不利象曰以宮人寵終无尤也義曰貫魚謂駢頭相次衆多之貌以人事言之則是小人之衆若貫魚然也夫小人之行姦惡凶暴居一郡則一郡被其害處一邑則一邑罹其殃況當天下之權握天下之勢哉然王者不能无嬖幸之人但不可恣已之情私天之祿以加厚之使其縱欲肆情以殘天下故當御之以道使不能釁其毒也今六五當至尊之位雖小人衆多如貫魚然但厚之田宅加之金帛而不使竊天下之權如寵宮人而寵之則无所不利也象曰以宮人寵終无尤也者言寵小人以宮人之寵使不能有其權則于己身終无過尤也上九碩果不食君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也義曰此一卦以隂剝陽而陽氣幾至剝盡而上九獨居其上不爲羣隂之所剝旣不爲隂之見剝至于建子之月復于地中而再生萬物如碩大之果最居其上而不見食于人則必有再生之象也以人事言之猶君子守正執節明哲以保其身不爲小人之所害至此將復其位而得行其道也君子得輿小人剝廬者輿所以乘載于物廬所以安庇其身也此上九剝極之時若以君子居之則削去小人之害施仁義于天下使天下之民出于塗炭由之而得其乘載也如復以小人居之則爲害愈㴱故不唯剝于一身以至廬舍亦皆見剝而天下之民无所庇身而不能保存也復震下坤上復亨出入无疾朋來无咎反復其道七日來復利有攸往義曰按序卦云物不可以終盡剝窮上反下故受之以復言隂陽二氣有消長升降陽氣既剝盡則必來復也然所謂復者是四月純陽用事其卦爲乾至于五月則一隂剝一陽故其卦爲姤六月則二隂剝二陽故其卦爲遯以至于七月爲否八月爲觀九月爲剝十月爲坤是隂氣之極盛也至十一月則一陽之氣濳復于黄鍾之宮以再生萬物而萬物得其亨通也亦猶君子時有否泰道有消長始爲小人之所剝及其乘時得位發其事業于天下其道大通故曰復亨出入无疾者言陽氣有生物之心入于地中出于地上物无違之疾之者猶君子有五常之質剛明之徳量時復位天下之人无有違之而疾害者朋來无咎者朋類也言一陽雖復于地中有生物之心然其氣微弱未能獨成其功必得羣陽並進乃可以共濟其事也亦猶君子求進其身欲行其道而或勢孤援寡必不能獨成其事是必得其氣類才德相合者推引而進則可以致君澤民而成治于天下乃可獲吉而得其无咎反復其道者言陽氣自上而反復于地以生萬物皆得其道猶君子之人復于其位進退皆合其道七日來復者言陽氣消剝至于此凡歴七爻以一爻爲一日故謂之七日然不謂月而言日者蓋日爲陽聖人欲見其陽道來復之速故以七日言之其實卽七月之間後復也利有攸往者言一陽之生君子浸長小人浸衰則君子當此之時居其位行其道所往无不利也彖曰復亨剛反動而以順行是以出入无疾朋來无咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎義曰下震爲動上坤爲順言復之所以得亨者由剛陽之氣反復于地又動而不失其柔順由是所以萬物以生以成也言君子動而不妄行而不暴能觀其時可進則進是以出入之間无有疾害之者皆由順而動之之故也故曰剛反動而以順行是以出入无疾朋來无咎反復其道七日來復天行也者夫天之行有消有長有升有降謙者益之盈者流之故陽極必剝隂極則復皆天道自然之理也故曰天行也利有攸往剛長也者言剛陽漸長小人道消則是君子之道長故所往而无不利也復其見天地之心乎者夫天地所以肅殺萬物者隂也生成萬物者陽也天地以生成爲心故常任陽以生成萬物今復卦一陽之生潜于地中雖未發見然生物之心于此可得而見也故董仲舒曰陽常居大夏以生育長養爲事以此見天地之心在于生成而已猶聖賢之心以生成天下爲心雖始復其位其事業未大被于天下而行道之初已有生育之心也在太𤣥中首曰昆侖旁薄幽夫昆侖天氣也旁薄地氣也幽晦也言天地之氣始雖幽晦而不可見然生物之心可得而推矣故知聖賢雖在幽晦之間而其心亦天地之心也而揚子又爲之辭曰昆侖旁薄幽何爲也曰賢人天地思而包羣類也是則天地聖賢之心可見也然天地以生成爲心未嘗有憂之之心但任其自然而已故老子曰天地不仁以萬物爲芻狗是雖有凶荒水旱饑饉而未嘗憂而治之也若聖賢有天地生成之心又有憂萬物之意是以其功或過于天地故繫辭曰鼔萬物而不與聖人同憂但聖人无天地之權耳使其有天地之權則凶荒水旱之類无得而致也故復卦之初其生成之心可見也象曰雷在地中復先王以至日閉關商旅不行后不省方義曰雷者陽之精也雷本行于天之上今復于地下是復之象也先王觀此象于冬至微陽始生之時閉其門關而禁止其商旅后者天子諸侯之通稱方事也天子諸侯于此微陽始生之時而又不省視其事也初九不逺復无祗悔元吉象曰不逺之復以脩身也義曰羣陽剝盡而純隂用事獨此一陽反于地下以萌生萬物是其復之初而來復之速者也猶賢人君子凡思慮之間一有不善則能早辨之使過惡不形于外而復其性于善道惟聖人得天性之全故凡思慮之間未有一不善故發而皆中于道賢人而下則其性偏于五常之道有厚有薄情欲之發有邪有正故于心術之間思慮之際不能无所汨惟大賢君子爲能治心明性知其有不善而速改之不能形于外故可以无大悔吝而獲元大之吉也祗即大也象曰不遠之復以脩身也者言聖人君子于思慮有所不善而能速改之以至由小賢至于大賢由大賢至于聖人自古及今有能行之者惟顔子一人而已故先聖繫辭釋此爻獨以顔子配之曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也是君子凡于思慮之間未精審其可否邪則改之正則從之勿謂人所不見衆所不聞而輒自寛假以有諸内必彰于外也蓋有諸中必形于外發于心必施于四支在中庸曰君子戒慎乎其所不覩恐懼乎其所不聞莫見乎隠莫顯乎微故君子慎其獨也是則人之有過患不知之知而改之則无有不至于善者也故聖人于此言不遠之復是君子脩身之法也六二休復吉象曰休復之吉以下仁也義曰六二以隂居隂得正者也在下卦之中得中者也下近于初附近于仁賢者也既中且正而又附于初九之賢故得休美而復其善道以獲其吉也六三頻復厲无咎象曰頻復之厲義无咎也義曰頻蹙也六三處不得其正行不得其中又違于仁則是過惡之人也以過惡之人居下卦之上猶愈于上六昏迷不復之人故此六三必待頻蹙强勉而後能復也則中庸所謂有勉强而行之者此是也然猶頻蹙勉强而復則當常自思省憂懼以爲危厲在前而不敢爲于邪惡以改過遷善則可以獲其无咎也六四中行獨復象曰中行獨復以從道也義曰四居位得正雖非其中然于五隂之間而獨得其中雖遠于初而與之爲正應傑然而復于善以從聖賢之道也象曰中行獨復以從道也者言初有聖賢之資而六四爲之正應是能從于聖賢之道也故揚子曰希驥之馬亦驥之乘希顔之人亦顔之徒正此謂也六五敦復无悔象曰敦復无悔中以自考也義曰六五處坤之體有敦厚之德居上卦之中有大中之道夫有敦厚之德則思慮不及于邪而動无躁妄有大中之道則所行无過與不及如是故能治心明性以復于善道而悔吝亡矣象曰敦復无悔中以自考也者五有敦厚大中之道以自考察己之思慮有不善未常不復于善也上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也義曰復道貴于速上六處卦之極而居復之終是其心昏迷而終不能復者不能復則邪惡著見凶之道也夫自外而來曰災自己所招曰眚言其心昏迷而恣私邪私邪既積過惡顯著則天地所不與鬼神所共怒而外來之災自招之眚所以皆至也用行師終有大敗以其國君凶者夫以迷復之道而用兵行師以伐于人必不能克勝而終至于大凶敗以血肉生靈虚竭帑藏以累其君凶之極也至于十年弗克征者十數之極也言用事而行師以致大敗雖十年之間終不能興起征伐之事象曰迷復之凶反君道也者夫君所以主宰天下司牧生民今用此迷復之道行師以征伐于人以致有大敗是反君所行之道者也然特以行師言者蓋舉其重者言之即它可知矣无妄震下乾上无妄元亨利貞其匪正有眚不利有攸往義曰按序卦云復則不妄矣言君子之人既能先復其性邪惡不萌于心而善道充積于内以發于外无有非妄之事矣然而具天地生成之四德者蓋以四海至廣生靈至衆情僞萬狀聖人在上必有天地四德之備然後可使天下之人服而化之无有非妄之行故有仁以濟之使皆遂其性而樂其生以至有禮以節之有刑以齊之有政以正之餘則乾卦言之備矣以其具是四德而有天下則天下信无非妄者也其匪正有眚不利有攸往者言聖人在上旣有四德以及于天下則天下莫不一歸于正而无敢有非妄之行者然而上下之間或有一不正之人欲以非妄之行而有所往則必无所利故有自招之眚所以致也彖曰无妄剛自外來而爲主于内動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往无妄之往何之矣天命不祐行矣哉義曰剛卽陽也无妄由否卦而來是乾之一陽自外而來居于内卦之初是爲主于内卦也動而健剛中而應大亨以正天之命也者上乾爲健下震爲動剛中謂九五也應謂六二也夫有其君而无臣則无妄之道不能行有臣而无君固不可得而行今九五有剛明之德而爲之君六二有柔正之德而爲之臣君倡于上臣和于下相成以道然後以元亨利貞之四德以被天下其威命之行莫不懾服而天下之人悚然不能爲非妄此天之威命也其匪正有眚不利有攸往者言聖人有威德及于天下雖父子昆弟之間州閭鄉黨之内莫敢有一于不正而非妄者或有不正之人非妄而欲有所往則无所利而災眚及之也无妄之往何之矣天命不祐行矣哉者言无妄之世以有妄而行復何所往哉之即往也祐福也言君之威德被于下所至无有敢犯之者若其復有非妄不正之行則是犯天之威命而天必不福祐也其可行之哉象曰天下雷行物與无妄先王以茂對時育萬物義曰夫雷之行于天下萬物无不聳動兢懼而不敢爲妄如君之威德發于上而被于下天下之人聳然聽從而无敢有妄也是以先王茂對此无妄之時則宜如何哉固當盡仁愛之道以養育萬物使天下各遂其所各安其業以至鰥寡孤獨皆得其所養如此則可以使天下之人久于无妄之道也何則蓋天既以无妄而在上者苟不養育之則未見使天下終久而不爲非妄者也初九无妄往吉象曰无妄之往得志也義曰夫君子有剛明之才足以致天下于无妄者必得剛明之君然後可以行己之道今初九有剛明之才而九五爲剛明之君若往而輔之則施己之威德于天下而天下之人不敢爲非妄自然成其治以此而行必其吉也象曰无妄之往得志也者夫賢人君子有兼濟天下之心則必遭時遇主日行其道致天下于无妄此君子之志也今初九能然是其志得行矣六二不耕穫不菑畬則利有攸往象曰不耕獲未富也義曰耕者田事之始也穫者收成之終田一嵗曰菑三嵗曰畬今六二以柔順之質居中履正上有剛明之君倡威令于天下是待君倡而後和令而後行如此謂不擅君之權不竊君之美是若農不耕而穫不菑而畬皆所以代事之終而成君之美則所往而无有不利也象曰不耕穫未富也者人臣之道貴其成君之事而代君之終也苟或居事之先爲物之倡則是竊君之美而自居其富盛也今二乃能不耕而穫不菑而畬是能待君倡而後和以代君之終是不居于富盛者也六三无妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也義曰夫居无妄之時必有剛明之德履中蹈正然後可以致天下于无妄也今六三以不中不正之身處无妄之時是有妄之人也以有妄之人欲治于无妄之世則上下所不容故災害及之也故曰无妄之災或繫之牛行人之得者牛即治田之具也六三既以不中不正而又欲擅君之權竊君之美不待倡而和不待令而行乃如不穫而耕不畬而菑故爲或人之繫其牛以至行道之人皆可以奪而得之也邑人之災者六三以不中不正爲非妄之人雖父子昆弟之間有所不容故不唯已有其災至于己之所屬之人亦皆爲其所累而受其災也九四可貞无咎象曰可貞无咎固有之也義曰夫居无妄之時必有至正之德則可以免咎今九四以陽居隂以位言之未居其正也然而以剛健而履以柔順之位是尚謙也如此則是可守其正道而得免其咎也何則蓋已本有剛明之才今雖履不正然以尚謙故可以從正而免咎象曰固有之也者言九四以剛直免咎蓋于己之德性素有之故曰固有之也九五无妄之疾勿藥有喜象曰无妄之藥不可試也義曰藥所以疏決壅滯攻治其疾者也今九五以剛明之德居至尊之位下有六二柔順之臣爲己之輔共致无妄之治則君臣之間无不正朝廷之上无不治萬民无不安若其間一有邪佞之干紀及邊鄙有小小之冦皆非己之所招亦不足興兵撓衆以動中原但在得其人則自然可平矣如有小小之疾不須用藥以攻治之但保安其身則疾自愈矣若復以毒藥攻之則是自取傷敗耳如秦漢之君竆兵黷武長征遠伐以至反被其害也故无妄之時有其疾不試其藥則自獲其安而有喜也上九无妄行有眚无攸利象曰无妄之行窮之災也義曰无妄之世无一民一物不以正相守而不敢爲非妄今上九居卦之極在无位之地失中正之道于无妄之時爲衆之所不容行則有災復何所利大畜乾下艮上大畜利貞不家食吉利涉大川義曰按序卦云有无妄然後可畜故受之以大畜夫君子之人既能復其性明其心不爲非妄而從于正道然後可以大有所畜止于邪曲之人也然小畜則巽在上乾在下巽爲隂其性柔順故不能畜之于始而終止之故爲小畜之象大畜則艮在上乾在下艮爲陽其性正靜故能止畜于始而終有天衢之亨是爲大畜之卦也利貞者夫乾者剛健君父之象夫以君雖尊不能无邪曲之欲而臣下能止畜之者必有大正之德然後可以輔歸于正道也不家食吉者夫人君之治天下必有貴爵重祿養于賢者使天下之賢皆進于朝廷受祿于國而不食于家故邪欲不行而正道日興以樹成天下之治而獲其吉也利涉大川者人君既得天下大正之人進輔于已而止畜已之邪欲如此則固可以成天下之治雖有大險大難亦得以共濟之也彖曰大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也義曰因二體以釋大畜之名剛健謂乾有剛健之德篤實謂艮有篤實之德言所以能大畜者由君有剛健之德以接于下臣有篤實之德以輔于上君臣之間皆有如此之德故其心志相同道又相協既能相交則上雖有邪僞之心亦莫由而發夫如是故正道日以行治道日以廣輝耀光明而其德日以増新也剛上而尚賢者剛艮也蓋艮有剛陽之德夫乾爲至剛本居于上今反居下是猶人君有至尊之勢至嚴之威而能崇尚有德及禮下賢人使之畜己之邪欲成己之治道所以師尚而貴寵之也故孟子曰湯之于伊尹學焉而後臣之故不勞而王桓公之于管仲學焉而後臣之故不勞而霸然觀孟子之意言人君之于臣有大正大賢之道必當尊寵而禮下之不以爲臣而師事之然後可以輔于己而歸正道也能止健大正者健謂乾夫人君有威嚴之勢而臣能止之必有大正之道則可也是故漢武不冠不見汲黯夫以汲黯之才但一直臣耳然尚畏憚之如此則其大正至賢之臣其君之畏敬可知矣不家食吉養賢也者人君旣禮下于賢而祿養之使賢者皆進而願立于其朝以輔翼于君而止畜君之邪欲以贊成其治道也利涉大川應乎天也者應謂六四六五之應于乾之初九九二猶君能接于臣臣又應于君君臣之間道義相同一志而共濟天下之難也象曰天在山中大畜君子以多識前言往行以畜其德義曰至髙至大者天也而物不可畜今山能包藴之故假象得大畜之義也君子觀此之象而多識前聖之言之行以自藴畜其己之德也何則君子之人雖有五常之性苟不該博古道亦不能成之是必多聞博識然後道業可以成也夫以堯舜禹大聖人而稽古孔子習于周公是雖有聖人之資未有不學而能至也初九有厲利己象曰有厲利己不犯災也義曰夫乾君之象也以君之至尊有天下之勢必不能无邪欲侈縱之心有邪欲侈縱而不戒之則必至危厲故書曰欲敗度縱敗禮以速戾于厥躬是言縱欲之事不可不戒今初有剛明之才而邪欲之情欲縱是有危厲也利己者已止也言初九之剛將欲行而上有六四爲之正應是大正之臣處君之左右以止畜君之邪欲故雖有剛欲驕侈之心不得以萌以騁使其所行之事皆從于正道如是則无所不利象曰有厲利己不犯災也者言始雖有厲而得大正之臣以止畜之使己之邪欲不行而從于正故不至犯于災害之事而反從于吉也九二輿説輹象曰輿説輹中无尤也義曰輹輪輹也九二亦以剛明之質又居卦之中是人君有剛欲之心欲上行而初已止畜之又上應于大正之臣爲之輔佐故二能恐懼戒愼其剛欲之心已止而不敢行如車輿之説其輪輹而不能進也象曰輿説輹中无尤也者言二雖有剛欲之情而已得大正之臣止畜之且已本有剛明之才能自思省于已故由其中而无有尤過也然則大凡人君不能无邪欲但患其諂佞之臣逢迎其惡導贊其非則終不能反之于善今初曰有厲利己二曰輿説輹是得其良臣而能反于善者也上九良馬逐利艱貞曰閑輿衛利有攸往象曰利有攸往上合志也義曰夫初欲上進以其得大正之臣居于左右以止畜之至于九二其邪惡已不行故此九三則言進退皆合于正道以至凡所行之事无所不可如馴良之馬馳逐于大道之上也利艱貞者言九三所爲之事雖皆合于正道然必常得大正之臣以居于左右而艱難守正乃可以獲吉也曰閑輿衛利有攸往者衛侍從也皆所以爲行道之具也言旣有賢正之臣以輔于君而又能艱難守正猶恐所爲之事或有過失故曰閑習其行道之具使无有過差而一歸于正故所行无不利也疏謂雖曰有人閑閡車輿之意非也象曰利有攸往上合志也者言此所以无往不利由上九大賢之臣以至正之道贊輔于已而能崇敬禮下之其心志相合道又相符契故也六四童牛之牿元吉象曰六四元吉有喜也義曰童牛者犢牛而无角者也六四居艮之始以隂居隂居得其正而下有初九之剛爲己之應而初居乾之體是君有剛志而欲上行已以大正之道居其左右以畜止之然初九又有至剛之才至明之性而能服其義故六四得以正道而止畜之猶无角之牛而又制之于牢牿言其易也元吉者言四既以大正之道使其君邪欲不行故正道日舉而得其元大之吉也象曰六四元吉有喜也者言臣旣能制君之邪欲君又樂從之而不行故上下相得交相喜悦也故齊景公從晏子之言而大悦孟子稱其詩曰畜君何尤畜君者好君也言景公欲騁遊樂而晏子以正道止之是有愛君之心故君臣相悦而无過也六五豶豕之牙吉象曰六五之吉有慶也義曰豶豕者豭豕而見豶者也牙牙杙也所以繫物也六五居艮之體有大中之德柔順之質而應于九二九二居乾之體有其剛欲而又有六五爲大正之臣居輔左右故二亦有大中之才剛明之性能服道知義禮下于賢其剛欲不行而從于正道故六五畜止之易如豶豕之牙也夫豕者蹢躅躁動之物難于制畜者也今見豶而又繫之牙杙之上是其易制也吉者言君之邪欲旣不能行是吉之道也然六四言元吉而此但言吉者蓋初九邪欲萌而六四能制之夫居事之始至難者也而四能畜之是以獲元大之吉至于九二則是其邪欲已止而不行六五但安然以正道而輔之故但言其吉蓋其止之又易也象曰六五之吉有慶也者言四元吉而有喜此但吉而言有慶者蓋六四是事之始其君之剛欲將萌而能畜之故但有喜而已蓋未知其久長之效也至此六五則是其邪欲已盡不行故其正道日舉而君至于无爲大興天下之治不惟有喜而至于有福慶也上九何天之衢亨象曰何天之衢道大行也義曰按小畜以巽體居乾之上故不能止畜于其始而上九止極有旣雨之象此大畜以艮體處乾上故能止畜于始初曰有厲利己二曰輿説輹三曰良馬逐四曰童牛之牿五曰豶豕之牙至此上九其正道已成而有天衢之亨言其大正之道大行于天下如天之有衢路坦然可以通之且經文有何字推尋其義殊无所適蓋傳寫者因象辭有之故遂加之也象曰何天之衢道大行也者何者設問之辭言上九何以得天之衢亨蓋以其正道之大行通達于天下也頤震下艮上頤貞吉觀頤自求口實義曰按序卦云頤養也蓋旣止畜于邪欲必正道以養之也故大畜然後受之以頤然得謂之頤者蓋二陽居其外四隂居于内陽爲實隂爲虛外實而内虛口頷之象頤養之義也貞吉者言所養得其正則獲吉也觀頤者言觀它人之所養能得正道則已法而效之若不得其正道則已革而去之自求口實者此觀己之所養也口實是養身之具故當常自求觀己之所養而從于正道也彖曰頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉義曰言人之所養惟在于正故上以仁義之道養于下使生靈遂性予天下之人以安在下者必勤身竭力以養其上故君能以仁義養于民則謂之聖君臣能以忠信奉養其上則謂之賢臣民能厚衣食以養其家則謂之良民士能充五常以養其身則謂之君子是所養皆得其正則獲吉也觀頤觀其所養也者言觀人所養得其正則君子取以爲法不得其正則禍害生故君子取以爲鑒也自求口實觀其自養者言君子之人既能觀人之所養又復觀己之所養若皆得其正則无不得其安也天地養萬物者此以下又廣明頤養之義言天地以隂陽二氣流布于四時發而爲日月風霆散而爲雨露霜雪使蠢動萬類皆遂其性而安其所此天地所以能養于萬物者也聖人養賢以及萬民者言聖人法天地所養之道而頤養天下之民然四海之廣一人不可以獨治教化不可以遍及擇天下之賢于衆人者爲公爲卿爲守爲宰班祿以養之使其宣君之教化行君之仁政代君司牧所以養天下之民也言聖人之有天下必先養賢然後及民也頤之時大矣哉者言頤之時大將以使上下内外大小所養皆得其正故先聖重嘆美之象曰山下有雷頤君子以慎言語節飲食義曰上艮爲止下震爲動上止下動是頤頷之象也君子觀此之象先慎其言語節其飲食以安養其身也夫言語由口而出不慎則榮辱隨之飲食從口而入不節則患害隨之故君子必當慎重其言語而不妄發以養其德節止其飲食使皆得其宜以養其身如是身所以安道德所以成也初九舍爾靈龜觀我朶頤凶象曰觀我朶頤亦不足貴也義曰龜所以知人之吉凶猶人之明智也凡賢人君子居于卑下或貧賤而不得其所養者必須韜藏仁義卷懐道德俟其時需其命不躁求妄進然後可以自得其所養也故禮曰儒有席上之珍以待聘又孟子曰天有爵刖人爵從之是君子有道藴于身而能俟時須命自然得其所養也今初九有剛明之才足以自養其正然以居震動之初故不能守己之道而躁求妄進舍己之明智而觀它人之所養若它人之居崇髙富貴而已乃朶動其頤是凶之道也象曰觀我朶頤亦不足貴者言君子无祿而富无爵而貴以其道在已也今初九有其道而不能自守以待其時有明智而不能自保以俟其養爲天下之人所賤故曰亦不足貴也六二顛頤拂經于丘頤征凶象曰六二征凶行失類也義曰夫自上而反下謂之顛夫爲下者勤身竭力以奉于上此其常道也今六二无正應而下近初九之剛故因而反養于初自上而養于下故曰顛頤且爲下不能以道養于上而反養于初是拂違其常道如履于丘墟不平之地而爲養也故曰拂經于丘頤居下不養于上而養于下則是拂違常道以此而行凶之至矣象曰六二征凶行失類也者夫居上養下在下養上此常道也今二反養于下是所行失其類也六三拂頤貞凶十年勿用无攸利象曰十年勿用道大悖也義曰拂亦違也夫所養之道得其正則獲吉故彖所謂養正則吉也今六三以隂居陽是履不得其位行不得其正正旣失之是拂違所養之道也故以正道言之是以凶也十年勿用无攸利者十者數之極也夫以不正之道居于上則不能以仁義之道愛養于人居于下則不能以忠信之道奉養于君如此而行雖極十年之間亦不可用矣是以所行所爲皆无所利也象曰十年勿用道大悖也者言君子之人于所養之道皆得其正則建諸天地而不悖質諸鬼神而无疑百世以俟聖人而不惑今六三不能脩養己之德而以不正爲養之道是其大違悖于所養之道也六四顛頤吉虎視眈眈其欲逐逐无咎象曰顛頤之吉上施光也義曰六二居下不養于上而養于下故進則凶也今六四處于上體是居人上也以隂居隂履得其正下應于初九之陽是養于下者也旣居上位而又能養下是得其吉也虎視眈眈其欲逐逐无咎者言虎暴猛之物也其視眈眈然言威嚴之至也夫居上者以正而養于下則下无不得所養下旣得所養若无所節制則必傷于寛裕而衆將放恣故用威嚴以濟之若恩威並立使民懐德而畏威也逐逐相繼不絶之貌言居上之人旣養于下則必隨其人之欲使之逐逐然而不絶此乃全其吉而无有咎害也象曰顛頤之吉上施光也者言六四居于上位而能盡其道以養于下是其施澤之光大也六五拂經居貞吉不可涉大川象曰居貞之吉順以從上也義曰凡爲養之之道當守以正則可也今六五乃以隂柔之質居于陽之位是拂亂其頤之義也經言經字之誤也豈有居至尊而乃拂亂其常道之甚哉但以其少不得于正故唯失其養之道耳居貞吉不可涉大川者言六五失其正故至于拂違其頤養之義今若能居守之以正道則可以得其吉也雖以居守其正道而得吉然本有失是未可以濟于險難也上九由頤厲吉利涉大川象曰由頤厲吉大有慶也義曰此一爻以剛明之質居一卦之最上雖非至尊之位然下四隂不能自養故必皆由于已而後得其養也厲吉者上以剛明之才爲衆隂之主衆皆由已而後得其養若不濟之以威嚴則必有所瀆也故當臨之以威厲則得其吉利涉大川者言上九旣以仁義之道以養于下下由之而後得所安而已又能濟之威嚴則是恩威並立而天下之人皆樂歸之故雖有大險大難亦可以濟之也象曰由頤厲吉大有慶也者言上九居其上而下皆由之得其養爲衆之所服是大有福慶之事也大過巽下兌上大過棟撓利有攸往亨義曰按序卦云不養則不可動故受之以大過蓋聖賢之人仁義道德素有以積習之而藴畜其心然後擴而充之天下以救天下之衰弊此所以次于頤然謂之大過者言聖賢之人有大才大德而過越于常分以正天下之衰弊故謂之大過也棟撓者言大過之時政教陵遲紀綱衰壊本末皆弱若大厦之將顛而梁棟不能支持故致傾撓利有攸往亨者聖賢之人有大才大智當此之時則過越常分而拯天下之衰弊以此而往則天下皆獲其利獲其利則得其亨通象曰大過大者過也棟撓本末弱也剛過而中巽而説行利有攸往乃亨大過之時大矣哉義曰言聖賢之人有大才大德故能過行其事而拯天下之衰弊是大過之時唯大者之人乃能過分以成天下之大功也若才德賢智之偏則不可況无才德乎棟撓本末弱者此言二隂居其上下隂體柔弱是猶内外皆小人而朝廷紀綱敗壊若大厦將顛而梁棟已摧本末皆傾撓也剛過而中者此指九二而言也夫以陽居陽守常之道也今以陽而居隂是過越于常分也如聖賢之人有大剛明之才而超邁古今過行其事而又不失其中故能復正天下之弊扶救天下之衰若當此之時有其才德而或不能過分行之則不能除天下之弊而立天下之功也巽而説行利有攸往乃亨者下順上説言聖賢君子拯大過之時以順而説天下之心而行之故湯始征葛東征西夷怨南征北狄怨曰奚爲後我是皆應天順人而行乃得天下之悦從故所往皆利而无不亨通也大過之時大矣哉者言君子挺不世之才駕非常之德必欲拯天下之衰弱出生民于水火者必得其時則可以行之也若有其德而无其時亦无能爲也故先聖重嘆美之象曰澤滅木大過君子以獨立不懼遯世无悶義曰夫澤本卑木本髙今澤反居木之上是卑者踰于髙下者踰于上大過之象也君子之人當是時而能越常分推仁義不忍之心獨立特行挺然而无所懼憚不顧險難不畏小人如此則可以救天下之衰弱立天下之事業也當是時苟不得已而不可爲當韜光遯跡養晦仁義以道自樂不與世俗混于衰弊之中而无所憂悶也然則聖賢之人所謂遯者非謂入于㴱林幽谷但不使名跡少露于人而反貽其害耳初六藉用白茅无咎象曰藉用白茅柔在下也義曰初六居卦之初爲事之始也夫爲事之始不可輕易必須恭慎然後可以免咎況居大過之時政教陵遲紀綱隳壊而聖賢之人有大才德欲往而拯之是其事至重功業至大尤不易于有爲必當過分而慎重然後可也若一失其措則禍不旋踵而至矣故繫辭曰初六藉用白茅无咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也蓋凡物置之于地固得其安矣而又以潔白之茅藉之是愼重之至也如聖賢拯天下之大過苟于事始慎之如此則可以立天下之大功興天下之大利又何咎之有耶象曰藉用白茅柔在下也者初六以隂居卦之初是以柔而在下蓋君子過行其事而慎重之至此以柔潔之茅藉之于下斯免咎矣九二枯楊生稊老夫得其女妻无不利象曰老夫女妻過以相與也義曰稊者楊之秀也此以陽居隂是君子之人越其常分而過行其事者也夫大過之時聖賢君子能過行其事以剛明之才勤健之德立天下之功業使陵遲者得以興起之隳壊者得以振舉之故如枯槁之楊復生秀美之稊衰老之夫而得少懦之女復有生息之象也无不利者言聖賢之人過其常分以行事使衰者復興亡者復存是所行无不得其利也象曰老夫女妻過以相與也者以老夫而得女妻則有生息之漸以女妻而得老夫則有老成之漸是皆過以相與者也九三棟撓凶象曰棟撓之凶不可以有輔也義曰大過之時君子有爲之際故若過其分而行則可以立天下之功若但守常之人則未見其能成天下之事業也九二能過分行之故所行皆利此九三有剛明之才德而乃以陽居陽則是守常之人不能過行其事如有才而不能施用有德而不能操致獨用匹夫之見而係上六之應使其政教愈敗綱紀愈頽若大厦之梁傾撓而不能扶持是凶之道也象曰棟撓之凶不可以有輔也者夫天之生聖賢將使拯天下之危難濟天下之生靈立其事業也今九三乃爲守常之人有才而不能用是不可以有輔于大過之君也九四棟隆吉有它吝象曰棟隆之吉不撓乎下也義曰夫大過之時是本末衰弱之世唯聖賢出乎其類過行其事而拯濟之今九四以陽居隂是能過其位分以拯天下之弊亦如大厦將傾而得良匠扶持之使其梁棟隆起而得全安也蓋衰亂之世旣拯民出于塗炭然後獲其亨通而得吉也有它吝者九四之應在初六若聖賢之人欲興起天下之治必須至公至平用心不偏獨力特行挺然无所畏憚使天下无一物不獲其賜如此則可以興滯補弊扶衰拯弱而立功業于天下若一有它志而係于私應則亦鄙吝之道也象曰棟隆之吉不撓乎下也者言九四雖下有初六之應而已以剛明之才終不私累于已是不撓于下故獲吉九五枯楊生華老婦得其士夫无咎无譽象曰枯楊生華何可久也老婦士夫亦可醜也義曰聖賢之人居至尊之位有大中之道當衰弱之世必須過越以行事則可以拯救于時也今九五以剛陽處于至尊是居可致之位操可致之資是可以振綱紀于廢壊也今反不能過越其分而但固守已任是亦守常之人也以守常之人而拯天下之衰弊故如枯朽之楊生其葩華易落之物不若九二生稊之茂實老婦得其士夫无所補助不能滋息不若老夫之得其女妻也然以陽居陽當至尊之位但得其无咎而已然不能過越以行事是以无休美之譽象曰枯楊生華何可久也者言五當大過之時自守已分若枯朽之楊生葩花易落之物其榮茂不可得久也老婦士夫亦可醜也者言衰老之婦得其士夫无所補助又不能生息適足以鄙醜者也上六過涉滅頂凶无咎象曰過涉之凶不可咎也義曰以隂柔之質居上卦之極當本末衰弱之世而已雖有仁義不忍之心憫生靈之塗炭悼紀綱之廢墜然而其體本柔弱則是才小德薄之人終不能濟天下之難猶如渉險之人其志雖欲終濟其力薄而微弱以至滅没其首是凶之道也滅頂猶言涉難之㴱也无咎者言上六有是心而欲濟天下之衰弱然其才力寡薄不能終濟以至滅頂是不可以咎責之也象曰過涉之凶不可咎也者志在拯難而雖至于滅頂故聖人于此憫之蓋此上六欲立天下之功業何可咎責之也坎坎下坎上習坎有孚維心亨行有尚義曰按序卦云物不可以終過故受之以坎言君子之人所行必貴得其中不可大過大過則必有坎陷故坎次于大過也然此卦是伏羲所畫之卦在八純之數其七卦皆一字而名獨此加習字者何也蓋乾主于健坤主于順若是之類率皆一字可以盡其義而此卦上下皆險以是爲險難重疊之際君子之人當此重險之世欲行事于天下必當預積習之然後可以濟其險阻若不能預習之則才小力薄致滅其身故聖人加習字者此也有孚者孚由中之信也夫水之性決之則流防之則止此水之信也如君子之人知幾達理行于險難有至誠无不通者以至誠无不通若水流而坎險皆可以平之也維心亨者坎卦上下之中皆有剛明之德是水之性至明而无所不通如君子中有剛明之德曉察險阻之事而便習之所行不違于中思慮不逾其志如此則事无不獲其濟行有尚者夫水之性凡坎險之處无不流而至之故能平其險難而潤澤萬物爲時之所尚也若君子之人當險難之時力能扶持之蓋由以仁義之道才智之美上而朝廷有其德下而萬物被其澤亦如水之无不潤而爲時所尊尚也彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉義曰夫坎險也陷也此卦上下皆坎是重險之象也亦言聖賢之人欲致天下之事業惟坎險之事最難則必素習之然後可以拯濟其事也故曰習坎重險也水流而不盈行險而不失其信者夫水之流者盈于一坎而又之一坎无有盈滿而不流者若險峻之處則決然而往无所凝滯是其信也猶君子之人當險難之世奮然不顧其身竭力盡誠往而拯其難无有凝滯是猶水之流而不失其信也維心亨乃以剛中者此卦以陽居中是有剛明之德而行于險難之中故无有不通也行有尚往有功者言水之性流于下而潤澤萬物是有生育之功爲時之尚君子之人素能習其坎難之事是以往則有其成功也天險不可升者此以下廣明險之義言天之崇髙極遠不可階梯而升其神明之道不可測度故能保其崇髙地險山川丘陵者言地有髙山大川髙丘峻陵以包藏萬物而不可踰越故物得其保全也王公設險以守其國者言王公法天地之險而扼衝要之地據形勢之㑹以建其國髙城㴱池外爲之固堅甲利兵内爲之戒嚴刑法以除姦飭教化以厲俗如此所以保國家之大而固其基業之久也險之時用大矣哉者言預能習坎險之事及是時用其道以濟之也象曰水洊至習坎君子以常德行習教事原本遺註初六習坎入于坎窞凶象曰習坎入坎失道凶也義曰窞者坎中之坎也大凡居險難之世必有剛明之德而素習其事然後其道可行于天下今初六以隂柔居坎險之始而上又无其應援是其卑而不能自奮柔而不能自立位卑身弱又不能素習其坎險之事以至復入于㴱險之處涉其難愈凶之道也象曰習坎入坎失道凶也者言初六之柔弱不能自立以之治一身則一身不治以之治一國則一國不治以之治天下則失治天下之道是其懦弱失道之甚愈往則凶愈㴱也九二坎有險求小得象曰求小得未出中也義曰夫聖賢之人有剛明之才德又加之以大中之道乗時藉勢其道足行于天下也今九二雖有剛明之德而居二隂之間不遭其時不得其位其道不得行于天下在于坎難之中必有危險之事也求小得者夫君子有才懐德得時居位行其道于天下无所求而不得今九二雖有才德然不得其時與位而又未出于險中是以所求止小得而已六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終无功也義曰夫有剛明之才德而履于中正則庶可拯其險難也今六三居不得中履復失正而又介重坎之間若來居于位則未出于坎若往之于上則復有其坎是其往來之間皆其坎險也險且枕者蓋身在于坎而下乘九二之剛是旣險而又且枕于險也入于坎窞勿用者言六三以其不中不正身在于險而又枕于險以此而往則愈入于難之㴱也入于難㴱之人是終不可以有用也象曰終无功也者言此六三欲用之以治險難則无有其成功也六四樽酒簋貳用缶納約自牖終无咎象曰樽酒簋貳剛柔際也義曰言六四出于下卦而居上卦之始以隂居隂是履得其正上又近九五之君九五又无應故盡心而委任之上下相交君臣相接故上无猜忌之心下无疑貳之志故其相待之物不假外飾雖以一樽之酒貳簋之食又以瓦缶質素之器納其至約于户牖之間以此相待亦終无其悔咎也蓋至誠相通心志相交故不假飾于外物蓋牖者所以通幽而達明也象曰剛柔際也者謂君臣之道相交際也九五坎不盈祗旣平无咎象曰坎不盈中未大也義曰九五當坎之時居至尊之位有剛明之德大中之道然而猶居上坎之中未出險難是坎險未盈者也祗辭也若坎險旣平則是出于險難故曰无咎象曰坎不盈中未大也者言五在坎之中流之未盈滿喻君之道未盡得其勢未能大亨通也上六係用徽纆寘于叢棘三嵗不得凶象曰上六失道凶三嵗也義曰上六處兩坎之上險惡之極者也是險惡而不悛如何處之宜係之以徽纆之索置之于叢棘之下使之思其過至于三年天道小變之時苟不改其惡是終不能改然後刑之此凶之道也象曰上六失道凶三嵗也者夫君子之人在平夷之地能思其過如顔氏不遠復无祗悔小人之情則險惡教化不能導之乃置之牢獄三嵗而使省其過是其失道之人也故周禮司圜掌收教罷民凡害人者弗使冠飾而加明刑焉任之以事而收教之能改者上罪三年而舍中罪二年而舍下罪一年而舍其不能改而出圜土者殺雖出三年不齒此之謂也離離下離上離利貞亨畜牝牛吉義曰按序卦云坎者陷也陷必有所麗故受之以離蓋言險難之後必須附文明之人然後得其安也離者麗也日也文明也人君之象也兩日相並聖明相繼之義也利貞亨者言聖賢之君繼世以有天下必皆以正道而爲治然後天下獲其利而得亨通矣故古之堯老而舜繼舜老而禹繼禹老而啓繼是其聖賢之君皆以正道相繼而无不得其亨通又若下之者麗于上上之者麗于下皆以正道然後可盡得其亨通矣畜牝牛吉者牛卽柔順之物所以任重而致遠也牝者又柔之謂也則是牛而又牝言至柔至順之故也蓋聖賢之人繼世以治天下其所畜之臣必須有遠大之才堪任國家之事有柔順之德不奪君之權使之上則盡忠于國下則竭誠于民如此故能成天下之治相繼不絶也若周之周公湯之伊尹漢之平勃是也彖曰離麗也日月麗乎天百榖草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也義曰此言離者麗著之義也故因而廣明離之義日月所以常明晝夜不息幽隠之間无所不燭者蓋其上麗著于天故也百榖草木所以春生夏長秋成冬收小大髙下无不遂其宜者蓋其下麗著于土故也重明以麗乎正乃化成天下者言上下重離兩日之象是聖賢以柔順之道相繼而明而又附麗于正道而行使其教化流行德澤洋溢如是故能化成天下之俗也柔麗乎中正故亨謂二五也言上下皆以柔順之道而麗著于中正之位是其君臣皆以柔順而居中正以成天下之治而獲其亨也然而聖賢之君其所畜之人有遠大之才有重厚之德使之竭誠盡節如此故能亨繼世以有天下爲萬世之福故曰是以畜牝牛吉也象曰明兩作離大人以繼明照于四方義曰上下二離是兩明也兩日重光臨照不絶之象也大人者言大才大德之人以其文明柔順之道相繼以有天下而臨照于四方幽隱无所不燭其光明相繼綿綿而不絶也初九履錯然敬之无咎象曰履錯之敬以辟咎也義曰錯然者敬之之貌也言此初九居離之初如日之初生未明照于天下若繼嗣之君于事之初則當常錯然警懼以進德脩業上副祖宗之託下慰生民之望所以得免其咎象曰履錯之敬以辟咎也者言居事之初不能脩省恭謹則未免其咎六二黄離元吉象曰黄離元吉得中道也義曰六二居下卦之中以隂居隂是旣中且正如日之中朝廷明盛行政施令爲皇極之化故有元大之吉象曰得中道也者蓋黄者中也以其有中正文明之德此所以自然得其元吉九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可久也義曰九三過離之中如日之昃其光有所虧也若人之年已衰耋必當求其代則可也在家則致家事于其子在朝則致朝事于其臣以安神養志也然後得其吉今三不能鼔缶而歌以養衰老則至于教化陵遲萬事隳壊是以有大耋之咨嗟凶之道也若堯之耄期倦于勤以舜代之舜之耄期倦于勤以禹代之故得教化大行致太平之久所以免大耋之嗟矣象曰何可久也者言日之既昃不久而傾若人之年已衰老不能鼔缶自樂以安神養志使教化陵遲是何可以長久也九四突如其來如焚如死如棄如象曰突如其來如无所容也義曰九四已出于下卦而在上卦之初如日之已没而再出突然而明是猶以其非道遽然而進且切近至尊大臣之位其身不正恃其權位乃欲炎于上故至焚如然失其爲臣之道逼君之位如是則死之亦宜故言死如若然人神所共棄天下之所不容故曰棄如六五出涕沱若戚嗟若吉象曰六五之吉離王公也義曰六五爲離明之主然以柔弱之質居于至尊下爲九四强臣之所逼至于出涕沱若而又憂戚嗟傷言慎之至也以其憂懼如是之至然後得其吉也象曰六五之吉離王公者雖爲强臣所逼然居于至尊麗著于王公之位天下之所順又能憂傷之至故獲其吉上九王用出征有嘉折首獲匪其醜无咎象曰王用出征以正邦也義曰醜衆也上九亦如三過其中是政教已衰故有四夷侵侮諸侯背叛之事王于是以兵征之征者正也征于四夷所以正華夷之體征于諸侯所以正君臣之義誅其元惡弔民伐罪而已故折其首惡匪及其衆則有嘉美而无悔咎象曰王用出征以正邦也者言王之用以出征以正萬民之法君則君臣則臣邦國從而正矣周易口義卷五
