body:
  text: 周易口義卷二宋胡瑗撰上經屯震下坎上屯元亨利貞勿用有攸往利建侯義曰此文王所作之卦名也文王既定乾坤二卦于前以明天地之道又以震坎二象畫為六位以次于後名之曰屯屯者屯難之名天地始交而生物之時也夫天地氣交而生萬物萬物始生必至艱而多難由艱難而後生成盈天地之間亦猶君臣之道始交將以共定天下亦必先艱難而後至于昌盛如湯之于伊尹文武之于吕望其始交時皆有四方之多虞然後卒能共治天下是皆先艱而後通也然萬物始生多難何以見之試以草木言之當勾萌甲拆之時其體弱而未成日曝之則槁必雨以潤之雨乆反害是始生多難可知也君臣倡治豈无難哉然屯有二義一為屯難剛柔始交而難生是也二為盈序卦云有天地然後萬物生焉盈天地之間者惟萬物故受之以屯屯者盈也是為二義以人事言之自古聖賢未有不由險難成名若文王囚羑里周公攝政有管蔡之流言仲尼厄于陳畏于匡㧞樹于宋削跡于魯孟軻有臧倉之困齊梁之君以為迂濶是皆出于險難而後能興事業于當時或垂名教于後世是以君子之人將欲立功立事不可以時屯而不往世難而不行雖小人之譖毁傾險安損君子之道哉且君子之道獨立不懼而行若終屯而不行乃生靈之不幸耳小人何能掩我哉唯君子能徧歴險阻艱難然後可以成名此聖人明卦之深教也元亨利貞者此屯之四徳亦天地之四徳也注疏以為劣于乾非也盖隂陽之始交必有屯難萬物由屯難而後生如春之時則勾萌畢達元之徳也夏之時則物生而大通亨之徳也秋之時漸而成之利之徳也既生既通既成而又于冬幹了之貞之徳也是屯之四徳亦乾坤之四徳也以人事言之則君臣始交而定難難定而後仁徳著故揚子曰亂不極則徳不形是其拯天下之大危解天下之倒懸出民于塗炭由于難而後仁著也此元之徳也天下既定必得禮以總制之使君臣父子兄弟夫婦尊卑上下之分不相錯亂此亨之徳也天下既定人倫既序然後保合太和而各得其宜一歸于貞此利貞之徳也勿用有攸往者此以下專以人事言之屯難之世天下未定萬民未安不可重為煩擾之事往而撓之若復往而撓之是益屯也必在省其刑罰措其甲兵輕其徭役薄其稅斂以安息之可也利建侯者夫天下始定民方息肩于困難一人不能獨治政教不能徧及必建侯分守使之行上之號令布上之徳教以各治一國之民則幽僻逺陋之地无不被其澤故屯難可以寧生民可以定也彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧冝建侯而不寧義曰此以下先聖釋文王彖辭之辭也言謂之屯者是天地剛柔二氣始交萬物始生則必有其難也若君臣始交萬物始定則亦必有難也動乎險中大亨貞者此以上下二體言之也震為動而下坎為險而上是動于險中也屯之初動而不已故得大通言聖人創業初在險難而教化未濟故于此動乎險中而不已則出乎險中而施元亨利貞之四徳以濟天下之民也大亨貞者釋四徳也不言利者盖聖人于乾坤二卦既備言四徳故于諸卦有四徳者皆略而不舉也雷雨之動滿盈者此聖人重釋亨貞之義也言屯者盈也隂陽始交則有雷雨之澤以生成萬物而使盈滿于天地之間若君臣始交以徳澤布于天下使天下之人皆被其賜而至于盈盛也天造草昧冝建侯而不寧者草草創也昧㝠昧也夫天之營造萬物於草創冥昧之時在聖人則當興制天下之事然教化未備人民冥昧而未通以聖人一已不能獨治必分建邦國之諸侯以撫綏其民是聖人于此之時豈得安寧而遑暇冝急急以治屯也象曰雲雷屯君子以經綸義曰此先聖大象之辭也言雲而不言雨者盖雲者畜雨將降之時也故又有雷動于下將興雨澤以蘇天下之民物是天地經綸之始也故君子法此之象當屯難之世撥亂反正施教行化興天下之利除天下之害以經綸當世之務也初九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也義曰磐桓者不進之貎言初九居屯難之初天下方定不可煩擾于民故磐桓然不遽而進然身雖磐桓而其志在經綸天下不失其正也利建侯者以其天下至廣不能獨治况當屯難之世生民方定必須封建聖賢之諸侯以康天下之難者也象曰志行正也者此先聖象辭言身雖不進然志在經綸天下所行不失其正故也以貴下賤大得民也者此言初九以一陽居衆隂之下是以崇貴而謙處于下屈已而就卑者也故身能禮下賢善而民心莫不歸之六二屯如邅如乘馬班如匪冦婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也義曰屯難也邅廻也如語辭也言六二與九五為正應而下乘初九之剛欲乘馬而行往應于五則以其難在于初故邅廻班旋而不敢進也匪冦婚媾者冦謂初也言六二若非初九為冦于已也則上與五為婚媾矣女子貞不字十年乃字者女子以隂言之未有所從者也盖此六二以隂居隂正也處下卦之中中也六二能居中得正不以初九為冦于已而下從之是女子能守正不變不為初之愛字者也十年乃字者十年乃天地之終數也數終則反常難釋則亨來是以中正之女至此十年難極則可以受九五之愛字也象曰六二之難乘剛也者言六二所以邅廻班旋乘馬而不敢進者盖以隂柔之質而乘初九之剛也十年乃字反常也者言于十年難終之後得從九五之應是反得常道也此爻施之人事猶君子守正專應不妄有所從者也六三即鹿无虞惟入于林中君子幾不如舍往吝象曰即鹿无虞以從禽也君子舎之往吝窮也義曰即就也虞虞人也以畋獵言之欲就其鹿而无虞人導之鹿不可得也夫六三以隂居陽本失正也夫人之不正則雖君子能博施者亦不愛于已矣上又无應若往求于五五屯其膏自與二為應必不見納若下求于初初又有六四之應則是以不正而妄動上下皆不獲其安故君子立身處世則必内畜其徳外㓗其行而存心于聖賢自任以天下生靈之重不為躁進妄動必待時之所推君子之援引以為先容則位可得而道可行也今以不正之質而又不畜其徳不㓗其行但以躁進妄動為心而又无君子之援是其往必无所得也故若欲就其鹿无虞人援引度其可否則鹿必不可得而徒入于林中而已何所獲哉君子幾不如舎往吝者註疏謂幾為語辭非也盖幾者有理而未形者也君子之人能知之先見知微知彰度其所然正身而動知其進退无所適而又无其援必不利矣則不如舍之是能豫决其可否知幾之君子也若不能如是而務為躁進必取其悔吝也象曰即鹿无虞以從禽也者凡飛走可擒獲者皆謂之禽故曲禮曰猩猩能言不離禽獸又書云无禽荒者皆可擒取之義也六三雖欲即鹿從禽然而无虞人以度其可否雖有鹿亦不可得也鹿即喻干禄財利之謂也君子舎之往吝窮也者此聖人為妄求躁動之戒也故繫辭云君子安其身而後動易其心而後語定其交而後求危以動則民不與也懼以語則民不應也无交而求則民不與也莫之與而傷之者至矣今六三居屯難而求進是危以動也非應而往是懼以語也以无虞而求鹿是无交而求也如此而往則速其悔吝困窮可知矣六四乘馬班如求婚媾往吉无不利象曰求而往明也義曰此一爻誠可謂知幾之君子也然雖與初九為正應而二近于初疑其與初相得而隔已之路故乘馬班旋而不敢進也然已守正而无求于陽故待初九之來求于已以為婚媾然後往而應之則獲吉而无所不利也若君子雖懐才藴徳有聖賢之事業然亦不可以已而求人必待其人再三見求于已而往則道可行言可從也故伊尹耕于有莘之野由湯三聘而後往以堯舜之道覺天下之民是也象曰求而往明也者言六四居其正而能知其幾性修智明不為妄動必待人求于已然後往而應之果非君子性修智明其能與于此乎九五屯其膏小貞吉大貞凶象曰屯其膏施未光也義曰凡為人君之道當如天之造物雲行雨施滿盈天下使萬物无不被其澤則可也書曰无偏无黨王道蕩蕩此為君者所當然也今九五據至尊之位而反屯難其膏澤專應在二不及于衆是但能煦煦之仁孑孑之義私已之親偏已之應若施之一家則可以澤一家若施之一國則可以澤一國若施之天下則无以濟是恩澤不及于廣逺使天下之人无以慰其望是以小貞則吉而大貞則凶也是所施膏澤不至光大也可知故象曰施未光也上六乘馬班如泣血漣如象曰泣血漣如何可長也義曰此言上六處一卦之上最居屯難之極欲應于五五屯其膏而无所告也固若鰥寡孤獨失職之民不得其所而罹于塗炭之中无所告愬者也五既澤不及于已三又失其正應故乘馬班旋而不得進泣血相續而无所愬也象曰泣血漣如何可長也者此先聖之微㫖非謂上六也盖責其為君臣之道也夫人君者不欲一夫有失其所一物不遂其性為人臣者又當佐君力行之今人見赤子墜井自非親戚皆將匍匐而救之況為民之父母豈可使斯民有此屯難之事泣血漣如而无所告哉是不可使之長如此也是不可長者盖責其為君臣之道也此先聖之微㫖然自古以來獨伊尹可能當此也蒙坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞義曰蒙即蒙昧之稱也凡義理有未通性識有未明皆謂之蒙所以次于屯者按序卦云屯者物之始生也物生必蒙故受之以蒙又曰蒙者物之稚也言若人之㓜稚其心未有所知故曰䝉也蒙亨者言䝉昧之人其性不通其志不明必得賢明之人舉其大端以開發之則其心稍通通而不已遂至大通亦若民之生雖懵然无所知㝠然无所明必得在上賢明之君善教化之教化之不已則知禮義而至于大通故曰蒙亨也匪我求童蒙童蒙求我者我謂賢明老成之人也言非是賢明老成之人往求童蒙者而告之盖是童蒙之人其性不明其志不通思其開釋而來求于我我則告之亦若賢明之君非是已欲自求于民而治之盖其民无知不能自治思欲開發暗昧之心以求于已則已然後居其位明教化以導之是以古之聖賢在上者其處心積慮非樂居于權位好處于富貴盖民來求治于我我當治之亦以天之生民蚩蚩者衆无所知識須得聖賢之人以治之以堯舜居之而不為樂者是聖人之本心也初筮告再三瀆瀆則不告者筮所以决疑也言童蒙之人不能自明志有所疑來决于已則已舉其大端一理以明告之而蒙者必當精思其可否深慮其善惡然後可以大通其志若或不思不慮而其性不達以至于再于三求告于老成之人則其事煩而瀆亂矣既已瀆亂則老成之人不復告之矣故仲尼曰舉一隅不以三隅反則吾不復之矣故古之時有朴作教刑以至蒙昧之人諭之而不思告之而不慮則有鞭朴夏楚之刑以戒之亦如䝉昧之民求治于在位者也聖賢之人在上則道之以教化漸之以禮義有或不能以自通以至反善趨惡瀆上之化故古之時有明于五刑以弼五教以正之是言再三瀆亂則不復告之而有懲戒之刑也利貞者此言亨蒙之道當利以正也故先聖曰子帥以正孰敢不正言必以正道開發于人也彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童䝉求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以飬正聖功也義曰艮為止為山坎為險為水山之下有險窒塞而不通則是蒙之象也夫水之性无不下導之則為江為海止之則為潢為汙今止而未決是其有蒙之義也蒙亨以亨行時中也者言䝉昧之人智性既未明而賢明老成之人必以一理而決之使其由稍通以至于大通如此是以亨通而行皆得時之中也匪我求童蒙童蒙求我志應也者言非賢明老成之人求于童蒙之人盖童蒙之人來求決于賢明老成之人也既來求決則賢明老成之人當告以善道是上下之志相為合應也再三瀆瀆則不告瀆蒙也者言蒙昧之人既來求决于賢明之人賢明者但開發一隅而告之其蒙者既得賢明之告必當思慮之自一隅以至于三隅然後可通也今若不思不慮以至于再于三而瀆問于賢明之人則賢明之人不復告之以其不能思慮而自瀆亂于䝉者也孔子曰學而不思則罔是也初筮告以剛中也者剛中謂九二也言九二以剛明之徳而居中是能以剛中之徳而發其蒙昧者也蒙以飬正聖功也者此言聖賢外能䝉晦其徳而内飬其至性至誠不息以育其徳是其聖賢之功也此正合潛龍之義始卷懐其才徳而終存心于天下後世怪民不知蒙晦養正之意乃退身于山林是豈聖賢之功乎象曰山下出泉蒙君子以果行育徳義曰言泉之始發于山下未有所之則必待决導之然後流注而至為江為海于未決之前雖出於山之下而未有所適是蒙之象也君子以果行育徳者言君子之人則當果決其行而力學審思強問篤行使其性明志通又且養育其徳以修其志使其道之大成至于聖賢而後已然後發其所畜以教化于人也初六發蒙利用刑人用說桎梏以往吝象曰利用刑人以正法也義曰據此一爻注䟽之解以為初六在屯難之後居蒙昧之初不能自明而上得九二之陽以照于已遂發其蒙蒙昧既發則志遂明于事而无所疑可以用刑于人或說其罪无所不當也今則不取盖此一爻乃亨蒙之法也初六居蒙之初乆在蒙昧不能通明必得在上聖賢之君申嚴其號令設張其教化以開示之使得其曉悟故曰發蒙也若其性識至昧雖得號令教化開發之而尚不通曉于心反善趨惡犯君之教化則賢明之君當用刑罰以決正之故曰利用刑人也然又其間乆在蒙昧之時不知禮義不知教化過而為之以至遭桎梏之苦始曉悟而自悔則聖賢之君又當肆赦之書曰舊染汚俗咸與維新是也故曰用說桎梏也以往吝者言凡刑法者小懲而大戒刑一而勸百使天下之人皆遷善而逺罪是不得已而用之也語曰上失其道民散乆矣雖得其情則哀矜而勿喜也不可恃已之勢肆已之威快已之欲用之以往无有休已則自取悔吝也九二包蒙吉納婦吉子克家象曰子克家剛柔接也義曰初六發蒙蒙之小者也上九擊蒙蒙之大者也而餘四爻皆隂柔之質惟此九二以剛明之徳居下卦之中是居得其中者也夫剛則能斷天下之事明則能察天下之微有剛明中正之徳則天下之賢不肖者皆從而歸之天下之蒙昧之人皆樂而求之而已能包容无所不納故曰包蒙吉納婦吉者婦所以助已而成治也以上下三爻皆隂柔之質故稱婦也然其中必有賢者能者而九二又能納之以助于已盖言九二居人臣之位正應于五五為至尊而以柔順之質專委于二荷天子之重任掌天下之繁務其責至重雖有剛明之徳亦不能獨當之必在廣納天下之賢才以相輔助然後可以成治也故云納婦吉也子克家者言有包蒙納婦之吉施之人子則可以幹父之事而克集一家之治施之人臣則可以幹君之命而克成天下之治也故曰子克家象曰子克家剛柔接也者言六五與九二為正應上以柔順而接于下父之慈也下以剛明而奉于上子之孝也父子之義相交則家道成也君臣之義相交則天下治也是六五之君能以柔順之道下委于九二之臣九二之臣能以剛明之徳上奉其六五之君是則剛柔相接而克成其治也六三勿用取女見金夫不有躬无攸利象曰勿用取女行不順也義曰金夫者剛陽之人也六三以隂柔而居陽位本不正也以不正之女不能順守婦道比近九二剛陽之人故起躁求之心而欲遽從之是不有其躬非清㓗之行故聖人戒之曰勿用取此六三不正之女也无攸利者言六三之女以不正之質而從于剛夫則必蠱其一家之事亦猶不正之臣以此道而事君必害其天下之治復何有所利哉象曰勿用取女行不順也者先聖所以言勿用取此女者以其不正之質而又躁求于金夫不待夫見求而自遽應之是行不順也六四困蒙吝象曰困蒙之吝獨逺實也義曰六四以隂柔之質居蒙昧之世又處隂之位上既逺上九之陽下又逺九二之陽在二隂之間无陽以發明于已困于蒙暗不得通達故有悔吝是以自古聖賢未有不自擇師取友親仁善鄰以成者也故子貢問為仁于仲尼仲尼答曰工欲善其事必先利其器居是邦也事其大夫之賢者友其士之仁者夫賢者事之仁者友之以相訓導以相琢磨未有不成其道業者果能此道則雖愚必明雖弱必強則自小賢以至于大賢自大賢以至于聖人也故孔子又曰里仁為美擇不處仁焉得智言人之所居必擇仁者之里而處之觀其動作必中于道觀其言語必中于義出入游處日漸月摩雖有凶子頑弟未有不率而至于善者又若孟子之母三徙其居而卒使其子為萬世之大賢是由母能親仁善鄰之力也今六四不能親仁善鄰故至于困窮而有悔吝也宜矣象曰困蒙之吝獨逺實也者夫陽主生物故為實今六四既逺上下之剛陽至于困窮而有悔吝是逺于陽實故曰獨逺實也六五童蒙吉象曰童蒙之吉順以巽也義曰六五隂柔之質而居陽位至尊之極也内有剛徳可以通天下之志外示柔順足以專任臣之道故獲童蒙之吉非六五柔順之徳无以委任九二剛明之臣非九二剛明之才无以當六五委任之重故此能專權委寄所謂勞于求賢逸于任使不勞聰明垂拱而自治者也象曰童蒙之吉順以巽也者以隂柔居至尊是順也能專任于賢而以柔接之是巽也上九擊蒙不利為冦利禦冦象曰利用禦冦上下順也義曰據初九是蒙之小者故曰利用刑人凡昧于理者皆謂之蒙若為臣不盡臣之忠為子不盡子之孝為弟者當奉于兄而反為輕侮之事為兄者所以友于弟而反為傷虐之行為士者所以守義明先王法則以正流俗而反為偷薄之行為農者所以力穡務本而反為怠惰之事為工者所以作器用以利于人而反為彫巧之弊為商者所以通濟有无而反為侈靡之異是皆反于常理而蒙昧之小者故用刑法以正之今上九乃是䝉之大者若諸侯羣臣所以佐天子而反為叛逆之醜若夷狄所以柔服于中國而反為叛亂之孽罪深惡大非五刑所能制必在興師動衆以征伐之故曰擊蒙也不利為冦者夫兵凶器也戰危事也若逞其凶器肆其危事以自冦于人往必不利故秦之始皇漢之孝武隋之煬帝皆貪一時之欲恃一己之威窮兵黷武長征逺伐使天下之男死不得縁南畝天下之女罷不得就蠶室而勞于餽餉流離四郊以至老母弔其子㓜婦哭其夫怨毒之氣徹于骨髓愁痛之聲淪于腸胃此皆為冦不利之明效也言利禦冦者言征伐之事非務乎窮兵黷武盖在于禦難備害而已若三苗之民反道敗徳而舜征之葛伯有先祖之奉而不祀有千乘之富而奪人之餽餉湯始征之昆夷玁狁為華夏之難而文王討之三監叛周而周公誅之四夷交侵宣王伐之此皆利于禦冦之明效也象曰利用禦冦上下順也者言諸侯之叛逆四夷之不賔服人神之所共怒也故聖人選兵簡將以擊之則上下之心无不承順也中庸曰喜怒哀樂發而皆中節謂之和若此可謂怒中其節也上下安得不順承之哉需乾下坎上需有孚光亨貞吉利渉大川義曰需訓為須須待也需所以次于䝉者按序卦云蒙者物之稚也物稚不可不養故受之以需需者飲食之道也夫需又為濡潤之義物在蒙稚必得雲雨以濡潤之人在蒙稚必得飲食以濡潤之以養成其體也謂之待者盖卦之二體乾在下必務上進既欲其進而又險在于上于是見險而止猶君子以險難在前故待時而動不妄求進是須待之義也有孚光亨者此指九五而言也故卦辭或統論一卦以明其體或因一爻以明其徳此需是九五當其義故指而言之以明其徳孚者由中之信也光明也亨通也夫九五以陽明之徳處至尊之位有由中之信以待于物物亦以由中之信接于己上下交相以至誠之道浹洽于天下其徳乃光明而亨通也故曰有孚光亨也貞吉者言九五以陽居陽得正者也夫既有由中之信接于物必須濟之以正乃獲其吉也若信而非正則入于邪僻故先聖云信近于義又曰子帥以正孰敢不正故曰貞吉然則此非止于九五人君之道獨當然若凡在位者能以正信之道接于下則下亦信之而從正也若父子之間以正信相接則不陷于不善朋友之間以正信相接則不陷于不義是凡為人者有由中之信皆當正而行之乃得吉也然既以正信接于人而人亦以正信歸于已以此而濟大難何不利之有故曰利渉大川彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利渉大川往有功也義曰需者濡潤飲食之謂也亦謂須待之義也險在前也者此以二體明之坎在上為險乾在下務于上進而坎險在上是以待時而動不躁求妄進故曰需須也險在前也剛健而不陷其義不困窮矣者此言雖險阻在前而下之三陽皆剛明至健之人必有欲進之心也然而既剛且健其進又不躁不妄固不陷溺于險難之中而其義不至困窮矣需有孚光亨貞吉位乎天位以正中也者此言九五之位有剛明之徳居至尊之極以陽居陽是正也又在上卦之中是中也既内有由中之信而外得其正故得光明而亨通是處至尊之位而以中正者也利渉大川往有功也者言有光亨之徳知其可進之時然後施己之道又本懐乾健之性以斯而往必有成功故曰往有功也象曰雲上于天需君子以飲食宴樂義曰坎為水為雲乾為天今坎在乾上是雲上于天也且雲者畜雨之具也今上于天是必反降雨澤于下也君子觀此需待之象以飲食養其身以宴樂寧其神居易以俟命待時而後動也注疏之說以飲食宴樂謂童蒙既發盛徳光亨无所為而但飲食宴樂而已觀此則是教天下以逸豫為心也非聖人之㫖今則不取飲食者所以養身也宴樂者所以寧神也是亦樂天知命居易俟時耳故君子之于飲食非謂肥甘其口腹也孟子曰飲食之人无有失也則口腹豈適為尺寸之膚哉君子之于宴樂非謂苟安其身也所以保其躬治其心明其性是君子樂天知命待天時之至也孟子曰仁義忠信樂善不倦此天爵也公卿大夫此人爵也古之人修其天爵而人爵從之今夫君子之待時也若農夫之趨于田也農者非不耕而可待其食也非務休逸而可待四時之有成也必力勤于稼穡志專于耕耨然後春生之夏長之秋成冬蔵之如不耕耨不播種則四時何有成哉君子之待時必須修其仁義忠信之徳然後可享其位伸其道也故曰君子以飲食宴樂初九需于郊利用恒无咎象曰需于郊不犯難行也利用恒无咎未失常也義曰郊者曠逺之地也按此卦坎在上為險乾在下為健夫有剛健之徳必欲上進今初九雖是剛健之質然而險難在前故見險而止待時而動厄窮而不憫樂天知命不務速進但需待其時逺難而已然所以于郊者郊最逺于水待之于此最逺難者也故曰需于郊也利用恒无咎者言居无位之地又處險難之下本有咎也然初九若能守其恒心不為困窮而易其節不以貧賤而渝其志相時之可否可進則進故得免其咎也象曰需于郊不犯難行也者言此初九能見險待時于逺郊之地是不犯冐險難而行也利用恒无咎未失常也者言俟時而動不犯難行者乃有常之君子也故中庸曰君子居易以俟命小人行險以徼倖言君子雖居貧賤而但守平易之心不妄動不躁進俟時而已小人則務險詖其行以徼恩倖今初九能守常不變是君子所為也九二需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也義曰沙者近于水亦平易之地焉按六四為險難之初三最近之初最逺之而二居逺近之間以陽居中内有剛明之徳而處得其中但守平易之心需于沙而已小有言終吉者言九二將近于難者也夫險難者小人隂險之行也已以君子之道守其中正不與小人苟合則小人興䜛搆之言以謗于已然九二動以剛徳行以中道不顧流俗之毁訾雖有小人讒搆之言終不能為害于己故曰需于沙小有言終吉也象曰需于沙衍在中也雖小有言以吉終也者衍寛衍也言九二所以需待于沙者以中有寛衍之徳而居中也夫小人之言也如犬之狺狺焉吠其聲者有之吠其形者有之安能為君子之害故九二雖有小人之言將害于已然而終不能害之自獲其吉也九三需于泥致冦至象曰需于泥災在外也自我致冦敬慎不敗也義曰上卦坎為險又為水六四在隂險之初而三最近之夫泥之為物最近于水者也此九三去難最廹故曰需于泥也致冦至者六四居險難之初小人之行者也以小人之心毁壊正道荼毒良民讒謗君子者也則君子之人必在敬而逺之然九三以陽剛君子之徳而反不敬逺小人則己之道何以著于天下又以至健之質務欲上進而最廹于小人故致小人之為冦也然九三以陽居陽雖不及中且履正者也以至正之道又内謹其心外慎其事則為冦之小人終不能陷于己象曰需于泥災在外也者易中凡上卦為外下卦為内今九三雖進而至此然尚未入于難但廹近六四是來害己者在外也自我致冦敬慎不敗也者言冦之欲來皆由己之欲進而自廹之也然君子所行必中道所為必中節使無毫髪之差則小人不能窺伺而起害也今既至此則固宜恭敬謹慎其所為則小人終亦不能克勝也故曰敬慎不敗也六四需于血出自穴象曰需于血順以聽也義曰血者傷之謂穴者所居之地也夫乾之為體本在于上今卦反在于下三陽皆欲上進復其本位六四以小人隂險之質居險之初而窒塞其中然下之三陽以至健之徳俟時而動至此皆引類而進六四雖始欲拒其進妨其路然覩衆賢之來其勢度己之力必不能退故退而避之則始獲安居如或止而不使之進是必致衆賢之所害自待其傷故曰需于血也出自穴者言若能度己之力不能禦則退其所居而不敢妨衆賢之進如此則庶可以免害也象曰順以聽也者夫小人不能與君子敵今三陽上進已必柔順以聽從其所命也九五需于酒食貞吉象曰酒食貞吉以中正也義曰注疏之解謂需之所須須于天位何所復需需于酒食以宴樂而已若此則是教人以體逸為心耳无足為法夫自古聖帝賢王雖當平治未敢忘于喪亂危亡及匹夫匹婦之失所者夕思晝行以濟于天下安敢自懐于安逸哉盖九五以中正之徳居至尊之位而息于險難又以由中之信待于物則天下之賢者樂從之賢者既樂從之則必飬之故需于酒食所以待賢也亦所以養身也賢人既養則天下之賢皆引類而歸之身既安則可以暢仁義之道于天下故曰需于酒食既以酒食待天下之賢得其正則吉也故曰貞吉象曰以中正也者言九五居卦之中是以中也以陽居陽是以正也既有中正之徳于是用酒食以待賢所以獲吉者也上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也義曰上六居一卦之極以隂柔之質乃復入于穴以獲其安何則盖六四退避不敢妨羣賢之路九五又能用酒食以待之賢者既以仕進不見害于己故得入其穴以安其居也有不速之客三人來敬之終吉者速召也言四五既使羣賢並進而上六又執柔而得安居故下之三陽君子皆不期而自應不召而自來然既以一隂而當三陽之應則是為其主也上六固當執柔順恭敬盡其禮而接納之如此則終得其吉也象曰雖不當位未大失也者言上六既當无位之地而能恭敬以接納三陽之君子是能來天下之賢者也位雖不當而有所過失然亦不至于大也何哉夫納賢好善優于天下天下之至美者也有此至美雖有過失又何大哉訟坎下乾上訟有孚窒惕中吉終凶利見大人不利渉大川義曰按序卦云需者飲食之道也飲食必有訟故受之以訟然謂之訟者上下不和物情違戾所以致也有孚窒惕中吉者盖孚者由中之信人所以興訟必有由中之信實于己而為他人之所窒塞不得已而興訟盖己直而彼曲己是而彼非其間情偽利害雖存則必具兩造以聽斷于在位之人然雖已有信實而為人之窒塞亦須恐懼兢慎而不敢自安則庶幾免于凶禍又中道而止則可以獲吉也終凶者言能兢懼中道而已則可也若于訟之時必欲終成而不已則聽訟之人必加之以鞭朴之刑重之以流竄之罪如此則是凶之道也利見大人者夫争訟之所由興皆由情意之相違戾上下之不和同鬬訟一生姦偽萬状然刑獄之情至幽至隠必得大才大徳之人以明斷其事則情偽利害是非曲直可曉然而決矣何則盖大人者才識明達智慮通曉雖幽隠纎芥皆能察辨之故訟者往求而決之冝矣不利渉大川者大川謂大險大難也凡歴險渉難必須物情相協志氣和同則可得而濟也今訟之時是其物情違忤而不相得欲濟渉險難必不可得何則以剛健在上坎險在下用剛健而渉坎險則愈入于深淵何利之有彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利渉大川入于淵也義曰大凡在上者剛在下者柔則不至于不和在上者巽在下者險亦不至于為訟今在上者既剛為下者又險其訟必興故曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也者此言九二之爻也以訟之所由興由已有信實而為人之所窒塞又兢懼怵惕得中而止不敢終竟其事而獲其吉是惟九二以剛明之徳而處得其中則能然也終凶訟不可成也者為訟之道雖有理而見窒于人然亦不可乆于其事若必欲成其事而終竟于訟則凶禍必及之也利見大人尚中正也者言九五之爻以剛明居中又處得其正獄訟之事皆可决之是善聽訟之主盖所尚者中正而已不利渉大川入于淵也者大川謂大險大難也若以訟道入于大險大難則訟愈深也故曰入于淵淵即川之又深者也象曰天與水違行訟君子以作事謀始義曰天之運行則左旋而西水之流行則无不東流以天與水所行既相違悖則不相得是訟之象也君子之人當法此訟卦凡作一事必須謀其始而圖其終使爭訟之端无由而起以之居一家興一事則皆謀慮其初使上下和睦而絶閨門之訟以之居一國凡造一事必須謀度其初使人民和同而絶一國之訟若此之類皆于其始慎慮之則忿爭辨訟自然可以息也故孔子曰聽訟吾猶人也必也使无訟乎其獄訟之事得明賢之人聽治之而又謀之在始則刑可期于无刑也初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辯明也義曰夫剛險相勝物情違戾故理有窒塞而事有侵犯是以成訟也今此一爻以柔順之質居下卦之初其性柔順不好為訟者也然應在九四九四以剛強而好訟來犯于己是以初六不得已而應之然訟之所由興在乎得理而已不可終竟其訟故曰不永所事小有言終吉者興訟之道若不務終其事則聽訟者亦必哀矜之雖然事理明辨亦須惕懼戒慎然後可以終得其吉今初六其性柔順不好辯訟雖小有忿争之言又不終竟其事故終獲吉也象曰其辯明也者言雖小有辯訟之言且非己好盖九四來侵于已其理自可明矣九二不克訟歸而逋其邑人三百户无眚象曰不克訟歸逋竄也自下訟上患至掇也義曰克者能勝之辭據彖辭言訟上剛下險則好訟之人也今九二以剛強之質又居坎險之中好為其訟而上敵于九五然九五居至尊之位而行得其正今九二以非理訟之是下訟于上少訟于長卑訟于尊賤訟于貴此而行訟何由勝故曰不克訟也歸而逋者九二既不克訟若不退歸而逋竄則禍必及之矣其邑人三百户无眚者言訟不克勝而逋逃若反據其強盛之國則是復有敵上之意故退避于至小之邑而止三百之户則可以免其災𤯝三百户即周禮司徒所謂通十為成成一百井三百家革車一乘二十人徒二十人之邑是其邑之至小者也象曰自下訟上患至掇也者掇拾取之謂也自外來謂之災自已召謂之眚此先聖因象而戒之言凡人以下而訟上至于逋逃盖自掇取其患害也六三食舊徳貞厲終吉或從王事无成象曰食舊徳從上吉也義曰六三以隂柔之質居坎險之終其性和同不犯于物然而上應于上九上九之性剛暴乃來訟于己巳不與之辯争故衆人莫克傾覆時君不為憎忿所以保全舊徳是所食爵禄不為上九之侵奪也故曰食舊徳貞厲者言本亦失正而又介二陽之間雖得食其舊徳于正道言之亦危厲也終吉者言此六三雖有危厲然已不好辯訟能以順從于上故終得吉也或從王事无成者言六三居一卦之下體柔而不敵上雖有訟于己而已能順之不為之辯是以終為在上之信任而人委之以事及其成功而且不自恃其力又不敢居其成但從王事守其本位本禄而已故獲其吉也九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也義曰九四以剛暴之性與物不和好為争訟者也而初六為己正應己以非理訟之然初能以隂柔之質不與物競雖為九四見陵而自能辨明故四于此不能勝之也故曰不克訟也復即命渝安貞吉者即就也渝變也言九四以非理訟于初既不能勝則當反就其好而變爭訟之命故可安静守正而獲吉也然而九二九四皆不克訟二乃逋四乃吉何也盖二者以下訟上以卑訟尊于義不可是以懼而逋竄不敢據其强邑然後始可免咎此九四者以上訟下雖為不可然能反其所好變其所訟改前之非從今之是此所以獲吉也象曰復即命渝安貞不失也者九四既復即其命變其前非修其正應之道守其安貞之徳復何有所失也九五訟元吉象曰訟元吉以中正也義曰九五以剛明之徳居至尊之位為訟之主者也以陽居陽故所行者正而无過與不及皆得中道而内有剛明之才則无所偏黨臨事果斷以此為聽訟之主則可察天下幽隠之情決天下寃枉之獄也然以居中得正又能决斷无私以此數徳故獲元大之吉也上九或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也義曰上九以剛陽之性居訟之極而下有六三之應六三又柔順而不與物争故此上九訟而能勝也乃有鞶帶之錫夫鞶帶者寵異之服也且上之賜必以禮下之受必以功此古之常道今上九以争訟忿競而受其寵異之服則是賜之不以禮受之不以功其為愧恥可知矣故于終朝之間三褫之而不能自安也褫云者為褫奪之褫又為恥辱之恥盖受之不當其分則必反覆褫奪而不自安也何哉至如有虞之時所賜皆以禮所受皆以功以至九官尚相遜而不敢當其所賜况今上九乃因争訟而受此寵異之服則褫不亦冝乎象曰以訟受服亦不足敬也者言凡授受賜予有差過其分則君子且不敢當是恐貽其羞辱也今上九以訟而當其厚賜何足敬尚之哉師坎下坤上師貞丈人吉无咎義曰按序卦云訟必有衆起故受之以師師者衆也師貞丈人吉无咎者丈長也丈人者言能以法度長于人也語曰杖者出斯出矣是長之謂也夫興師動衆其賞罰號令必一賞罰號令既一則羣聽不惑衆心皆歸則天下之人合志畢慮同心戮力可以立大功于天下也此乃長子帥師以中行者是也若賞罰號令出于二三則羣聽必惑衆心无所適從而上下違背離心離徳則兵戰之功无由而成也故師或輿尸大无功者是也然師卦之中最得其正者唯九二而已然此一卦五隂一陽而九二獨以剛陽之徳居得其中為六五之委任是將之有材有徳而又有其權位者也如是則可以興師動衆而不失其將兵之道以役天下之人使皆同心戮力悅從于上而无怨望者也然須吉而无咎者夫兵之所動生靈之性命社稷之安危皆繫之若一失其機一失其道則血肉生靈板蕩天下其為禍不細矣故在將兵者以恩威兼濟而協民之心合民之力而使不失其機變不失其威權必致成功大吉然後可以无咎也故曰師貞丈人吉无咎夫所謂丈人者莊嚴之稱言必須以威猛剛强然後可以陳師鞠旅而役毒師衆此未盡其㫖何則凡用兵之道必剛柔相濟恩威相須然後可以戡難成功或第莊嚴其色􅋺其威貎夫何益哉彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣義曰師者衆之稱貞者正之謂故曰師衆也貞正也此言于丈人獲吉者盖能以法令長于人統其衆帥其民使天下之人皆同心戮力而歸正則其丈長之人如此而可以王天下矣凡言王者天下之所歸于己者也即湯武之兵戢亂而王是也剛中而應者此指九二而言也言九二以剛陽之徳而處得其中正上應于六五之君為六五之君所委任是以居于中正有將帥之才也其體剛陽剛陽則明斷有將帥之徳也而又為五所注意有將帥之任也故能興師動衆使天下之民畢從之也何哉盖將兵之道若剛而不中則失于暴暴必傷物明而不中則失于太察太察則不能容民而士不附皆失所以將兵之道也故此有中正之徳有剛明之才又為君之所寵任兼此數長故可以成必戰之功而協從于天下也行險而順者此據二體而言也坎為險坤為順以興師之道天下之至險也何哉夫兵凶器也戰危事也其征伐一出則安危隨之豈非至險乎然而行此危險之事必須順于物理協于民心然後得為師之道也以此毒天下而民從之吉者此言以剛中之才徳役使天下之民而民皆悅隨乃得其吉既得其吉何過咎之有故曰又何咎矣象曰地中有水師君子以容民畜衆義曰坎為水坤為地以地至博厚而水行其中无所不容此師卦之象也君子法此師卦之象包容其民畜聚其衆是得為師之道也故將驅民于兵戰則必須以恩信而懐結之以仁義而畜養之及其臨事而使則人之從也雖死而不怨故曰君子以容民畜衆初六師出以律否臧凶象曰師出以律失律凶也義曰師衆也律法也言行師之道役其羣衆在于事始未必盡從故或勇或怯或逆或順如此則冝何為須在將兵者必有法律以制之使進者必進退者必退然又不可失其威嚴盖戰鬬之事動驅民于死亡非如此則莫可為之統率也故初六者居卦之下為出師之始必當用之以道制之以威動静之間不可一失其法律也否臧凶者否不也臧善也言為將統衆于一動一止之間捨法律則不可苟不以法律則行伍無以齊一衆心无所適從故雖偶有一䇿能屈于人能勝其敵是皆一時之幸然于長乆之䇿終至于凶也故象所謂失律凶也九二在師中吉无咎王三錫命象曰在師中吉承天寵也王三錫命懐萬邦也義曰夫九二以剛陽居下卦之中為六五柔順之君之所信任是用剛而不失其威嚴居中而所行无過无不及而又有權有位可以出竒䇿立功立事于國家者也何則夫將兵統衆柔而无剛則失于怯懦而不能斷剛不居中則過不及皆有之既剛而中苟不見任于君則雖有胸中之竒萬全之䇿无所施也今九二於此數事皆備有之故統兵出征必立其功是能以中而獲吉也无咎者夫兵者國家之大事社稷之安危生民之性命所繫苟一失其道咎莫大焉必獲其吉然後可以无咎也故曰在師中吉无咎王三錫命者言九二既為六五之信任是其有才有徳而又承其權位酌行中道不失為師之義也故王者再三錫其命所謂三錫者一命受爵再命受服三命受車馬也然九二所以致其賜者盖人君以忠良難偶才不易得又况于不常之事而立不常之功故所以稠厚其賜也象曰在師中吉承天寵也者言九二以剛陽居中然能在師旅之間成立其功盖應于五而六五能信任之使己之才徳可以運籌決勝扶衛社稷是能上承天寵然也王三錫命懐萬邦也者此又言承上王再三之錫命者盖由得將之才徳備而盡所以用兵之道以卦體終始六爻獨此九二有剛中之徳為師之主上下莫不歸之是有懐萬邦之象也六三師或輿尸凶象曰尸或輿尸大无功也義曰輿衆也尸主也六三居下卦之極以隂居陽失位不正之人也以六三當行師之時是不能專一號令紛揉羣聽在衆皆得以主之也以此而行則凶可知矣象曰大无功也者此言出軍行師其動作必以律進退必以法精練士卒整一行伍或天時不得或地利不順以至无功而敗于敵又况六三以不正之隂柔使號令二三而衆得主之則是大无功者也六四師左次无咎象曰左次无咎未失常也義曰次止也按春秋荘二年冬公次于滑八年師次于郎以俟陳人蔡人是皆次者止之義也夫師必尚右右者隂也隂主于殺左者陽也陽主于生今六四不右而左次之是止而不進之義也既不進則是志不在于殺者也何則夫六四以隂柔之質本无剛嚴果斷之徳不能成戰陣之功但次止其兵而无肅殺之意以此而行則是量時度力不蹈于禍雖无功于大事止獲保全而免其凶咎而已矣象曰左次无咎未失常也者言六四雖不能統衆成戰陣之功而次止其師然亦不失其常也六五田有禽利執言无咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也義曰夫田野之有禽則是害苗稼固當獵取之天下有姦詐之人則是犯王之命固當征討之盖姦臣賊子雖治平之世亦不能无但在上之人即時誅之不可使滋蔓其牙蘖必務翦除而清其亂也是如田之有禽必傷害苗稼固獵而去之可也利執言无咎者夫兵者凶器聖王不得已而用之用之者所以誅不廷而討不軌也然而征討之事聖人固不當親往之所利者但執彼之不順之言遣將而征討之可也以此而行于義自得其无咎矣長子帥師者夫長子止言九二之爻也言九二有剛明之才中正之徳能統一師衆又為六五所委任故能帥其衆同心戮力以赴難然後獲其成功也是長子帥師之效也弟子輿尸貞凶者弟子止謂衆隂之爻也輿衆也尸主也夫統兵舉衆必使號令齊一法律中正然後能成戰陣之功或任以柔弱之質而復衆主其兵號令賞罸出于二三以至衆有離叛之心又不能成戰陣之功以正道則凶也上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也義曰夫初六者行師之始也當以法律而用之今上六居用師之終賞功之際是大君有賞賜之命也故曰大君有命開國承家者功大則開建一國以為之諸侯也功小則承一家以為卿大夫也小人勿用者夫兵家之道動以萬數故所任之人或以勇力或以謀智是必有小人厠于其間未必皆賢也是以成功之後居上者論功定賞差次其秩必審其可用不可用若是賢人君子運謀智而決勝者則當封之公侯爵之卿大夫可也盖君子雖獲大功而无矜伐之心雖位尊權重又无驕慢之志寵盛則益恭爵崇則愈謹者也若小人得一小功則希其大賞使之在高位必生驕慢驕慢生則覬覦之心熾是堅氷之漸所由來矣然則小人冝如何而置之錫之金帛厚之田宅可也若賞之以大位則不可也以是庶可絶覬覦而窒禍階也是故漢之高祖以韓彭英盧之輩而王天下及其賞功則封之列國授之大權然其終亦不免叛逆之禍而幾至于喪亂也後光武中興有天下雖臣有大勲大功亦但賜之金帛土田而已此誠英斷睿哲深謀逺慮先天下之禍亂而思之合聖人之微意得小人勿用之深㫖者也聖人于此切戒之言勿用此小人居于大位若其用之必至于亂邦也比坤下坎上比吉原筮元永貞无咎不寧方來後夫凶義曰比者相親比之義也比吉者言所以得吉盖上下順從衆心和睦衆心和睦則禍害不生故由此而得吉也原筮元永貞无咎者原究也筮者決疑之物也元善之長也貞正也言人之所相親比不可不慎也若所比之人善則為吉為美也若所比之人惡則為凶為禍也故當原䆒其情性筮決其善惡必湏有元善之徳永長而不變守正而不回有此三徳故可親附之獲其吉而得无咎也苟三徳不備者未盡所以相親附之道也則凶咎將至焉是以君子之人居官則親其同僚為士則親其朋友以至閭里則親其賢善之人如此則皆可以獲其无咎也不寧方來者寧安也方將也言有此元永貞三徳之人為比之主則人將親比之然後獲其安也是以天下之人其有不安者有不得所者率將輔從于賢善之人則此相親比者无不獲其利而无不得其所從也後夫凶者言在上為比之主能使天下之人皆悅而來親比然天下之人既至親比其有後至而不從者則必為居上之人所誅戮也是終自取其凶咎也故昔夏禹會于塗山執玉帛者萬國獨防風恃強而後至為夏禹之所戮此其後夫凶之驗也彖曰比吉也比輔也下順從也原筮元永貞无咎以剛中也不寧方來上下應也後夫凶其道窮也義曰比吉者此統明比卦之義言人之所以相附近由其志意符契而无所相違以是為比故獲其吉也比輔也者言人之所來比于上由其有元永貞三徳之人為比之主以是天下之人皆悅隨依輔之也下順從也者言此比之卦惟九五一爻以剛陽之徳而居尊位為比之主使下之衆隂皆來親附而順從是盖居上者有徳以率服之然也原筮元永貞无咎以剛中也者言九五所以為天下之人來比附而无咎者盖其以剛陽之徳居上卦之中故也不寧方來上下應也者言九五以剛陽之徳居于尊位上下衆隂皆親附于己至于不寧之人罔不來應也後夫凶其道窮也者親比之時已獨後人是比道已窮其凶也不亦冝乎象曰地上有水比先王以建萬國親諸侯義曰坤下地也坎上水也且地得水則潤澤水得地則安流今地上有水乃合和親比之象也先王以建萬國親諸侯者言比之大莫大于建國親侯是以先王法此象建萬國使相親附其諸侯使之和協然後天下四方皆可以使之親比也且諸卦言君子而此獨言先王者盖建國親侯莫非天子之事也故止言先王凡能君臨天下愛萬民通謂之君子又諸卦或言后者天子諸侯之通稱也初六有孚比之无咎有孚盈缶終來有它吉象曰比之初六有它吉也義曰凡親比之道貴心无係應光大其志來者見納則得為比之道也今初六處比卦之初以柔順之質而上无專應是有由中之信行親比之道自然不蹈于咎過者也有孚盈缶者缶即素質之器也凡親比之人苟无由中之信雖豐其禮盛其器以接于物終无有信之者今以至約之禮至儉之器也然此初六本有至信發之于中以接于物雖此質素之器以其信而盈溢之則合于親比之道所以獲吉也故左傳曰苟有明信澗溪沼沚之毛蘋蘩蕰藻之菜筐筥錡釡之器潢汙行潦之水可以羞于王公可以薦于鬼神夫以鬼神之尊王公之貴以此微薄之物尚可為薦羞盖以至誠為之本而物為之末也終來有它吉者盖此初六本負廣大之徳无專應之私又以其至信盈溢于素質之器故于終乆之道有它來比輔而得其吉也若西漢鄭當時待四方賢士以延時髦而輔己之不逮然奉養不過一盤餐而已盖本以至信接物當世賢士英傑莫不歸心以是盡所以比附之道也六二比之自内貞吉象曰比之自内不自失也義曰六二止與九五相應是不若初六之廣大其道恢宏其志廣比于人但偏私以應于五故于卦言之是自内而比于上也然得其貞吉者以六二志偏專應苟更不以正道處之則滛邪佞媚无所不至也故當大正乃得吉也六三比之匪人象曰比之匪人不亦傷乎義曰六三過二不得中也以隂居陽不得正也夫以不中不正之人當親比之世則所行皆非人之常道也夫以是雖有中正之人必不相輔故孔子于衛主顔讐由彌子之妻與子路之妻兄弟也彌子謂子路曰孔子主我衛卿可得也子路以告孔子曰有命孔子進以禮退以義得之不得曰有命是聖賢之人雖欲假位行道汲汲于救時然非人則不主也又若魯桓公以不正之人于家則殺兄于國則弑君嘗欲求㑹于衛至桃丘之地而衛侯以其弑逆不正之君則弗與之見故仲尼于春秋但書公㑹衞侯于桃丘弗遇是由持不正之道欲求比于人則人莫之于輔以人莫有與之者誠可悼也故象曰不亦傷乎是可傷也六四外比之貞吉象曰外比于賢以從上也義曰二言比之自内者以其上係于九五一志而專應之是自内而比者也此六四外比之貞吉者盖初六有由中之信而能比天下之賢故不專于一應而天下之人皆比之故有它來之吉此六四既非初之專應必須外比于九五之賢也然以隂居隂履得其正九五以陽居陽亦得其正故九五之爻以一陽居至尊衆隂之所歸也此則徃而親比之是能外附于賢而不失其正道所以獲吉也九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也義曰九五顯比者言此九五以剛明居至尊為比之主者也必須虚心廣志以待天下之賢以比天下之人故于比道光大也今反一志專應其道褊隘而私係于物是止能顯然明比于六二也王用三驅失前禽者三驅田獵之禮欲左者左欲右者右不用命者入吾網此三驅之禮也然用此三驅者盖從田獵之時禽有逆之而去者則棄而殺之其有順而來者則愛而活之田獵之禮常失前往之禽也今九五不能恢洪廣大其道而止應于二是應于己者則比之不應于己者則棄之是常失于不應己者也邑人不誡吉者言九五其志既狹但顯然明比于二是不能親天下之賢而賢者亦不來附于上故止于已邑之人不為誡令而歸附于已故得其吉也象曰顯比之吉位正中也者五處至尊不能廣逺其志而苐顯然比于六二然本不得吉此所以獲吉者盖以其居中得正也邑人不誡上使中也者言此比道雖不廣而能于己邑之間不須誡令而得吉者盖由居上者使以中道之故也上六比之无首凶象曰比之无首无所終也義曰比言无首凶而乾言无首吉者何也盖乾之為道至剛至健若為事物之先必至玩威而暴物是必待物之來犯然後從而加之所以得吉也此親比之道必先往比于人如在下者比于上卑者比于尊愚者比于賢又原䆒其情性筮決其善惡觀其有元永貞三徳之人從而附之如是卑可升于尊愚可至于賢是必先往而比則可獲其吉也是故聖人一起天下之人畢來附之其有不從而逆之者則為聖人之所誅戮也故有後夫之凶今上六以隂柔之質居比卦之終是不能率先親比于賢者所以致其凶咎信无所終也周易口義卷二
