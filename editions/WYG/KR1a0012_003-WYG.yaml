body:
  text: 周易口義卷三宋胡瑗撰上經小畜乾下巽上小畜亨密雲不雨自我西郊義曰序卦云比必有所畜故受之以小畜是由比卦旣相親比則必有畜積之道也蓋此一卦是乾巽二體乾本剛健而居上處于下則必務于進而巽以柔順處上必不能止禦之也亦猶在上之邪欲已形然雖有順正之德必不能止畜之也故得小畜之名此小畜亨者以大畜之卦其畜道至盛故不言亨而此得亨者蓋大畜是乾下艮上以乾在下必欲上通而艮居上卦爲山又能止物是使在下之陽不得上進及夫畜極乃亨故卦下所以不言亨也若此小畜亦乾在下而巽在上巽以柔順之質不能拒物乾雖上進而不能止之故初則復自道九二則牽復至于依附乃能止之獨止于九三一爻而已是陽志得以上升故言亨也然按此一卦之迹其文王之事耶蓋文王當紂殘暴不道之君以己雖有其才德然紂之左右前後皆僉壬故終不能止之也以此知文王内文明外柔順而道在小畜也密雲不雨自我西郊也者夫隂陽交則雨澤乃施若陽氣上升而隂氣不能固蔽則不雨若隂氣雖能固蔽而陽氣不交亦當不雨猶若釜甑之氣以物覆之則蒸而爲水也夫東震北坎皆陽方其隂氣上交于坤位則雨矣南離西兑皆隂方其雲氣不能爲雨今言自我西郊是雲氣起于西郊之隂位必不能爲雨也以人事言之則猶君之邪惡已形而又有便佞之臣左右逢迎其志其間雖有一二賢正之人亦必不能止矣夫君欲旣行而諂諛以滋之臣又不能止畜則膏澤何從而下哉彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也義曰柔得位而上下應之曰小畜此指六四而言也小畜卦有二義何者夫陽以生物其德至大隂以濟陽其德至小今六四以一隂柔得位體无二隂以分其應故上下五陽皆應之是小者能畜矣夫三陽在下而並進四以一隂獨當其路勢極柔弱必不能止禦至于進極乃始能畜是小有所畜也此二義也健而巽剛中而志行乃亨者此據二體而言又就釋所以得亨之義也夫乾以健位于下巽以順處于上乾健務進而巽順不能止之使其剛健巽順安然由中而行是于邪欲得亨耳密雲不雨自我西郊施未行也者已解在前象曰風行天上小畜君子以懿文德義曰風者震動之氣能生物亦能成物其行于地上則可以助天地生成之力也今以二體言之則巽在乾上則是風行于天之上其功不及于物是小畜之象也君子當此之時知其未可以進用則懷畜仁義懿美文德樂天知命待時而動其志在于佐君以澤天下之民物而已初九復自道何其咎吉象曰復自道其義吉也義曰乾體在上今居于下必務上進也此初九以剛健之質居乾之初勢必務進而又應在六四六四又以柔弱居巽始是必不能爲之制畜但聽其進而不拒順其性而不違此所以得復自故道而剛志得行安然不犯咎過而自以爲吉也象曰其義吉也者言復自故道而无所違拒于義理自吉也九二牽復吉象曰牽復在中亦不自失也義曰九二以剛陽而務進然其應在五五雖以剛陽居上而體本巽順非制畜之極不能逆己之進故得牽連而復所以得吉者居中之故也然五本剛健雖不違己志然猶不若六四以柔道依違于初使其安然上進故此必待牽連而後得復也象曰牽復在中亦不自失也者言九二必待牽連而後復是不能復有所爲但于己不自失耳九三輿説輻夫妻反目象曰夫妻反目不能正室也義曰輿車也輻車輪也乾爲陽故稱夫巽爲長女故稱妻言九三以剛健欲務上進上九居畜之極固止而不從之是故輿説其輻而不能行夫妻反目而不能正然按大畜之三則曰閑輿衛利有攸往而此言輿說輻者蓋大畜之時臣能以大正之道畜君于始使其邪欲之不行故畜則有厲而二則說輹九三畜極則通所往皆獲其利故曰閑輿衛利有攸往今小畜巽順居上其臣之勢微力弱不能禦君邪欲之志故初則復自道二則牽復至此九三方能止畜而不使之進故曰輿說輻夫妻反目也大凡非至聖之人不能无邪曲之情必左右前後皆得正人端士以大正之道而規戒制畜之使其思慮不入于邪言動皆由于正則終有天衢之亨也若夫左右前後皆以讒諂佞諛逢迎其惡則其間雖有一中正之臣亦必不能止畜之也夫正臣不能止畜則放僻邪侈无所不入驕奢淫佚无所不至而車輿說輻之咎夫妻反目之禍何以逃哉且大畜始雖不通至于九三則利有攸往是其爲福也甚大小畜始雖能亨通至于九三則有說輻反目之禍其爲患也非輕蓋制畜之道當在其始而聖人所以㴱戒也象曰夫妻反目不能正室也者言九三至放縱旣極而見畜于至正之臣以至不能正己之室況于他事乎則其爲禍也可知矣六四有孚血去惕出无咎象曰有孚惕出上合志也義曰孚謂由中之信也血者所傷之稱也去除也惕懼也出散也言六四以柔順居巽之初下之三陽上進而已獨當其路將以拒止之而不使其進則必爲其所傷故當以由中之信發于至誠依附于上之二陽同心一志與之共止畜之則傷害可以去惕懼可以出散而免其凶咎也象曰有孚惕出上合志也者言六四所以畜于物者蓋上九當制畜之極已能一心合志依附于上而共畜之則能出散惕懼也此不言血者蓋惕懼旣散則去其傷害可知矣九五有孚攣如富以其鄰象曰有孚攣如不獨富也義曰攣攀連也如語辭也鄰謂九二也此九五居小畜之時位雖剛明體本巽順又以由中之信攀攣于物故九二所以得牽復而上進也故曰有孚攣如富以其鄰者言九二以陽質上應于九五九五又以由中之信接之是不專己之富盛而分用于二也上九旣雨旣處尚德載婦貞厲月幾望君子征凶象曰旣雨旣處德積載也君子征凶有所疑也義曰夫六四以柔順不能畜物使初得復自故道至于九五雖以剛質處中然體本巽順故亦不能拒九二之進至此上九制畜既極九三雖欲務上進乃爲己之所禦而其志不通也故其辭曰輿說輻夫妻反目是也夫陽氣上進隂不能固蔽之則不爲雨澤也彖所謂密雲不雨是也若陽氣上升隂能固蔽之則蒸而爲雨今此上九是能固畜九三之進然位雖陽爻而體本巽順是隂陽相應而成雨澤故言旣雨也旣處者旣安也夫六四以柔弱之故是以惕懼而不敢安此上九旣爲制畜之極能固止其九三之進則安然而居不在惕懼也故曰旣處尚德載者言昔之不雨今旣雨矣昔之不安今旣安矣此皆由君子之人貴尚其德而行之故也婦貞厲者言此上九雖以陽處之然而體本柔順下應于九三是婦道也以婦而制畜其夫于正道言之蓋亦亢厲也月幾望者至隂之精也乾爲陽故爲日巽爲隂故爲月日常滿月多虧今至于此是巽之極而隂之盛也月至盈而言幾望者蓋月者臣之象也君之邪惡旣見畜于臣是臣德之盛也然以臣之分則不可過故當常若月之幾至于望則可也君子征凶者夫上九居制畜之極而有旣雨既處之事是時之甚盛也爲君子者若復更有所往不知其止則是凶咎之道此聖人存誠之意也象曰旣雨旣處德積載也者言所以獲既雨既處者由君子以仁德積之于内而行之于外以至有大正之道畜其剛健之進皆由久于積習然也君子征凶有所疑也者言至此道盛之時若復征進不已則必爲人之所見疑也履兑下乾上履虎尾不咥人亨義曰按序卦云物畜然後有禮故受之以履言物旣有所畜聚須禮以節制之故履所以次于小畜也然則履者禮也夫人之情目之于色耳之于聲口之于味鼻之于臭四體之于安逸必得禮以節制之然後所爲適中動作合度而放僻之心无自入矣苟不以禮節制之則必驕情肆欲无所不至是其禮不可一失之也此卦上乾爲天爲剛是爲君爲父爲夫之道也下兌爲澤爲順是爲臣爲子爲婦之道也乾剛在上是能以尊嚴臨于下也兌説在下是能以説順奉于上也上下相承故得君臣父子夫婦皆有其節制則上下之分定而尊卑之理别天下之禮行矣履虎尾不咥人亨者此聖人之㴱意也虎者至威至猛之物也咥齧也然今履蹈其尾而不見咥齧終獲其亨者蓋言暴猛之物不可以犯若君子能盡禮以履之終亦不見其傷也何則夫以天下之尊莫尊于君生殺之權繫之也若爲臣者能内盡其忠外盡其禮柔荘肅慎以事于上則君雖有雷霆之威嚴亦將温顔柔色而接之矣一家之尊莫尊于父一家之喜怒繫焉若爲子者内盡其孝外盡其禮温柔恭順以事其父則父雖至嚴亦將柔順而接之矣况于下者有文以相接有情以相親其間縱有離間之心亦不可得而離間也是故君父之至嚴鈇鉞在前鞭朴在後爲臣子者果盡其心竭其力厚其禮以事之則終不見其傷害也故曰履虎尾不咥人亨彖曰履柔履剛也說而應乎乾是以履虎尾不咥人亨剛中正履帝位而不疚光明也義曰履柔履剛也者此言得履卦之名者蓋由以柔順之體上承于乾剛之質此所以名曰履也説而應乎乾是以履虎尾不咥人亨者此就二體而言之兌以隂柔處于下而上承剛健是由賤之事貴卑之事尊苟非盡悦順之禮以事之則其傷害可知矣固當執此道以事之則猶蹈猛摯之獸而亦不見其咥齧也故曰説而應乎乾是以履虎尾不咥人亨也剛中正履帝位而不疚光明也者此止言九五之德也體本剛健而又以陽處陽居中履正是其德剛明而中正也以此履踐至尊之位而不有疾病則其道光大而明顯也象曰上天下澤履君子以辨上下定民志義曰乾天也兌澤也夫天本在上今居于上澤本在下今居于下是尊卑分定而各得其所也故君子于此時以人之飽食煖衣逸居而无教則近于禽獸也是以作爲禮制以節之教之辨别其民之上下安定民之心志使爲君爲父爲夫爲長凡在人之上者皆以恩威接于下使其爲臣爲子爲婦爲幼凡在人之下者皆以柔順事于上如此則上下之分定而人民之志固定矣初九素履往无咎象曰素履之往獨行願也義曰夫禮之本本于質是故冠冕之始始于緇布之質衣裳之始始于韠韍之質器皿之始始于汚尊瓦缶之質飲啜之始始于太羮𤣥酒之質是皆禮之始率以質素爲本也今初九居履之初是能本于質素而行故曰素履也往无咎者往則踐履而行之之謂也言當此履之始而君子能往踐質素而行之故得无咎象曰獨行願也者此履卦之初能踐履質素而行者蓋獨行己之願也何哉其爲禮之始本起于質朴迨後世則尚文尚華惟君子則能不撓于衆而獨行此質素之願以矯正當時于淳約也九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也義曰九二居下卦之中其體是兌兌者和說之謂也今旣履得其中又能和說則是樂其道而忘其憂踐其道坦坦然安于循理也幽人貞吉者幽人則樂道慎獨之人也凡人之爲禮貴本于中而行則得其爲禮之中道故周禮大司徒以六禮教萬民之中是所行之禮貴得其中也且凡人之爲禮有恭肅矜莊而過其中者有簡易惰慢而不及其中者有外能恭莊而内實不敬者有内能恭敬而外不整肅者有顯然能行中道而欺于闇室者有不欺于闇室而傲于等夷者是皆爲禮失其本而不得其中故唯此樂道慎獨之人能行之是于正道而得其吉者也六三眇能視跛能履履虎尾咥人凶武人爲于大君象曰眇能視不足以有明也跛能履不足以與行也咥人之凶位不當也武人爲于大君志剛也義曰六三位過九二不中也以隂履陽不正也過中失正則所行之禮皆不知其本始而不能免其憂逃其凶也喩如眇者之能視亦不足明其中道跛者之能履亦不足行其正道以隂而乘剛是踐履其虎之尾而見咥者也且以隂而履剛其志本暴猶若强暴之人爲于大君視所行所爲皆不中不正而至凶禍者也九四履虎尾愬愬終吉象曰愬愬終吉志行也義曰愬愬驚懼之貌也九四處上卦之初履六三之上而六三以隂居陽其志尚剛武今九四乘之是履虎尾也旣履此剛暴之上爲九四者固當愬愬恐懼則終得其吉也何則四本隂位今以陽而居之是本有謙志又近于九五之尊五以已有剛明而尚謙志委任之旣爲上之所委又能愬愬然恐懼則得其吉也故曰履虎尾愬愬終吉象曰志行也者言九四能履蹈于六三之虎尾終乃得吉而不見其咥者蓋因已本尚謙而見信任于五又能愬愬然恐懼不敢自安以是而獲其終吉則己之志得行也九五夬履貞厲象曰夬履貞厲位正當也義曰夬決也貞正也厲危也言此九五以陽居陽有剛明之德而居尊位爲臨制典禮之主也夫旣有剛明之德而又居至尊之位故能決然定典禮之是非辨制度之中正分上下之等夷齊天下之民志也夫爲禮之道本于尚謙在繫辭則曰謙以制禮是也今九五以剛爲禮之主于正道言之則危厲可知也故曰夬履貞厲象曰位正當也者言此九五旣爲制禮之主固當尚謙退爲本則得其中而吉也今乃以剛夬而爲之是于貞道有厲也故聖人于此責之言九五所處之位旣已正當則宜尚謙爲本不可用剛夬以制禮故有貞厲之道也上九視履考祥其旋元吉象曰元吉在上大有慶也義曰視瞻視也考稽考也祥禍福之兆也何謂禍福之兆蓋凡能履其禮之中正而行者則獲其福慶也不能由履之中正而行者則至于禍患也夫初九居履之初尚其質素而行之故得无咎今此上九居卦之極是禮法之已成也禮之旣成則當視瞻其所行之道而稽考其禍福也其旋元吉者言上九旣居禮法之成又能視其所行之如何故周旋反覆之間皆能獲元大之吉也象曰大有慶也者言此上九居禮之成又能視其禍福以至周旋之間皆獲元大之吉是大有其福慶之事也泰乾下坤上泰小往大來吉亨義曰按序卦云履而泰然後安故受之以泰蓋言凡人旣能行其禮典則必獲其安泰泰者安也以二體言之則乾本在上今降而下之坤本在下今升而上之是上下相交隂陽相㑹故謂之泰以人事言之君以禮下于臣臣以忠事于君君臣道交而相和同則天下皆獲其安泰也故曰泰小往大來吉亨者自内之外是往也由外入内是來也陽德剛明又主生育其道至大故稱大今下降之是大來也隂主柔弱又爲消剝故稱小今上而升之是小往也隂陽之氣旣交則萬物得其吉而亨也以人事言之則大爲君子也小爲小人也大者來居于内是君子進用于朝廷小者往而處外是小人退黜于巖野也君子旣進小人旣退則君臣之道交而上下之心和同成治于天下而天下之民皆得其吉而亨通也彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外隂内健而外順内君子而外小人君子道長小人道消也義曰天地交而萬物通者言陽氣下附隂氣上騰二氣交感萬物得其生而亨通也上下交而其志同者上君也下臣也若君以禮敬接于臣臣以忠節事于君財是上志下接下情上通上下之道交通故能行天下之大道也立天下之大治也則天下之民皆得其安泰也内陽而外隂者陽爲君子隂爲小人小人外而君子内泰之道也内健而外順者此止以君子之身而言也故君子内懐剛健之德而外示柔順之貌以此之故所以爲泰也内君子而外小人者言君子則親附而用之小人則疎遠而黜之是君子之道日以長而小人之道日以消然則聖人作易書不盡言言不盡意于此所以丁寧而言者蓋欲其在位者登君子而任用之抑小人而黜退之則天下之事无不舉萬民之業无不安是泰道畢矣故聖人所以申勸而言也象曰天地交泰后以財成天地之道輔相天地之宜以左右民義曰夫天氣下降地氣上升二氣交通而萬物得其生此天地交泰之道也后者天子諸侯之通稱也蓋天地交泰以生天下之財是以天子諸侯觀此泰卦之象阜豐其財以成就天地生育之道故作爲􅃠罟以畋以漁作爲耒耜以耘以耔用商賈以通有无作工功以便器用阜豐其財使鰥寡孤獨皆有常餼此所以成天地化育之道輔相天地所生之宜以扶助天下之民而至于安泰也初九拔茅茹以其彚征吉象曰拔茅征吉志在外也義曰乾本在上今居于下必務上進若君子將進用于朝廷以佐君澤民而興天下之泰也茹者相續之稱也彚者類也征者進也夫茅之爲物拔之則其根牽連而起若此初九之君子旣進用于朝廷則天下之賢必皆引類而進則是君子之道長之時也君子之道得長則天下之民受其賜如此則吉莫大也象曰志在外也者言初九之君子必將引類而登進者蓋其志于天下之民而進求其用所以佐君而共立天下之治興天下之泰也九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也義曰九二以剛明之德居中而上應于六五之君爲六五之所任是君子見用于時爲興泰之臣也然而天下雖泰其間不无荒穢而九二旣以剛居中則必寛𢎞廣大其心以包藏其荒垢也故曰包荒用馮河者馮河是暴猛之人也九二旣居重位柄重權爲天子之見任而能逺大其器量雖此馮河暴猛之人亦能用之何則夫良匠无棄材隨其長短大小而皆適其用況天下之廣當泰之時雖此暴猛之人亦有以用故曰用馮河不遐遺者遐遠也遺棄也言此九二之君子荒穢者包藏之暴猛者能用之是皆由其廣大寛厚之至故雖遐遠者亦不遺棄之也朋亡得尚于中行者言九二旣以剛明之德見任于六五而又廣大其量以容于物故必不親己之所親而親其朋類如此所以得尚于中道而行也象曰以光大也者言九二之君子旣得尚于中而行是其道光大而明顯也九三无平不陂无往不復艱貞无咎勿恤其孚于食有福象曰无往不復天地際也義曰此一爻聖人因天地將復之際故設爲之戒也言乾本在上坤本在下所以泰者上下交也今九三居下卦之極是天地將復之際也天地復則不交而否矣故聖人戒之曰无有平而不歸險陂无有往而不復其所者猶若无有泰極而不至衰否故當艱難而守之以正道則可以久于其泰而免其凶咎也勿恤其孚于食有福者言旣能艱守正道則不待憂恤其孚信而自然明顯故可以往而安食其福祿也象曰无往不復天地際也者言九三居乾之上是將復于上在坤之下是將復于下當天地之分際故曰天地際也六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也義曰翩翩者自上而下疾飛之貌也夫九三以陽居乾卦之極是三陽同志皆務上進也六四以隂居坤卦之初是三隂同志而皆欲下復也故此所以翩翩然與上二隂具復其本所以无有凝滯也故曰翩翩不富以其鄰不戒以孚者以用也言三隂同志皆欲下復故此六四不待富盛而自然能用其鄰不須戒備而自孚信也故曰不富以其鄰不戒以孚象曰皆失實也者實謂居處也言乾本在上今泰之時則下之坤本在下今上之是上下皆失其實也六四所以翩翩然欲將復而居下謂其失實故也中心願也者言六四不待戒備自然有孚信而下復者是衆心之所共願也六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也義曰帝乙商之賢王也歸者婦人謂嫁曰歸歸妹之爲言順也祉福也此六五乃中順之主也當此泰平之時能以文柔接于下則彖所謂上下交而其志同卽君降志而接其臣所以興泰道者也猶言帝乙賢王以女下嫁于諸侯是謙順之至也故曰帝乙歸妹以祉元吉者夫天子以女而下降于諸侯是順之之至也而在下者又能盡其分故上下皆獲其福祉而有元大之吉也故曰以祉元吉象曰中以行願也者言君治天下必欲得賢能之臣爲之委任也今六五能執謙以下于九二賢明之臣以至獲元大之吉是由其中道而素願得行也上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也義曰大凡平治之世雖教化甚盛其間不能无姦惡之人堯舜太平也未必无小人桀紂暴亂也未必无君子皆繫于其上之所爲如何耳是故古之善爲國者旣以仁義道德爲己任而安治天下又且髙其城濬其隍以爲之戒備而防天下之姦冦也何則天下雖在熙泰而姦惡之人其心未嘗安故聖人謂王公設險以守國者將使治天下者必有仁義以興治道亦須設險厄以崇備也若但有其德而不能設備則不可以保其國也若但設其險阻而无其德其國固不能以保也昔在太王居邠狄人侵之去而居岐山之下而邑焉以太王爲國非无德也然卒爲狄人之所迫者以不設備故也使太王居是時髙㴱其城池則雖夷狄之侵擾亦无能爲也又秦之始皇有天下北築長城西據崤函帶山阻河險厄萬里非无備也然二世則失天下者以不爲德故也使秦皇能以是國而脩其德以濟之則傾亡之禍无有也以此知爲國者必有其德又設其險則可以永永而守也然呉起曰在德不在險蓋一時之權言耳非萬世之大法也且五帝而下堯都于冀舜都于蒲今之河中府是也禹都于安邑湯都于亳今之河南是也周都于酆鎬今之洛京是也是皆其所都之地所處之國未有不以山河之險而守其國也聖人之戒治天下者安不忘危治不忘亂則可以永有其泰也上六處卦之極而泰道將革又不能居安而思危處治而思亂以至驕慢邪侈而不爲之戒備故有城復于隍之事也蓋言城復傾圯而无髙險之阻隍復盈滿而无㴱固之限是皆恃泰之至以及于否也故曰城復于隍也勿用師者夫泰道既極已不能自爲之備而更用軍師以攻伐于人則是不量己力而天下之人必不服從適自取滅亡之道耳故聖人又戒之言不可復用師也自邑告命貞吝者夫威賞政令行之于天下則可今上六既无所戒備又不可用師威德不足以及遠告命不能及天下但可號令于己邑之中而已此皆由恃安泰之過而不能防閑以至于此以正道言之誠足以鄙吝者也故曰自邑告命貞吝象曰其命亂也者蓋其命令紛亂不能及于天下聖人所以丁寧而言之者欲戒後之人君處天下之泰必常思危亡之事則可以常保其泰也否坤下乾上否之匪人不利君子貞大往小來義曰按序卦云物不可以終泰故受之以否否者閉塞之道也天地相交隂陽相接則萬物得其亨通而繁盛故曰泰泰者通也物不可終通故天地各復其本而隂陽不相交則萬物皆閉塞而不生此否之道也否之匪人者匪非也言天地不交萬物不生而否塞此非所謂人之常道也夫君必以至誠接于臣臣必以至忠奉于君則天下可以獲安也今否之時君臣不交而物不得其所是非人之常道也何則夫人情莫不欲安欲逸欲富欲壽否之時則不得其安不得其逸不得其富不得其壽是豈人之常道乎不利君子貞者夫否之時天地不相交君臣不相接小人見用而其道長小人之道長則䜛疾于君子爲君子者苟欲以正道而行則必爲小人之所害故韜晦道德卷懷仁義退而自處不露其正則可也大往小來者陽德至大隂德至小今否之時陽之大德往居于外隂之小德來處于内往者屈之來者伸之猶君子往屈于巖穴小人來居于朝廷則否道所以致也彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下无邦也内隂而外陽内柔而外剛内小人而外君子小人道長君子道消也義曰言否之所以非人常道而不利君子貞者由天地各復其所二氣不相交而萬物不得其亨通也上下不交而天下无邦也者上君也下臣也君不以禮敬接于臣臣不以忠節事其君禮敬忠義之情不交則君臣之道塞君臣之道塞則天下之諸侯從而亂所以邦國將至于傾覆矣内隂而外陽者内者親也外者疎也隂爲小人陽爲君子親小人而疎君子此所以成否道也内柔而外剛者此小人之體也内而柔則隂賊殘害外而剛則狠僻凌暴故語曰色厲而内荏厲嚴厲也荏柔荏也外有嚴厲之色内有柔荏之心此所以反君子之道也内小人而外君子小人道長君子道消也者由其内小人而親信之外君子而疎逺之是以小人之道日以長君子之道日以消也象曰天地不交否君子以儉德辟難不可榮以祿義曰言君子于此天地不交賢人道塞之時則當韜光遁迹以全身遠害不可與小人並立若與小人並立則必見害而召禍也故但守儉素之德不憫貧賤以避小人䜛疾之患耳如不得已而仕則不可居重位享重祿以榮其身第可全已遠害而已故君子陽陽之詩曰君子陽陽左執簧右招我由房言周之衰君子遭是時者相招爲祿仕但爲一伶官之賤職以全身遠害而已矣初六拔茅茹以其彚貞吉亨象曰拔茅貞吉志在君也義曰泰之初是君子道長之時可以進用于朝廷是以連引其類而進之故其爻辭曰拔茅茹以其彚征吉今否之初是小人道長君子不可用之時也時旣不可用則必引類而退守以正道不可求進然後得其吉而獲亨也象曰拔茅貞吉志在君也者夫君子之志未嘗不在致君澤民也雖當此否塞之時引退守正不苟務其進俟時而後動者蓋亦志在致君澤民而已六二包承小人吉大人否亨象曰大人否亨不亂羣也義曰六二居否之時小人而見用者也然而以隂居隂處得中正是于小人之中能包其柔順便佞之心以奉承于上是以小人而得小人之吉者也大人否亨者若大德大才之人則不然居是時也以其道塞而不通故能以正自守韜藏其仁義卷懐其道德不爲世俗之所變而不雜于小人之中于否之世行否之中道所以全身遠害也中庸曰國有道其言足以興國无道其黙足以容詩曰旣明且哲以保其身蓋否之時不可進用但以義而自處全身遠害而已中庸又曰素富貴行乎富貴素患難行乎患難君子无入而不自得焉是言大人君子于否之時行否之道所以亨也故曰大人否亨象曰大人否亨不亂羣也者言大人君子其時雖否然能以道自處以正自守不與小人雜是不亂其羣類也六三包羞象曰包羞位不當也義曰六二雖以小人之道用于時猶且不失其中承事其上而得其吉也今此六三位既過中履復失正小人之道愈㴱但包其羞恥苟容其身而已故曰包羞象曰包羞位不當也者蓋言六三于小人之中最爲甚者言其所處之位不當故也九四有命无咎疇離祉象曰有命无咎志行也義曰有命謂九四有命于初也疇類也離附也祉福也夫否塞之時不可有命于其人蓋小人衆多也然此九四乃有所命者以其有剛明勤儉之德所應在初耳何則初六居否之時以道不行于天下故不苟進引類而退存心在君蓋守道之君子也今九四有命焉所以爲无咎也然以君子而應君子不唯已得无咎使其疇類亦得附離于福祉也故曰有命无咎疇離祉象曰有命无咎志行也者蓋九四以正而見命于初以至同有其福祉是己之志得行也九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也義曰休息也夫以柔順之道婉遜以承其上而獲小人之吉者六二是也以剛健中正之德而履至尊之位憂天下之所宜憂泰天下之所未泰消去天下之小人而休息天下之否道者惟九五大人行之而獲吉也故曰休否大人吉其亡其亡繫于苞桑者桑之爲物其根榦皆相迫結而堅固者也苞即叢生也夫以大人之德能消天下之否而反于泰雖然且當常謂危亡之在前不敢遑安而曰其亡矣其亡矣如此之戒則社稷磐固如繫于苞桑之上而不可拔也上九傾否先否後喜象曰否終則傾何可長也義曰傾覆也圯也夫否極則泰剝極則復未濟終之于既濟此易之常道也在繫辭則曰易窮則變變則通通則久又揚子曰隂不極則陽不生亂不極則治不成皆變易之常道也今上九居卦之極則必傾去其否而反之于泰可以獲其亨通也故曰傾否先否後喜者此言否之道始則六二包承而大人否九五休否而有大人吉至此上九則否傾而之泰是先否後喜之驗也象曰否終則傾何可長也者言何可常若此之否也然聖人言之繫乎勸戒也泰之時慮其恃安而過極故九三則曰无平不陂无往不復至上六則曰城復于隍皆所以存戒之之意也今否之時又慮其躓跋而不進故九五言休否大人吉至此上九則言傾否先否後喜亦存勸之之意也此皆極言人事之道而明易之㴱㫖也同人離下乾上同人于野亨利涉大川利君子貞義曰按序卦云物不可以終否故受之以同人夫天下否塞之久人人皆欲其亨通是必君子同志以興天下之治則天下之人同心而歸之故曰同人同人于野亨者野取遐遠廣大之稱大凡君子推己之仁以及天下之人施己之義以合天下之宜廣大宏博无所不通然後得同人之道而至于亨通故曰同人于野亨利涉大川者言君子旣推仁義以同天下之心使天下之人同心而歸之无有不從則雖有大險大難亦得而濟之也故曰利涉大川利君子貞者夫君子有仁義之心忠恕之道推之于身而加乎其民故不以一己爲憂所憂者天下不以一己爲樂所樂者天下以至天下之人合心而從之是君子之正也故同人之道所利者唯君子之正者也彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子爲能通天下之志義曰柔得位得中而應乎乾者此就二五之爻釋所以得同人之名也六二以隂居隂是柔得位也居下卦之中是得中也旣中且正又應于九五之尊是得位得中而應乎乾也以人事言之則是有中正之臣而上應于乾剛之君君臣之道同則天下之人合心而歸之矣又如在上者能以剛健之德仁義之道推諸天下而在下者又以柔順中正而應之上下之心旣同是得同人之道同人曰此三字蓋羡文于義无所通同人于野亨利涉大川乾行也者言所以得于野亨而險難无不濟者由君子以勤健之德中正之道以同天下之人使天下之人同心而歸之是以乾之道而行也文明以健中正而應君子正也者此以二體明利君子之貞也下離爲文明上乾爲健以是之德則无所不濟而天下之人莫不與之同心也故曰文明以健又以六二柔順而居下卦之中九五以剛健而居上卦之中上下皆有中正之德相應故能率人之心以同天下此君子之正也唯君子爲能通天下之志者因上文明君子之正此又申說君子之道且凡人之情思慮不廣唯止一身一家而已唯君子則不然但推其仁義之道忠恕之德以及天下以天下之人莫不欲安則君子扶而不危人莫不欲壽則君子生而不傷人莫不欲富則君子厚而不困人莫不欲逸則君子節其力而不盡是皆君子盡心于已推之于人恢廣宏大无所不同故能通天下之志也象曰天與火同人君子以類族辨物義曰夫天體居上而火之性又炎上是得同人之象也君子法此象于是類其族辨其物族即族黨也物即物性也言其分别族黨使各以其類明辨其物性使各得其所善者同于善不善者同于不善君子則與君子同道小人則與小人同道是類别天下使各得其同也初九同人于門无咎象曰出門同人又誰咎也義曰門者亦言其遐遠廣大也咎者怨咎也夫廣遠寛大无所不同是同人之道也今初九以文明之性履同人之始是其用心廣大无所偏私出于門則與人同也夫出而與人同則人亦同心歸之又何有怨咎者乎六二同人于宗吝象曰同人于宗吝道也義曰宗主也吝鄙也夫不以己之親疎不以己之憎愛則盡同人之道矣今六二不能遠大其志廣與人同而反私心偏意上係于九五之主是其道褊狹誠可以鄙吝者也九三伏戎于莽升其髙陵三嵗不興象曰伏戎于莽敵剛也三嵗不興安行也義曰戎兵也莽林莽也陵丘陵也興起也夫六二以中正之道上應于九五中正之君君臣上下各以正道相應而九三以陽居陽志好强暴不量己力輒欲私貪六二之應而奪之是以伏其兵戎于林莽之中然而以不正險陂之行加于人故不敢顯然興其兵戎但伏于林莽之中又且恐懼而不敢進故升其髙陵以望之也三嵗不興者夫以不正之道而欲犯于至正之人其勢必不克勝故至于三年之間亦不能興起也象曰伏戎于莽敵剛也者言其以不正之道欲妄攻奪是其志不懼九五之剛而輒欲敵之也三嵗不興安行也者以不正之小人而欲敵大正之君子其勢自然不能勝雖竆三嵗之間安能行之哉九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也義曰墉謂乘九三之墉也克能勝之辭也九三不量己力志尚剛暴欲謀奪九五之偶已爲大非故伏其兵戎于林莽之中今九四位乘于九三之上亦欲因其九三之勢乘陵而奪取六二以義言之是必不克勝也然得吉者蓋已旣不能克勝故因其勢之困弱而反守于法則故得免咎而獲吉也象曰其吉則困而反則也者言九四旣因其困弱而反守法則是改過之人也故左傳曰人誰无過過而能改善莫大焉此九四所以獲吉也九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也義曰九五與六二之爻下以文明上以剛健各恃中正以相應而欲同心同力共治于天下然而物有間于己而不得相遇者蓋以九三伏戎于莽九四又乘其墉皆奪己之應故已乃用太師以攻伐而克之是先號咷也旣攻伐而克之然後得與六二相遇而同心同力以共成天下之治是後有笑也故曰同人先號咷而後笑大師克相遇象曰同人之先以中直也者言九五始以九三九四爲孽于其間而不得與六二相應然一舉其師則克之者蓋由己以大中之道至直之德而往伐之故无有不勝也上九同人于郊无悔象曰同人于郊志未得也義曰郊者國城之外曠遠之地也夫同人之道貴其无所不同則可以立功立事也今上九居同人之極而處于遐曠之地志无所同但可以免其悔吝而已若其欲立功立事于天下則其志未有所得故象曰志未得也大有乾下離上大有元亨義曰按序卦云與人同者物必歸焉故受之以大有蓋言君子推仁義之心以及于人行忠恕之道以同于物則天下之人皆同心而歸是大有于天下也然則大有者大有于衆也雜卦言大有衆者是也元亨者元大也亨通也夫大有于天下之衆苟不以天地元大之德治于天下則不能致其亨通也故大有之世必以元大之德亨通于天下故曰元亨彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨義曰此就六五一爻以釋卦名也夫六五以柔順之質居至尊之位以大中之道行于天下使天下之人无過无不及而盡合于中故天下之人皆來應之也以卦體言之則是六五獨以柔順文明用其大中而上下五陽他无所従故皆來應之也推之人事則是聖人在位得柔順之中道而逺近无不應之是大有天下之民也其德剛健而文明應乎天而時行是以元亨者此就二體而釋所以得元亨之義也乾在下爲剛健離在上爲文明剛健則能幹濟于事文明則能照察于物其德既剛健而文明則能應順乎天時而行也夫天以春而生成萬物聖人以仁而愛育之天以秋而肅殺萬物聖人以刑罰而懲勵之是聖人所爲皆順于天以時而行也既以剛健文明之德又上順于天時而行是以獲其元亨也象曰火在天上大有君子以遏惡揚善順天休命義曰夫火性本明天體居上今火在天之上至明而无所不燭是大有之象也君子法此以大有天下之衆則當遏絶其惡而揚舉其善何則大凡天下所以不明者由其惡不去也聖人在位則遏絶之若惡之大者則誅擊之惡之小者則刑戮之如此則天下之爲惡者知懼也天下之所以不知者由其賢善之人不用也聖人在上則揚舉之若大賢則置之大位小賢則置之小位如此則天下之賢者知勸也順天休命者休美也夫福善禍淫天之命也聖人在上惡者遏之善者揚之是能承順天休美之命也初九无交害匪咎艱則无咎象曰大有初九无交害也義曰交害者相交以利害者也大凡以親而交于人則必有疎之者矣以喜而交于人則必有怒之者矣以利而交于人則必有害之者矣唯君子爲能用心廣大故无意于交也今初九居大有之始處卦之下是无心于物者也旣无心于物則所尚遠大不交于有害者也匪咎者言初九之所以无心于物而不交于害豈凶咎之道耶然雖非凶咎之道又當艱難其志終久而不變則庶可以全得无咎也九二大車以載有攸往无咎象曰大車以載積中不敗也義曰九二以剛明勤健之才當大有之時履得中道應于六五是其中正之臣而可當其重任者也猶若大車之持載雖甚任重而不至傾敗者也有攸往无咎者夫君子懐才抱道患不得其位旣得其位患不得其君所謂得君者何若己言則君聴之己諫則君從之已有所興爲則君順之是也今二以剛明中正之才爲六五之所委任故所行所往无不利也所往旣利則凶咎何由而至哉故曰有攸往无咎象曰積中不敗也者言君子有剛健之才德積畜于内雖授之大位任之重權而无有墮廢之事是猶大車之持載積于其中而无有傾敗也九三公用亨于天子小人弗克象曰公用亨于天子小人害也義曰此一爻處大有之時以陽居陽當下卦之極爲衆陽之長是尊極之臣在三公之任者也然當此至重之位以君子則用可享于天子而行天下之大道立天下之大位也以小人處之則不能克勝其任以至壊敗王事而爲害于時也故曰公用享于天子小人弗克九四匪其彭无咎象曰匪其彭无咎明辨晳也義曰彭謂九三也匪其彭者是不有奉九三之心也九四以陽居隂當上卦之下履失其正而上近六五之君下比九三之臣處于君臣之間若行不正則咎莫大焉且九三位爲三公有權之臣也四柔順屈節以趨附之是行乎非正之道而必有非常之咎也固當常有不奉三之心則得其无咎矣象曰匪其彭无咎明辨晳也者凡知人曰晳此所以匪其彭者由九四能明察其善惡辨别其事宜知九三之不可趨附之而不附故獲无咎六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而无備也義曰孚由中之信也交謂上下之道相交也六五居大有之時以柔順而處至尊之位是執柔示信以接于物故上下皆歸向之也夫己以由中之信接于人人亦以由中之信奉于己上下交相親信故曰厥孚交如威如吉者言既以由中之信及于天下天下皆親信之則是威德並行而獲其吉也故不賞而民勸不怒而民威于鈇鉞是也象曰厥孚交如信以發志也者言發己之信以及天下之信已能如是則天下有信无信之人皆發其誠志以交應之也威如之吉易而无備也者易平易也備戒備也言已既有孚信交于人又有威德以及于天下賞一賢而天下之賢知勸罰一罪而天下之罪知懼有此威德之著故天下皆平易而无所戒備也上九自天祐之吉无不利象曰大有上吉自天祐也義曰按繫辭云天之所助者順也人之所助者信也履信思乎順又以尚賢是以自天祐之吉无不利也此言餘爻皆履剛而上九獨乘六五之柔是思順也六五有孚信而已履之是履信也又以剛而居上處无位之地是能崇尚于賢者旣能思乎柔順之道履乎孚信之德又以尚賢如此則自天而下无有不助之者又何不利之有謙艮下坤上謙亨君子有終義曰按序卦云有大者不可以盈故受之以謙謙者卑退而不自驕盈之謂也以二體言之則艮下剛而止也坤上柔而順也大凡内剛止而外不柔順則失于亢外柔順而内不剛止則近于佞剛也柔也内外相稱此盡其所以爲謙之道也旣盡其謙則是无不濟而亨通也君子有終者終謂終身踐履而不變也夫用謙之道貴在久而行之若夫小人亦有時而用謙但不能終久由之故朝行而夕或改矣唯君子則能先明其性平其心發之于外則皆恭敬之道故有庸言之信庸行之謹終身而行之无有改也彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也義曰謙亨天道下濟而光明地道卑而上行者此釋所以得謙亨之道也夫天體雖髙以其能降下其氣而生萬物是得其謙而道益光明也地以其卑故其氣得以上升相濟以成萬物夫天氣下降地氣上升二氣相交而能生成萬物是得謙亨之義也以天地至大尚以謙而後亨況于人乎天道虧盈而益謙者此以下廣言謙之義也虧損也益增也夫天之爲道盈滿者虧損之謙順者増益之至如日中則昃月盈則蝕皆其類也地道變盈而流謙者變變易也流流布也至如水旣盈滿則必決泄而虧散之其卑下者則流布而增盈之此其類也鬼神害盈而福謙者害謂禍害之也福謂福慶之也鬼神者天地之用也有盈滿者則從而禍害之有謙損者則從而福慶之人道惡盈而好謙者人之爲道有驕淫者衆共惡之有謙退者衆共好之以天地鬼神之爲道或虧變禍害其盈者而益流福慶其謙者其在于人者可知矣謙尊而光者以尊上而言之若天子諸侯及爲人父爲人兄凡在人上者苟能好謙則其德愈尊而光大矣卑而不可踰者卑者以爵言之士也以人言之庶民也及爲子爲弟凡在人下者若能益尚謙退則雖在卑下亦衆人所不能踰越也君子之終也者言上之所行終身由之而不變者唯君子爲能然也此聖人舉之以結上文耳象曰地中有山謙君子以裒多益寡稱物平施義曰山體本髙地體本卑今山居地之中是抑髙舉下之義而得謙之象也君子假借其象言物有多者減而裒聚之少者增益之稱其物之多少而均平其施與是亦抑髙舉下之義也初六謙謙君子用渉大川吉象曰謙謙君子卑以自牧也義曰初六以謙巽而居一卦之下是其謙而又謙者也夫謙謙之道小人所不能爲唯君子則能行之故曰謙謙君子用渉大川吉者夫君子持身卑退恭敬之心發于内則謙謙之道形于外故衆心皆歸而萬民皆服民衆旣歸則雖有大險大難用是而渉之无有不濟況于平易常處之時獲其吉也可知矣象曰謙謙君子卑以自牧也者牧養也守也言大人君子所以謙而又謙者蓋内明其性外篤其敬以卑而自守故也六二鳴謙貞吉象曰鳴謙貞吉中心得也義曰鳴者聲聞流傳于外也夫六二居卦之中以隂居隂是君子履中居正積柔順而行其謙故聲聞流于人也貞吉者言六二以謙退之聲聞于人是得正道之吉也象曰鳴謙貞吉中心得也者此言君子所作所爲皆得諸心然後發之于外則无不中于道也故此謙謙皆由中心得之以至于聲聞流傳于人而獲至正之吉也九三勞謙君子有終吉象曰勞謙君子萬民服也義曰勞謙者言勤勞于謙也九三以陽居陽爲下卦之長衆隂所歸而其位至重故上則謙以奉于君下則謙以治于民勤勤不已无有厭斁之心是謂勞謙者也君子有終者言君子唯以行道爲己樂不以用謙爲己勞故終身行之而不變所以得其吉也象曰勞謙君子萬民服也者言君子之人勤勞而行謙則爲萬民之所服而衆心之所歸且凡人能謙者天地鬼神尚且祐助而福慶之則民之服従也可知矣六四无不利撝謙象曰无不利撝謙不違則也義曰撝謂指揮之間皆謙也夫大有之四處君臣之間故聖人戒之言匪其彭然後得无咎以其以陽而居隂也此謙之四亦在君臣之間乃言无不利撝謙者以其以隂居隂履得其正故也何則凡朝廷之間必得正人端士以贊佐其君則爲治于天下无所不利也今六四以至柔之質而居柔位是至正之人也以至正之人而上近于六五之君下比于九三之臣而盡謙巽之道以承接之故進退俯仰以至指揮之間皆得用謙之道而无有不利也象曰无不利撝謙不違則也者言六四所以然者由履于正位不違逆其法則也六五不富以其鄰利用侵伐无不利象曰利用侵伐征不服也義曰以用也六五以柔順居至尊之位是能執柔以治人居謙以遇物故不待富盛而能用其鄰也以天子言之則能用其四夷與天下諸侯以諸侯言之則能用其鄰國也利用侵伐无不利者言六五以柔德化治天下而能用其鄰當此之時苟有不庭不軌之人則是不率仁人之教而天下共棄之人乘天下共棄之心而伐之无所不利夫堯舜以至仁率天下然尚有三苗之征則其他可知矣但聖人在上有叛逆之人則衆所共怒也以至仁而侵伐之无有不利也然先聖于此特言侵伐者蓋有意于勸耳何則夫人君之治天下必恩威兼用然後可濟今當謙之時不可純用于謙其有不庭不軌必以侵伐而克之也上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也義曰上六居上卦之極謙道已得而處于无位然本以其行謙故亦有聲名流傳于外故曰鳴謙利用行師征邑國者言上六雖行謙而聲名既著矣然而居无位之地无功實之效故但可行師征己之邑國而已是其功未能及遠不若六五之用侵伐而无所不利也象曰鳴謙志未得也者按六二亦言鳴謙而象曰中心得也此言志未得者蓋六二當人臣之位居中履正以此而行謙故得吉也今上六雖有謙巽之聲聞于外然居无位之地雖欲立功立事于天下其志未有所得也周易口義卷三
