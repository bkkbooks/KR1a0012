body:
  text: 周易口義宋胡瑗撰説卦義曰夫周易説卦者此是孔子第八翼也以其伏羲畫八卦之後文王重為六十四復作爻彖之辭以明卦爻之義然其理或有未盡之事孔子又作此説卦以陳説諸卦之情偽爻彖之義理故謂之説卦昔者聖人之作易也幽賛於神明而生蓍義曰言昔者聖人之作為大易之道以盡天地之理人事之要又通明賛助於鬼神以生用蓍之法然後揲蓍以求其萬物之數者也參天兩地而倚數義曰言聖人既畫成八卦作為大易上準擬於天地下幽賛於神明是以生其用蓍之法以揲求天地之數是以參天兩地而倚數者因其天地生成之數以分隂陽竒偶之數也生數則以一三為天之生數二四為地之生數因其天地之生數又有七九八六之數以為天地之成數然後分天地竒偶老隂老陽少隂少陽之數自此而立矣觀變於隂陽而立卦義曰言聖人因其天地生成之數分其竒偶之象是以觀其竒偶之數隂陽變動之理而立成一卦者也發揮於剛柔而生爻義曰言聖人既能參天兩地而倚數又觀隂陽之變動而立成一卦又察其變化之道得失之理發越揮散剛柔之體互相資取而生於六爻也和順於道徳而理於義義曰言八卦之位大易之道上以通於天地下又和合參順聖人之道徳又窮極萬物之象人事之義理以成變化之道者也窮理盡性以至於命義曰言大易之道爻象之設上既通於天地下又賛於鬼神又發揮剛柔之體而分其爻又和順聖人之道徳而理於義又窮極萬物之理以盡萬物之性以至于命者也命者則謂長短凶折夭亾之類是也然則大易之道皆能盡萬物之性又能盡人之性者蓋性者皆天所禀受之善性者也若能守己之性不陷於邪佞則其命可以知矣若人不能守己之性而放僻邪侈无所不至則其命不能固矣是故大易之道爻象之間有變有動皆所以盡人之性命者使人觀之則趨吉背凶向善改惡也昔者聖人之作易也將以順性命之理義曰自此已下至六位而成章為一章以明卦爻之意也言古者聖人所以畫為八卦作為大易者蓋以上順天地之命下順萬物之性既能順天地萬物生成之性命則其言吉凶之道情偽之理无不備載於其間也是以立天之道曰隂與陽立地之道曰柔與剛義曰言大易之道既以盡天地萬物生成之性命是以立天之道曰隂與陽其地能承受天之氣而生成萬物是以立地之道曰柔與剛言其天地隂陽剛柔二氣上下交感而成剛柔之理也立人之道曰仁與義義曰天地既立則人生於其間人既生於其問則立仁義之道以本於人仁者博愛之謂仁也義者行而宜之合於道則謂義又因其人而立仁義之道以生成於天下也兼三才而兩之故易六畫而成卦義曰言伏羲既畫八卦之後但以三爻為一卦故上一爻以象天中一爻以象人下一爻以象地以盡三才之道後世聖人因而兼之重其三才之道兼而兩之以六畫而成一卦故上二爻以象天中二爻以象人下二爻以象地六爻既備以成一卦之理分隂分陽迭用柔剛故易六位而成章義曰既以六畫而成卦又以一三五為陽位二四六為隂位分為隂陽之道隂則為柔陽則為剛因其六爻之位分其隂陽之象用其剛柔之理交相錯雜或升或降故此大易之道六爻之間上下變動而成其文章者也天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆義曰此一章言伏羲畫卦之始始因天地定位之後作為八卦故因天地之道畫為乾坤之象取山之象為艮澤之象為兌雷之象為震風之象為巽水之象為坎火之象為離因天地定位之後取此山澤雷風水火之象畫為八卦以盡萬物之理萬事之情後世聖人觀其天地生成之體又艮有止静之徳澤有潤物之性山澤之象其氣可以相通又因雷之能震動萬物風之能發生萬物又取雷風之象能相擊搏以生萬物又觀水火之性不相資射言水之性其性濕而潤下火之性其性燥而炎上因其水火之性不相資射以成八卦之象互相變動互相錯雜以推測其物理以稽考其人之情偽分其竒偶之數人之過去未來之事若數其已往之事則以順而數之言其易知也若數其未來之事則以逆而數之言其難知也是故聖人因此大易之象逆人之吉凶之兆皆以逆數之術以前萬民之用使人知其吉而背其凶也是故易逆數也義曰言此大易之道八卦之理交相錯雜以盡吉凶然而皆逆知來事以前萬民之用也雷以動之義曰此一節總明八卦養物之功也風以散之義曰言雷能鼓動萬物風能散育萬物也雨以潤之義曰潤滋也萬物之生非雨而不潤也日以晅之義曰既雨以潤之又日以乾晅之艮以止之義曰艮以止静之徳止於萬物而不使過其分也兌以説之義曰兌能和説萬物使之成就也乾以君之義曰乾以剛健君臨於物也坤以藏之義曰坤以柔順能含藏於物也此八卦交相錯雜然後能成於物也帝出乎震齊乎巽相見乎離致役乎坤説言乎兌戰乎乾勞乎坎成言乎艮義曰帝者生物之宗以尊而言之則謂之帝此復言八卦之用也言帝之始生萬物必自震而始潔齊萬物則在乎巽令萬物相見而繁盛必在乎離致役萬物則在乎坤和説萬物必在乎兌隂陽相戰必在乎乾受賜萬物則在乎坎能成萬物則在乎艮者也萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聴天下嚮明而治蓋取諸此也義曰言萬物出乎震震東方者以震是東方之卦斗杓指東為春主生故萬物皆由震而出也齊乎巽者以巽是東南之卦斗杓指東南之時萬物潔齊而不相瀆亂也離者明也以離是南方之卦萬物盛大必假離而臨照之故萬物相見必自離而後可明也然而聖人之治天下必法此離為日之象以明天下之事取其明无所不矚之義也坤也者地也萬物皆致養焉故曰致役乎坤兌正秋也萬物之所説也故曰説言乎兌戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮義曰坤者地也以地能生養萬物是有勞役之事故曰致役乎坤兌者説也萬物説兌必在於秋故兌為正秋之卦也然不言方而言秋者以兌説萬物非止於一方故言秋也戰乎乾者以乾是純陽之卦主於西北西是隂地而乾居之是有隂陽相薄之義故曰戰乎乾坎者水也北方之卦也上下皆坎有水之象焉水行不舍晝夜所以為勞萬物之生非水而不滋益故曰萬物之所歸也艮者東北之卦也萬物之所成終萬品之所成始皆由艮以本之其位在丑寅故曰東北之卦也神也者妙萬物而為言者也義曰此已下一節明八卦生成之用也言八卦運動交相錯雜以妙萬物然而求其真宰之用无有逺近不知所以然而然是其用如神也然則謂之神者以其无形无状人之所不見者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也義曰動者鼓動也言鼓動萬物莫疾乎雷震者雷之象故不言震而言雷也撓散萬物者莫疾乎風風者巽之象乾燥萬物莫熯乎火火者離之象也兌説萬物莫説乎澤兌者澤之象也滋潤萬物莫潤乎水水者坎之象也終始萬物者莫盛乎艮艮者止之象也水火之性雖不相入然而相逮有相資之理雷風相薄而不相悖逆山澤相懸而能通氣夫如是然後能成變化之道生成之理也然則艮不言山而言艮者以其動撓燥潤之功是雷風水火之性至於終始萬物之義於山為㣲故言艮而不言山也然而雷風相薄而不言相逆者蓋雷風若相悖逆則生物之理息故言相薄而不言悖逆也乾健也坤順也震動也巽入也坎陷也離麗也艮止也兌説也義曰此一節説八卦名訓也乾象天運行不息故為健坤象地能承順事故為順震象雷能奮動萬物故為動巽象風无所不入故為入坎象水水居險陷故為陷離象火能著於物故為麗艮象山山有止静之徳故為止兌象澤能澤潤萬物故為説也乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兌為羊義曰此一節説八卦畜獸之象也所謂逺取諸物者此也乾為馬健速之物也坤為牛至順能任重也震為龍潛動而變於隂也巽為雞體多陽輕舉之物主於下也坎為豕豕主汚濕故為豕也離為雉有文章也艮為狗狗能善守禁止外人故為狗兌為羊外柔而不害物也乾為首坤為腹震為足巽為股坎為耳離為目艮為手兌為口義曰此一節説八卦人身之象也所謂近取諸身者此也乾尊在上故為首坤能包容萬物故為腹震動在下故為足巽順於人故為股坎陽明在内故為耳離陽明在外故為目艮能止静其物故為手兌能和説於人故為口乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女義曰此一節明乾坤六子父母之道也索者求也乾為天父之道也坤為地母之道也二氣相求勝而男女生也得父氣者為男得母氣者為女乾初求於坤而得長男曰震乾生於坤也坤之初求於乾而得長女曰巽坤生於乾也乾之再配於坤得中男曰坎坤再配於乾得中女曰離乾三配於坤得少男曰艮坤三配於乾得少女曰兌二氣相推八卦著矣男女之道備矣天下之情見矣乾為天為圜為君為父為玉為金為寒為冰為大赤為良馬為老馬為瘠馬為駁馬為木果義曰此已下廣明卦象之義也乾為天者此廣明乾之象也乾為天剛健不息萬物之宗也為圜周萬物也為君為父有尊嚴之道也為金為玉性堅剛也為寒為冰氣凝嚴也為大赤老陽之色也為良馬行健也為老馬行健之久也為瘠馬无其膚其骨堅也為駁馬堅猛之至也為木果老而為實生之本也坤為地為母為布為釜為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黒義曰此一節明坤之象也坤為地能生育萬物故為母為布取其廣載也為釡取其化生成熟也為吝嗇取其生物不移也為均取其均平也為子母牛取其生育之順也為大輿取其能載萬物也為文取其色雜也為衆取其載物不一也為柄取其生物之本也其於地也為黒取其極隂之色也震為雷為龍為𤣥黄為旉為大塗為長子為決躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮義曰此一節廣明震之象也為雷能震於物也為龍隂中之畜也為𤣥黄取其蒼雜之色也為旉取其敷布而生也為大塗取其剛動而上柔萬物之出也為長子以其為初求也為決躁以其剛性之甚也為蒼筤竹取其堅貞而上虛也為萑葦以其類而列也其於馬也為善鳴取其象雷聲之逺聞也為馵足取其剛在下也為作足取其一動也為的顙取其陽下應於上也其於稼也為反生取其反甲而出也其究為健取其剛行也為蕃鮮取其蕃育之盛也巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其於人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦義曰此一節廣明巽之象也為木取其可揉而順也為風取其陽在上也為長女取其初求也為繩直取其齊一也為工取其能揉物為器也為白取其能潔於物也為長取其風行之逺也為髙取其風性髙逺也為進退取其隨物之上下也為不果取其能樂於物也為廣顙取其有容也為多白眼取其色多白也為近利取其躁人之情多近利也市三倍取其生物之盛也為躁卦取勢躁急也坎為水為溝瀆為隠伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄為曳其於輿也為多眚為通為月為盜其於木也為堅多心義曰此一節廣明坎象也為水取其北方也為溝瀆取其水行无不通也為隠伏取其水行地中也為矯輮取其曲直得所也為弓輪取其激矢運行其於人為加憂取其險難也為心病取剛在中也為耳痛取其主聴也為血卦取其水行地中也為赤取其血色也其於馬也為美脊取其陽在中也為亟心取其急也為下首取其水流向下也為薄蹄取其水流行也為曳取其行地也其於輿也為多眚取其重載也為通取其水行也為月取其水之明也為盜取其潛行也其於木也為堅多心取其剛在内也離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鼈為蟹為蠃為蚌為龜其於木也為科上槁義曰此一節廣明離之象也為火取南方也為日取火精也為電取有明也為中女取再求也為甲胄取剛在外也為戈兵取外剛利也其於人也為大腹取其隂在内也為乾卦取其日所烜也為鼈為蟹為蠃為蚌為龜皆取剛在外也其於木也為科上槁取其隂在中而空也艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其於木也為堅多節義曰此一節廣明艮之象也為山取其静而不動也為徑路取其可上而行中也為小石取其陽堅也為門闕取其止出入也為果蓏取其陽在上也為閽寺取其禁止也為止取其止物也為狗為鼠取其止人也為黔喙之屬取其剛喙而能喙物也其於木也為堅多節取其陽生也兌為澤為少女為巫為口舌為毁折為附決其於地也為剛鹵為妾為羊義曰此一節廣明兌之象也為澤取潤下也為少女取三索也為巫取其順也為口舌取其能口説人也為毁折取其缺於上也為附決取柔附上非所麗也其於地也為剛鹵取其下堅而上潤也為妾取其少女也為羊取其中壯而外順也序卦義曰夫序卦者所以序説六十四卦之義也按文王既繇六十四卦分為上下二篇其先後之次其理未見在於常常之人故難曉矣孔子就上下二篇各序其相次之義以序説六十四卦之本因以發明大易之淵藴故謂之序卦自乾坤而下至於既濟未濟皆言相受之理也有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也義曰夫乾卦是伏羲所畫八純之卦乾者天之用也生成之祖宗也萬物之生必自乾而始故乾為六十四卦之首也然而獨陽不生獨隂不成陽不得隂不能成生物之道天不降地无以為育物之理故有天然後有地地者載萬物之本也坤者地之用也坤能順承於天以生成萬品之物故以坤次於乾也故乾坤者天地之用萬事之本始者也然天地之生萬物必須屯難然後成也故草木之生莩甲之時必先屯難而後至於盛大盈滿於天地之間也故屯卦所以次於乾坤也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之稺也物稺不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履義曰夫物既屯難而生未至於盛大故必蒙然而盤屈盤屈不已然後盛大故以蒙卦次於屯也然物生蒙昧若不滋潤之以成生養之道則不能成也故以需卦次於蒙也然而需者養也飲食之道也飲食之道養而不已必有其争訟之事故以訟卦次於需也然而争訟不已物情乖離必有行師用兵之事故以師卦次於訟也行師不已必須親比故以比卦次於師也然而親比之道貴於得正既得其正必有所畜故以小畜次於比也物既畜聚必須合禮故以履卦次於小畜也履而泰然後安故受之以泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人義曰能行禮者其身必安故以泰卦次於履也安之既久必有其否故以否卦次於泰卦也然而否之既久其道必亨必須和同故以同人之卦次于否卦也與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫義曰既與人同衆物必歸必須大有其衆故以大有次於同人也既大有其衆不可剛暴必須謙順故以謙卦次於大有也然而既大有天下之衆又能謙順則人必悦豫而隨之故以豫卦次於謙也豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨義曰天下既悦豫則人樂然而隨之故以隨卦次於豫也然而以喜隨人久而必極必敗於成事故以蠱卦次於隨卦也事既已久敗必須有才徳之人以臨治之故以臨卦次於蠱也臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑義曰臨人之道必在中正中正必有可觀故以觀卦次於臨也觀民之道必以徳化徳化既行必須去其剛梗之物故以噬嗑次於觀也嗑者合也物不可以苟合而已故受之以賁賁者飾也義曰物既相合必須脩飾於外故以賁卦次於噬嗑也致飾然後亨則盡矣故受之以剝義曰物既文飾久而必敝故以剝卦次於賁也剝者剥也物不可以終盡剥窮上反下故受之以復復則不妄矣故受之以无妄有无妄然後可畜故受之以大畜物畜然後可養故受之以頤頤者養也不養則不可動故受之以大過義曰物不可終剥必復其性故以復卦次於剝也既復其性必有由中之信以行於己故以无妄次於復也物既无妄必有可畜故以大畜次於无妄也物既大畜必有所養之道故以頤卦次於大畜也養之必以其道苟失其節必致於大過故以大過次於頤卦也物不可以終過故受之以坎坎者陷也義曰物既大過必至險陷故以坎卦次於大過也陷必有所麗故受之以離離者麗也義曰險難既久必須明徳之人以治之故以離卦次於坎也自此以上凡三十卦為上經統言天地之道故以坎離而終之其實三才之道皆備矣蓋咸恒首明人事夫子以丁寧而説之後人以簡編重大而分之也有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯義曰自此以下凡三十四卦咸恒首明夫婦之道人倫之本故為下經之首也有天地然後有萬物者此廣明夫婦之道必自隂陽為本始也夫天地交錯而生萬物而有男女男女既成則有夫婦夫婦既正則有父子父子既立則有君臣君臣既正則有上下既有上下則禮義之道有所注錯此正天下治邦國人倫之大本也夫婦之道不可以不久也故受之以恒恒者久也物不可以久居其所故受之以遯遯者退也義曰夫咸者感也艮體在下兌體在上艮為少男兌為少女以少男下於少女以成夫婦之道以成咸感之象此萬世不易之法也然而咸道貴速故以二少而言之夫婦之道不可不久以須常久然後可以成室家之道也故以恒卦次於咸也物既常久必至退遯故以遯卦次於恒也物不可以終遯故受之以大壯義曰物不可以終遯而退處之必須用剛壯之道以出其所處也不動則不能出故以大壯次於遯也物不可以終壯故受之以晉晉者進也義曰物既大壯動而出乎遯必須進之故以晉卦次於大壯也進必有所傷故受之以明夷義曰物不可以久進進之不已必為人之所不與人既不與必有所傷故以明夷卦次於晉也夷者傷也傷於外者必反其家故受之以家人義曰傷於外者必反於家故以家人之卦次於明夷也家道窮必乖故受之以睽義曰夫治家之道必須嚴正然後无咎苟失嚴正則其道必乖故以睽卦次於家人也睽者乖也乖必有難故受之以蹇義曰物既乖離必成蹇難之事故以蹇卦次於睽也蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益益而不已必決故受之以夬義曰物不可以久難必須解而散之故以解卦次於蹇也解人之難必有所損故以損卦次於解也損之不已必須益之故以益卦次於損也益之不已必須決去之故以夬卦次於益也夬者決也決必有所遇故受之以姤義曰剛決之道必須以正既以正而決之則君子有所喜遇也故以姤卦次於夬也姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革義曰君子既有所遇則萬物莫不萃聚之故以萃卦次於姤也既萃之上必須升進故以升卦次於萃也升而不已其道必困故以困卦次於升也升之既久必反於下故以井卦次於困也井道既得其所不可不革治之故以革卦次於井也革物者莫若鼎故受之以鼎義曰革之必得其道有鼎新之義焉故以鼎卦次於革也主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而无所容故受之以巽義曰物既鼎新凡所主者莫非長子故以震卦次於鼎也物不可以終動動必有所止故以艮卦次於震也止物必有所漸故以漸卦次於艮也漸必有所歸故以歸妹次於漸也物既歸之可以致天下於豐大故以豐卦次於歸妹也時既豐大或有所過失而為旅故以旅卦次於豐也既居為旅不可以剛强必須巽順故以巽卦次於旅也巽者入也入而後説之故受之以兌兌者説也説而後散之故受之以渙義曰人既巽順物亦和説故以兌卦次於巽也説之既久不可偏係必須散之故以渙卦次於兌也渙者離也義曰物既渙散必致於乖離也物不可以終離故受之以節義曰物不可以終離必須有止節之道也故以節卦次於渙也節而信之故受之以中孚義曰為節之道必須由中之信以符合之故以中孚次於節也有其信者必行之故受之以小過義曰孚信之道或失其正或過越其事必須小有所過故以小過之卦次於中孚也有過物者必濟故受之以既濟義曰事既過越凡矯過者必附人而行之既附人而行之則有所濟故以既濟之卦次於小過也物不可窮也故受之以未濟終焉義曰物既得所濟或居安不能慮危故以未濟之卦次於既濟也然觀六十四卦始於乾坤終於未濟者以其乾坤是生成之宗故為六十四卦之首也必以未濟而終之者以其常人之性多失成事或居安不能慮危居存不能思亡以至自取其咎故以未濟而終之也此聖人垂教之深㫖也雜卦義曰夫周易所以言雜卦者葢孔子取其六十四卦之中人所常行之事交相錯雜以陳其義也以其事无常定物无常體可以施則施之可以止則止之故揉雜諸卦之義以為行事之本故謂之雜卦也此十翼之中第十翼也乾剛坤柔比樂師憂義曰夫乾用剛健必以柔順而資之故曰乾剛坤柔夫親比之道貴於和順和順則人心樂樂得其道則正樂失其道則憂必致於行師動衆也臨觀之義或與或求義曰夫防民之道貴於中正既中且正則可以風化於天下既可以風化於天下則為下之所相與或為下之來求也屯見而不失其居義曰夫屯難之世是君子經綸之時必須利建侯以安天下使天下之人皆安其居不失其所此則是君子治屯之事也蒙雜而著義曰夫蒙昧之人未知所著必求賢者以發明之然而既得賢者以發明之則无所錯雜而自然著見也震起也艮止也損益盛衰之始也義曰震東北之卦能起生萬物也艮有止静之徳故為止損益之道與時偕行可損則損之可益則益之故曰盛衰之始也大畜時也義曰夫物既无妄天下之人所共信故為大畜之時也然大畜其道必須以正然後畜其物也是因其時而畜之也无妄災也義曰夫无妄之時天下之所共信人心之所樂與若以不信之人厠於其間則自取其災也萃聚而升不來也義曰夫萃聚之時天下之所和洽也故能聚聚之不已其道必上進可也若進不由其道則凶進得其道不還可也謙輕而豫怠也義曰夫謙恭之道不自尊大是謙輕也然而為逸豫之道又自怠也噬嗑食也賁无色也義曰夫雷電相合如口頤之中嚙去其剛梗之物也故言食也夫山火之賁貴其文飾但合於中而已不在煩多之色是无所定也兌見而巽伏也義曰夫為兌説之道必貴其顯見顯見於外合於正則吉也夫巽順之道貴其卑伏若不能卑伏則非為行巽之道也隨无故也蠱則飭也義曰夫隨時之義不在於有故可行則行之可止則止之故云无故也夫蠱敗之事必須整飭之然後事有濟也剝爛也復反也晉晝也明夷誅也義曰夫五隂一陽小人剝君子之象也衆隂消萬物之義也故云爛夫五隂在上一陽在下是陽氣反復之時也夫晉者日出地上為陽陽為晝故曰晝也夫明入地中明有所傷必有誅傷之事井通而困相遇也義曰夫井以濟人為徳故曰通也夫物既久困必須所遇有賢徳之人以出之也咸速也義曰夫夫婦之道貴於得正兌為少女艮為少男以少男下於少女是貴速也故有咸之象也恒久也渙離也節止也解緩也蹇難也睽外也義曰夫婦之道貴於長久故曰久也渙散之久物必乖離也物不可以久離必須節止之解緩者言天下蹇難解而緩散之蹇者山上有水故曰難也睽者乖也物既乖離必居於外也家人内也否泰反其類也大壯則止遯則退也義曰夫家人之道必處於内也夫天氣下降地氣上騰泰之象也天氣在上地氣在下否之象也是否泰二卦反其類也雷在天上大壯之道物不可終壯則必止遯之乃可也大有衆也同人親也革去故也鼎取新也小過過也中孚信也義曰夫火在天上明有所矚故可大有天下之衆也與人同者必親也革去其故舊者也鼎有自新之義也小過者人情小有過差也中孚者有孚信及於天下也豐多故也親寡旅也義曰豐言盛大髙者懼危滿者懼溢故多憂也親者寡少故曰旅也離上而坎下也義曰離為日故宜在上也坎為水故宜在下也小畜寡也義曰小畜者言風行天上不能徧及於物故曰寡也履不處也義曰履以謙為本隨人而行故不可定處也需不進也義曰需者養也但待其時而養焉故曰不進也訟不親也大過顛也義曰天水相違訟之道也故曰不親不親者不相親洽也大過者上下相陵本末顛錯故曰顛也姤遇也柔遇剛也漸女歸待男行也義曰姤者遇也天下㑹遇之時柔遇剛也漸者進也男女之行必以漸而進之然後成其夫婦之道也頤養正也義曰山下有雷為頤之象故曰養也養其正則吉既濟定也義曰言水火相濟君臣相得是天下大治物性大定之時也歸妹女之終也義曰夫女者有適人之義若従男得其道以成夫婦此則是女之終者也未濟男之窮也義曰夫男子之道多失於怠事故居安不能慮危以成其未濟是自取窮之道也夬決也剛決柔也君子道長小人道憂也義曰夫五陽一陰是五剛而決一柔也五君子而決一小人也故君子之道得以長小人之道所以憂也此十翼之中惟文言繫在乾坤之卦内更不必詳解之周易口義終
