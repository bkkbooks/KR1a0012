body:
  text: 周易口義卷七宋胡瑗撰下經睽兊下離上睽小事吉義曰按序卦云家道窮必乖故受之以睽睽者乖也言家人之道既窮極則必至于睽異而離散也小事吉者夫睽乖之時上下之情既異内外之志既乖天下之人其心皆不同于時雖有大才大徳之人亦不能大有所為也何則夫君子之道必將大有為則須上下協心衆賢同力无有異志故發之天下而功業被于世也今既睽乖故但小事則可以得吉也彖曰睽火動而上澤動而下二女同居其志不同行說而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉義曰睽火動而上澤動而下者此釋所以得睽之名也火本炎上澤本潤下水火相資然後能成功而利萬物也今乃火動于上水又動于下水火不相資是有睽乖之義也二女同居其志不同行者離為中女兊為少女女子之生長必從人此天理之常也今二女同居必有從人之志是其志不同行亦睽異之義也說而麗乎明柔進而上行得中而應乎剛是以小事吉者言暌之時所以得小事之吉者下以兊說而上以離之大明猶君子以說順之道而附于大明之人而又以柔進居至尊之位所行所為正合于中道无過无不及又且下應于九二剛明之臣夫如是故小事所以得其吉也天地睽而其事同也者此以下廣明睽之義也言睽之道有自然而合者若天以髙而處上地以卑而處下是睽也然而隂陽之氣交則生成之事同也故曰天地暌而其事同也男位乎外女位乎内是睽也然而相資而成一門之治則是其志通也故曰男女睽而其志通也萬物衆多品類不同是睽也然而好生惡死樂安懼危則是其事類也故曰萬物睽而其事類也睽之時用大矣哉者睽乖之世小人衆多然順時而動者惟大才大徳之人能之故先聖于此重嘆美之也象曰上火下澤睽君子以同而異義曰火在上澤在下二者不相資故有睽乖之象夫睽異之時小人衆多皆欲加害于君子故君子與之和同然外雖和同内之所存則異也初九悔亡喪馬勿逐自復見惡人无咎象曰見惡人以辟咎也義曰初九居一卦之下當睽乖之時上无其應本有悔者也然而九四亦无正應故與初心志相合逺而相得其悔所以亡也喪馬勿逐自復者馬者至彰顯之物當睽之時人心既已乖離雖喪失彰顯之物必无有私匿之者故雖勿逐當自復也見惡人无咎者夫險惡之人其用心皆欲陷害于君子況睽乖之時小人熾盛苟不和同而接見必罹其所害故見之乃无咎也象曰見惡人以辟咎也者夫君子進用于朝道行天下則斥逐小人无所畏忌時既睽乖雖其惡人亦禮下而接見之所以避一時之咎也九二遇主于巷无咎象曰遇主于巷未失道也義曰巷者委曲不正之道也君子當治平之世斥逐小人則可坦然由正道而行若睽乖之時人心不同羣小黨盛皆欲加害于君子故此九二與五為應以五為主不敢顯然相遇于明坦之途顯然遇之則為小人之所害但遇之于委曲隘狹之道乃得无咎象曰遇主于巷未失道也者蓋睽之時不可顯然而行雖由委曲隘狹之巷而得遇于主亦未失君子之道也六三見輿曵其牛掣其人天且劓无初有終象曰見輿曵位不當也无初有終遇剛也義曰輿所以載物而行也六三以隂居陽履失其正上有上九之剛為己之應己得往而應之然睽異之時履于不正則上下皆欲害之故若其輿為人之牽曵其牛為人之拘掣也其人天且劓者天當作而字古文相類後人傳寫之誤也然謂而者在漢法有罪髠其􅁂髪曰而又周禮梓人為筍簴作而亦謂髠其􅁂髪也其人即謂九二九四也以六三履非其正皆欲害之故或來髠其􅁂髪或來劓割其鼻也无初有終者六三本以正應于上九以其履不得正故小人皆來害之上九既見六三為小人之所害故亦疑之不與六三之從已是无初也然六三本以至誠而應上九初雖不與之應然其有剛明果斷之才故終則明知六三之誠而與之應是有終也象曰无初有終遇剛也者言初為上之見疑然終則知已之誠而與之應是六三所遇得剛明之人也九四睽孤遇元夫交孚厲无咎象曰交孚无咎志行也義曰九四當睽乖之世而无應獨立是睽之孤者也元夫謂初九也初九以剛明之才處下卦之下而无正應今九四亦无正應是其心志相同體類相契而為配偶也交孚者九四初九既不以正而合是必傾至誠至信以交相待也厲无咎者九四雖與初以信相交然彼此皆不正故須必常若危厲則可以免其咎悔也象曰交孚无咎志行也者夫當睽乖之時果无應則所存之志不得行矣今四乃與初以道相應是其志得行也六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也義曰六五以隂居陽履于不正本有悔者也然居至尊之位而下應九二之剛陽故其悔所以亡也厥宗噬膚者宗謂九二也九二既為已之正應則是已之宗黨也膚者柔脆之物易于噬嚙者也九二本以正而應己然當睽乖之時衆皆來肆害于己故九二之宗排斥此隂邪不正之小人使之不為害是易于噬柔脆之物也往何咎者言九二既以至誠來應于己己往而應之又何咎哉象曰厥宗噬膚往有慶也者言六五之應既在九二而為小人之間厠故九二終能噬嚙之不妨己之路若往而應之則不惟相合而又有喜慶之事也上九睽孤見豕負塗載鬼一車先張之弧後說之弧匪冦婚媾往遇雨則吉象曰遇雨之吉羣疑亡也義曰四以无正應而曰睽孤今上九處卦之終是睽乖之極者也睽乖之極雖有其道亦不能通故亦曰睽孤豕本不潔之物而又負其泥塗是穢之甚者也言六三為己之正應而在九二九四之間故已之視乎六三必有猜貳之心狐疑之惑若視豕之負塗然穢惡之甚也載鬼一車者鬼者虚无而不可見也車之所不可載者也今上九見六三在九二九四之間故疑其穢惡若見一車之鬼是其造虚成實以无為有妄偽之甚也先張之弧者言六三本為己之應今既厠于二陽之間故上反疑之張其弧矢欲以攻之也後說之弧者上卦為離離為火火性至明上九處離之極明之至者也下卦為兊兊為水水性至潔六三處兊之極至潔者也六三本以至誠來應于己為小人之所厠至于致疑然上九以至明之性故終能察六三之至清而審其至誠遂說去其弧而與之會合也匪冦婚媾者六三本以正道應己然以二陽所間故不得會合今既察明六三之情偽是雖讒言不能間之而終得會合也往遇雨則吉者雨者隂陽之和也今上九之陽合于六三之隂則是和而得吉也象曰遇雨之吉羣疑亡也者言上九始以小人之讒間六三故疑之而不與之應然上九有剛明之徳知六三以至誠而來應遂不疑而與之會遇和合是羣疑亡也蹇艮下坎上蹇利西南不利東北利見大人貞吉義曰按序卦云乖必有難故受之以蹇蹇者難也言睽乖之時上下離異人心不同必有蹇難此蹇之所以次于睽也利西南者西南坤位也坤者致養之地廣大寛平生育之所也夫當蹇難之世生靈不得其安民物不遂其所人人思治之時也若聖賢之人治天下之蹇則置民于寛廣生育之域然後得其安而至于太平也不利東北者東北艮位也艮為山山者險阻不通之地也若聖賢之人出民于險阻而置之安平則是治蹇之道也若復納諸險阻之地則其民愈困而其道愈窮故利西南而不利東北也利見大人者言蹇之時欲治天下之險釋天下之難必利見其大才大徳之人也貞吉者蹇難之作由上下人心乖異不正而然今濟天下于无事則必本諸大正之道然後乃吉也彖曰蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉義曰此因二體以釋其義也坎為險在上故曰險在前也見險而能止知矣哉者坎為險艮為止見險在前止而不進是其知也蹇利西南往得中者西南寛廣生育之地民在蹇難置之此則得其安居而各遂其所是往而得其中道者也不利東北其道窮也者東北險阻之地民在蹇難復置之此則其民愈蹇是其道之窮也利見大人往有功也者夫大人與天地合徳日月共明有仁義之心經綸之志民被塗炭往而見之共以解其蹇難致其安平則是往而有功也當位貞吉以正邦也者謂五得其君之正二得其臣之正各當位而守正故能正邦也蹇之時用大矣哉者蓋蹇之時必得大才大徳之人然後可以解天下之蹇故先聖于此重嘆美之也象曰山上有水蹇君子以反身修徳義曰山者險阻之物水流于險阻之上其勢必不能通是蹇之象也君子以反身修徳者言君子罹此蹇難不怨天不尤人但反己之身修飭其徳而已孟子曰愛人不親反其仁治人不治反其智禮人不答反其敬此之謂也初六往蹇來譽象曰往蹇來譽宜待也義曰夫蹇難之世坎險在前君子居之必量時度勢而進以自保其明今初六居卦之始在險難之初若不顧其危衝冒而進則蹇難愈甚若翻然知幾觀時可否可退則退復其所處不陷躁失則保全其道得其嘉美之譽故往蹇來譽象曰往蹇來譽宜待也者言君子當蹇難之初險阻在前未可以進宜退而自處以待其時也六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終无尤也義曰蹇難之時人人皆有所患而不可動故初則往蹇來譽三則往蹇來反四則往蹇來連獨此六二云王臣蹇蹇者蓋以其處人臣之位履中居正上應于九五之君而君在蹇難之中必盡忠竭力奮死不顧雖重險在前亦衝冒而往也匪躬之故者六二所以冒犯險難而進者非其一身之故蓋上以為君下以為民救天下之蹇也象曰王臣蹇蹇終无尤也者凡為人臣苟不盡忠竭節見危授命則有不忠之罪今六二既能盡忠竭節不恤其身以救天下之蹇故終无尤也九三往蹇來反象曰往蹇來反内喜之也義曰九三以陽剛之徳居下卦之上為初六六二之所恃也然而險難在前往則愈蹇若君子之人能知時之不可行度勢之不可用反而自處以守其正則得其所安故曰往蹇來反也象曰往蹇來反内喜之也者既退而反居其本位則不惟己獲其安兼下之二爻皆得其所恃安止而不犯于難是内有喜恱之事也六四往蹇來連象曰往蹇來連當位實也義曰連者牽連之謂也六四以隂居隂得正者也然而蹇難之世坎險在前冒昧而進愈必有難而入于深險若能知時之不可行退而牽連下之三爻止而自守則得其安也注疏讀連字從上聲言四往來進退之間皆有蹇難而不利夫蹇之時其險在前故君子止而不往若退而守不務其進則復何蹇難之有此注疏之失也象曰往蹇來連當位實也者言四以隂居隂得正當位者也陽為實今四連下之陽是當位而附得其實也九五大蹇朋來象曰大蹇朋來以中節也義曰五居蹇難之世而處坎險之中是蹇之大者也有若天下未安人民未治之時也而九五居中履正能任六二之臣二又得人臣之正故盡心竭力以輔于己是其朋來也如湯之救夏而得伊尹武王救商而得吕望之類也象曰大蹇朋來以中節也者言五以剛中得人君之節二以柔中得人臣之節是君臣之間皆能以中節也上六往蹇來碩吉利見大人象曰往蹇來碩志在内也利見大人以從貴也義曰上六處蹇之極居一卦之外難將終者也夫險極必平難極必安當此之時不可復有所往若往則益蹇反而退居其位下應九三以守碩大之徳則得其吉道故曰往蹇來碩吉也利見大人者言險難將終但能附麗賢明大才大徳之人則可以逺出險難而持久于治不須復有所往也象曰往蹇來碩志在内也者言上所以來則有碩大之徳者蓋志應在内卦之九三也利見大人以從貴也者陽爻至尊貴者也今上六能利見大才大徳之人以終其難是從者貴也解坎下震上解利西南无所往其來復吉有攸往夙吉義曰按序卦云物不可以終難故受之以解解者緩也言天下之民不可使終受其難必有聖賢之人往以濟之故解之所以次于蹇也利西南者西南寛廣生成之地也夫聖賢之人解天下之患難除生民之疚疾必須發仁義之道躋之寛平之所使皆遂其生成然後利也不言不利東北者東北險阻之地解之時聖人止務散釋天下之難不復更有險阻故不言東北也无所往其來復吉者夫聖賢所以有所往者蓋以天下之民在于患難故欲拯而濟之也今天下之患難既解若復有所往則是煩擾其民而事愈瀆亂自取其弊敗之道若屯之彖言勿用有攸往是也但來而復其所有獲其吉也有攸往夙吉者言聖賢積心處慮恥一物之失所今難解之時天下之民雖已權安然其間有所未濟亦當趨往而解之以速為尚則可得而吉也彖曰解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉義曰坎為險震為動動于險之外是聖賢之人動而能拯天下之險使皆出于難也故曰解險以動動而免乎險解也解利西南往得衆也者言聖賢既以仁義之道除釋民之患難而置之于寛廣生育之地使各得其所以此而行則必得天下之衆心也其來復吉乃得中也者夫天下之難既解若復有所往則瀆亂已甚之道也若不往而煩擾其民守其止靜則得中也有攸往夙吉往有功也者言患難既解之後或天下之民有未得其所者聖賢之人不可遲緩必汲汲而拯之言速則有功也天地解而雷雨作雷雨作而百果草木皆甲拆者夫天在上地在下氣不交則雷雨不作而萬物不生故天以陽氣降于下地以隂氣升于上隂陽相蒸剛柔始交則必有屯難屯難既解故鼓之為雷蒸之為雨雷雨盈滿則百果草木皆敷甲而拆以至句者萌者動者植者皆乘時而獲其亨通矣解之時大矣哉者按諸卦或言時義或言時用而此止言時者蓋難解之時无不釋故止言時耳若蹇之時用是天下在于蹇而始將治之故必有所用是以言用也又遯卦言時義之類是皆義有所存之時故言義也此卦于義用並无所取故不言也象曰雷雨作解君子以赦過宥罪義曰雷雨既作則蟄蟲昭蘇草木甲拆解之義也天下之民方此難解之時始出于塗炭其有過惡遷善逺罪蓋舊染汚俗化上薄惡之政而然也故君子之人當此之時有過者赦之有罪者宥之使之改過自新遷善逺罪蓋難解之道也初六无咎象曰剛柔之際義无咎也義曰夫民在患難非聖賢則不能濟然濟民之難務在于速不可使之久困也故卦言有攸往夙吉彖曰往有功也是濟難在于速也今初六居卦之下當解之初天下之難盡已解釋而无有所咎矣象曰剛柔之際義无咎也者九四剛也初六柔也剛柔交際同心以解天下之難其義自然无咎矣以時言之則患難初解亨通將至其義必无咎悔也九二田獲三狐得黄矢貞吉象曰九二貞吉得中道也義曰田獵也狐者隠伏多疑之獸也三者言其象也蹇難初解民心尚疑猶恐未脫于難而又入于蹇故君子當行其教化革其殘暴之政易服色改正朔以新天下之耳目使民心无所疑矣如以田獵而獲三狐猶言羣疑亡也黄中也矢直也言九二又得大中之道剛直之徳行天下之正道而得其吉也六三負且乘致冦至貞吝象曰負且乘亦可醜也自我致戎又誰咎也義曰負者小人之事乘者君子之器陽至貴君子也隂至賤小人也今六三隂居陽是小人而乘君子之器也夫昏亂之朝庸主在上則賢不肖混淆故君子之位而為小人所乘今蹇難既解君臣上下各從其正而六三乃以不正之質居至貴之地是小人在君子之位也則天下之所不容斯人之所衆棄也故致冦盜之至為害于已而奪取之也然而小人得在髙位者蓋在上之人慢其名器不辨賢否而與之以至為衆人所奪而致寇戎之所害也象曰負且乘亦可醜也者言小人在位是可醜惡之也故孟子曰不仁而在髙位是播其惡于衆也自我致戎又誰咎也者言小人不度已徳不量已勢而竊居君子之位所以致戎冦之來也若以一郡一邑言之則為致冦若以天下言之則為致戎且冦戎皆自已招又何咎于人哉故繫辭曰負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致冦至盜之招也九四解而拇朋至斯孚象曰解而拇未當位也義曰拇者足指之大者也謂六三居四之下上无應而附于四有足指之象也九四正應在初是其朋也既係于六三必忘于初則初亦忘之矣今既解去六三而專應于初六則至而信矣故解而拇朋至斯孚象曰解而拇未當位也者夫以至尊而為天下之主則可包含荒穢而容天下之民物也今九四不當至尊之位故不可係于他類而必解去之則其朋黨至而信矣六五君子維有解吉有孚于小人象曰君子有解小人退也義曰六五以大中之道位上卦之中下應九二剛明之君子以君子之道既行是能解天下之難而得其吉也孚于小人者夫君子當解難之時必能進用賢者黜退小人以成其治治道既行則小人自然望風而信服退藏竄伏以避君子之誅也象曰君子有解小人退也者君子之道既行于上以解天下之難則豈患小人哉必自然信之使退也上六公用射隼于髙墉之上獲之无不利象曰公用射隼以解悖也義曰隼者擊搏貪殘之禽也髙墉非隼之所居也六三以柔懦不正之體居下卦之上是竊國家之名器當君子之大位猶貪殘之隼而居髙墉之上也今上六處解之時居動之極是君子之人藏器于身而不妄動者也故能射去此不正之小人使不得居髙位而竊名器如射隼于髙墉之上也獲之无不利者以小人而當君子之位以此而獲之何不利之有故繫辭曰隼者禽也弓矢者器也射之者人也君子藏器于身待時而動何不利之有動而不括是以出而有獲語成器而動者也損兊下艮上損有孚元吉无咎可貞利有攸往曷之用二簋可用享義曰此損卦謂損下以益上損民益君之象也然上之損下不可太過必須合于中正則民皆勤身竭力樂輸于上有孚者言上之取于民必當以信立之限極取之有時用之以制取信于民其民皆信奉于上則獲元大之吉而无咎悔矣苟或暴政横賦臨之不以道取之不以信使其民仰不能以事父母俯不能以畜妻子凶年樂歲殫財竭力奉國不暇如此則怨結于下災見于上而其咎悔可知矣故古之什一為萬世中正常行之法所謂長久貞正而大吉无咎者也既有其孚又守以正則所往无不利矣曷之用二簋可用享者此言在上之人既能示民以信取民有制使上足其用下不匱財如此則復將何所為故雖二簋至約之物亦可用之以享于鬼神也左傳曰苟有明信澗溪沼沚之毛蘋蘩薀藻之菜筐筥錡釜之器潢汙行潦之水可薦于鬼神可羞于王公是也言損道既以至誠至信而行雖用二簋可以享于鬼神不待其豐備也彖曰損損下益上其道上行損而有孚元吉无咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虚與時偕行義曰艮上而止兊下而說夫損民益君必上有節止絶无名之求則下皆樂輸以說順之道而上行也故曰損下益上其道上行也損而有孚元吉无咎可貞利有攸往者言貢賦之入皆有常制不失其信則可也苟什一之外不以孚信動有妄求是過損于下而取怨于民也故必有孚信之道獲元大之吉免其悔吝然後可以常行利有所往也曷之用二簋可用享二簋應有時者言至約之物不可以常行可儉則儉可豐則豐所應皆有時也亦如損民應上雖不可過然亦必視歲之豐凶而輕重之則自然國用以羡而民力不困也損剛益柔有時者此謂損初九九二之剛益六四六五之柔亦有其時不可以常行可以損則損可以益則益也損益盈虚與時偕行者言不可長損于彼而益于此盈于此而虚于彼凡損益盈虚之道皆與時而行也故孟子曰治地莫善于助莫不善于貢貢者校數歳之中以為常此之謂也象曰山下有澤損君子以懲忿窒欲義曰按左傳曰川竭則山崩是言山澤之氣相通故得以生于萬物也今澤在山下是損澤益山損下益上之象也君子觀此之象可損之事在于忿欲有忿則懲戒之有欲則窒塞之可損之善莫善于此何則自非聖人不能无忿爭之心嗜欲之事自君子而下則時有之固宜損之也初九已事遄往无咎酌損之象曰已事遄往上合志也義曰初九居一卦之下處損之初民之象也夫民之為職固當給衣食以奉養其上者也事謂耕穫之事也言耕穫之事既已則速往以奉于上乃得免其咎也酌損之者言上之損下下之奉上必皆斟酌其宜使合中道故民之于私上有父母之養下有妻子之畜而又有州閭鄉黨冠昏喪祭之用不可盡竭其所有以輸于上自取不足之患必斟酌其宜合于中道則可也象曰已事遄往上合志也者夫上之志所須在于民民之志在奉其上今初九能己自已之事遄速斟酌而往奉之則是合上之志矣九二利貞征凶弗損益之象曰九二利貞中以為志也義曰夫損下益上必須斟酌其宜使合于中正者也夫什一者天下之中正也過之則桀殺之則貊皆不得其中也初已損之以益其上至二復損則損之太過利在乎守正而已征凶者言若損之不已復往而奉于上則凶之道也弗損益之者言不可更損己以奉于上當反求上之所益則可也象曰九二利貞中以為志也者言損上益下損下益上皆不可過宜必以大中之道而行今初已損而奉于上至二則不可更有所損是以中道為志也六三三人行則損一人一人行則得其友象曰一人行三則疑也義曰夫天地君臣夫婦之道若専一相應則其志純其道固也今六三之隂上應于上九之陽若己與六四六五二爻同往而應之則反損上九之一人若己獨往而應之自得其友矣故繫辭云天下百慮而一致殊塗而同歸是言凡事在于一致則其道純而无駁也象曰一人行三則疑也者言六三獨往應上九則其志和同而无所間矣若三人往之則上九必有疑惑之志慮其有害于己也六四損其疾使遄有喜无咎象曰損其疾亦可喜也義曰遄速也夫為人上者不可過取天下之財以困斯民今六四一爻當大臣之位切近于至尊故當盡忠于國不可復往損于民但民有疾則去之有患則損之如此所以為天下之利而副人臣之職也使遄有喜者六四既為大臣其責甚重若有一小人在位為國家之害良民之蠧則當損去之而務在于速不可使之滋蔓如此則有喜恱之事而獲无咎矣象曰損其疾亦可喜也者言為人臣之職若能秉忠直而損國家之疾除民物之害而使之獲安是可喜之事也六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也義曰龜者決疑之物以喻人之才智也朋黨也十朋衆也夫損下之道不可過苦惟在位聖賢之人不以為常但其用之有制耳今六五以柔順居艮止之中而位至尊下又應九二剛明之臣已能虚心而接納之又弗損于下是故天下賢明才智之人皆盡其謀慮竭其志策來益于己也弗克違元吉者夫好賢而不能用則與不好同用之不能從則亦與不用同故好賢者必用其才而又聽其言此其任人之道也今六五能虚己以接納賢者而信任之又且不違其言不逆其諫使天下才智之人得盡其善竭其能而奉于上是以獲元大盡善盡美之吉也象曰六五元吉自上祐也者六五以柔居尊任用賢知之臣聽其謀從其諫故得衆賢之歸而得元大之吉自上而下无不祐之也上九弗損益之无咎貞吉利有攸往得臣无家象曰弗損益之大得志也義曰大凡居上者不可常損下以益己今上九居損之極在艮之終更無損下之道是以施仁義之術生成天下以益天下之民如此則得其无咎以貞獲吉既獲其吉則所往何不利哉得臣无家者夫蚩蚩之民愚无所知若在上者益之以道則歡心而歸之今上九既不損而反益之則天下之民皆臣服而歸之逺近无有疎間天下為一家故曰无家象曰弗損益之大得志也者言上九居上體之極而反益于下則是天下之民无不臣服而已之志大得行于天下也益震下巽上益利有攸往利涉大川義曰按序卦云損而不己必益故受之以益蓋言凡物之理盛極必衰損久必益益者損上以益下損君以益民明聖人之志在于民也然損下益上則謂之損者蓋既損民之財又損君之徳也損上益下則謂之益者蓋既益民之財而又益君之徳也然上之益下非謂耕而食之蠶而衣之以天下之廣生靈之衆苟家至户到人人給之則雖至愚固知不可也故博施濟衆堯舜其猶病諸蓋居人上者為之求賢或為農官或興水利勸其力穡使游手之民敦本而棄末又為之擇守令宣行教化興利除害以益其民是皆因其所利而利之因其可益而益之故非損于上乃能益于下也利有攸往者夫上之益下是損有餘而補不足故得天下之心既得天下之歡心則何往而不利哉然損則云有孚元吉无咎可貞然後曰利有攸往此則直云利有攸往者蓋損之時是損于民必使天下信之然後有元大之吉而无咎以為長久貞正之道故始得利有攸往此則損上益下得天下之歡心无所往而不利也利涉大川者夫君能以仁義之道益于下下受其賜則捐軀而報于上効命以助其君雖有大險大難皆可以濟涉之也彖曰益損上益下民說无疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進无疆天施地生其益无方凡益之道與時偕行義曰損上益下者此謂損九五而益六二也夫陽本實而有餘隂為虚而不足今以九五之有餘益六二之不足使民各安其業皆被其澤如此則得天下之歡心民從之无有疆畔也自上下下其道大光者夫損下而益上則損上之徳今上能自損以益其下利益之事自上而流布于下故其道廣大而光明也利有攸往中正有慶者夫九五以陽位乎上中正之君也六二以隂居下中正之臣也君臣之間皆以中正之道下益于民以此故獲福慶之事也利涉大川木道乃行者上巽為木下震為動故以木為舟楫動則能涉大川也猶人能盡仁義行于上動而為民之益民既受其益則莫不盡其心思輔于上故雖大險大難无不濟矣益動而巽日進无疆者此以二體言之夫行益之道居上者能動而上順天意下順民心則徳之進而无有疆極也天施地生其益无方者夫天損一元之氣以益于地為萬物之始地承天之氣以生成萬物之形其利益之道至公而不私至正而不邪至廣至大而无有方極亦若聖賢以仁義利益天下之民而无有偏黨私邪其道廣大而无有窮己也凡益之道與時偕行者夫行益之道不可以常行可損則損可益則益何則天以一氣降于地以施生萬物若常使益之則萬物滿而過亢也是必有事而損之君子以仁義寛愛而恤于下若常益之則在下者亦生驕亢而不知自損是故先聖于此戒之言凡為益之道必與時而偕行也象曰風雷益君子以見善則遷有過則改義曰夫風得雷則威益彰雷得風則聲益逺是相益之象也君子法此益象見人有善則遷而從之知己有過則改而正之夫日遷一小善積而不已則大善著矣曰改一小過改而不倦則大過除矣蓋益之大莫過于遷善改過也故孔子曰聞義不能徙不善不能改是吾憂也初九利用為大作元吉无咎象曰元吉无咎下不厚事也義曰初九以剛陽之力震動之始是志于有為而欲興益于天下者也然興益之道必須居位得勢而後行之有餘今初九雖有剛明興益之心而位卑勢寡非可致之地又況當益道之初有謀始之責至難至重故須所為大吉然後免咎故曰利用為大作元吉无咎也象曰元吉无咎下不厚事也者夫大有所為以益天下必須履貴勢操重權乃能當之至于位卑勢寡之人則不可僭有所興今初九實以剛陽之才利于大作然初本卑下不當厚事故須萬舉萬全至于大吉然後无咎也六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也義曰六二以柔順之徳履得中正居受益之地上應于九五剛明之君而已能盡人臣之節以事之无有偏黨姦邪之行无蔽塞賢者之心是以天下明智之人各欲獻其謀慮而來益于已故曰或益之十朋之龜弗克違者夫以天下之人樂告以善道而已又能以中庸和柔之徳聽信之弗有違戾也永貞吉者按損之六五言十朋之龜弗克違元吉者蓋損之六五居得其正為損之主是以天下賢智歸之而獲元大之吉今六二在于下卦居人臣之位受天下賢智之歸其勢至重一失其正必侵君之權其為禍不細矣故當永守正道盡人臣之節率其衆賢皆盡忠竭力以事其君則得其吉也王用享于帝吉者王者能任賢受益而弗違又能永正以此之道享于帝而得吉況其為臣能盡忠竭力以事其君則其吉可知矣象曰或益之自外來也者六二居中得正又能盡人臣之忠義以事其君故賢智之人皆自外來而益之也六三益之用凶事无咎有孚中行告公用圭象曰益用凶事固有之也義曰凡君子之人不在其位不謀其政若居其位當其任則可以有為于時今此六三以隂居陽位非其正而過于中道欲施益于下非所當也然所益之事若民之凶荒疾苦札瘥患難則已不顧一身奮然往而益之則可以得其无咎也有孚中行者言六三雖益以凶事然亦當以由中之信合于中道而行然後可也告公用圭者圭符瑞也所以執而為信言六三既以由中之信而行執其符瑞以告于公而明其所益之事若漢武之時河内失火凡爇千餘家帝遣汲黯往視之黯曰此不足為患時河内之民值歲凶疾苦計萬數黯遂矯命發廪以救之民由是活及歸朝乃請矯制之罪帝遂賢而釋之是乃非其位越其職以濟凶荒之事象曰益用凶事固有之也者言六三雖居非其位然其救民安國之心固有之也六四中行告公從利用為依遷國象曰告公從以益志也義曰六四以隂居隂履得其正上近于五下應于初在益之時是能盡心竭力上以益于君下以益于民告其所以為益之道也夫既能上益于君下益于民以此告于公則无有不從也利用為依遷國者夫天下之大莫大于遷國今以六四居得正位行得大任能致君澤民故雖遷國之大皆依從而利用之則其小者從可知也象曰告公從以益志也者言六四能恢有為之道以益天下使君尊民富各得其所是非以一身一家為念所志者惟益于上下而已九五有孚惠心勿問元吉有孚惠我徳象曰有孚惠心勿問之矣惠我徳大得志也義曰九五以剛明果斷之徳處至尊之位下應六二賢明之臣是能以由中之信興利于民也惠心者夫天下之廣生靈之衆聖人在上非可以家撫而户養之也蓋所惠者惠于心而已天下民之温飽非待王者耕而食之織而衣之也但勸之教之通商惠工而已如此則是王者惠心之謂也論語所謂因民所利而利之惠而不費者是也勿問元吉者言九五既以仁義之心惠及于天下則不待問而自獲元大之吉也有孚惠我徳者夫民无常懐仁則懐之故書曰撫我則后虐我則讐今九五能以由中之信接于衆故天下之民亦惠信九五之徳也象曰惠我徳大得志也者言九五能興益之道以利于民則其志大有所得也上九莫益之或擊之立心勿恒凶象曰莫益之偏辭也或擊之自外來也義曰上九居卦之上處益之極不通時變不度人情是其求益于人无厭者也故莫有益之者求益于己侵剥于下故或有擊之者立心勿恒凶者无厭之求以速禍患是立心无常之人凶之道也象曰莫益之偏辭也者言上九求益于己非有以益于人是偏辭以求益也或擊之自外來也者六二上九皆言自外來也六二居中守正其益在君民故明智之人皆自外來而益之上九居益之極求益于己不知其益人立心勿恒故人或自外來而擊之也夬乾下兊上夬揚于王庭孚號有厲告自邑不利即戎利有攸往義曰夬決也序卦云益而不已必決故受之以夬以天道言之則夏之三月五陽盛長以剝削一隂之時也以人事言之則是聖人在上羣賢並進協心宣力以衆君子決去一小人之象也揚于王庭者夫君子道長則小人道消小人道長則君子道消此必然之理也凡羣小得志君子之人若不能潛光晦跡欲以直道顯然而行則反為小人之所害矣今夬決之時則是衆賢盛長小人消剥故可以顯然揚于王庭而決去之也孚號有厲者君子之道既盛必須信賞必罰決然示其號令使天下之人皆信服而從之也有厲者厲危也夫以衆賢聚于朝廷布宣號令決去小人然亦不可放心肆意而遂以為安故當肅肅祇懼而自為危厲則可矣告自邑者夫發號施令雖當夬決之時君子道盛亦不可驟然以威勢加于天下故宜告自已之一邑使一邑之人信服之然後告及于天下所謂自内及外由邇及逺也不利即戎者然當此之時更不可恃其剛壯長征逺討荼苦生靈以速危敗若昔唐之太宗可謂英主矣然而享治既久則恃其剛威以有髙麗百濟之征至今稱之終累聖明之徳也利有攸往者夫夬決之時一隂乗陵于衆陽之上而又勢微力弱下之五陽共進而決去之是君子之道坦然而行无所往而不利也彖曰夬決也剛決柔也健而說決而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也義曰剛決柔者言以五陽而決一柔猶衆君子去一小人也健而說決而和者此以二體言之下乾為健上兊為說以健而決以說而和蓋君子所行必得其中剛不至暴柔不至懦故雖夬決之時用剛以決小人則亦必以和而濟之揚于王庭柔乘五剛也者言君子之命令所以顯然不憚宣揚于王庭者蓋以一柔而乘陵五剛一小人而乘陵五君子是以公行決去而无有畏懼也孚號有厲其危乃光也者言君子當此得時得位號令必行之際更能兢兢危厲審克而舉則其道益光也告自邑不利即戎所尚乃窮也者言發號施令先告自已之一邑使一邑之人信服之然後告及天下則天下无不信服也苟若恃其剛壯玩兵黷武侵伐不戢則自取窮凶之道也利有攸往剛長乃終也者言君子之道所以坦然得行者蓋由五剛盛長一隂消剝之故也是君子之道大成終美于此也象曰澤上于天夬君子以施禄及下居徳則忌義曰夫至髙者天也潤物者澤也今澤升于天是必決然流霈于下也故君子觀此之象則施其禄惠以及于下居徳則忌者此則字當作明字輔嗣之說亦曰居徳以明禁蓋傳寫之誤耳忌則禁忌之義也夫已正則可以責人之邪已是則可以責人之非今夬決之世君必先以仁義之徳自居于身而後可以明其禁忌以示天下使天下皆知其禁有不服從者然後決然可以刑加之也不然不先示以禁忌則孔子所謂不教而誅也初九壯于前趾往不勝為咎象曰不勝而往咎也義曰初九當一卦之下故有足趾之象夫夬之時小人乘陵于上而初九以剛明之才欲往決去上六之小人故曰壯于前趾往不勝為咎者夫夬之時雖君子之道長然而欲往決勝其小人必須量敵而後進慮勝而後會可進則進決然而發萬舉萬全矣若夫不度己力不察彼勢躁急而往則反受其害故曰往不勝為咎象曰不勝而往咎也者夫力既不勝于小人乃決然不顧而往則必為小人之所害而有咎也九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也義曰九二以剛健居一卦之中則能決然而往排去小人不為慉縮而不進也故雖有驚惕號呼莫夜之間而有兵戎之事然亦不煩憂恤之也象曰有戎勿恤得中道也者言九二以剛健之徳決去柔邪之小人而又所行所為之道无過无不及皆得大中之道又何所恤也九三壯于頄有凶君子夬夬獨行遇雨若濡有愠无咎象曰君子夬夬終无咎也義曰此一爻有錯倒之文當曰壯于頄有凶獨行遇雨若濡有愠君子夬夬无咎何則三應于上上為隂柔被決之小人夫既應于小人為小人之所汚辱則何得无咎哉又象曰君子夬夬終无咎也以此固知夬夬而後无咎也頄者面之骨謂上六也上六處一卦之上故有面頄之象夫剝之卦五隂長而一陽在上猶五小人而剝一君子六三于小人之中獨能上應君子而不為剝削之道故曰剝之无咎此卦五陽進而決一隂是五君子而決一小人也獨九三不與衆君子同心決去小人而反私應之是壯于頄凶之道也獨行遇雨若濡有愠君子夬夬无咎者夫雨者隂陽和合之所致也衆賢方共決上六之一小人而三獨應之而其志和合故曰獨行遇雨夫小人之性近之則不孫逺之則怨今夬決之時君子得志而反為小人之所汚辱是獨遇雨而濡潤其身且有愠怒也夬夬者敢決之辭也惟君子之人性明而志果居九三之位不為應之所撓奮然決之乃得无咎也象曰君子夬夬終无咎也者言九三終能抱公却私與君子之衆同徳合義以決去小人則无過咎之累也九四臀无膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也義曰次且者其行不安之貌也衆君子皆欲上進以決去小人九四以不正之質獨當其路為衆賢之所傷而不得安行也牽羊悔亡也者羊者剛性之物謂九三也言九四若能牽連九三之剛與衆賢協心盡力上決于小人則其悔可亡也聞言不信者九四雖牽連于九三而其悔得亡然九四之性本以剛强而自任故雖聞其言亦不信之也象曰聞言不信聰不明也者言九四所以聞言不信者以視聽之間有所不明也九五莧陸夬夬中行无咎象曰中行无咎中未光也義曰莧陸草之柔脆者也九五居至尊之位以天下之威而躬親決上六之一小人則決之甚易若去莧陸之草也中行无咎者九五既能決去小人而以中行得无咎者何也夫為君之道必得天下之賢而任使之賢人衆多則自能決去小人故不勞已力可以安而无為今九五以萬乘之威而躬決小人是由不能任天下之賢而用之也若能以大中之道而行則方得无咎也象曰中行无咎中未光也者言居至尊而親決小人雖得中正未足謂之光大也上六无號終有凶象曰无號之凶終不可長也義曰上六以隂柔小人之質當夬決之時居衆賢之上而貪其榮寵戀其禄位不能退避君子而又乘陵于上卒為君子之所誅故雖號呼于天亦終不免其凶咎故先聖戒之言无用號呼亦不能逃其誅而免凶也象曰无號之凶終不可長也者上六當夬決之世而居衆賢之上是其勢微力弱必為衆賢之所誅是不可以長久也姤巽下乾上姤女壯勿用取女義曰按序卦云夬者決也決必有所遇故受之以姤姤者遇也夫羣陽並進以決小人小人既去則聖賢之人得其相遇也然謂之姤者蓋以隂而遇于陽以柔而遇于剛也以人事言之則是臣遇于君君遇于臣也以至貴賤尊卑少長師友之間皆得其遇也女壯者此指初六而言也以其以一隂而遇五剛是女之壯者也勿用取女者女之為道固當婉娩柔順從一而終臣之為道必盡心竭力以事其上今初六乃以一隂而遇五陽是剛壯不正不順之女故聖人于此戒之言不可取猶不忠不一之臣不可用也彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉義曰柔遇剛也者言初六以一隂而遇五剛也以人事言之則是以卑而遇于尊以賤而遇于貴君臣上下朋友夫婦之間皆得其姤遇者也勿用取女不可與長也者夫以不正不順之女用于閨門則不能成其室不正不順之臣用于朝廷則不能盡忠而害天下今初六之隂不能專一其行以剛壯而遇于衆陽是不可與之永長以相處終始以相保也故曰不可與長也天地相遇品物咸章也者此以下廣明姤之義也天以一陽之氣降于地地以一隂之氣承于天天地之氣相遇故萬物發生而章明也故君臣相遇則能成天下之治夫婦相遇則能成閨門之事師友相遇則能成其道業也剛遇中正天下大行也者凡人有剛明之徳而不遇中正之位則不能行其道有中正之位而无剛明之徳則不能稱其任今九五既有剛明之徳又居中正之位故能大行教化于天下而盡姤遇之道者也姤之時義大矣哉者夫姤遇之道患不得其時得其時患不得其義既得其時又得其義然又患不能久之也故君臣相遇不久則不能治天下夫婦相遇不久則不能治閨門朋友相遇不久則不能成道業是姤之時與義至大至難故先聖于此重嘆美之也象曰天下有風姤后以施命誥四方義曰風之行于天下以發生萬物則物无不相遇而得其生成此姤之象也后者天子諸侯之通稱夫天子之治天下諸侯之治一國皆當法姤之象發施仁義之教命以詔告于四方之民則四方之民莫不順從而恱服也初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也義曰金者堅剛之物柅者車輪之下制車之行是制動之器謂九二也初六居姤之始以一隂而上承于五陽是剛壯不正之女也然上有九二最近于己九二有堅剛之徳能制物之動今初六若能繫之而不躁求妄動正一而不遷則得其吉也然初繫于二本非其正然姤遇之時人无常親有賢者則可以附合不顧正應而繫之也故初六若能專一守正以繫于二則可以獲吉矣有攸往見凶者初六既不能順從于九四之正應而繫于九二則當專一守正可以獲安若苟有所往而妄動則是凶之道也羸豕孚蹢躅者羸豕牝豕也淫壯之甚者也蹢躅躁動之貌言初六既以一隂而上承于五陽又不能專一守正躁動而欲有所往是若羸豕淫躁之甚者也象曰繫于金柅柔道牽也者夫隂柔之體不能自立必牽繫于剛明之人乃可也今初六以隂而繫于九二之陽是隂道之牽也九二包有魚无咎不利賓象曰包有魚義不及賓也義曰魚隂物也謂初六也夫姤遇之時君臣上下貴賤尊卑各以正道交相際接然後事克濟矣今初六之隂來附于己非已所召已得初六之隂如庖廚之有魚然无咎者初之應本在四而已擅之是有咎也以初之來非已所召近而相得可以无咎也不利賓者夫饗賓當以其正今九二所得之魚非其正也初本九四之民今附于己是擅有他人之民擅有他人之民而與人是義之所不可也故象曰義不及賓也九三臀无膚其行次且厲无大咎象曰其行次且行未牽也義曰夫姤遇之時君臣上下尊卑貴賤皆得其遇然後有所濟矣今九三上无所應下无所繫是不得相遇之道也然姤之時下之君子欲上進而已當其路又乘九二之剛必見所傷而不得其安行故曰其行次且厲无大咎者言九三雖為下之所傷而以陽居陽所履得正處非有妄若能常自危厲而周防警戒則咎亦无大矣象曰其行次且行未牽也者言九三不能牽連衆陽而獨當上進之路所以次且而不安也九四包无魚起凶象曰无魚之凶逺民也義曰魚亦謂初也夫姤之卦以一隂而遇五陽則淫壯甚矣然初六既以躁妄之情與二相得而失四之應是猶二庖有魚而四反无之也起凶者夫姤遇之時必得天下臣民然後有所輔助而動作不失其正也今九四以不中不正之身居上卦之下雖有初六之正應而反為九二之所繫則是君无其臣國无其民動而有凶也故孟子曰得道者多助失道者寡助多助之至天下順之寡助之至親戚畔之今九四居不得正履失其中是寡助之人也象曰无魚之凶逺民也者夫民惟邦本本固邦寧初為九四之民而繫于二九四不得有之是逺于民也九五以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舍命也義曰杞者杞梓之材木之秀者也言此一爻有剛明之才中正之徳居至尊之位為姤之主而不遇其應雖有衆陽在下來助于己然在下者各固其位但如延蔓相纒終无所益是猶杞秀之材雖甚盛茂而為瓜之延蔓纒繞之適足為美材之累含章有隕自天者以已有剛明之才居至尊之位而下无賢明之輔是以終日之間焦心勞思以求天下之賢蓋自念有倡而无和有令而无從有仁義不能施于天下有禮樂不能宣布于四方于是但含蓄章美之徳以待天下之賢是以盡其至誠不舍其命以求天下之賢言天若隕墜我之命則已若天未隕墜其命則我求之不已天必生賢明之臣以為己之輔佐為己之應援故曰有隕自天明九五求臣之切也象曰九五含章中正也者按坤之六三曰含章可貞或從王事彼以其為臣之道言其在下而含蓄章美之徳待其君而後發此云含章君之道也九五居中正之位亦含蓄章美之徳而无中正之臣以輔己而宣發之故守其中正之位待其得賢而後已有隕自天志不舍命也者言此九五之君求賢之切若天不隕墜我之命則我之志不舍其求賢之命矣故古之髙宗諒闇三年其惟不言恭黙思道至于夢寐之間孜孜求賢以得傅說置之為相又周之世宗以朝廷左右雖有百官而无中正之臣故孜孜求賢以得王朴任之為臣以建太平之策以此見自古聖人治天下求賢之心乾乾不已也上九姤其角吝无咎象曰姤其角上窮吝也義曰角者物之最上窮極之處也按此上九居一卦之極在无位之地當姤之時上无所遇下无所應如至于角窮盡而無所容也吝无咎者以其居窮極無位之地上无所容是自取鄙吝又何咎于人哉故曰无咎象曰姤其角上窮吝也者言上九不能自量其時而進至于角是窮吝之道也周易口義卷七
