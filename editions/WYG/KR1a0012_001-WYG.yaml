body:
  text: 周易口義卷一宋胡瑗撰上經乾乾下乾上乾義曰此伏羲所畫之卦也伏羲畫八卦始有三爻一爻為地二爻為人三爻為天以象三才之道然未能盡變通之理故文王重之為六爻初為地之下有蒙泉之象二為地之上三于人為臣民之位四出于臣民之上為儲貳之象五正當天位六為天之上有太虚之象然後萬物成形而天下之能事畢矣六爻皆陽象天積諸陽氣而成也既象天其不名天而名乾者盖天者乾之形乾者天之用夫天之形望之其色蒼然南樞入地下三十六度北樞出地上三十六度狀如倚杵此天之形也言其用則一晝夜之間凡行九十餘萬里夫人之一呼一吸謂之一息一息之間天行已八十餘里人之一晝一夜有萬三千六百餘息是故一晝一夜而天行九十餘萬里則天之健用可知自古及今未嘗有毫釐之過亦未嘗有毫釐之不及盖乾以至健至正而然也故聖人于此垂教欲使人法天之用而不法天之形所以名乾而不名天也且天之形象人之體魄也天之用象人之精神也使寒暑以成日月以明萬物以生此天之健用也若人之有耳目口鼻四體是其形也其口言鼻臭目視耳聽手足四體之運此其用也至于心之思慮藴于内則為五常百行發于外則為政教禮義故為君為臣為父為子為兄為弟為夫為婦以至于為士農工商莫不本于乾乾不息然後皆得其所成立也左氏曰民生在勤勤則不匱是皆言人當法天之健用也故曰乾元亨利貞義曰文王既重伏羲所畫之卦又為此卦下之彖辭以明乾之四徳又配之四時五常而言也元者始也言天以一元之氣始生萬物聖人法之以仁而生成天下之民物故于四時為春于五常為仁亨者通也夫物春始生之夏則極生而至于大通故高者下者洪者纎者各遂其分而得其性也聖人觀夏之萬物有高下洪纎乃作為禮以法之使尊者卑者貴者賤者各定其分而不越於禮故於四時為夏于五常為禮利者和也在文言曰利者義之和言物之既生既育故必成之有漸自立秋凉風至八月白露降九月寒露降以至為霜為雪以成萬物莫不有漸而成也聖人法之以為義義者冝也天下之民雖有禮以定其分然必得其義以裁制之則各得其冝也故於四時為秋於五常為義貞者正也固也言物之既成必歸于正以隂陽之氣幹了於萬物聖人法之為智事非智不能幹固而成立故於四時為冬于五常為智然則此五常不言信者何也蓋信屬于土土者分王四季凡人之有仁義禮智必有信然後能行故于四者无所配也然此四徳以天下事業言之則元為樂亨為禮利為刑貞為政何則盖元者始生萬物萬物得其生然後鼔舞而和樂聖人法之制樂以治天下則天下之民亦熙然而和樂故以元為樂也天下既已和樂然而不節則亂故聖人制禮以定之使上下有分尊卑有序故以亨為禮也夫禮樂既行然其間不无不率教者聖人雖有愛民之心亦不得已乃為刑以治之于是大則有征伐之具小則有鞭朴之法使民皆畏罪而遷善故以利為刑也夫天下既有樂以和之禮以節之刑以治之不以正道終之則不可也故政者正也使民物各得其正故貞為政也夫四者達而不悖則天下之能事畢矣故四者在易則為元亨利貞在天則為春夏秋冬在五常則為仁義禮智聖人備于乾之下以極天地之道而盡人事之理也初九潛龍勿用義曰自此至用九皆周公所作之爻辭也爻者效也效一卦之動而為之故謂之爻謂之初者一卦之始也謂之九者陽之數也凡易言九六者皆隂陽之數也天一天三天五天九是陽數之竒也地二地四地六是隂數之耦也潛者隠也龍者有變化之神陽氣之象也陽以生成為徳君子之象也凡乾坤之十二爻配之十二月今初九乃是建子之月一陽始萌于黄鍾之宫雖生成之功未及于物然已有生成萬物之心矣若君子未得位之時雖道未澤于世然已有澤天下之心矣謂之潛龍者言陽氣未發見而在潛隠之地也勿用者聖人戒後世勿用此潛龍為徳也何以言之凡人萃五行秀氣而生為萬物之最靈者也然天下之衆愚不肖者常多賢智者常少況聖人挺全粹之徳受天元之純則又過于賢也逺矣夫有聖人之資則无所不通无所不明矣固當出見於世輔其君澤其民利其物以成天下之事業則可也文言曰君子以成徳為行日可見之行也今有聖人之徳之明反以潛隠為事則天下之愚不肖將誰治之是不知天所以生聖人之意也孔穎達作疏以謂勿用者于此時小人道盛若其施用則為小人所害寡不敵衆弱不勝强禍患斯及故戒勿施用此大非聖人之㫖夫聖人才无所不能智无所不周懐道徳持仁義以革天下弊舉陋典新汚俗矯曲為直表邪為正以陶冶於上而天下治矣又何憚小人之害若懼其見害而勿施用則是天下常亂而不可得治也然此勿用者盖言勿用此潛龍為徳也今歴考易中或彖或爻言勿用者有四若屯之彖云勿用有攸往言屯難之時不可徃撓其民務安全也姤之彖云勿用取女言一女配一男是其正也今一隂而遇五男剛壯者也若此之女勿可取之不可與長也師之上六曰大君有命開國承家小人勿用言上六師道之成大君班爵行賞其功大者開建其國為諸侯其功小者建立其家為卿大夫若小人偶立一戰之效與之金帛可也賜之甲胄可也後漢光武不任功臣以吏事深得其道不然若用小人必亂其邦所以韓彭英盧立功受地不旋踵而就戮也䝉之六三曰勿用取女見金夫不有躬无攸利言婦人必當正静其徳以待六禮之備然後用父母之命媒妁之言方可歸之今六三持身不正見其金夫遂欲從之聖人戒之勿用取此女也由是觀之聖人之戒後世不可用潛龍為徳誠无疑矣故孔子目長沮桀溺曰鳥獸不可與同羣吾非斯人之徒與而誰與又曰素隱行怪後世有述焉吾弗為之矣葢後世之人多以潛隱為徳或隱於巖野或遯於林泉罔徳義以沽名傲衣冠以耀志故有終身不見用於世而亂人倫者也且疏又引舜耕歴山漢祖為泗水亭長是豈終潛哉盖養成其徳耳然聖賢其無隠乎曰已道未著已行未成必學問之以養成聖徳然後施為于天下耳甘終身于山林川澤哉然或上下為戾亦有可隠之時故中庸曰君子之道費而隐雖然豈隠遁哉隠其身不隠其道所以然者不以一己之私忘天下之公故孔子皇皇於衰周孟軻汲汲於戰國皆謂有聖人之徳身未顯而其道不自窮也乾六爻皆聖人象也若之何有聖人之資而潛隠自居乎文言曰潛之為言也隠而未見行而未成是以君子弗用也聖人之戒勿用潛隠為徳可謂明矣九二見龍在田利見大人義曰九二之爻是十二月中氣之後正月中氣之前陽氣發見地上之時也田者稼穡所生而有資益之地也以人事言之則是聖賢君子有中庸之徳發見于世之時也夫君子之道積于内則為中庸之徳施于外則為皇極之化此爻但有君徳而无君位故曰見龍在田利見大人者何盖凡有大人之徳必須利見有大才大徳之君然後可以行己之道若舜之得堯禹之得舜伊尹之得成湯傅說之得高宗吕尚之得周文是也然則五得天位亦曰利見大人者何曰有是君必須有是臣然後萬務可舉天民可治若堯得舜舜得禹臯陶禹得稷成湯得伊尹文王得吕尚是也故九二九五之爻皆言利見大人今驗于易或彖或爻言利見大人者有七萃之彖曰王假有廟利見大人言既作廟以萃聚先祖之神靈必須得大才大徳之人以輔行其禮訟之彖曰利見大人言訟之事必須利見大才大徳之人以辨其是非巽之彖曰小亨利有攸往利見大人言申其號令法制必須大才大徳之人以參酌恢隆之也蹇之上六曰徃蹇來碩吉利見大人言居蹇難之極往則益蹇若來居位則安安則得其碩大之福而吉必須利見大才大徳之人以求解散蹇難也及此乾之二五凡七皆聖人之微㫖也九三君子終日乾乾夕惕若厲无咎義曰九三居下卦之上在人臣之極位正當公相之權也上則須輔弼于君下則須總領百官以平均天下之民凡朝廷之幾務莫不一責于已若專奉上而怠于恤下則有佞邪之謟若勤恤于下而簡于奉上則有侵權之誅固宜終朝乾乾日不自暇慎思之力行之不倦以終之是上則以思輔其君下則以思總百官以治天下之民自朝及夕常戒懼而惕若則可以无咎矣若者辭之助注以為至于夕猶惕然若厲今則不取九四或躍在淵无咎義曰或者疑惑也躍者騰躍也淵者龍之常處也九三已極人臣之位九四出人臣之上切近至尊之位既非人君又非王官是儲貳之象也何哉仲尼曰或躍在淵乾道乃革言人道近於地今九四近於天位已出人臣之上是乾道革變之始也夫太子者天下之本生民之望也不有所進則无以副四海之望欲進其位又恐侵君之權處多懼之地故不得不疑也始則疑惑終則无咎者盖或躍以進其徳在淵以守其位分是進其徳不進其位也故昔者太子必入太學求賢師以教諭之就賢友以漸摩之使知為君為臣為父為子之道目見正色耳聞正聲是躍以進已徳而在淵以守已位也震曰震驚百里不喪匕鬯言百里者威不逺也匕鬯者宗廟之器也有威而不過守禮而循常是以見臣子之道全而不侵於君父也今輔嗣之注曰近乎尊位欲進其道廹乎在下非躍所及孔頴達從而疏之曰以其遲疑進退不敢果敢以取尊位且聖人六經垂萬世之教為天下之法所以教人臣之忠人子之孝也今其言曰不敢果敢以取尊位是何人臣之忠人子之孝哉又言曰西伯内執王心外率諸侯以伐紂此尤違聖人之㫖如其言則簒逆之道也今故不取夫聖人之言不勸則戒勸之者欲其進徳也戒之者懼其侵君之權也為儲貳者但進修其徳以禮法而守其位則文言所謂進徳修業欲及時也故无咎九五飛龍在天利見大人義曰九五之爻當建辰之月陽氣盛而上升於天如龍之騰飛然猶聖人積中正誠明之徳徳既廣業既成即人君之位上合天心下順人情以居至尊之地也然乾之六爻九二九五並言利見大人者九五雖有聖人之徳之位必須得大才大徳之臣輔佐之然後可以有為於天下使一民不失其所一物必遂其性此聖人之心也故言利見太人九二雖有聖人之徳固須得大才大徳之君然後得已道之行先聖云水流濕火就燥雲從龍風從虎聖人作而萬物覩此言聖人在位天下有聖人之徳者皆來仕于朝皆以類應也禮曰天降時雨山川出雲如聖人在上則天下聖人皆來輔佐之也孟子曰堯以不得舜為己憂舜以不得禹稷臯陶為己憂堯大聖人也必得舜舜大聖人也必得禹稷臯陶故可以治是雖有大才大徳之君必利見大才大徳之臣然後成天下之治也上九亢龍有悔義曰此一爻居卦之終亢極之地也若聖人當衰耗之年不可更專己任必得聖賢之人以代己之聰明也故堯之耄期倦于勤則授之舜舜耄期倦于勤則授之禹禹耄期則授之啓是聖人與時消息知進退存亡而不至亢極故无悔耳然聖人之徳固无亢也盖其年有亢耳聖人之道固无悔也盖其身有盛有長有耄耳今上九是年齒衰耗精神倦怠之時若居此時不能自反而求代己任則必有悔矣離之九三曰日昃之離不鼔缶而歌則大耋之嗟凶太𤣥首之上九曰巔靈氣形反正此謂也是皆聖賢謂耄必求代而著萬世之戒也用九見羣龍无首吉義曰乾之六爻自初至上皆稱龍者終始全用剛陽之徳也王者法天之健居兆人之上亦當終始用其剛陽之徳也故言用九見羣龍然謂无首吉者言全用剛徳不可居物之首也何則夫國家兵武至剛威者也動則蠧民之財殘民之命聖人不得已而用之也凡人臣有背叛四夷有侵撓天子于是加兵以誅討之去其元惡大憝以安天下之生靈待其有犯然後應之耳不可先之也先之則窮黷矣夫窮兵黷武豈聖人事哉秦之始皇漢之孝武隋之煬帝唐之明皇皆為首以自取敗亡之道耳故聖人戒之言无首乃得无咎也彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧義曰彖曰者仲尼為十翼之文贊明易道以觧文王所作卦下彖辭之辭以明一卦之大要故亦謂之彖大哉乾元萬物資始乃統天者此三句釋乾元之義也大者无限極之辭乾者剛陽至健之氣元者始生長養之徳言天以一元之氣生成萬物而无有限極也然坤則稱至哉者盖天氣降於地為萬物之始地承天之氣以育成萬物之形是有所至故曰至哉資者取也言乾以一元之氣發育施生故萬種之物資而為始坤則待天氣之降然後能生萬物故乾言資始坤言資生此聖人於一字皆有㫖意乃統天者夫天者形之名今以剛健之徳運行不息故得天氣常存是乾元能統領天之形也雲行雨施品物流形者此釋亨之徳也乾為陽氣而上統于天天將降雨山川出雲雲氣升行雨澤下施故品彚之物各流布其形體而得亨通也大明終始六位時成時乘六龍以御天者此四句總結乾之徳大明終始之道六爻之位各有次序初則潛陽氣潛萌于黄鍾之宫二則見陽氣見於地之上三則處人臣之極四則出人臣之上為儲君五則陽氣至盛隮升於天上則亢極在太虚之中時潛則潛時見則見時躍則躍時升則升是六位以時而成也時乘六龍以御天者夫以上下定位而言之謂之六位以陽氣變化而言謂之六龍陽氣自十一月漸升冬至之日萌于黄鍾之宫至五月而隂氣漸升是乘此六龍之位以時而升降故大明生成萬物終始之道以控御天體也且人之神氣萃之則生散之則亡天有剛陽之氣運行不息故天體常存也乾道變化各正性命者此二句申明乾元之徳變者後來改前以漸變易也化者一有一无全然而化也性者天生之質有剛柔遲速之别也命者人所禀受有貴賤夭夀之等也天以剛陽之徳自然以漸變化各正其萬物之性命按書曰惟天隂隲下民是或富或貴或夭或夀皆上天黙定之也至於草木之性有甘有苦有益人者有害人者皆天所賦性命之然也保合太和乃利貞者此釋利貞之徳也天以剛陽之徳生成萬物必以漸成之以保合太和之道盖剛陽不以健而利物則不能保合者也故必漸成之若立秋凉風至八月白露降九月寒露降以至為霜為雪是漸成其物而不暴終能正固而幹了之也若其大暑之後寒涼暴至則萬物能成乎故曰保合太和乃利貞首出庶物萬國咸寧者自大哉而下明乾之四徳元為春以始生亨為夏以大通利為秋以漸成貞為冬以幹了是天道自然而然也此二句言人為天下之君首出萬民之上法乾之四徳為禮樂刑政以生成天下之萬民故樂為元禮為亨刑為利政為貞四達而不悖萬國所以皆得安寧也象曰天行健君子以自彊不息義曰此先聖所作大象之辭所以明一卦之用也天行健者蓋言天以至健而行故一晝夜之間凡行九十餘萬里而君子之人則當法之而健健不已以至為君為臣為父為子小之一身次之一國大之天下皆當法天之至健之徳强勉於已夕思晝行无有休息則可以成天下之事業而行天下之大道也故曰天行健君子以自强不息潛龍勿用陽在下也見龍在田徳施普也終日乾乾反復道也或躍在淵進无咎也飛龍在天大人造也亢龍有悔盈不可乆也用九天徳不可為首也義曰潛龍勿用至不可為首也此先聖又解釋周公之爻辭故謂之小象潛龍勿用陽在下也者言建子之月陽氣始發而功尚未及于物是猶以聖人之徳而在於潛隠之時也然千里一賢猶為比肩且千里至逺之處而間有一賢則猶以為比肩相接是則普天之下庸庸者多而賢智者寡矣以賢者尚或如此其少况聖人乎是盖千載而一遇也以天之所以生聖人者必將有以益于天下而興天下之利除天下之害舉天下之教化行天下之大道也而復潛遁為事則是辜天地之生矣雖然天陽之氣有時而潛有時而見聖賢君子亦有時而潛有時而見盖聖人慮萬世之下觀此潛龍之事遂務隐遁而失其施用故於此戒之言當勿用此潛龍為徳也今言潛龍勿用者以其陽氣在地之下而功未及物故曰陽在下也見龍在田徳施普也者言陽氣發見於地之上而功及乎物也是猶聖人執中道其功施布而无所不至使賢者智者皆可以俯而就之愚者不肖者皆可企而及之以至一民一物欲使无不得其宜而皆合于中道是其徳施普也然而雖有聖人之徳而无聖人之位不能大營造天下之事業故曰徳施普也終日乾乾反復道也者乾乾健健不息之謂九三當公相之位其責甚重上以道承事於天子及其儲君而盡其忠義之分竭其人臣之節下以道表率百官之事平均萬民之政教反復以事上治下不離其道故曰反復道也或躍在淵進无咎也者言儲貳之位能進其徳則不失天下之望守其位分則絶君上之疑雖日進其徳而无有咎悔故曰進无咎也飛龍在天大人造也者言九五之爻正當陽氣極盛之時生成萬物而萬物各遂其性猶聖人有大中之徳又居聖人之位故當興利除害扶教樹化鋤姦進賢以至經營萬事設為仁義之道使一民一物无不被其澤无不遂其性故言飛龍在天是大人營造興制之時故曰大人造也亢龍有悔盈不可乆也者大凡日中則昃月盈則蝕物理之常也今聖人自初至上其功已著其徳已成則至于年衰齒耗當求所代以副天下之望則可不然則有過亢之悔故謂之盈滿之地不可乆居知其可退而退則悔吝可逺故曰盈不可乆也用九天徳不可為首也者言聖人用剛健之徳以化成天下鎮撫四夷懐來諸侯如四夷交侵中國諸侯不臣天子則聖人以兵應之是不為首也凡先動為首後動為應若其純用剛徳而又為事首是必至于過暴而為禍害也待其有犯已者然後應之則不失其道故曰天徳不可為首也文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也義曰文言者先聖以乾坤之義尤深故又作文飾之言以解其義元者善之長也者自此以下至元亨利貞文言之第一節也元者始也言天以一元之氣始生萬物萬物皆由一元而生是為衆善之長也何則善莫大於生徳故天地之大徳曰生是大徳生成以元為始即此元者能長於衆善也亨者嘉之㑹也者言天既以一元之氣施生萬物而至于盛夏之月則陽氣極盛萬物皆極其生養而無不繁蔚故高下洪纎无不得其所是嘉美之所聚㑹也利者義之和也者義冝也和漸也所謂自立秋凉風至以至為霜為雪是天之生物皆使不失其冝以積漸而成之也貞者事之幹也者言天之使物自始生至于亨通而又成之有漸及冬之時則生成之功已畢使皆得其正固而幹了之君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四徳者故曰乾元亨利貞義曰此以下言君子法天四徳而行也君子體仁足以長人者言天以一元之氣生成萬物而萬物得遂其性各安其所故君子以至仁之徳陶成天下使一民一物莫不受其賜是故于一家施仁則一家之内愛敬而尊事之一國施仁則一國之内愛敬而尊事之雖有鰥寡孤獨窮民之无告者均使之不失其所如此是為衆人之長也嘉㑹足以合禮者言天以盛夏亨通萬物而萬物莫不茂盛故君子施嘉美之道使各得㑹聚謂猶民物既已富庶則不可以無節故欲男女有别則為之制婚姻之禮欲上下交接而和樂則為之制鄊飲酒之禮欲其尊君賔王則為之制朝覲之禮欲其篤哀戚孝思則為之制喪祭之禮如是之類是君子以嘉美之道而使皆合禮也利物足以和義者言君子法天霜露之氣而成就萬物皆有其漸故始以仁義禮樂教之導之然民有不令不肖者雖善教之而終不能遷則必用刑罰以整齊之使不至於亂而皆得其利又以漸而成治使天下之物各得其冝也貞固足以幹事者言君子法天貞正之徳能幹了其事若正而不固則无能終其正若固而不正則入於邪必當守正堅固然後可以幹濟天下之事也此君子法天之四徳而行故曰乾元亨利貞也初九曰潛龍勿用何謂也子曰龍徳而隠者也不易乎世不成乎名遯世无悶不見是而无悶樂則行之憂則違之確乎其不可㧞潛龍也義曰此孔子欲申言乾六爻之㫖故假設問荅以明其義此以下至動而有悔文言之第二節也潛龍勿用其義何謂也子曰龍徳而隠者也言有聖人之徳而處於貧賤是隠遁之時也不易乎世者言有聖賢之道則必隨世俗而施為教化以磨揉于下使其亂則變而為治惡則悛而為善今潛隐之時但韜晦其光而自修其已是不為世俗而變易者也不成乎名者言聖人不務於名其有實則名隨之矣今但以潛隠為事而不行教化之實是不成其名也遯世无悶者言既潛遁則不務行其教化之實是無所憂于天下故遯世而无以為悶也不見是而无悶者言有聖人之徳居其位行其道是為世所是也今止以潛隠為事而不務行其教化則不見是于天下也雖不見是於天下然已亦終无所憂悶而務專獨為事也樂則行之憂則違之者凡聖人有為於時則其所施設教化皆與天下同之若天下之所樂己亦樂而行之天下之所憂己亦憂而違去之是憂樂皆同於天下此聖人之常行也今止以潛遁為事是所為皆異於衆也若天下之所憂已或樂之則行也天下之所樂已或憂之則違去之而不行也是務隠晦者雖憂樂必異於世也確乎其不可㧞濳龍也者言如上之數事確然不能舉㧞也其所為者是濳隠之人也此皆聖人著為萬世之戒言上之所行皆濳晦之事故當勿用此為徳也九二曰見龍在田利見大人何謂也子曰龍徳而正中者也庸言之信庸行之謹閑邪存其誠善世而不伐徳博而化易曰見龍在田利見大人君徳也義曰此釋九二爻辭言聖人居于下位而所行无過无不及者以其有中正之徳也故曰龍徳而正中者也庸言之信庸行之謹者庸常也言九二之君子有聖人之徳故俯仰循理從容中道至於常言必信實常行必謹慎是由其性至明故出處語黙皆合於中和之域然後口无可擇之言身无可擇之行也閑邪存其誠者寛而防之謂之閑誠則至誠也言此九二能以中正之徳防閑其邪惡慮其從微而至著故常切切而防閑之若中庸所謂博學之審問之慎思之明辨之篤行之以小善至於大善由大善乃至于聖是由能防其邪惡而内存至誠然也中庸又曰至誠無息不息則乆乆則徵言至誠之道終而不已則有證騐也又曰其次致曲曲能有誠唯天下至誠為能化盖言委曲之事發於至誠則形於外而見著見著則章明章明則感動人心人心感動則善者遷之惡者改之然後化其本性故曰惟天下至誠為能化此聖人存誠之驗也故曰閑邪存其誠也善世而不伐者伐矜伐也夫中人之性有一善則盎然溢于面目而自矜伐其能也若夫有善功有善徳而不自矜伐者唯聖人能之若堯之時洪水泛濫于中國而民幾魚矣唯大禹能排决疏導之以消其難使萬世之下被其賜然而禹亦未嘗矜伐之故舜稱曰汝惟不矜天下莫與汝争能汝惟不伐天下莫與汝争功又若仲尼萬世之師其功配天地其明並日月然且嘗言君子之道四丘未能一焉以仲尼之于四事豈有不能哉盖聖人雖有大善于世而不自伐也徳博而化者此言既有中正之徳其言常信其行常謹又能防閑其邪惡而存其至誠有大善而不自伐故其徳廣而化行于天下矣易曰見龍在田利見大人君徳也者九二雖未居大人之位而為人臣乃有人君大中之徳故特舉本爻之辭以結之九三曰君子終日乾乾夕惕若厲无咎何謂也子曰君子進徳脩業忠信所以進徳也脩辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危无咎矣義曰君子進徳修業忠信所以進徳也者内盡其心謂之忠不欺于物謂之信盖九三居人臣之極位内能盡己之心不欺于物使徳行日進而功業日脩也脩辭立其誠所以居業也者辭謂文教也誠謂至誠也言外以修其文教内以敦其誠實此所以居業也然上謂之修業下謂之居業者蓋文辭相避亦功業之盛故當居之也知至至之可與幾也者幾者有理而未形之謂也言君子之所學學聖賢之事業致君澤民之術也小而一邑次而一郡以至為將為相佐天子治天下當其未至之時知其必至預習其業朝夕以思之學其為治之道至于有位宰一邑牧一郡為將為相舉而行之无所施而不可盖由知至而至之耳昔孟子四十不動心盖當志學之年天下之事无所不學及其壯仕之歳凡天下之事莫有動其心者是知至而至之也知終終之可與存義也者言為臣之義終始一徳以奉其上是得臣之冝也豈非知終乎然後之人臣居于顯位上而奉一人之尊下而有百官萬民之責内无覬覦僭竊之心若伊尹之於太甲周公之於成王霍光之于昭帝諸葛亮之于蜀主此數君子是謂知終終之于人臣之分能存萬世之義也是故居上位而不驕在下位而不憂者言九三居人臣之分其徳業既已進脩則宜進退必以徳而升降必以道故居上位而无驕亢之色在下位而無憂悶之心故乾乾不息因其所為之時而惕懼戒慎雖履至危之地亦免其咎矣九四曰或躍在淵无咎何謂也子曰上下无常非為邪也進退无恒非離羣也君子進徳脩業欲及時也故无咎義曰此先聖釋九四之爻辭以位言之曰上下以出處言之曰進退今九四當儲貳之位故雖或上或下非苟為其邪佞也或進或退非苟離其羣類也是故進其徳以副天下之望脩其業以絶君上之疑如此者是將欲及時而行道也故上與進是或躍之義下與退是在淵之謂也故无咎者言若不能進其徳以塞天下之望又不能守其位分而致君之疑則其為禍也不細矣今得无咎者誠能副民望而去君疑也九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也義曰此釋九五之爻辭同聲相應同氣相求者此釋聲氣自然相感之道也同聲若彈宫而宫應彈商而商􅀿鳴鶴在隂其子和之之類是也同氣若天欲雨而柱礎潤磁石引針琥珀拾芥之類是也水流濕火就燥者此釋无情之物自然相應夫地體卑下水性就下其流必就卑濕也火本炎上其性燥故焚其芻薪必先於燥也雲從龍風從虎者此言有情感无情也龍者水畜雲者水氣故龍吟則景雲出虎是猛威之物而風亦是震動之氣故虎嘯則谷風生聖人作而萬物覩者言聖人之作光明盛大與天地合徳萬物莫不遍燭夫天地感應而生萬物聖人感應而用天下之賢共成天下之業敷為皇極之教而天下萬物莫不觀覩之也前言大人造是聖人營造興制之時此統言之故曰聖人作而萬物覩也本乎天者親上本乎地者親下者此言本天則動物也本地則植物也言天之運動而飛物亦動地之凝静而植物亦静此聖人推舉自然之理以明之也上九曰亢龍有悔何謂也子曰貴而无位高而无民賢人在下位而无輔是以動而有悔也義曰夫卦之六爻上與初為无位初則未中上則過中是雖在高貴而无大中之位既貴而无位以居于尊高則安得天下之民也賢人在下位而无輔者今既亢極則賢雖在下位而亦不輔佐矣夫如是則動静之間皆有悔也潛龍勿用下也見龍在田時舎也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也義曰此以下至天下治也文言之第三節全以人事明其義也濳龍勿用下也者言聖人有龍徳在於潛隠之時故聖人戒其勿用此為徳者以其功不及物居无位之地而處于卑下也見龍在田時舎也者舎棄舎也若仲尼有聖人之徳而无其位當衰周之時皇皇汲汲而不得見于世是為時之所棄舎也夫既為時棄舎然而前又言徳施普也及天下文明者何也前盖以聖人之徳言之也此所謂時舎者以位言之也終日乾乾行事也者言九三居人臣之極位有奉上率下之責至難至重故終日之間乾乾不息以行當位之事也或躍在淵自試也者言九四已離下卦而居上卦之下逼近至尊慮有僭上之嫌故疑之而或騰躍以試己之才徳副天下之望也飛龍在天上治也者言聖人有龍徳而居天位以興天下之治也亢龍有悔窮之災也者言聖人當過亢之年其精力耗倦若不求所代以終其位則必有窮極之災也乾元用九天下治也者言乾以一元之氣自濳至飛終始本末能用陽剛之徳以生成萬物在聖人則有剛明之道以一己不能盡天下之治固在左右前後大臣小臣皆能用剛正之君子然後得天下治矣濳龍勿用陽氣濳藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天徳亢龍有悔與時偕極乾元用九乃見天則義曰此以下文言之第四節全以天氣明其義也陽氣濳藏者言建子之月陽氣濳施於地下而藏遁之時也天下文明者言天氣發見於地上使勾萌皆達枯槁畢榮故高下洪纎皆流形品使天下之物有文章而光明也與時偕行者言建寅之月三陽並用之時其卦成泰故君子終日之間乾乾不已與天時相契而行也乾道乃革者言九四離下卦之上而入上卦之下故其道有所變革也乃位乎天徳者言天者積諸陽氣而成今九五之爻以剛陽之徳居至尊之地是位本乎天位者也與時偕極者言四月之間陽氣盛極如聖人當耄期之年是與時偕極也乃見天則者言乾元能用剛陽之徳乃顯天之法則也乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乘六龍以御天也雲行雨施天下平也義曰此以下文言之第五節又重釋乾之四徳也乾元者始而亨者也者元始也亨通也言乾以一元之氣始生萬物萬物皆資始于一元然後得其亨通故於春則芽者萌者盡達至夏則繁盛是乾以一元之氣始生于物而物得其亨通也利貞者性情也者言萬物既生而繁盛則必漸成之故利於秋貞於冬當秋之時則萬物和漸而成至於冬則幹了而无不獲其正性言之人事則聖人能生成天下民物使皆獲其利而不失其正者葢能性其情也何則葢性者天生之質仁義禮智信五常之道无不備具故禀之為正性喜怒哀樂愛惡欲七者之來皆由物誘於外則情見於内故流之為邪情唯聖人則能使萬物得其利而不失其正者是能性其情不使外物遷之也然則聖人之情固有也所以不為之邪者但能以正性制之耳不私于己而與天下同也聖人莫不有喜之情若夫舉賢賞善興利于天下是與天下同其喜也聖人莫不有怒之情若夫大姦大惡反道敗徳者從而誅之是與天下同其怒也聖人莫不有哀之情若夫鰥寡孤獨則拯恤之凶荒札厲則賙貸之是與天下同其哀也聖人莫不有樂之情若夫人情欲夀則生而不傷人情欲安則扶而不危若此之類是與天下同其樂也是皆聖人有其情則制之以正性故發於外則為中和之教而天下得其利也小人則反是故以情而亂其性以至流惡之深則一身不保况欲天下之利正乎乾始能以美利利天下不言所利大矣哉者此又嘆美乾之徳言乾始以一元而生成美利于天下于卦不言所利者誠由至廣至大无有限極故不可以所利言之也然則易卦有具四徳者七其餘皆言所利若坤言利牝馬之貞屯言利建侯之類是也葢有所係然耳獨乾徳至大故不可言所利也其曰大哉乾乎剛健中正純粹精也者此言乾之徳至大而不可窮測也以其剛健運行晝夜之間凡行九十餘萬里而无毫釐之過與不及至於春夏以生秋冬以成自古逮今未嘗違悖是其至健而不失中正也所以然者葢以至純至粹精健而不雜故也六爻發揮旁通情也者言乾之六爻或濳或見或躍或飛而跡皆不同故發越揮散則可以見聖人出處進退之情也時乘六龍以御天也者已解在彖雲行雨施天下平也者言乾以一元之氣布而為雲散而為雨以生成天下而无不均也君子以成徳為行日可見之行也潛之為言也隠而未見行而未成是以君子弗用也義曰自此至其唯聖人乎文言之第六節也此一節復釋潛龍之言故先發上二句以明不可用潛龍為徳也言君子之人得其天性之全故五常之道亦必博學審問然後修成其徳為常行之行而發之於天下使天下之人日見其所行此謂君子之常道也潛之為言也隐而未見行而未成是以君子弗用也者夫君子之人既以成徳為行為心則不可專務隠晦今之潛則是以聖人之資性反在于潛遁未見之時也行而未成者言既有聖人之性則必學之問之修成其道而為行於己然後用之於外則可以成聖人之全徳今止以潛遁為心則是有聖人之資質而不學不問亦終不能成行于已是與不聖同矣故聖人于此戒之言是以君子弗用此潛龍為徳也君子學以聚之問以辨之寛以居之仁以行之易曰見龍在田利見大人君徳也義曰此釋九二爻辭也言君子之人禀天之全性發見于世而能執中庸之道者也何哉盖聖人雖得天生善性之全亦須廣博其學以精其徳審問以辨其疑而又寛裕居其時以畜聚其事業而志于逺大是以執其中庸而不有妄動以至推仁義以愛人示恩信以撫物其徳業恢廣无所不至使天下之賢智者可以俯就天下之愚不肖者可以企及此皆由博學審問寛居仁行之然也是故庸人之情苟一善得于已則必悻悻然耻于下問而又躁妄以求其進所居失其寛所行失其仁是故業不能成於逺大而終為淺丈夫矣故聖人又于此歎美九二之徳言其見龍在田以其有人君之徳而无人君之位耳九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危无咎矣義曰此又釋九三之爻葢此一卦上下皆乾是重剛也三四介重剛之間下已過于二上不及于五故皆曰重剛而不中也上不在天非九五之君也下不在田非九二之臣也正當大臣之位上有一人之奉下有百官萬民之責故乾乾因其時而惕懼不敢遑安如此則雖在危地亦可无咎九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故无咎義曰此又釋九四之爻乾之六爻上二爻為天下二爻為地中二爻為人備三才也此九四一爻上不在天下不在田中不在人是中不在人臣而正得儲君之位既為儲貳則進退上下皆有疑惑故所進而上者修徳也所退而下者守位也夫如是故无咎矣夫大人者與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况于人乎况于鬼神乎義曰此又釋九五之爻大人者大才大徳之人也夫天高而覆地厚而載故其徳曰生聖人亦能以仁愛生成於物故與天地合徳日月至明故无幽无隠皆燭之而聖人亦能同其明天以春夏秋冬而生成肅殺聖人亦能以仁義刑政化天下故與四時合其序鬼神之為道善者福之淫者禍之聖人則賞善罰惡是與鬼神合其吉凶先于天時而行事則天弗違之是天合大人也後於天時而行事則奉順於天時是大人合天也以天之至大而聖人合之况于人與鬼神乎亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎義曰此又釋上九之爻亢之為言但知進而不知退知存而不知亡知得而不知喪如此之類皆聖人之所不為是亢而招悔者也唯聖人為能知進而不忘退知存而不忘亡知得而不忘喪故于衰耗之年則求所代而終之堯舜禹是也上一句其唯聖人乎于義不安當為羨文坤坤下坤上坤義曰此伏羲所畫文王所重純隂之卦也上下六爻皆隂以象地積諸隂氣而成也坤者順也言坤柔順之徳上承于天以生成萬物猶臣以柔順之徳上奉于君以生成萬民也元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉義曰此一節是文王所作卦下之彖辭也凡坤之四徳與乾之四徳同也但乾以剛健之徳資始萬物坤以柔順之徳資生其形也其言利牝馬之貞者盖乾體至大全用剛徳故于乾卦之下直言元亨利貞而不言所利也今坤主臣道故言利牝馬之貞者盖馬取其服乘有善行之才而又牝馬順之至也以言地之為道能順承天之氣以生成萬物无有休息若人臣順承于君而能宣君之令行君之事皆不失其正道故言利牝馬之貞也君子有攸往者夫坤體之利唯至順至正然後不失其常道人臣之分亦當執其正而濟之以順若順而不正則失于諂媚若正而不順則失于悍愎而有先君之事是故惟君子有全徳乃能循此道始終不失其分以此而往无所不利故曰君子有攸往也先迷後得主利者夫乾者天道坤者地道言之人事則乾為君為父為夫坤為臣為子為婦言其分則君倡而臣和父作而子述夫行而婦從若臣先君而倡子先父而作婦先夫而行則是亂常道也若能處其後而順行其事不為事先則得其主守而不失為臣為子為婦之道也西南得朋者西南致養之地隂之位也今坤本隂以隂之隂是得其朋類而行若君子未仕之時必得明師賢友以相切磋盖聖賢事業尤甚淵博獨學則不能成獨見則不能明固須資于朋類而後有所至也故伐木詩曰自天子至庶人未有不須友以成也是言人必得朋類而事業可成也東北喪朋者西南為隂位東北為陽位今離西南而反之東北是以隂之陽喪失其朋類如君子之人與師友講成道徳及其業已就其性已明務行其道而薦身於朝廷之間以求致君澤民之事是喪失其朋類者也安貞吉者言地體安静而永守其正若天氣降於地地則承而發生是不妄有所發也如臣之輔君當常守安静貞正之徳待君倡然後和之是亦不妄有所動故得獲其吉也彖曰至哉坤元萬物資生乃順承天坤厚載物徳合无疆含𢎞光大品物咸亨牝馬地類行地无疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地无疆義曰此以下先聖釋文王彖辭之辭至哉坤元萬物資生乃順承天此三句釋坤元之徳也故先嘆美之言至哉者盖坤主承天之氣而生萬物之形必有所至也萬物資生者言一元之氣降于地為萬物之始也承一元之氣以生萬物之形是天下萬品之物莫不資取於坤元而生其形質也乃順承天者蓋地得天之降氣然後順從而發生萬物也坤厚載物徳合无疆此二句釋坤之自然之徳也坤厚載物者言地道博厚于天下之物高下洪纎无不持載无不包容也徳合无疆者言地者形之名坤者地之用是地之形則至廣至大而無疆畔若其徳則持載生育萬物大无不周逺无不及是坤之徳亦合地形之无疆也含𢎞光大品物咸亨者此釋亨之徳也含包也𢎞厚也光明也大盛也謂之含者言坤之為體无所不包无所不周謂之𢎞者言博厚而无所不載謂之光者言萬物由地而生皆得亨通而光明謂之大者言其體至廣至大謂坤之有此四徳然後萬物繁植得其亨通也牝馬地類行地无疆者此釋利牝馬之貞言地之為道生成萬物无有休息馬為人所服乘亦能行之不息是為地之倫類而行之无疆也柔順利貞君子攸行者此釋君子有攸往之義言君子之人能柔和謙順以盡其為臣之節而又不失其正是所往无不獲其利也先迷失道後順得常者此釋先迷後得主利之義言為人子為人臣為人婦其為道必須待倡而後和行而後隨若首先而行則迷惑錯亂而失其道若所行居人之後而順承其上乃得君子之常道也西南得朋乃與類行者已釋在前東北喪朋乃終有慶者此言君子已仕進用朝廷上以致君下以澤民以施已之素藴是終獲其美慶之道也安貞之吉應地无疆者此言坤之所以安静守正而得吉者蓋由承天之氣以發育萬物无所不得其生是其徳之无疆也君子之人上承於君亦當安然守至正之徳而不為事始不為物先待君令而後行此其所以獲吉也是其徳應地无疆也象曰地勢坤君子以厚徳載物義曰此先聖大象之辭言地之形體固本柔順柔順者地之勢也故能生成萬物之形質也君子以厚徳載物者言君子之人法地之道以寛厚其徳使其器業廣大𢎞博无所不容以載萬物使萬物无不得其所皆如地之容載也初六履霜堅氷至象曰履霜堅氷隂始凝也馴致其道至堅氷也義曰言履霜者隂氣始凝結之時也堅氷者隂氣極盛之時也夫坤之六爻皆隂而初六居其最下是隂氣始凝之時也大凡隂之為氣至柔至微不可得而見故自建午之月則一隂之氣始萌於地下以至于秋人但見其物之衰剥時之愴慘且不知其隂之所由來然于履霜之時則是其迹已見故可以推測其必至于堅氷也以人事言之則人君御臣之法此其始也夫人之深情厚意不易外測故大姦若忠是也然為臣而佐君必有行事之迹於其始善善惡惡可得而度之故在人君早見之也見其人臣之間始有能竭節報効則知終必有黄裳之吉乃任而用之使之由小官至于大官則為國家之福若姦邪小人其有諂佞之状一露則知積日累乆必至於龍戰之時故當早辨而黜退之則其惡不能萌漸也若使至于大位以僭竊侵陵則惡亦不易解矣是由履霜之積積而不已終至堅氷是冝辨之在始也象曰履霜堅氷隂始凝也者言隂之至于履霜是隂氣始凝之時也堅氷二字當為羨文盖下文已有至堅氷也馴至其道至堅氷也者盖馴者馴狎之義謂臣之積惡有漸乆而不已則至大患也六二直方大不習无不利象曰六二之動直以方也不習无不利地道光也義曰直正也待夫陽之至然後發而生成萬物是其體安静守正而不為物之先也方義也義冝也言生物无私使各得其宜也大者言地體至大无所不包无所不容也不習无不利者言坤有三徳自然而物生故不待修習而後能以人事言之則君子之人其徳素藴其行素著聖賢之事業已習之于始至此用之朝廷之上隨時而行之且非臨事而乃營習故无所不利是以孟子四十不動心者此也於卦則二為地之上是萬物發生之時也故三徳之備地道之美盡於此矣象曰六二之動直以方也不習无不利地道光也者言六二以直方大之三徳發動而生物无不得其冝盖以自然之質不勞而生不為而成光大之至也六三含章可貞或從王事无成有終象曰含章可貞以時發也或從王事知光大也義曰含畜也章美也貞正也言六三陽位今以隂居之是能執謙不敢為事之倡始故内畜聖賢之事章美之道待君之所令及謀議之所至則從而發其章美之道以進于君如此是得臣子之正或從王事无成有終者言六三之君子執臣子之分不敢先倡待君有命然後從而行之既行之又歸美于君而不敢居其成功但竭節盡忠而終于為臣之分也象曰含章可貞以時發也者言人臣含畜章美之道若謀議未及而先發之非其時而宣行之使天下之人但知臣之所為而不知君之所命則失所以為臣之分也今含畜章美俟可發而發之然後功成于己即歸之于君而不失臣子之分也或從王事知光大也者此言君子待君之命而從之則是君子之智益光明而盛大也六四括囊无咎无譽象曰括囊无咎愼不害也義曰括結也囊所以盛物也坤是隂卦六四本隂位又以隂居之則是隂陽之道不交而君臣之間不相接也然六四既當此否塞之時則必括結其囊藏其徳卷而懐之以待其時无咎者言六四有聖賢之才若非時而進則為小人所害今既能韜光晦迹故得无咎也无譽者言六四既括結其囊所以歛其才徳則天下之美譽何由而至哉故曰无咎无譽也象曰括囊无咎慎不害也者言六四當君臣不交之時而能慎宻而不出則小人雖有殘賊之心而欲害之必不能及也六五黄裳元吉象曰黄裳元吉文在中也義曰黄者中之色裳者下之飾盖衣譬其君裳喻其臣以六五居上卦之中而當公卿之位是能執中道施美利而暢於四方故獲元大之吉也象曰黄裳元吉文在中也者大凡五色備具謂之文今六五能居中而施其美利自内及外自朝廷及天下是得黄中之色而可以見四方之色也上六龍戰于野其血𤣥黄象曰龍戰于野其道窮也義曰龍者陽之氣戰者戰敵之稱野者非龍之所處言隂之為物至微至柔積而不已至于彰著必成堅氷盖自履霜若能積其善杜其惡及其終則有黄裳之大吉若不能杜其惡以至害于而家凶于而國終有龍戰之災也夫姦臣賊子之為心其禍亂之萌包蔵之乆至此既不可遽滅之則必有賢明之君起而誅討之然而以陽來勝隂不无相傷故血𤣥黄也𤣥者天之色黄者地之色言上下相傷之甚也象曰龍戰于野其道窮也者言自細惡而不辨至于盛大以及于戰是其道之窮極也用六利永貞象曰用六永貞以大終也義曰此言六者隂之位自初至終皆有柔順之徳故曰用六然既柔順而不守其正則為邪為惡故純用柔順則利在永長守其貞正則不失臣子之道也象曰用六永貞以大終也者言既能用其柔順又能永守貞正之道則是臣子能以大義而終也文言曰坤至柔而動也剛至静而徳方後得主而有常含萬物而化光坤道其順乎承天而時行義曰此以下仲尼之文言釋坤之徳也坤至柔而動也剛者言坤之體用至柔得天之降氣然後生成萬物之形質无不持載是其動則至剛也至静而徳方者言地體凝静不妄有所動待天之降氣然後始發生萬物若天氣不降于下則凝結安静而其徳至方至正不妄有所發也後得主而有常者此釋文王之彖辭也凡為人臣之道必待君倡而後和君令而後從不敢居事之先則得所守而不失臣子之常也含萬物而化光者此釋含𢎞光大之義言地之道含養萬物其徳𢎞厚而光大也坤道其順乎承天而時行者此仲尼嘆美坤卦之辭言坤道至柔至順承天之道順時而行之若春則生秋則成是也以人事言之若臣奉君之命以時而行之皆无不得其宜也積善之家必有餘慶積不善之家必有餘殃臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅氷至盖言順也義曰此釋初六之爻辭也積善之家必有餘慶此釋履霜之義因先發此文言君子之人不以小善為无益而不為故積日累乆至于大善延及于乃子乃孫皆獲慶善之餘也故中庸曰舜其大孝也與徳為聖人尊為天子富有四海之内宗廟饗之子孫保之故大徳必得其位必得其禄必得其名必得其夀其言大舜自匹夫有一小善未嘗捨去以至積為大善而終享聖人之位流慶于後此積善之慶也積不善之家必有餘殃者夫小人以小惡為无傷而弗去故積小惡以至大惡累小罪以及大罪而終有殃禍加之于身以至乃子乃孫皆受餘殃也臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辨之不早辨也者言君素寵其臣父素寵其子寵而不已耳目之所狎習荏成凶惡以至包蔵禍賊之心非在弑君之朝弑父之夕驟使然也盖由積乆漸漬而成其凶災也如此由君之不早辨其臣父之不早辨其子故也易曰履霜堅氷至盖言順也者此先聖因履霜之戒故引上文以結盖言順者是言履霜而至堅氷由順而積至之也直其正也方其義也君子敬以直内義以方外敬義立而徳不孤直方大不習无不利則不疑其所行也義曰此釋六二之爻辭也直其正也者言地之為道不為妄動必待天氣至而後發之故其徳无有不正也方其義也者義冝也言地之為徳四時之間生育萬物終始皆得其冝也君子敬以直内者凡人有忿怒之氣皆出于心之不敬故君子之人既執直于内則必濟之以恭敬也以之事君而能恭敬其顔色内有執直不回之心則反覆之間皆合于道也義以方外者夫君子外有廉隅方正而立則邪不能入然而所行又能合其宜則于事无不通濟也夫直而不敬則傷于訐方正而不得其冝則傷于愎故君子直則必敬于内方則必合于外也敬義立而徳不孤者言君子之人内直以敬外方以義則其徳不孤也何則盖君子既以敬義接于人則人亦以敬義反于已是不孤也直方大不習无不利則不疑其所行也者夫直而不邪正而謙恭義則與物无競方則凝重不躁如此既不假營習而无所不利則不須疑慮其所行而皆中于道也故曰不疑其所行也隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道无成而代有終也義曰此釋六三之爻辭也言為臣之道當内含章美之徳以待君議論之所及詢謀之所至然後發已之素藴以贊行君之事業輔成君之教化及其有所成功則歸美其君而不敢自居其成功此所以盡為臣為子之分故曰隂雖有美含之以從王事弗敢成也地道也妻道也臣道也者此先聖釋地之道因舉大綱而言之盖凡為子當奉于父為弟當事于兄卑者當事于尊之類皆下奉上之道也地道无成而代有終也者言地之為徳必待天之氣至然後發之以賛成天之生育之徳是得其地道大終之義也天地變化草木蕃天地閉賢人隠易曰括囊无咎无譽蓋言謹也義曰此釋六四之爻辭也天地變化若陽下交隂隂上交陽隂陽交通故能生成萬物而草木品類皆得蕃昌猶如君臣之道交接則天下得其安也故曰天地變化草木蕃也天地閉賢人隠者言天地不交隂陽不通則草木枯槁而萬物衰滅猶君不交于臣臣不交于君君臣道塞則賢者退隠也盖坤為隂卦四本隂位又以隂居之是天地閉塞隂陽不交之時是猶君不交于臣而賢者退而自處也若於此不能退則為小人之害也易曰括囊无咎无譽盖言謹也者言賢者當此之時既能括結其囊而自處是能謹慎而避害也君子黄中通理正位居體美在其中而暢于四支發于事業美之至也義曰此釋六五之爻辭也黄者中之色居其中則通于四方之理言其黄則極于四方之色今六五之君子有此黄中之徳故能通天下之物理也正位居體者言六五位極公相是得其正也而又執柔順之道以全臣子之節是居其體也美在其中而暢于四支發于事業美之至也者言六五正居公相之位内總百揆外統九州牧伯而又作樂以興天下之和制禮以正天下之序施刑以懲天下之惡為政以正天下之治是皆内含章美之道以通暢于四支開發天下之事業如此是文明章美之極至者也隂疑于陽必戰為其嫌于无陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黄者天地之雜也天𤣥而地黄義曰此釋上六之爻辭也言其疑者盖其始不杜凶惡之漸以至于極盛則疑忌之心生而僭竊禍亂之事作以至見侵于陽而陽與之戰也為其嫌于无陽也故稱龍焉者此坤六爻皆隂故无陽龍陽也此稱之者盖言隂至于此既已極盛則是至于建子之月必有一陽之生以消退羣隂使之不能有為也猶如亂臣賊子為惡已甚則必有剛明之君子與之戰而滅之也此盖聖人不容隂之過盛故稱龍以存戒也猶未離其類也故稱血焉者言陽微隂盛以至相敵然而隂雖至極猶不能離其隂類故雖見敵于陽但稱血也猶臣雖盛極見侵于君猶不能離臣之分也夫𤣥黄者天地之雜也天𤣥而地黄者𤣥天之色黄地之色以其上下相敵必有相傷故𤣥黄之色錯雜于其間然隂雖至盛終不能勝于陽猶臣之道惡雖至盛亦終不能有其成也此皆聖人存戒于人君言于履霜之時則必察其臣之所為而進退之故至此可无龍戰之事也周易口義卷一
