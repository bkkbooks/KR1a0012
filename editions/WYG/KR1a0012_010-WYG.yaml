body:
  text: 周易口義卷十宋胡瑗撰下經兌兊下兊上兌亨利貞義曰按序卦云入而後說之故受之以兊言人能以柔順之道入于人則人皆說之故次于巽然謂之兌者其象為澤其性為悅所以為天下說之之法也然澤者水之所聚而滋息萬物以為生成之功使之皆得滋養而說懌也然不謂說而謂之兊者盖聖賢之人將欲感天下之心必當以仁義之道恩恵之事固不可以言語口舌而為說故去其言而為兊也亨者言聖賢發仁施恵布徳澤以說天下之人使天下之人皆感說之故得其亨通也利貞者夫感說之道多失于邪若小人之人止以淫聲媚色雕牆峻宇流連荒亡以說于心巧言令色柔佞邪諂以苟容于人如此皆所以喪身敗徳以至亡家失天下是說非正然也故聖賢之人施其感說之道皆本于至正則无所不利也彖曰兌說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉義曰剛中而柔外說以利貞者言此卦内二爻為剛外爻為柔言所以感說人者當内有其剛外示以柔然而止有剛則至暴而无以感說天下之心故當外示之以柔内既剛外復柔以此說人則人皆說而歸之是得其正而无所不利也是以順乎天而應乎人者夫天之體之徳運動而不已是至剛者也及其降氣以生成萬物則至柔而不失其柔也人之情莫不好安逸而惡危亡說仁義而懼鄙吝今聖賢之人内有剛眀之徳而外示柔順之道施其仁義發其恩恵以說于天下是上能順乎天之心而下能應乎人之情也說以先民民忘其勞者民之情皆欲安而惡勞若聖賢之人將欲役使之必當發其仁義恩恵感說之則民從其役使而忘勞苦之心也夫就死者人之所難也聖賢先能發仁義徳澤然後使之冒犯大難至于死地則民亦說樂而從之无有怨也說之大民勸矣哉者夫施說之道固非小小之事可以感懐天下之心必須有仁義徳澤以遍施天下使民雖從其勞役犯其死難皆无怨心况乎納之以善教民固勸而說從之矣象曰麗澤兌君子以朋友講習義曰上下二體皆兌是二澤相麗也夫水之聚于一澤之中則能滋息萬物而使之皆得其說懌而况二澤相麗是其說之大者也君子觀是象凡施說之道必當施之于大而至于久遠若小人惟以淺近為說以快己之欲然至于久逺則不能无厭倦之心厭倦既生至喪身亡家敗國失天下皆由于此故君子之人當說其大者惟朋友講習盖朋友之道同心同徳其志氣相契所講者聖人之道徳所習者聖賢之事業日聞其所不聞日見其所不見使道徳事業愈久而愈新皆无其厭倦之心是為說之道莫重于此也初九和兌吉象曰和兊之吉行未疑也義曰和謂中和也夫兌者西方之卦也以四時言之則爲秋秋所以成萬物萬物皆說而成也君子之人在上以義制天下之民使之感說而歸之故當廣發其中和之教所應不係于一无心于物而使之自然感說而從之則不失其兌之義也今初九居兌之始是能剛中而柔外以施其說也何則盖以其有剛明之才故曰剛中體夫兌說故曰柔外夫内既剛外又柔是能以中和之道說天下之人心无所係故得天下之懽心而獲其吉者也象曰和兌之吉行未疑也者初九能以中和之道上不係應而行不在私故以此而施說于人則人皆說而從之復何所疑哉九二孚兌吉悔亡象曰孚兌之吉信志也義曰此爻以陽居隂履非其正本有悔者也然以剛居中是其有至信發之于中而施說于人不為邪僻不為非妄使天下之人皆必信之以至歡心而歸一獲其吉是得其所以為說之道悔遂亡矣象曰孚兌之吉信志也者能以由中之信發于己之志而施說于天下天下之人莫不說而歸之六三来兌凶象曰来兌之凶位不當也義曰夫感說之道必須至公至正无所偏係使天下之人自然而說之則可也固不可以言語口舌柔邪以苟取于人而求其說今六三當施說之世以隂居陽又在一卦之上是履不得中行不得正以不中不正之道是欲以柔邪諂佞姑息苟且以来天下之說雖天下之民一時懽心而說從之終无其道以久說斯民以是施說非凶而何九四商兌未寧介疾有喜象曰九四之喜有慶也義曰商謂商議裁制也寧安也介隔也疾謂六三也九四以剛明之資居上卦之下切近九五之君是居得大位與持重權者也既為權位之臣則邪媚之人皆欲以甘言巧語柔佞之道以苟說于己將以希進用之地然小人之徒止欲榮進一身而已若使進而有位則上必為害于君下必為害于民君民之間皆被其疾害是則九四既有權位人求說已及已之說人皆當商議裁制其所說之義則不失其正然既商議裁制則旦夕憂慮常恐小人之進故未能斯須遑安也介疾有喜者六三既以柔邪欲說于己欲圖進其身苟進之則為君民之害矣故九四則當施剛眀之徳以裁制而介隔杜絶之既能介隔六三之小人則天下之賢者得以進天下之民皆得其安上以致國于太平下以納民于富夀之域是有其喜慶者也象曰九四之喜有慶也者九四所以有喜者葢由能介隔六三諂佞之小人使不得進所以杜君民之害使賢者得路以施仁義於天下獲其福慶之事也九五孚于剥有厲象曰孚于剥位正當也義曰孚信也剥刻也夫聖賢之人皆以仁義為先若使之進于有位則上可以致君于无過之地下可以躋民於富夀之域使天下罔有一民一物不得其所而不被其福慶也此聖賢之所用心也小人則不然外以柔邪諂佞内以貪殘狠毒為心若使之見用于上必為亂于君于下必為害于民以至天下皆被其剝刻然則為天下者欲治于民莫若以至誠委任天下之賢使推其仁義之心以布澤流恵則天下不勞而治矣今九五以剛明中正之徳居至尊之位為兌之主是有可致之資既有其資則當信任其賢明有徳之人以輔助于己故天下皆被其賜矣且五雖本應于九二九二有剛正之徳而已不能盡柔巽以任用之反比于上六邪佞不正之臣是所信者剥刻之小人也既信剥刻之小人則賢者退而朝廷昏亂紀綱廢弛以至害于國而及乎天下是其危厲之甚也象曰孚于剝位正當也者此聖人戒之之辭也言九五居可致之位操可致之資反委任上六柔邪之小人以剥刻君子自取危厲故于此切戒之責于五也上六引兌象曰上六引兊未光也義曰引者牽引之辭也言上六以隂柔居一卦之極當无位之地故欲以柔邪不正之道苟且以牽引天下之民欲使盡歸說于已象曰上六引兌未光也者夫施說之道一失其正則皆為私邪而不可行况其以柔佞欲苟說于人乎今上六既然故雖得人之說其道亦未足為光大也渙坎下巽上渙亨王假有廟利涉大川利貞義曰按序卦云說而後散之故受之以渙渙散也離也釋也言人樂極則憂歡極則悲歡樂之極久而不已以至離散故渙次于兌然渙者是人心睽離上下違散之謂也亨者言上下所以渙散故民所以睽離盖由道有所壅塞志有所不通是以渙散故君子當此之時必以權變之術剛眀之徳釋去民之險難以和衆情以導衆志使皆得萃聚而至于亨通故曰渙亨也王假有廟者言人精氣體魄萃則生散則死精氣散之于天則為神體魄歸之于地則為鬼㝠冥然倀倀然幽邈而不知所之為人子者思欲追念其容貌竭心以奉養雖有悽愴之懐不可得而見之故先王因此渙散之義思欲萃聚其親之神靈故假立其廟以狀先祖之容貌于是四時追感設為祭祀之禮以薦享之所以表追念悽愴之心而又燔燎羶薌以達諸陽酌鬱鬯芬香之酒沃之于地以達諸隂所以盡孝子思親之志教天下追思奉先之道也利涉大川者大川險阻之謂也夫渙散之時民心違離上下相戾必不能涉其大川是故聖賢君子必起而濟之雖甚大險必往救其生靈不可懼其患難是利在涉此大川以拯天下渙散使皆萃聚不至離散而各得其濟也所以能然者盖巽體属木涉于川而无沉溺之患故古之聖人刳木為舟剡木為楫舟楫之利以濟不通是巽木能涉于水也猶聖人有才智而又有剛健之徳能拯民之患難无有不濟者也利貞者言離散之時不以正道而拯濟之則人心愈肆而邪僻之事從而至矣故聖賢之人當此之際利守正道則可萃天下之民也彖曰渙亨剛来而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乗木有功也義曰剛来而不窮者此言九二有剛陽之徳来居坎險之中而上无所應然已有剛眀之才終不陷身于窮困也柔得位乎外而上同者此言六四以隂居隂居得其正而在上卦之下是位乎外也既居外卦之下下无其應然上比九五之君九五亦无應故與之志合而相得同心戮力上與五同渙散天下之難萃聚天下之民而濟之也王假有廟王乃在中也者言人體魄既散幽隂而難見是故王者假立此廟以萃其容貌四時祭祀以表悽愴之心然而立其廟宇設其祭祀追思念舊不可以瀆不可以疏是王者教人之孝亦在中道者也利涉大川乗木有功也者言川者水之聚濟之以舟楫今下體坎坎為水故為川上體巽㢲為木故為舟繫辭曰刳木為舟剡木為楫是唯舟楫為能利涉大川猶聖賢當此渙散之時必須冒涉險難使渙散者皆萃聚之故往則有功也象曰風行水上渙先王以享于帝立廟義曰夫風行水上渙然而散是得渙之象也帝即天帝也以形言之謂之天以氣言之謂之隂陽以主宰言之謂之帝言先王當此渙散之時設其郊祀備其物儀薦享于天地以報成功也立廟者言萃聚先祖之精神立為廟貌四時祭之以表悽愴之心奉先之道也初六用拯馬壯吉象曰初六之吉順也義曰夫渙散之時人民既違散上下既乖離救之緩則情偽交作姦邪並起无所不至事難濟矣今此初六以隂柔之質居一卦之下又在渙散之始是往而拯之不可後時固當用剛壯之馬急于解民之難使得萃而不散吉之道也象曰初六之吉順也者言當此渙散之時固不可以剛暴拯濟之苟尚剛暴則民愈怨而心愈離今初九既以隂柔居于卦下而復在事初能執柔順之道以拯濟之故得其吉也九二渙奔其机悔亡象曰渙奔其机得願也義曰机者人所倚憑謂初六也此九二當渙散之時以陽居隂失正者也上又无應是无同心同徳合契之人也既无合契之人居又失正是有悔者也然而初亦无應能知事始用拯濟之馬以救天下之渙今二若能奔從于初則是得其所憑倚之地也既得其所憑倚則可以同謀合慮以拯當時之難使天下得其萃聚天下既以萃聚則其悔得以亡矣象曰渙奔其机得願也者言二當渙散之時上无其應道不得行志不得伸其身不能有所濟既能奔從于初與之共謀為慮同心協志而有所憑依則是得中心之所願也六三渙其躬无悔象曰渙其躬志在外也義曰夫有才者或无位有位者或无才或位崇而徳薄㦯志大而位小皆不足以有為也今六三以隂居陽履非其正當渙散之時其徳不能安天下之衆其才不能釋天下之難在險之終有悔者也然而上有上九居一卦之極有剛眀之才以己為正應既以己為正應是以不能固其所守往從于上然雖不能大濟天下之事亦可以釋一身之患而无悔吝也象曰渙其躬志在外也者言三雖居非其位而得上九為之正應往以從之思展其志于天下國家也六四渙其羣元吉渙有丘匪夷所思象曰渙其羣元吉光大也義曰羣衆也天下之渙起于衆心乖離人自為羣六四上承九五當濟渙之任而居隂得正下无私應是大臣秉大公之道以濟天下之渙且又得君以行其志内掌國之機務外宣君之徳意使天下之黨盡散則天下之危以濟天下之難以解天下之心不至于乖離而皆得以萃聚上下悉有所歸有此之功故得盡善元大之吉也渙有丘匪夷所思者夫為人臣者當尊其君為人子者當尊其父然後君父臣子之道正矣丘者臲卼不平之地今六四上奉九五之君下為百官之長當天下渙散乖離之際其承君之命令宣君之徳澤以釋天下之難一責于己是其權既重其職匪易故六四常終日乾乾終夜惕惕竭其臣節能自臲卼不敢少安而亦未嘗敢平其思慮也象曰渙其羣元吉光大也者言渙散之時上下乖離六四獨能執柔順之道以事其君使天下之衆不至離散如是于臣子之道得其光明盛大者也九五渙汗其大號渙王居无咎象曰王居无咎正位也義曰汗者膚腠之所出出則宣人之壅滯愈人之疾然且一出而不可反猶上有教令釋天下之難使天下各得其所者今此九五居至尊之位為渙散之主居得其正履得其中能出其號令布其徳澤宣天下壅滯發天下湮鬱使一令之出而不復反一號之施而不復更善者賞之惡者罰之使天下之人皆信于上咸有所歸是如汗之不反者也渙王居无咎者言九五既居尊位為渙散之主當是時上能自正其位下能任六四之臣宣號令布徳澤釋天下之大難正天下之廣居輔王者之尊位使天下之人皆知上有眀君下有賢臣无渙散之難民得安堵天下合洽則九五之君所以居位而无悔咎矣象曰王居无咎正位也者言九五居至尊之位任賢明之臣萃天下之民而免悔者由所居之得正故也上九渙其血去逖出无咎象曰渙其血逺害也義曰逖者逺也夫天下渙散之時上下乖違情偽叢生利􅊣紛起必有所傷也今此上九居上卦之極處无位之地能全其身獨逺其難不與衆競故渙其血去也逖出无咎者言既居卦極而无位是能獨逺于難所以无咎也象曰渙其血逺害也者既獨居上卦之上是最逺于患害也節兊下坎上節亨苦節不可貞義曰按序卦云物不可以終離故受之以節言凡物不可使之終有離散故必節制之然謂之節者葢節之道在于人之一身則言語飲食心意思慮出處進退以至嗜欲皆有所節使父子有禮上下有等男女有别尊卑有序長幼有倫夫婦有制内外有分皆有所節至于一國以及天下用度禮樂刑政賞罰號令宫室旌旗車輿服器以至稅賦徭役以其時賢不肖各有所處士農工商各守其業富貴貧賤各當其分如此之類舉而言之是修身齊家治國正天下皆有所節故謂之節然其得亨者何盖人之修身以至治天下皆有所節則所往之地所爲之事无不獲亨通也苦節不可貞苦者人之所難嗜者也猶味之苦也夫節之道不可過過則人不樂從以其一身一家節過則猶无大害若于治天下人民之衆而節之太甚則必不樂從是故聖人預為之備曲為之防酌中立法使其車輿器用宫室旌旗衣服制度皆有其節一合于中正苟苦之則天下未易治也且如賦稅之設非欲聚斂其財貨厚取于民以自足已盖有郊廟之祀賓客之供兵儲之備此為國者不可廢也是以不得已而取之取之必有中道故中者天下之通制取之過甚則在下者財匱而不能給取之薄則在上者用度不足是以量時之豐約酌民之厚薄使天下之人樂從而易于輸納可謂得節之道也故夏后氏五十而貢殷人七十而助周人百畝而徹皆什一法而得天下之中彖曰節亨剛柔分而剛得中苦節不可貞其道窮也說以行險當位以節中正以通天地節而四時成節以制度不傷財不害民義曰此因二體以明節亨之義上坎為陽陽為剛下兊為隂隂為柔剛得中者九二九五之爻也夫節所以得亨者陽本在上今處于上隂本在下今居于下是君臣上下各有分也故曰剛柔分也剛得中者言九二九五以剛陽之質居剛陽之位又居得其中履得其正當節之時能為節制之道使天下皆得中制是以亨通也若節不可貞其道窮也者夫節之道不可過過則不能緣人之情而衆不樂從是不可久行于世而為萬代通行之法窮困之道也說以行險者上坎為險下兌為說是說而能行於險也盖言聖人緣人之情酌中以為通制當節之時雖有險阻能以說順行則人亦樂從之也當位以節者言九五有剛眀之徳居至尊之位為節之主是所居當其位而能酌民情為之節制也中正以通者此又言九五居中履正所為節制得其中又得其正得其中則无過與不及之事得其正則不入于私邪是中正所為之道可以通行萬世使天下得盡所以為節制之義也天地節而四時成節以制度不傷財不害民者此已下廣眀節之道也夫天地之道隂陽之序以生以成皆有所節至如生成之終則有風雨霜雪以殺之殺之既終復以春陽為發生之始是天地之道始始終終隂陽相盪寒暑往来不失其序所以能生成萬物此天地盡其為節之道也聖人法天地之道為之節制設其禮法各有常分以至取予无不得其中如是而行自然財不傷而民不害也象曰澤上有水節君子以制數度議徳行義曰夫水之性決之于江河其性沛然順于下莫之與禦今水在澤中則不能順往而流故有節制之象數者名數也度者制度也言君子之人法此節之象定其名數立其制度使禮樂之道度量之分无得過差盡合于中也議徳行者夫人本五常而生其性有全有偏唯聖人受性之全賢人則才智有所偏是以當節之時必量其才之大小隨其徳之優劣以任用之大才者置之大位小才者置之小位若其无徳无行則没身而不用初九不出户庭无咎象曰不出户庭知通塞也義曰户者門之内牖之間也夫人之情莫不欲安逸而惡節制之為禁此節者節人之邪情約人之私欲遏人之非絶人之偽然而節情約欲遏非絶偽人莫不惡之然當節制之始典章未備法度未詳必當慎宻之不可洩機于人苟所行不宻則必為人所窺而敗壊成事如是則法未出而姦生令未下而詐起必不可以節制之也今初九履下卦之下居節制之初是謀事之始故當慎其幾宻不使宣露于人使天下之人由之而不知之而情偽不作巧詐不生則是能慎其幾宻不出户庭之間所以成節制之道而无咎矣象曰不出户庭知通塞也者言初九居事之始所以不出户庭者非是藏其幾宻慎其法制不宣布于天下葢當節制之初典章法度未甚大備不可以宣露于人是能知其時可以通則通之可以塞則塞之通塞不失其宜也故繫辭曰亂之所生則言語以為階君不宻則失臣臣不宻則失身幾事不宻則害成言大凡幾宻之事必當慎之苟宣露于人則君失臣臣失身以至天下皆失其節如是則不能免于咎也九二不出門庭凶象曰不出門庭凶失時極也義曰在外謂之門大凡居事之始節人之情偽必當慎重而幾宻之故初九在卦之始處節之初典章未備法度未完故幾密而不宣露于人是以不出户庭也今此九二居卦之中是典章已備法度已立必當宣布于天下以制節于人情使其姦偽不敢萌巧詐不得作天下之人皆合于中制可也今有可致之資而反不出門庭之間使制度不立上下无别以至天下之人皆亂其常則是恣人之情縱人之欲速凶之道也象曰不出門庭失時極也者言九二居得其中而法制已成當行而不行當施而不施使天下之人情偽交作而上下无等節制之道不出門庭之間失時而不宣布以至窮極亦不能行凶其宐矣六三不節若則嗟若无咎象曰不節之嗟又誰咎也義曰若者語辭也夫為節之道必須先正其身然後可以正人身既正則天下孰不從之今六三以陰居陽是為不正在下卦之上是為不中既失其中又非其正且在卦之上是居衆人之上者也夫居衆人之上必也賞必信罰必當正身立法度平典章宣政教以節天下之人則姦偽不作巧詐不生而人自信從之矣今反不能自正其身又不能節制其人是雖有嚴刑峻法人亦不從故反自生嗟怨之聲如是必不可為節制之主也无咎葢三以不正之身居衆人之上不能節制以至嗟若之凶皆已自為之又何咎于人哉故象曰又誰咎也六四安節亨象曰安節之亨承上道也義曰按此爻居上卦之下近九五之尊而又以陰居陰履得其正上承其君下率其民以柔正之道上以節君之情制君之欲防君之邪僻致君于正又能宣君之令布君之徳以去天下人之邪偽禁天下人之非僻使天下之人一歸于正而得節制之道是由以柔正自正其身以至正君率民安然而行其節制故所往无不得其亨通也象曰安節之亨承上道者言六四以柔正之道自正其身上承于君以行節制所以率天下之人得以亨通是承君上之道也九五甘節吉往有尚象曰甘節之吉居位中也義曰甘者味之甘人所嗜也夫節之道是節人之情防人之欲人之所惡也今九五以陽居陽處得其正又居上卦之中履至尊之位為節制之主當節之時能以中正為之節制无過无不及施于當世則天下之人无尊卑長幼上下以至于遠近幽隱皆悦然樂而從之是九五為節之道使人樂從如嗜甘味也所以得其吉矣往有尚者五以中正之道為節制之法可以為世世之通行而天下之民皆樂從之是五有所往則為人尊上者也象曰甘節之吉居位中也者言聖人通其情故能達節常人違其情故多苟節夫能通天下之情不違其理守大中之節不失其時以此而行則合聖人中正之道今五居至尊之位在上卦之中是能正其身而為節制之主使天下之人皆尊尚而從之是居位中正之故也上六苦節貞凶悔亡象曰苦節貞凶其道窮也義曰夫節制之道貴乎中正則人樂從之今上六過于九五是居不得中者也所為節制之道皆過于中是人所厭苦之也以正道言之則已凶矣故曰貞凶然悔亡者夫節制有苦于天下則害其事今上六居无位之地但行于一已而自節苦于一身則可以悔亾故孔子曰禮與其奢也寧儉喪與其易也寧戚是言凡過節于一身則可以无悔也象曰苦節貞凶其道窮也者以陰柔之質居節制之極所為失中正之道而天下之人厭苦之是過為節制之道以至窮極也中孚兌下巽上中孚豚魚吉利涉大川利貞義曰按序卦云節而信之故受之以中孚言聖賢之人為節之道必當以信而行之使乆而不變可以為萬世之法故以中孚次于節謂之中孚者孚信也信由中出故曰中孚葢二陰居中是虚中而發誠信于内出之于性孚信既發于中施之于外則天下必信之矣豚魚吉者豚是獸之至微者也魚是蟲之至隱者也夫聖賢之人所立正教必須信于天下使天下之人皆順從之以至至微至隱之物皆亦被其信是故聖王作為節制斧斤不時不入山林數罟不入汚池昆蟲未蟄不以火田如是之類是皆取之以時用之有節使至微至隱之物皆遂其生而涵濡其性豚魚无識之物猶且被澤而不妄有所傷則有識之類其蒙信也可知矣故曰吉利涉大川者川者險難之地大則有兵革之事小則有宼盜之虞于天則水旱蟲蝗于人則死亾疾疫險難之事也夫節制之道行于世必以至信及于天下不遺微小則天下相信戚疎相睦聖人以此極濟天下之難何所不利哉若不以至信及于上下苟涉大難必有阻溺此中孚之徳猶已及于豚魚則天下之人无不信服上下和同物情不違故涉于大難无不利矣利貞者夫信而不正不若不信故聖賢所節制必須不偏不黨至誠不息不為邪欲所勝則天下皆信其上是所利在于正也彖曰中孚柔在内而剛得中説而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乗木舟虚也中孚以利貞乃應乎天也義曰柔在内者謂六三六四也言三四以柔順處中而四陽居外二陰既處其中則是虚其中也言誠信之道發于中行于外使天下之人皆信之故曰柔在内也剛得中者謂九二九五也二爻皆以剛居中而得正夫剛而不中不正則為私為暴不可信于天下故剛以得中為貴也説而巽孚乃化邦者言此卦下體為兑兑為説上體巽巽為風是九五能以風教權變孚信于天下則天下之人説順而信矣左氏曰小信未孚神弗福也夫聖賢之人不可為小小之信必當立其大信使天下之人皆孚信之上既以由中之信發之于中施之于外无偏黨私曲皆合于中則天下之人皆化上之信姦偽不作巧詐不興亦以至誠至信奉于上故曰乃化邦也豚魚吉信及豚魚者言豚魚所以得吉者蓋由孚信之所及至廣至遠取之有時用之有節不傷其性以至至微至隱皆被其徳故小雅魚麗之詩蓋言萬物衆多也利涉大川乘木舟虚者下兑為澤澤者水也上巽為木木在水上舟之象也夫大川之深至險至浚若以舟楫濟之而居于其中所涉无不濟矣是猶在上者能以節制之道由中之信施為號令風教于天下使天下之人上下以信相接何所不從哉若國有大患人有大難則可以使同心戮力以順從于君而共拯之无危險而不獲其濟中孚以利貞乃應孚天者夫天之道无所不正无所不信故冬至則陽氣應之夏至則陰氣應之寒暑代謝日月往來皆无毫釐之差是天地陰陽寒暑晝夜日月皆有其信而不失其正是天之不言而能信萬物者也今聖賢之人能推由中之信无偏黨之邪以取信于天下使天下皆信之是應乎天也象曰澤上有風中孚君子以議獄緩死義曰澤與風皆生成之道也夫風行澤上物无不從猶君子之人以由中之信施乎外无所不及无所不順也議獄緩死者君子觀是之象以謂獄者繫獄之人就苦而告之以所死者不可復生必推由中之誠原議冤枉察其真偽求其曲直以緩恕其死則可以盡其至信之道也初九虞吉有它不燕象曰初九虞吉志未變也義曰虞度也燕樂也此居兑之始上有六四為之正應然中有九二六三間隔已之應是以初九能度四之正應裁量其情以孚信于己不為二三間隔而變其志自能虞度終以至誠待之故得吉也有它不燕者初既以四為正應雖有二三間之而能虞度之以謂縱有它來從己者己亦執心不變不與之為燕樂也象曰虞吉志未變者此一爻居事之始在兑之初其志専一與四為應其志終不變易矣九二鳴鶴在陰其子和之我有好爵吾與爾靡之象曰其子和之中心願也義曰夫信出于中雖天地亦可以充塞苟无信實雖无識之物亦不已從今九二以剛陽之徳居兌之體在中孚之中而有由中之信以及于下上无其應无所私係在三四重陰之下處幽暗之中而不失其信是以聲聞于外至于天下同類之人以孚信應之若鳴鶴之在陰而其子自然應和我有好爵吾與爾靡之者言聖賢之人既以誠信達于天下上下自然以誠信相交故與之其天爵共天禄而无所離間靡散也言我有美好之爵與爾共散之也蓋至誠所感上下和悦之至也象曰其子和之中心願者言誠信之人願與同類相應今得誠信而應之是中心之所願也六三得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也義曰六三以陰居陽履非其正小人者也切近于四四以陰居陰君子者也夫小人而近君子則必陷于君子是以六三得其所敵故曰得敵既敵必戰則或鼓而進故曰或鼔然小人雖欲害君子君子執正道而无所變易非小人之所能勝則反自罷敝故曰或罷且小人既不克勝而得罪于君子則懼其侵奪故曰或泣然君子守己薄責不為區區之行不屑屑與小人校計則小人獲存而得出于憂懼之地反有所喜故曰或歌以是見六三不中不正所為失道而强弱憂喜之无常也故象曰位不當也六四月幾望馬匹亡无咎象曰馬匹亡絶類上也義曰月者陰之體望者光魄盈滿與日相望之時也此一卦惟六三六四以陰柔居于内而六三以其不正故為小人也六四以陰柔之質居巽順之體居得其正奉九五之君能布徳教以孚萬邦得臣道之正也如月之近望光輝明盛徧照天下然懼招君父之疑常自戒慎不自滿假故曰幾望也馬匹亡无咎者匹謂匹耦羣類也夫君子守其道徳以務遠者大者不與小人校分毫之利害若以君子而與小人校其區區屑屑則賢不肖混淆而君子小人无間以至患害所及今六四雖為六三所侵來與己爭然己得其正犯而不校是以絶其羣類上承于五固守其分養成至徳故獲无咎也象曰馬匹亡絶類上也者言匹馬而亡是獨行也能下絶六三之類上順九五之尊是自能以正道上應于五也九五有孚攣如无咎象曰有孚攣如位正當也義曰攣者牽攣之謂也此九五居至尊之位履正處中也夫居尊而有中正之徳是有至誠至信之心發之于内而交于下以攣天下之心使天下之人皆以誠信奉于上上下内外皆以誠信相通是得為君之道而獲吉復何咎之有上九翰音登于天貞凶象曰翰音登于天何可長也義曰翰者鳥羽之髙飛也此上九在一卦之上居窮極之地是其誠不能自内而出无純誠之心篤實之道徒務其虚聲外飾以矯偽為尚如鳥之飛登于天邈然不見其形杳然莫覩其迹徒聞其虚聲而已貞凶者君子之人所為所作必皆本其純誠篤實光大以感于人而人亦以誠實奉之此君子之謂也今乃居无實之地任无誠之聲以正道觀之可謂凶矣故曰貞凶象曰何可長者言上九徒以虚聲外飾驕于人殊无純誠篤實之行以此而往愈久愈凶故聖人戒之曰何可長如此蓋欲人改過反誠以信實為本也小過艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宐上宐下大吉義曰按序卦云有其信者必行之故受之以小過言聖賢君子有由中之信至誠之道則不以小人之所疑謗而不行固當發之于外以拯天下之失矯天下之弊使至平治而後已故以此次于中孚然謂之小過者葢大過以四陽居内二陰在外本末皆弱上下皆微故聖賢之人以大才大徳過越常分以救天下之大難今此小過以四陰在外二陽居内是綱紀未甚隳壊天下之事少有差忒故聖賢之人小小過行其事以矯正之故若喪過乎哀用過乎儉是皆小有所過也亨者夫聖賢之君既推至誠之道過行小事以矯一時之失則天下之人一歸于大中之道而得亨通也天下皆奢矣嗇儉一已以矯之者晏子一狐裘而三十年是也天下皆薄于喪也哀毁一身以矯之者會子水漿不入于口者七日是也葢人情已弊矯而行之所以勸進于中道也利貞者夫小過之時非常行之時也苟不以至正之道推至誠之心則入于詭譎誕妄天下不能信服之矣故當率己以正然後利也可小事不可大事者夫當小過之時本末未至甚弱政教未至甚頽天下之事小有所差君子固當過越而行其小小之事以矯世勵俗使復趨大中之道可也如當是時不能附順人情而反大過其事不近于民則所為迂遠民无所濟矣飛鳥遺之音者夫鳥之飛騰于空虚但聞其音而不見其跡謂如君子過越中道矯正天下之弊但使民由之而不使知之也不宐上宐下大吉者夫鳥之飛翔雖不見其跡然又不可大過而愈上若愈上而不已則愈窮而不得其所歸故當下而附于物則得其所棲止也猶君子當小過之世乗時藉位矯過常分以正當時不可大越其事逺于人情必當附近民心約附所為然後獲吉也彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宐上宐下大吉上逆而下順也義曰夫小過之時天下之時小有過失君子思欲拯濟之不可大過其分但以小者之事過而行之以矯一時之弊然後得亨也過以利貞與時行也者夫君子所為觀時而動時之大弊則大過其分而行時之小弊則小過其分而行約民中道驅而納之隨事制宐適權應變一皆必出于正故曰過以利貞與時行也柔得中是以小事吉者夫大過二五皆以陽居中故曰可行大事今小過二五皆以柔居中故不可大有所為但小有過為之事則吉也剛失位而不中是以不可大事者夫成大事立大功必有剛明之才居于内柔順之道行于外可也今三四雖有剛明之才徳而居失其位行不得中故不可以行其大事惟小事過可也有飛鳥之象焉者按小過之卦自中孚而來有飛鳥之象者蓋中孚之卦四陽在外二陰在内内虚而外實故上有飛鳥翰音之言今小過四陰在外二陽在内是内實外虚故有飛鳥之象也飛鳥遺之音不宐上宐下大吉上逆而下順者言飛鳥翔空无所依著愈上則愈窮是上則逆也下附物則身可安是下則順也猶君子之人過行其事以矯世勵俗欲民易從必下附人情亦宐下而不宐上也象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉義曰夫雷者出于地今反在山之上是小過之象也君子當天下小有差弊之時將以矯世勵俗驅合于大中之道是以過行小事于身使天下之人觀而化之故若天下之人有所行過差而失于傲慢君子則過恭以矯之若天下之人居喪過差而失于率易君子則過哀以矯之若天下之人用度過差而失于奢侈君子則過儉以矯之是皆君子之人過為小事以矯天下之大中也初六飛鳥以凶象曰飛鳥以凶不可如何也義曰小過之時是君子過行小事以矯一時之失正當時之弊衆所不為而已獨為之皆在于身故取飛鳥之象以明之今初六一爻雖以柔而居下卦之下然所應在四故如飛鳥之愈上而无所附著是以凶也何則蓋小過之時不宐上君子必須應機適變隨事制宐附近于人情而後可也若其所行太過所為己甚雖位在下而志愈上故獲凶也象曰飛鳥以凶不可如何者初六雖在下而已升至窮極而无所容以罹其凶將可奈何哉故曰不可如何也六二過其祖遇其妣不及其君遇其臣无咎象曰不及其君臣不可過也義曰祖始也妣在内也君六五也臣六二也夫小過之君子不可大有所為但小過而合其宐欲矯正天下使一歸于中耳今六二已過于初以柔順處于内故曰過其祖遇其妣也不及其君遇其臣无咎者小過之世不可為己甚之事事為己甚則有僭逼之嫌而罹其上逆之凶葢二在其下比于初則為過比于五則為不及今不敢過越其君以行事正得為臣之體是所遇得其分故无咎也象曰不及其君臣不可過者為臣之分則必奉君之職而行臣之事不敢及于君蓋為臣之道不可過越也九三弗過防之從或戕之凶象曰從或戕之凶如何也義曰小過之時蓋君子行大事以矯正天下不使小人得過也今九三雖處剛陽之位有明斷之質然反不能過防上六之小人而使之得過夫既使小人得過理已乖矣而況復從而應之乎應之則為小人之戕害必矣且小人之心常欲陷害君子惟君子預自防閑不使近于已則得禦小人之術今三為小人所戕蓋不能預防以至優柔不斷是凶禍之來皆自取之也象曰從或戕之凶如何者言既為小人所戕而致凶將如之何哉是不能過防之使然也九四无咎弗過遇之往厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也義曰小過之時不宐上宐下則得其道也今九四雖位上卦之下而應于初六是能下附人情故得无咎也弗過遇之者言小過之時事小有差君子宐過行而矯正之乃權時之宐也今四以陽居陰雖不得正是能過行其事而不至已甚而下附人情使天下之愚不肖皆可企而及之是弗為過甚而遇得其道也往厲必戒勿用永貞者言小過之事切近人情但矯正風俗而已是不可往而過也若往而不已將致危厲之災必須戒慎之不可用此為永長貞正之道此蓋聖人戒慎丁寧之辭也六五密雲不雨自我西郊公弋取彼在穴象曰密雲不雨已上也義曰小過之時小者過也六五以陰居陽履于至尊是小者過而得中小過之主也然以柔居剛又履至尊之位是陰雖極而徳未盛其惠未行故不能為雨澤施于下但為西郊密雲而已何則夫雨者陽氣上騰陰能固止之則相蒸薄而為雨今陽艮止于下不升而交于陰則陰氣雖强盛于上而无陽以通是以不能為雨而雲徒宻結于西郊也西郊謂陰之正位也公弋取彼在穴言六五之陰極盛故稱公也弋者所以射髙也穴者所以隱伏而在下也公以弋繳而取穴中之物猶聖賢雖過行其事意在矯下也然五以柔而處至尊之位无剛陽之徳故止可為公之事也象曰宻雲不雨已上者上當為止傳寫之誤言陽氣已止于下故不雨也豈有陰盛于上陽止而不雨哉蓋陽艮止于下所以不雨也上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也義曰上六一爻過而不已不知所止是亢極之甚而无所遇也若鳥之髙翔不知所止上而愈无所適以至窮極而離于凶禍不能反于下以圖其所安猶人之過而不已不近人情亢已而行故外來之災自招之眚皆有之也既濟離下坎上既濟亨小利貞初吉終亂義曰按序卦云有過物者必濟故受之以既濟既盡也言聖賢君子能過行其事以矯天下之失使天下生靈皆濟于治无所不通此既濟所以次小過也然既濟者是聖賢功業已成教化已行徳澤已著人情已安倉廩衣食皆已實足君臣上下皆已和正軍旅皆已修練四夷皆已賓服无一民一物不得其所以至至纎至悉皆得通濟故曰既濟也亨小者傳寫之誤按彖曰小者亨也此當曰小亨蓋言既濟之時朝廷已盡正教化已盡行故上下遠近纎悉微隱至小之物皆得其所濟而亨通況其大者乎利貞者言天下既濟之後或不守之以正道則逸豫怠惰之心生而放恣邪惡之事形以至罹于凶禍矣故必長守正道則无所不利也初吉終亂者初謂天下之始治夫天下既治惟君子為能兢兢慎持惟恐有失故其始則吉也及其傳之子孫流之後裔則事或乆而多弊治或永而多闕以至逸豫怠惰居安而不思危居存而不思亾不念祖宗之重器以至顛敗覆隕皆由此漸是其終則亂也至如周治于文武成康之初而亂于昭穆之後漢治于髙祖文景之初而亂于武元之後以是知創業之主蓋得于憂勤故多吉守成之君蓋生于康樂故多忽聖人特于此言之者將以為萬世守成之戒使之居安慮危在治思亂而豫為之備不使至于傾危也彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也義曰既濟者天下之物无不濟也雖物之至微至細者亦皆遂其所則大者可知矣如行葦之詩仁及草木夫草木无知之物仁尚及之他則不言而喻矣以此知聖賢功業已成徳澤已流人情皆得其安而教化大行矣利貞剛柔正而位當者言六二六四以陰居陰九三九五以陽居陽皆得其正施之人事則是君子小人各得其分貴賤長幼各得其序君君臣臣父父子子夫夫婦婦兄兄弟弟各得其所則中國為中國夷狄為夷狄不相揉亂而天下萬事无所不濟无所不利也初吉柔得中也者謂六二也言既濟之時天下之民物國家之教化无所不濟蓋在上者有中正之道文明之徳然後能致也六二以陰居陰不失其正在下卦之中居離明之體是得寛柔中正文明之道以濟天下故曰吉也終止則亂其道窮也者夫民生于憂勤而死于安樂天下乆治則人苟其安萬務易墮禍患不警故持盈守成之道當須至兢至慎然後可以乆濟苟止于逸樂不自省懼以為終安亂斯至矣故曰終止則亂其道窮也此聖人深戒之辭象曰水在火上既濟君子以思患而豫防之義曰坎上為水離下為火水火之性不相入然相資而成功有烹飪之利以濟于用故得既濟之象也君子以思患而豫防之者既濟之時天下既以治安君子宜深思遠慮豫為之防曲為之備居安思危居存思亡動作語黙皆常戒慎則可以久于既濟矣初九曵其輪濡其尾无咎象曰曵其輪義无咎也義曰夫既濟由未濟而來初九居一卦之始是天下之未濟而險難之未平也聖賢處此之時當此之責則焦勞思慮經營心志欲濟天下之患難使至于安平是以不顧險難之在前衝冒而往欲行之速故至于搖曵其輪濡潤其尾雖然曵輪濡尾其心无他蓋能憂天下之憂欲濟天下之患難而已故雖深冒于難終得无咎也象曰曵其輪義无咎者言初九以剛健之徳居既濟之初盡心竭力不顧險難但以既濟為心故至于搖曵其輪濡潤其尾如是則于義自然无咎矣六二婦喪其茀勿逐七日得象曰七日得以中道也義曰六二當既濟之時處下卦之内婦之象也茀者首飾也婦之有茀所以為容也按初爻則天下未甚濟至二則險阻已平治道已成萬事莫不盡濟然此爻介于初九九三之間而又以柔弱之質故必為他人之所侵然六二能執中道持正不變所應専在九五而志不可奪故所喪者但喪其首飾也勿逐七日得者夫既濟之時天下之民大和雖有邪佞之人處于其間終亦不容之也故六二始雖喪茀然已能執正不回則不待捕逐凡七日之問自得之矣是猶天下新治民已見太平紀綱未墮上下方盛當此之時雖有小人敢行侵侮亦不能貽害但如婦喪其茀雖小有所失不乆之間亦當自復故曰勿逐七日得象曰七日得以中道者言六二喪茀所以勿逐七日得之者由其有文明陰柔之徳得中正之道故也九三髙宗伐鬼方三年克之小人勿用象曰三年克之憊也義曰髙宗商之賢王也鬼方遠方也九三處下卦之上當離明之極離為日日之過中明則衰矣施之人事猶人君不能持盈以傾覆祖先之業而至于衰亂也然當是時必有聖賢之君恢復先王之業而起中興之治故聖人取髙宗以明之言昔商運之衰禮樂廢絕王道衰微綱紀將頽逮乎髙宗能興復商家之衰運纘成基業以致太平之治然必伐鬼方者蓋衰亂之後必有幽遠不賓之人故當用師伐罪以安定其民然威服之道不可速成故須三年然後克勝之也小人勿用者夫復太平之功必用賢明之士然後功業有所濟矣況中興之際其勢衰弱君子居之其力猶憊況用小人乎是愈益于亂也故戒之勿用此小人也六四繻有衣袽終日戒象曰終日戒有所疑也義曰繻者盛美之服也袽者衣之破敝也今六四以陰柔之質居得其正當既濟之時居坎險之地是猶繻有袽也夫九三當衰亂之後而復能以剛明之道起中興之治此六四當已治之時當其教化之流行仁義之洽浹无所不濟之時也若人君不得持盈守成而逸豫怠惰則傾覆之患復至矣如盛美之繻服久而必有弊敗故居上者處至盛之時知其必有傾覆在後故當終日之間兢兢戒慎常以弊敗為慮則可以永安泰而有磐石之固也故聖人于此㴱戒之也象曰終日戒有所疑者言六四雖居坎險之下而能終日戒慎如此者蓋能通天下之志欲成天下之務必有先見之幾察事于未兆故當自疑恐其事久必壞治乆必亂安久必危故也九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也義曰此一爻聖人湥切戒慎之辭東鄰西鄰者取文王與紂之事也紂居東都故言東鄰文王居岐山故言西鄰紂君也文王臣也何以東西言之蓋紂繼世有天下而暴虐无道邦國凌遲所存者位號也文王身雖為臣而功徳已被天下故三分天下有其二以歸之是有君民之徳故以鄰國稱之也夫牛者祭之豐也禴者祭之薄也言紂雖在上以豐盛之祭殺大牢以享于鬼神然无至誠馨徳充塞于前故神亦不享文王雖以薄約之祭薦于鬼神然有至誠馨香之德神則享之蓋以誠實受福也以是觀之人君在徳不在物鬼神享徳不享味也象曰東鄰殺牛不如西鄰之時者祭不以時而瀆其神雖豐不享祭得其時雖甚薄約福斯受矣是以商紂雖盡物不如文王之得時也實受其福吉大來也者言以至誠而享其福祿則不惟慶及一時之身且將延及其來系故吉大來也上六濡其首厲象曰濡其首厲何可乆也義曰物盛則衰治極必亂理之常也上六處既濟之終位在一卦之外以柔乘剛居物之上其道窮極至于衰亂也故天下之事傾敗而不能支如涉險而濡溺其首是危厲之極也皆由治不思亂安不慮危以至窮極而反于未濟也象曰濡其首厲何可久者言上六當既濟之終反于未濟至于濡沒其首危亡不遠故當翻然而警惕然而改何可乆如此乎故曰何可久也未濟坎下離上未濟亨小狐汔濟濡其尾无攸利義曰按序卦云物不可窮也故受之以未濟終焉葢言既濟之後在上者不能持盈守成以至窮極而无所通濟故以此次于既濟也此卦自既濟上六而來明天下之事既濟之後治平已久人心怠忽恃安而不思其危恃治而不思其亂逸樂不已亂所由生是以濡其首反既濟而為未濟也謂之未濟者是天下法度敗壞教化不興故曰未濟亨者聖賢君子當是時欲復有所濟使民心之安教化之興宜以仁義之道拯救之是必先正其身然後正朝廷朝廷正然後正天下必使天下人民事物各得其濟而獲亨通也小狐汔濟濡其尾无攸利者汔者幾也狐之性善涉水者也然以小者渡之雖幾至于濟然勢力微小必至濡溺其尾也以人事言之猶天下未濟欲興太平之功欲拯天下之難必藉大才大徳聖賢之人與之戮力同心一志畢慮不顧險阻之在前奮然往而濟之則可以立大勲圖大業拔天下於困厄出天下于水火也苟以小才小徳位卑勢寡之人當之欲濟天下之險阻是猶小狐之涉淵水雖僅至于濟不免濡溺无所利于拯難也彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾无攸利不續終也雖不當位剛柔應也義曰柔謂六五也言未濟之所由來者以居上者所為有過不得中道所以然也今六五能以柔順之質履大中之位委任九二剛明之臣與之同心竭力共濟天下之事所以獲其亨通也小狐汔濟未出中也者下坎為險以狐之小者往涉于水其力微弱未必能濟猶以小才涼徳之人欲濟險涉難必不能出險難之中矣濡其尾无攸利不續終者小狐之涉水雖幾及其濟然以力弱不能自奮故致濡尾不能終濟也亦如人之濟難其勢弱其才薄終无餘力以拯民于塗炭不能卒有所成故曰不續終也雖不當位剛柔應者言九二九四以陽居陰六三六五以陰居陽所處皆不當位位雖不當然上下二體剛柔相應施之人事猶君臣同心戮力而相應則可以共濟天下也象曰火在水上未濟君子以慎辨物居方義曰夫水火相資然後能濟于物故曰既濟今此二體火上水下火自炎上水自就下水火相戾而不能相資是以有未濟之象君子因此之象則當精審其事明辨于物使各居其方皆遂其所則賢為賢愚為愚貴貴賤賤法度昭明各安其分不相踰越蓋取諸水下火上之義也初六濡其尾吝象曰濡其尾亦不知極也義曰欲濟天下之險難拔生靈于水火者非大才大徳之君子有可致之資可致之勢固不能也今初六以柔弱之質居一卦之下處坎險之底且欲拯天下之難除天下之害謂不量力不度徳反自取禍于躬以至濡溺其尾也夫以薄才當未濟之時求安其身猶未知其可也況欲濟天下乎故彖曰小狐汔濟濡其尾言力不能濟反自罹其害誠可鄙吝也象曰濡其尾亦不知極者言初所以濡溺其尾蓋不量已才分而不知道之極也九二曵其輪貞吉象曰九二貞吉中以行正也義曰夫欲泰天下之否解天下之蹇非剛明才徳之君子未知其可也今九二以剛明之才徳居大中之位雖未出于坎險然所應在五五又以柔順之道信任于己與已同心戮力往拯天下之危經綸當世之治以勞賚安定天下之民雖搖曵其輪盡力而退固无咎也貞吉者為其以陽居陰所處非正然已有濟難之力苟能用大中之道由大正而行則吉可知矣象曰九二貞吉中以行正者言二本非正以其有正中之徳可以行正道而獲吉也六三未濟征凶利涉大川象曰未濟征凶位不當也義曰六三以陰居陽又在坎險之極是不正懦弱之人也以不正懦弱之人身在坎險欲拯天下之患難濟天下之未濟如之何其可乎身且不正反欲進救天下是窮凶之道也然云利涉大川者蓋六三下近九二剛明中正之人上比九四興衰撥亂之臣處二四之間而能依附之則可以獲安而不至溺身于險難故曰利涉大川也九四貞吉悔亾震用伐鬼方三年有賞于大國象曰貞吉悔亡志行也義曰九四出坎險之中居離之位是有剛陽之才然以陽居陰所履不正是以有悔苟能守正而上承六五之君竭力盡心以附順于上以興天下之衰則悔可亡故曰貞吉悔亡震用伐鬼方三年有賞于大國者震謂威震也當未濟之世風俗久漓典章久墜紀綱乆闕而九四有剛明之才又居離明之位是能用其威震興師動衆亦須三年然後有功使復于既濟故聖人重其酬功報勞以大國而賞之所以寵其成績也然按既濟之卦在九三亦言伐鬼方而曰髙宗此但言震用者蓋既濟九三有中興之象此九四則興衰之臣也象曰貞吉悔亡志行也者言九四已出險難志欲安濟于天下故能以剛明之才徳大正之道施行其救難之志也六五貞吉无悔君子之光有孚吉象曰君子之光其暉吉也義曰六五以柔順位于至尊未濟之主也然以陰居陽本亦有悔故必守正然後得吉而无悔也君子之光也者以柔順文明之道所行得中且下應九二剛明之臣與之同心戮力一志畢慮與天下興利除害致天下于既濟是君子光顯之徳也有孚吉者言六五以柔順之質委任九二剛明之臣與之共治天下當絶疑忌之心以信相待則興治之功畢而終獲其吉也象曰君子之光其暉吉者六五之君能以柔接物以信遇臣興天下之治是君子光暉之用无所不至而獲其吉也上九有孚于飲酒无咎濡其首有孚失是象曰飲酒濡首亦不知節也義曰夫六五柔順之主能下接九二剛明之臣使既濟之道已成至于上九則綱紀已振教化已洽法令已備故已可以无為而治不勞聰明委信于臣而飲食宴樂以相和悦所以无咎也濡其首有孚失是者夫安不可恃樂不可極任臣不可以不察如是則有苟簡敗壞浸潤之禍至于濡溺其首蓋失其所信之道取不節之嗟故曰有孚失是此聖人深戒之辭也周易口義卷十
