body:
  text: 周易口義卷四宋胡瑗撰上經豫坤下震上豫利建侯行師義曰豫樂也悅也按序卦云有大而能謙必豫故受之以豫言聖人在上大有天下之衆而又能持謙巽之德以臨于下則天下之人皆悅豫而從之以二體言之則雷出于地上而蟄蟲昭蘇勾萌皆達萬物無不得其豫悅也故曰豫利建侯行師者天下之人既已悅豫則當建立諸侯而分治天下出兵行師以討其叛逆何則夫民苟不順何為而可哉民心既已悅順雖驅之死地而亦從之故豫而建侯行師無所不利矣若武王之伐紂以其順天應人是以一怒而安天下天下之民無不悅豫而順從也彖曰豫剛應而志行順以動豫豫順以動故天地如之而況建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉義曰剛應而志行者此以二體明其義剛謂九四也應謂初也九四以剛陽居大臣之位又處震動之下下與初六為應是上下之志皆得通行也順以動豫者震上動也坤下順也言聖人所動皆順于民心則民無有不順而悅豫也豫順以動故天地如之而況建侯行師乎者此釋建侯行師之義言聖人能以豫順民心又合乎時雖天地之至髙至厚尚亦不違況建侯以治民行師以戡難乎其利可知也天地以順動故日月不過而四時不忒者言天地之大一晝一夜凡行數十餘萬里而無毫釐之過與不及是能以至順而動故日月代明而無薄蝕之差四時迭行而無盩繆之愆也聖人以順動則刑罰清而民服者聖人以天地為心而有所動作則天下之人悅豫而從故刑罰清而民服從之然此指刑罰而言者蓋聖人用之所以禁暴止姦萬民之所深畏者也當刑者刑之當罰者罰之懲一而勸百故刑罰可措而清矣是天下之民服從而不犯也豫之時義大矣哉者聖人歎美之辭也言豫之時其義至大意使後人所動所為當順于心而已象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考義曰雷者隂陽奮擊成聲也殷盛也言雷聲奮出于地上則震動萬物使勾者盡出萌者盡達萬物起而滋植悅豫之象也先王觀此之象則必順時而動使天下之人皆從服而和樂也民既和樂于是采其和聲作樂以通天下之和使天下之人聞之而無不悅樂則其德從而崇髙也故若武王伐紂之後天下之民既出于塗炭而得其和樂于是象其成功而作大武之樂是由順民心而動者也且聖人作樂不惟民得其和又且薦之上天配以祖考所以通人神之和而告其成功也初六鳴豫凶象曰初六鳴豫志窮凶也義曰鳴謂聲名流傳于外也初六居豫之初係應于四四為悅豫之主有盍簪之朋而已應之是得志于四也夫以小人得志則悅豫過甚驕奢放恣無所不為以至聲傳于外而致其凶咎也象曰鳴豫志窮凶也者大凡樂不可極志不可滿人理之常也今初六致其凶咎者志窮于悅樂故也六二介于石不終日貞吉象曰不終日貞吉以中正也義曰介于石者言介然如石之堅徑也六二處悅豫之時居中履正是中正知幾之君子也初六有鳴豫之凶已下交之而無褻瀆之心九四為悅豫之主有盍簪之朋已上交之而無諂媚之行是君子之人介然守其節操堅徑如石守其正道故不終日之間所以獲其吉也先聖繫辭釋此爻曰君子見幾而作不俟終日介如石焉寧用終日是言六二中正而獲吉也六三盱豫悔遲有悔象曰盱豫有悔位不當也義曰盱者盱睢諂媚之謂也遲緩也以不中不正之質而上近于九四操權之臣若盱睢諂媚以求悅于四則必有悔也若遲緩而不求于四亦必有悔也然則六三何以進退遲速之間皆有悔蓋悅豫之時以正而從之則可也三既以不正而所求者又不正則宜其速悔矣九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也義曰此卦上下羣爻皆隂柔而四獨以剛陽之德為豫之主然非至尊之位乃專權之臣也權既已專是以上下皆附從之必由于已而後得豫也故曰由豫也大有得者四既得衆爻從之以取其悅樂是已之大有所得也勿疑朋盍簪者朋類也盍合集也簪冠之笄也言四秉悅豫之權衆來附已然而必藉天下羣才共成天下之事業羣材既已從己己必盡誠以信任之不有疑二之心則彼將引其朋類合其簪纓而來也象曰由豫大有得志大行也者九四以剛陽之才為豫之主上下羣隂悅附于已而又能信任天下之士天下之士皆合其簪纓而來是得其位而有權故其志大得行也六五貞疾恆不死象曰六五貞疾乘剛也恆不死中未亡也義曰疾謂疾病也恆者綿綿之貌六五以柔弱之質居至尊之位而履失其正又下乘九四剛陽之權臣是於正道有所疾也恆不死者言六五以柔弱之質而履失其正是有疾病者也然而得常不死者以其居中處尊猶且綿綿不絶而未至于亡也然所存者但位號而已故若周平東遷之後天下之權盡屬強臣而天王所存者位與號爾此六五所以然者蓋一卦之中最正者六二一爻而已其執節堅徑所交不諂不瀆是至正之臣也今五乃不能委任之而又且乘陵于四此所以得不死之疾也上六冥豫成有渝無咎象曰冥豫在上何可長也義曰冥謂冥昧也上六居豫之極悅樂過甚而不知止節以至智性昏迷冥冥而無所知識以至于凶咎也大凡禮樂之道必相須而成然後制節和平皆得其所也若禮勝而樂不至則民散而不和也樂勝而禮不至則民蕩而不反也是樂必有禮以為節禮必得樂而後和二者兼備則不至悔咎也今上六悅樂過甚是不知所節以至冥暗也古之太康內作色荒外作禽荒而貽邦國之患商紂作長夜之樂以至傾圯社稷是皆智性昏迷恃樂過極以至亡也非獨人君則然至于公卿大夫而下莫不若是故伊訓曰惟兹三風十愆卿士有一于身家必喪邦君有一于身國必亡故知自天子至于士庶人凡酣樂過甚必有凶咎也有渝無咎者渝變也言苟能因其逸樂之過而反思悔咎自省于已變前之為而節之以禮則庶幾免于悔咎也象曰冥豫在上何可長也者此聖人深戒之意也言其悅豫過甚至于情蕩性冥而不知所止是何可長如此乎言能渝變則可以無咎也隨震下兑上隨元亨利貞無咎義曰按序卦云豫必有所隨故受之以隨言聖賢在上既得天下之悅豫必皆樂而隨之也然謂之隨者兑上為説震下為動是聖賢動順民心則天下皆悅樂而隨之也元亨利貞者此天地之四德也凡聖賢之人欲天下之隨已故當修天地生成之四德然後可以使天下皆悅而隨之則可以免咎也凡人將隨于人者亦當審其所隨之人有此元亨利貞之四德能生成于民物者然後隨之則得其所安而獲其無咎也是隨之道必以此四德兼備然後可以求人之隨及隨于人也彖曰隨剛來而下柔動而説隨大亨貞無咎而天下隨時隨時之義大矣哉義曰剛來而下柔動而説隨者此就二體以釋其義夫震以動其性剛兑以説其性柔今震在兑下是剛來而下于柔也猶聖賢君子以至剛之德至尊之位至貴之勢接于臣而下于民故賞罰號令一出于上則民皆悅然隨于下也故曰剛來而下柔動而説隨大亨貞無咎而天下隨時者此釋元亨利貞之四德也言有是四德兼備而無其咎過則天下之人盡將奔走匍匐及時而隨之矣隨時之義大矣哉者言隨時之義至大非大才大智有上四德之人必不能使天下之民悅而隨之也故先聖于此重嘆美之也象曰澤中有雷隨君子以嚮晦入宴息義曰雷在澤中是待時而動若雷之一奮則萬物皆隨而震動是隨之象也君子以嚮晦入宴息者此當有二義言隨之時必當慎其所以為隨之道不可輕動必須待其人有是四德之備而後隨之雖然亦未可以顯然而從之固當韜光養正向于隱晦之中以自安息而詳審其人使可以隨然後往而隨之則得其道也苟不擇其人又且顯然而往至于中道有所不至則其為患不細矣故論語曰朋友數斯疏矣事君數斯辱矣是也又若君子欲人隨于已亦當韜光濳德向于冥晦之中使其元亨利貞四德之備則天下之人自然隨之也故君子之隨于人者若伊尹起莘而隨湯太公起海濱而隨文王七十子之隨仲尼皆得其為隨之道也故先聖于象辭以戒後人凡隨之道尤宜重愼也注疏謂物皆説隨可以無為不勞明鑒且凡聖人在上天下未隨之時則當焦心勞思以治之及天下既隨之後則亦當憂勤而思所以安之之道豈有物既隨而荒怠佚樂無憂勤之志者哉初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也義曰官主守也渝變也大凡人素有所主守確然持一節不變者當隨之世則必觀時量勢而變其前之所守則其人之可從者決然往而隨之可也今初九居隨之時當動之始固宜易所素守擇其人而隨之也既欲擇其人則必視其有四德之備大賢大正之人使可以隨之則隨之則于正道得吉也出門交有功者言不能韜光晦迹拱默以待其人而已出門矣則必擇其有功者然後交之乃可以獲安而不失其所也象曰官有渝從正吉者大凡人之守節確然執一而不能通變者未可以語聖賢之道也夫聖賢之道隨時通變無所執泥當可隨之時雖素有所主亦必擇其人之善者而從之也若時不可動而人不可隨則退而固其所守以道自處也然雖去就不同但從于正則吉也六二係小子失丈夫象曰係小子弗兼與也義曰小子謂初九也丈夫謂九五也大凡隂柔不能自立必得剛陽之人以係之則可也今六二居隨之時與九五為正應而最逺之初九非其應而切近之故已以隂柔之質因而附于初是失九五之丈夫而係初九之小子也然則六二履于中正何係乎非應蓋隂弱而無常守故也夫以不定之性而又居隨之時是必舍逺而係近矣然所以不言凶者蓋聖人于此戒之謂其尚有從正之道若能係于九五而舍于初九則不至于凶咎也象曰係小子弗兼與者言係于初則失五係于五則失初從此則失彼從邪則失正是不可以兼與也六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也義曰丈夫謂四也小子亦謂初也六三亦以柔弱之質不能自立必得剛陽之人以隨之也上既近於四而下又逺于初是以隨九四之丈夫而失初九之小子也隨有求得者言隨之時六三上無正應九四又下無正應是兩無所繫而又相比今六三往隨之是所求有得也利居貞者言六三九四皆非所應今既相從必以正道乃獲其利而無凶咎之事也是以凡師友朋黨之間所相隨者必皆以正則可以全其終也故仲尼曰居是邦也事其大夫之賢者友其士之仁者蓋言必得正人端士然後可以相從也九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也義曰九四以陽居隂履非其正然而已以剛明之才得居人臣之極位用心廣大無所係吝天下之民欲隨于己巳輒納而不拒之是有所獲也貞凶者夫民君之民也已居人臣之位而輒有之則侵權擅民于人臣之正道大為凶也有孚在道以明何咎者孚誠信也道臣子之道也言九四雖擅有君之民侵取君之權蓋是君之澤未下于民而已又當臣位之極故天下皆願歸之也然既在嫌疑之地則宜如何故必當推其至誠至信率天下之民以奉于上盡其齊物之心顯然推白其臣子之道以明非有叛逆之惡則庶可以免其刑戮而逃其悔吝也故昔者文王當紂之時三分天下有二而記者稱之曰文王有君民之大德有事君之小心然尚不免紂之疑而有羑里之囚幾至不免是臣子之道當顯然盡其誠信以事于君則可以免咎象曰有孚在道明功也者言既有孚信在于臣子之道而上得剛明之君知己非叛違之意故足以明己之功也九五孚于嘉吉象曰孚于嘉吉位正中也義曰九五居隨之時以剛陽居至尊而履得其正處于大中故天下之人莫不鼓舞而隨之然則如何以副天下所隨之望故當虛其心盡其誠以信任大才大賢嘉善之人以共成天下之大治則吉莫與盛象曰孚于嘉吉位正中也者言九五為中正之君下應于六二六二亦為中正之臣而已能孚信而任之則天下之賢皆來隨于已而輔成天下之事業也上六拘係之乃從維之王用亨于西山象曰拘係之上窮也義曰夫隨之世天下之人莫不畢從于上也今上六處卦之終最居于上極是其凶頑而不從之人也夫凶頑之人雖王者興而不從聖人起而不服必待其拘囚縶係之後乃從也維之王用亨于西山者維即維縶之也西山以上體兑兑西方之卦山取其險惡也夫聖人在上天下之民莫不歸之而此上六凶頑之人置之一方則一方受其害而罹其險惡今既加之以誅伐而維縶之使不能萌其惡以毒于民故雖西方險阻之地亦得亨矣蠱巽下艮上蠱元亨利涉大川先甲三日後甲三日義曰蠱壞也按左傳昭公元年云皿蟲為蠱榖之飛者亦為蠱蓋言三蟲食一皿有敗壞之象故云皿蠱為蠱又言榖之積久腐壞者則變而為飛蟲亦蠱敗之象故云榖之飛者亦為蠱夫物既蠱敗則必當修飾之故雜卦曰蠱則飾也是矣以人事言之則是風俗薄惡教化陵遲而不綱不紀也方此之時聖賢之人必以仁義之道施為而拯治之也元亨者元者天地大生之德于人為仁也亨者天地大通之德于人為禮也言聖賢當此天下蠱壞之時思欲拯治之必有天地大生之德至仁之道以拯濟之又當以禮制而拯葺之以救弱扶衰興滯補弊使天下之生靈各得其大通也利涉大川者大川謂大險大難也夫治天下弊壞之事不可安然而治之必在衝涉大難奮不顧一己之私存心於天下然後可以治其事措之安平也何則以天地之德至廣至大而發生萬物尚有屯難況聖賢治天下蠱敗之事豈無險難乎先甲三日後甲三日者庚甲皆申令之名也凡事仁恩于五行為木木主春春為施生故為仁恩之令也凡事已蠱敗非下民之所能為皆在上者致之也然聖賢必欲治之則當以仁恩之令而為之先也是故民有匱乏者則出粟帛以濟之民有失于奢者則以禮而節之民有未出于塗炭者則出之而使安其所民有入于凶頑而陷于刑辟者則使之改過自新故先之三日以申諭之後之三日以丁寧而勸戒之如此則天下之事無有不舉矣彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也義曰上體艮為剛下體巽為柔夫天下之事所以弊壞者由上無剛明之德以斷制于下下無柔順之心以從令于上耳今此卦上既剛明而能斷下又柔順以奉令故蠱敗之事可以得治也故曰蠱剛上而柔下巽而止蠱者上艮為止下體為巽巽為權變艮為鎮靜夫能用權者多失于鎮靜今既止靜又能行權故可以治蠱敗之事也利涉大川往有事者言聖賢之人欲治蠱敗之事則雖大險大難必往而治之庶成天下之事業也先甲三日後甲三日終則有始天行也者言上之行仁恩之令先之三日後之三日終而復始若天有四時之行春生而秋成始始終終無有休息也象曰山下有風蠱君子以振民育德義曰按左傳云在周易女惑男風落山謂之蠱言山之有材木今為其風之所落而在山之下也夫風之為氣能生物亦能落物此即肅殺之風故為蠱之象也君子觀此之象以拯救天下敗壞之事振濟萬民之難使皆得其所而遂其性又且養育己之德業而加于天下不使至于蠱敗也初六幹父之蠱有子考無咎厲終吉象曰幹父之蠱意承考也義曰大凡事之蠱敗必求所以修飾之也初六居卦之始得巽之體能用權變以承家道而幹集父事故云幹父之蠱有子者夫能代父之任而成家之事者子之職也一不能然是無子矣今初以權變而幹父之事使男正位乎外女正位乎內內外和睦上下整肅是得其為子之道也考無咎者言父有不能幹家之事而至于蠱敗咎莫大焉苟得賢明之子以代其任而成其事則可使其父立于無過之地矣今初六能用其權變以幹濟其事使其父得無咎也然謂之考無咎者夫生曰父曰母死曰考曰妣蓋言初六不唯能幹父之蠱而致父于無過兼使其父雖至于終沒亦免其咎而致其令名以光于後也故祭義曰亨孰羶薌嘗而薦之非孝也養也君子之所謂孝者國人稱願然曰幸哉有子若此所謂孝也已又哀公問于孔子曰何謂成親孔子曰君子也者人之成名也百姓歸之名謂之君子之子是使其親為君子也是為成其親之名也蓋言父雖有過而子能終幹之則使其父免咎矣厲終吉者厲危也言初六居卦之始幹父蠱敗之事是主艱也故當常若危厲在前恐懼其始則終可以獲吉也象曰幹父之蠱意承考者意謂心之所存也言為子之道不可盡循父之命但心之所存以至孝事其親而成之耳九二幹母之蠱不可貞象曰幹母之蠱得中道也義曰九二以剛明居中而在內卦之內是能幹其母蠱壞之事也故曰幹母之蠱不可貞者言君子之人必上思忠于君下思利于民不可屑屑然專以治閨門之事久執其道為己之正也象曰幹母之蠱得中道也者九二以剛明之德居得中位在內則能幹母之蠱在外則能幹父之事在朝廷則能忠于君而利于民是周旋進退皆得于中道也九三幹父之蠱小有悔無大咎象曰幹父之蠱終無咎也義曰九三以陽居陽有剛明之德履于至正故能幹父之蠱何則夫剛則有能斷之才正則公而不私以此而行則克幹其事而無所不濟也小有悔無大咎者言九三全用剛斷以幹其家事則必傷于和睦之道而親族之間必小有悔恨之者然已代父之任整肅閨門之教而幹成其事則終無大咎也六四裕父之蠱往見吝象曰裕父之蠱往未得也義曰夫父以柔懦不能剛決以至蠱壞其家而六四又以柔弱之質承其蠱敗之後無剛明果決之才不能代父之任而幹家之事也然而以隂履正故但少能寬裕其父之事耳故曰裕父之蠱往見吝者夫承蠱敗之後而以柔弱之質將有所往必見悔吝而無所成也然初六亦以隂柔之道乃能幹父之蠱此即往而見吝何也蓋初六居壞敗之始當幹家之初能用權變以治其事致父于無過之地故聖人言之以為萬世治家之法當在于始也是以為臣為子者不可以無剛明之才也今六四既居事壞之後而無剛明之才不能幹濟其事故往見吝而無所得也六五幹父之蠱用譽象曰幹父用譽承以德也義曰譽者嘉美之稱也六五所以能幹父之蠱者蓋承以其德不在剛威而能代父之任承家之事又有大中之道下應九二剛明之人用是所以得嘉美之譽也象曰幹父用譽承以德者言六五所以用譽者非徒取于虛名也蓋以大中至正之德承父之志以治其事使社稷永固生靈受賜各遂其所而天下嘉美之譽自然至矣上九不事王侯髙尚其事象曰不事王侯志可則也義曰夫事治于始至于終則其事已成也大凡人子之始竭力盡孝以事父而治于家人臣之始竭力盡忠以事君而利于民及夫國家既濟功業既成榮問既極而苟年德衰耗則必有止足之心而不纍其位退休歸老不事于王侯而自崇髙尊尚其事也象曰不事王侯志可則也者言上九之不事王侯蓋有足止之心髙尚之行可為世俗之所法則也言聖人之德始終如一無有衰耗若周公之輔于周亦卒于周未聞髙尚其事也夫有周公之資則可為自賢人而下則不能無衰耗矣功業既成則休退宜也然世俗所謂髙尚者內則無心于家不孝于父而幹其事外則無心于國不忠于君而利其民但髙傲衣冠晦迹山林逺去人迹此直豕鹿木石之伍耳非聖人言蠱上之意也臨兑下坤上臨元亨利貞至于八月有凶義曰按序卦云有事而後能大故受之以臨臨者大也聖賢之人興立事業必自小以至于大故臨所以次于蠱也然謂之臨者居上臨下之義也此卦之體二陽漸進是聖賢興起君子之道得行有才德以臨于天下也元亨利貞者天地之四德也夫聖賢興起必有四德之備如春之生夏之長秋之成冬之固使天下無一物不被其澤無一民不受其賜乃可以臨于人也至于八月有凶者八月即周之八月今之六月斗建未之時二隂生也臨卦二陽生即周之二月今之十二月斗建丑之時也此言聖賢興起君子道長而至于八月有凶者蓋聖人之深戒也言二陽始進進而不已不顧隂氣之侵逼至于入月二隂之生則其卦為遁以至為否隂氣漸進陽氣必消也猶君子乘時得位以臨于人若不能深思極慮以防其失使小人得乘隙而進則至于侵害矣故當此之時居其安不忘其危在其治不忘其亂則可以久臨于天下而無有危亂也彖曰臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不久也義曰浸漸也言所以為臨者二陽始生其德漸進猶君子得其時遇其君以漸而進于位興立事業以臨于天下也故曰臨剛浸而長説而順者上坤為順下兑為悅也言剛浸而長是聖賢之人臨于天下有至尊之勢至嚴之威也其勢至尊其威至嚴則卑賤之俗疏逺之民其情曷以通而其恩曷以下哉是必有仁義之化以悅順于民心使天下無不被其澤無不受其賜彼皆悅然以順于上也剛中而應者此謂九二以剛明之德而處下卦之中也凡臨人之道必須下其身先于臣民以交接于下則下之志皆得上通也大亨以正天之道也者夫聖賢在上既能悅而順人以剛明之德先于臣民故能行元亨利貞之四德以撫育萬民生成萬物此乃天之道也至于八月有凶消不久也者此言二陽漸進至于八月二隂浸長則陽道不久而消剝矣亦如君子之待其時不顧小人之進使其少得勢則必侵害君子君子之道不久而漸退矣然不曰七月者蓋其一隂始生小人之勢尚弱未能為害至于八月二隂既長則小人之道漸盛而其黨漸熾故有侵害之事也聖人至此言之所以深戒萬世居安思危之意也象曰澤上有地臨君子以教思無窮容保民無疆義曰夫臨者居上以臨下也至髙天也至下地也今不云天臨而曰澤上有地臨者蓋地之勢最附近于澤而澤又依著于地是臨之象也君子法此之象汲汲然惟恐一物之不被其澤故夜以思之晝以行之焦心極慮施其教化以臨于民而無有窮已也又能寬容保安之而無有疆畔也然則為君子者不能思其教化則不可臨于民者一也能教而不能寬容之則不可以臨民者二也能容而不能保安之則不可以臨民者三也須三者之道兼備而又有元亨利貞之四德夫然後可以臨于民也初九咸臨貞吉象曰咸臨貞吉志行正也義曰咸感也夫剛者必有至尊之勢至嚴之威以臨于人今初九以剛明之才居一卦之下是聖賢之人下其身以先于臣民者也夫既下其身以先之則天下之民莫不感悅而從矣故曰咸臨既能下其身先于人人皆從之則得其正而獲吉也象曰咸臨貞吉志行正也者且聖賢之人非苟欲柔邪佞媚以取悅于天下之人蓋上之臨下以仁義之化行己之道興天下之利耳今初九以剛明之才處衆隂之下是其志本行于正也九二咸臨吉無不利象曰咸臨吉無不利未順命也義曰九二亦以剛明之才居下卦之中下其身以先于臣民者也是以天下之人莫不感悅而歸之故曰咸臨也吉無不利者初九雖能使人感悅而從之然未得其中故但得貞吉而已九二以剛明之德處下卦之中則所為無過與不及皆得中道而又居衆隂之下能下其身以接于民則獲其吉而無所不利矣象曰未順命也者此未字當為羡文夫九二有剛明之德以臨于人天下皆感悅而歸之無有不順其命者也而經文言未順命豈天下率歸而有未順命者乎蓋易經傳之久其間不能無脫誤故此未字當為羡文也六三甘臨無攸利既憂之無咎象曰甘臨位不當也既憂之咎不長也義曰甘者柔邪佞媚之道也六三不中不正又居兑之極是過于柔佞也為上者以此不正之行悅媚之道而臨于人故謂之甘臨夫以不正之行佞媚之道以苟且取譽于民雖苟得頃刻之悅一時之譽然于天下之事終無所利矣故在書曰罔違道以干百姓之譽者是也象曰既憂之無咎者言六三若能以己之不正而反自思省以憂其危知甘佞為非而變從于正道則可以免咎悔也六四至臨無咎象曰至臨無咎位當也義曰六四所履得正下應于初九剛明之援以臨于人能至于臨下之道而得無咎也蓋上之臨下必得其正道若一失于正而入于邪則下之從也若影響之效固不可以無正也是以孔子曰其身正不令而行苟不正其身雖令不從是上之臨下必由于正也今六四以隂居隂是履得其正以此臨下則下無不從是至于為臨之道而獲其無咎也象曰至臨無咎位當也者六四以隂居隂處不失正是能正一心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方正四方則逺近莫不一于正誠由居當其位而行得其正也六五知臨大君之宜吉象曰大君之宜行中之謂也義曰知臨謂能用羣賢而任知以臨于人也六五以隂柔之質居坤順之中履至尊之位得大中之道九二有剛明之才五以至誠接納而信任之故天下之賢莫不竭其聰明盡其才智以輔于己也能用天下之賢以知而臨于人是得大君所行之宜而獲其吉也故若堯舜之為君而任臯夔稷禹之徒是也象曰大君之宜行中之謂也者夫天下至大生靈至衆居上者以一耳一目不能周其視聽必得天下之賢才以輔于己則可也今六五能任用剛明才智之臣以臨于下是大君所行之中道莫尚于此上六敦臨吉無咎象曰敦臨之吉志在內也義曰敦厚也坤為博厚而上六處坤之極是能以敦厚之道而下臨于人也吉無咎者六四六五皆有剛明之援所以獲吉今上六雖有敦厚之德然下無正應無剛明之助是本有咎矣必須吉而咎乃得免故曰吉無咎象曰敦臨之吉志在內也者夫坤之體本在于下今在上而其志樂于下復是志在于內也何則蓋上六處一卦之極雖下無剛明之人以為己助然能以敦厚之德附于二隂故三隂同志皆樂下復是其志在內者也觀坤下巽上觀盥而不薦有孚顒若義曰序卦云臨者大也物大然後可觀故受之以觀觀者觀也此卦之體二陽在上是聖賢之人有剛明之德以臨觀于天下使天下之人莫不仰觀而化之也觀盥而不薦者盥薦者皆祭宗廟所行之禮也盥謂天子始入廟則必盥手酌鬱鬯于地以求幽隂之時也薦謂三獻薦腥五獻薦熟之時也夫始盥之時其禮簡略故至誠之心恭肅之意莫不盡之若薦腥熟之時則其禮已煩雖有強力之容恭懿之心則亦倦怠矣是以聖人在上臨御天下必當如始盥之時盡其至誠之心以為天下所觀法也固不可如行薦之時禮數煩劇其志懈怠則不能使天下之人觀之以為法則也有孚顒若者孚信也顒謂恭肅之貌也若語助也言聖人既能盡至誠之心如始盥之時而臨制天下則天下之人仰以法之皆以孚信而應之其貌顒顒然盡其恭肅以應夫上也彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣義曰大觀在上者謂此卦以二陽居于上臨觀于下使其教化浹洽而天下之所觀仰也順而巽者此以二體而言下坤為順上巽為權也夫聖賢之人雖有剛明之德以臨于下然在乎不自尊大不自髙抗凡所作為皆用柔順之道以下于民則天下之民悅而從之無所懈倦而又示之以權變之道使民由之而不知其所以然也中正以觀天下者夫觀有二義以度而言之則謂之觀以目所觀亦謂之觀也此一句指九五而言蓋以陽居陽又處上卦之中履至尊之位有大正大中之德以臨于天下使天下皆有所觀法也觀天之神道而四時不忒聖人以神道設教而天下服者此廣明其義也言下之人既觀上之道以為法則而聖人又觀天之道以為法則也神道者隂陽不測之謂也天運至神之道生育萬物春生夏長秋成冬固使物皆遂其性而不可推測其用四時之行無或差忒聖人法之亦以至神之道設為仁義之教以成治天下使天下之人各安其性而懷其業不知其所以然而然也象曰風行地上觀先王以省方觀民設教義曰夫風行于地上則無所不至物無不順生成萬物萬物得其茂盛皆可以觀故曰觀之象也先王以省方觀民設教者是先王觀此之象以省察四方之利害觀視萬民之善惡而設仁義之教以行于天下使一民一物皆得遂其生成而不失其所也初六童觀小人無咎君子吝象曰初六童觀小人道也義曰按此卦二陽居上有剛明之德為天下之所觀而天下之人莫不奔走以觀其道而為法則也今初六以隂弱之質最居其下而逺于剛陽不能上進以求聖賢之道而觀之但冥冥然無所知識無所聞見若兒童之所觀也故曰童觀小人無咎者言于小人之道則得其無咎也何則夫小人之人天下之事無所歸責但營保一身而已故不能進而觀聖賢之道為己之法則以至終身愚懵無能開發止為兒童之見此于小人所以無咎也君子吝者夫君子之人則當求聖賢之道學聖賢之事業廣其視聽大其知識以充己之道上思致君下思利民而成天下之事業則君子之道畢矣今以童觀在下而君子之人苟亦昧然無所聞見而不能明顯以求觀于上取法于聖賢之人則誠可鄙吝也六二窺觀利女貞象曰窺觀女貞亦可醜也義曰夫自外顯然而觀則謂之觀自內而觀則謂之窺此六二一爻以隂柔之質居下卦之內遠于在上二陽剛明之人不能往而從之惟在內窺竊而觀之故曰窺觀也利女貞者夫居觀之時大觀在上而已為窺觀之道不能顯然而求觀其道以為法則是但利于女子之貞而已固不可為君子之道何哉蓋女子之職主于閨門之內不預外事故但自內而窺竊于外耳故曰利女貞也象曰窺觀女貞亦可醜也者言為窺觀者于女子之行則可為正其于君子誠可以醜也蓋凡君子之人上必志于君下必志于民而思兼濟于天下故皇皇汲汲以求聖賢之道若聖賢在上則顯然而往觀之以廣己之視聽發己之才識而成己之道以著天下之事業也今乃反為女子之事而窺竊以觀于人是誠足醜也六三觀我生進退象曰觀我生進退未失道也義曰生謂風教之所自出也六三處下卦之上為衆人之長者也既為衆人之長則風教號令皆自己出也是以六三必下觀于民而察己之道其風教有過于中者則俯而就之其風教有不及于中者則勉而及之使進退俯仰皆至于道也然六三既有風教下及于民而又曰進退何也蓋所履非至尊之位但居一卦之上為衆人之長耳象曰觀我生進退未失道也者言六三雖非至尊之位以其風教之及于下而又能察己之所出未至者則進之過中者則退之是或進或退皆未失于道也六四觀國之光利用賓于王象曰觀國之光尚賓也義曰夫大觀之時有其才有其德而又有其位為天下之所觀法者莫尚于九五也初六最遠之故曰童觀六二居內不能顯然求觀故曰窺觀惟六四以隂居隂履得其正而切近于九五是能上附于賢明之君而求觀聖賢之道故朝廷之義宗廟之禮無所不知仁義之道禮樂之事無所不習如是而進于朝廷觀國之光輝故王者以之為賓也且如舜以一匹夫之賤登之朝堯與之迭為賓主是有德之使然也故曰觀國之光利用賓于王象曰觀國之光尚賓也者言六四既上附九五能觀國之光故主者尊尚其德體貌其位而以之為賓也九五觀我生君子無咎象曰觀我生觀民也義曰九五居至尊之位為天下之所觀仰也風教號令一出于已也是以下觀于民若民善則知己風教之善也民惡則知己風教之惡也然而九五履正居中而又處至尊之位以天下之大或風教有未至姦邪有未去習俗未盡善禮樂未盡興則皆其咎也然九五能觀察于民而修飾于已使向之未至者皆趨于道是君子居之則得其無咎也象曰觀我生觀民也者夫觀流則可以知源視影則可以知表聖賢觀民則可以知己政之得失也故常切切思省下觀于民是以至于無咎也上九觀其生君子無咎象曰觀其生志未平也義曰上九有剛陽之德居一卦之上非至尊之位故不觀于民而為民之所觀也然非至尊之位而為天下之所觀仰者則中庸所謂動而世為天下法言而世為天下則者此爻是也是知為天下之所觀則天下之責歸之而萬民之法由之也若其言之一玷動之一跌則天下莫不知之是有所咎也故上九即當切切思省以觀己之所出使動息語默皆合于道以副天下之所觀法則是于君子而得無咎也象曰觀其生志未平也者言上九有盛大之德為天下之觀仰然處于無位之地而權不在已又其責望既重故夕思晝行常欲興天下利除天下害知其心志之未平也噬嗑震下離上噬嗑亨利用獄義曰按序卦云可觀而後有所合故受之以噬嗑蓋人以大才大德為天下之觀法使天下合心而歸之也然則此卦自頤而得頤者上艮下震二陽居外四隂在其內是其所養之道也今噬嗑即是九四矣一陽居三隂之中如剛梗之物在于頤中必待噬而齧之然後可得其合故若朝廷之上朋友之中閨門之內有一小人間厠其間則為君子良民之害故必須刑罰竄殛之則君子之道得以行良民之志得以伸心氣和同上下協合所以大通也故曰噬嗑亨也利用獄者上體離為明下體震為動為威夫刑獄之事巧詐百端情偽萬狀至幽至隱而難察者也必得威明之人施剛斷之才以制之則姦偽可以刑服強梗可以放逐而君子之道得行上下之志和合也彖曰頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也義曰頤中有物曰噬嗑者夫剛梗之物在于頤中是為口頰之患噬齧之然後得合也噬嗑而亨者小人為君子良民之害必須刑戮之則上下之志合而大通也剛柔分者離隂也為柔為明震陽也為剛為威以威剛至明而用刑則君子小人分而無間厠也動而明雷電合而章者夫有剛威之才而不能明察則暴而傷于物有明察之才而不能剛威則柔懦而不能立事是必威明兼濟則事無不立也今噬嗑之卦動而且明雷電相合而和同故其道光顯而章著也柔得中而上行雖不當位利用獄也者此指六五而言也六五以柔順之道履得其中而居至尊之位夫以柔而居至尊所行不得其位所處不當其位然猶以居離明之中其性至明故利用于刑獄之事也何則夫獄之情至深至隱其間姦偽利害出于萬狀故非至明之君子則不能斷制其事今六五所處雖不得正然以其居離卦之中是其性至明故利用于獄也象曰雷電噬嗑先王以明罰勑法義曰震為雷故有威離為火故有明有威有明能辨小人之情用刑以去之此噬嗑之象也先王以明罰敕法者言先王當有威明之德有善必賞有惡必刑所以明示其罰而正敕其法也初九履校滅趾無咎象曰履校滅趾不行也義曰履校者以木械桎其足之謂也滅沒也趾足趾也初九居噬嗑之初是被刑之輕者也其罪惡未至于大故但校滅其趾而已夫聖人之視民也如父母之于赤子雖有罪豈忍加之刑戮哉蓋慮罪小之時不為之懲戒則必至于大惡故當此罪小之時加以木械桎其足趾使其惡之不能行也故繫辭曰小人不耻不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也言小人不仁不義見利則勸恃威則懲此所以為小人之福也象曰履校滅趾不行也者言其當罪小之時用校以滅其趾使知其罪雖小不可為而不行也六二噬膚滅鼻無咎象曰噬膚滅鼻乘剛也義曰膚者柔脆易嚙之物滅鼻者用刑之深也六二以隂居隂又處下卦之中是得正且中也以此中正之道用刑至當如嚙其柔脆之膚言其易而民服也然下乘初九之剛故用刑大過至于滅鼻之深然以居中履正用刑至當雖滅鼻而過于深察是亦無咎也象曰噬膚滅鼻乘剛也者夫初九者過惡之小人已乘于上當用刑以懲之所以至于滅鼻之深然非專尚深刻蓋以乘初九之剛故也六三噬臘肉遇毒小吝無咎象曰遇毒位不當也義曰臘肉者全乾之謂也六三居下卦之極是為不中以隂居陽是為不正凡用刑之道有諸己然後可以求諸人無諸己則不可責于人也今六三以不中不正之行而刑人之過則人無有服從之者故若噬臘肉之難也民心既不從怨懟既已結故非但不能刑人將反招其害也故曰噬臘肉遇毒也小吝無咎者言六三以不正不中而為人之見害故小有所吝然而居震動之上以柔順之質而應于上九剛明之人則能辨民之邪正察獄之情偽是雖始有小吝終亦自然無咎九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也義曰乾胏者肉之帶骨者也因有骨而乾愈于噬臘肉之難也夫君子處得髙位而進輔于君以幹天下之事者必有中正之德德既中正則刑一人而天下服其罪賞一人而天下勸其善今九四處上卦之初是不中也以陽居隂是不正也以不中不正之道而刑于人則甚于噬臘肉之難也金剛也矢直也九四履文明之始其體剛剛則果于行事明則辨于邪正雖非中正猶有剛明故所行無不得其直然四本以不中不正故當憂民之所不服慮惡之所不懲艱難其心退有所懼而守之以正則可以責于人而人服之故獲其吉也象曰利艱貞吉未光也者蓋由艱難守正而後得吉是道未光大也六五噬乾肉得黃金貞厲無咎象曰貞厲無咎得當也義曰噬乾肉者易于乾胏而難于噬膚也六五以文柔處其至尊所行所為皆合于道無過無不及以此主刑賞之柄握生殺之權宜矣得黃金者黃中之色也金者剛之物也夫斷天下之獄必有中正剛明之德可也六五雖少失于正然以有離明之質行得中道而能用刑者也貞厲無咎者言六五處至尊之位有文明之德然用刑雖少失于正而人有不服今若堅守其正而常若危厲則無咎矣象曰貞厲無咎得當也者言六五能守其正常若危厲則所行所為無不當也上九何校滅耳凶象曰何校滅耳聰不明也義曰上九居卦之極罪之大者也何校滅耳刑之深者也夫君子之人有善必勸勸之不已則小善至于大善以至愚者必賢賢者必聖也小人則有惡不悛以至積小惡至于大惡由小罪至于大罪也今上九過惡之小人罪之至深者也夫小人之為惡雖日有聖人之教化聞于耳而不知遷善雖有聖人之刑罪將及于身而不知改過以至積罪至大長惡不悛君子雖欲愛之不可得也故此所以被刑之深校加于首而滅沒其耳凶禍所以及之也故繫辭云善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解夫人之耳聽必聰也人之目視必明也小人之耳非聵也目非瞽也日聞聖賢之教化而不能飭身歸善以至陷于刑戮蓋積惡之久而不知罪之深是聰不能自明也賁離下艮上賁亨小利有攸往義曰按序卦曰物不可以苟合而已故受之以賁賁者飾也言物之既相合必有文章賁飾之也賁亨者夫噬嗑之時則是聖人削鋤強梗強梗既鋤則可以制作禮樂申明仁義施為教化設為文章以文飾之則治道大通于天下矣小利有攸往者夫治天下必有賢明之才處中正之位乃能興治立事今賁之上九以陽居一卦之上在無位之地是不能大有所為故小利有攸往而已彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下義曰賁卦自泰而得坤之上六來居乾之九二此以柔道文飾剛健之德也夫治國之道不可專于剛剛則暴不可專于柔柔則懦剛柔相濟然後治道可成何則兵革所以禦侮而不可久玩刑罰所以止姦而不可獨用必有仁義禮樂文章教化以文飾之則天下大通矣故曰柔來而文剛故亨分剛上而文柔故小利有攸往者此言以泰卦乾之二分居坤之上是分剛陽之道而文飾于柔德也夫聖賢有剛健文明之德則必履至尊之位總大任持大權乃可大有為于天下今以剛居無位之地是但小有所往而已天文也者此以下廣釋文飾之義也按經但云天文也上下相應不成義理當上有剛柔交錯四字蓋遺脫故也言剛柔交相錯雜以成天文是天之文也若寒暑相推而成四時日月相代而成晝夜隂陽相蕩而成風雨雷霆此皆剛柔交錯天之文也文明以止人文也者此以二體而言離下為文明艮上為止既有文章之光明又能止靜是人之文也若夫君聖臣賢上行下化仁義禮樂著于天下是國之文也父義母慈兄友弟恭男正位乎外女正位乎內閨門之內和諧肅穆是家之文也聖人舉此文明之道發于天下國家以文成其治使刑罰措而不用兵革寢而不作也觀乎天文以察時變觀乎人文以化成天下者天文即前所謂也聖人上觀乎天文以察時之變若東作西成南訛朔易雨暘風燠災祥之類也聖人觀乎人文使君明臣忠父慈子孝兄弟有禮長幼有序各得其正故制作禮樂施為政教以化成天下而成天下之治也象曰山下有火賁君子以明庶政無敢折獄義曰夫山有草木之茂而火明其下光明照于上有賁飾之象也君子觀此之象以明舉其庶政庶政者謂國家禮樂教化之道申明興舉之以文飾天下之治以其繁而不以儉曰庶政無敢折獄者夫獄訟之情至幽至隱者也其間姦詐萬狀情偽萬端必有剛明之德則能别于寃枉決其是非而其情可得而見今賁之象其明不遠到故聖人戒之言但可以明其庶政而不可果敢而折獄也何則蓋獄事至重決而行之則死者不復生刑者不復贖是必有剛明之德乃可決斷其事曲直是非之情無所不當矣初九賁其趾舍車而徒象曰舍車而徒義弗乘也義曰趾足也初九處賁之初有至明之性體于陽有至剛之德是君子之人能以道義賁飾其身可行則行可止則止不為苟且是能賁飾其行趾也舍車而徒者以卦體言之則初九之正應在于六四而與六二相比六二上無正應欲求于初而初有剛明之德確然守正惟義所在不顧六二而棄之但待其時而往從六四之正應也猶君子之人能以道義飾于身故車雖至貴若義不當乘則舍之徒雖至賤若義當行則從而行之是所行所止皆惟義之所在也象曰舍車而徒義弗乘也者六四逺也徒步勞也初九不以遠且勞而必往之六二近也乘車安也初九不以安而苟乘之是皆去就以義也六二賁其須象曰賁其須與上興也義曰須者待也夫君子之進不可以躁必待其時有其君往而可以行己之道則決然而進無纍矣今六二之爻上無正應是未可以往必退而待其時候可進而進之故但以道義賁飾其身由中而行之以須待而已象曰賁其須與上興也者夫六二所以賁飾其身而待者蓋上無正應未可以往也已既無應而切近于九三九三亦無其應近而相得故已能上與九三合志同心以興起也猶居朝廷之間親其賢而共成其治朋友之間亦能比其賢而能成其事業者也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也義曰夫六二以無正應未可以進故賁飾其身以須其時而九三亦上無正應亦未可進故與六二同志交相文飾交相濡潤候其時則進于朝輔其君以贊成天下之治也故曰賁如濡如永貞吉者言九三既與六二交相賁飾濡潤然非正應則當永長而守之以正則得其吉也象曰永貞之吉終莫之陵也者言能永守正道則外人不能間而侵陵之也六四賁如皤如白馬翰如匪寇婚媾象曰六四當位疑也匪冦婚媾終無尤也義曰皤者潔白之貌六四以隂居陰履得正位而行得正道能以五常之道飾其身修其行潔白其志使君子之德成而無有玷缺也故曰賁如皤如白馬翰如者言六四應在于初初有剛明之德而已有正一之行能賁飾其身而又潔白其馬往而從之也匪冦婚媾者婚媾謂會合也六四雖正應于初九若往而就之必得會合然猶疑懼六三間于其間為己之害故言若非六三為冦則與初九會合也象曰六四當位疑也者六四之往應初九固無有不得然猶恐初九為六三之所間故云疑也匪冦婚媾終無尤也者言六四履正位行正道又且賁飾其身潔白其志雖六三為冦于其間亦不能為害故終無尤過也六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也義曰丘園謂敦實之地若務農重本之類也六五秉柔中之德居至尊之位而為賁之主在初九則賁飾其趾二又能待時而飾身至此則是賁飾已至即不可更務文華而反賁飾于敦實之地使天下知其本而務于農桑之事故國用豐阜民財充實而貨帛衆多戔戔然而至盛也吝終吉者吝謂吝嗇也凡王者治天下國用既阜民財既實則不可更務奢侈必當吝嗇其財節儉其用然後終于富盛而獲吉也象曰六五之吉有喜也者六五能施飾于敦實之地至于財用繁盛復能儉嗇節用使上不匱于用度下不乏于財力上下之情交相喜悅所以不惟獲吉而又有喜慶之事也上九白賁無咎象曰白賁無咎上得志也義曰夫此卦自賁趾至此上九賁道已成如白之受采無入而不自得以人君之尊是始則勞于求賢而急天下之治既得其賢又且逸于任使以至臻極治之道自有為而至無為但守其質素無施而不可也又君子之人始能治其心明其性飾其身至此可以為仁可以為義為禮為智處于富貴富貴得其宜居于貧賤貧賤得其道以至為將為相為公卿無所施而不可無有疑懼而動心者今上九處此之地其所賁飾之道既備故用之天下則天下治用之一國則一國安施之一家則一家肅進退出處皆得其宜而無有過咎象曰白賁無咎上得志也者上九能以五常之道修其身道義已成事業已備但至此則廣而充之天下無不得其所是在上而其志得行也周易口義卷四
