body:
  text: 周易口義易類提要臣等謹案周易口義十二卷宋倪天隱述其師胡瑗之説也瑗字翼之泰州如皋人用范仲淹薦由布衣拜校書郎厯太學博士致仕歸事迹具宋史本傳天隱始末未詳葉祖洽作陳襄行狀稱襄有二妹一適進士倪天隱殆即其人董嚴陵集載其桐廬縣令題名碑記一篇意其嘗官睦州也其説易以義理為宗邵伯溫聞見前録記程子與謝湜書言讀易當先觀王弼胡瑗王安石三家三原劉紹攽周易詳説曰朱子謂程子之學源於周子然考之易傳無一語及太極於觀卦彖辭云豫聞之胡翼之先生居上為天下之表儀於大畜上九云豫聞之胡先生曰天之衢亨誤加何字於夬九三云安定胡公移其文曰牡于頄有凶獨行遇雨若濡有愠君子夬夬無咎於漸上九云安定胡公以陸為逵考伊川年譜稱皇祐中遊太學海陵胡翼之先生方主教導得先生所試大驚即延見處以學職意其時必從而受業焉世知其從事濂溪不知其講易多本於翼之也其説為前人所未及今核以程傳良然朱子語類亦稱胡安定易分曉正當則是書在宋時固以義理説易之宗也宋志載瑗易解十卷周易口義十卷朱彝尊經義考引李振裕之説云瑗講授之餘欲著述而未逮其門人倪天隱述之以非其師手著故名曰口義後世或稱口義或稱易解實無二書其説雖古無明文今考朝公武讀書志亦云胡安定易傳蓋門人倪天隱所纂非其自著故序首稱先生曰其説與口義合而列於易傳條下亦不另出口義一條然則易解口義確為一書宋志誤分為二明矣乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀周易口義發題先生曰夫易者伏羲文王周公孔子所以垂萬世之大法三才變易之書也自伏羲仰觀天文俯察地理始畫八卦故爻有九六以盡隂陽之數位有三畫以盡三才之道寫天地雷風水火山澤之象以盡天下之用明健順動入止説陷明之體以盡天下之理然而伏羲之時世質民淳巧偽未興詐端未作故雖三畫亦可以盡吉凶之變自神農至堯舜莫不取法八卦之象以為大治之本歷夏沿商以及桀紂之世民欲叢生姦偽萬狀禮隳樂缺天下紛然故三爻不能盡萬物之消長究人心之情偽文王有大聖之才罹於憂患觀紂之世小人在位詐偽日熾思周身之防達憂患之情通天人之淵藴明人事之始終遂重卦為六十四重爻為三百八十四又於逐卦之下為之彖辭故天地通變之道萬物情偽之理一備於此然謂之易者按乾鑿度云易一名而含三義簡易也不易也變易也故穎達作疏洎崔覲劉正簡皆取其説然謂不易簡易者於聖人之經繆妄殆甚且仲尼曰名不正則言不順言不順則事不成是言凡興作之事先須正名名正則事方可成況聖人作易為萬世之大法豈復有二三之義乎按掦子曰隂不極則陽不生亂不極則德不形又繫辭曰易窮則變變則通通則久又云生生之謂易是大易之作專取變易之義蓋變易之道天人之理也以天道言之則隂陽變易而成萬物寒暑變易而成四時日月變易而成晝夜以人事言之則得失變易而成吉凶情偽變易而成利害君子小人變易而成治亂故天之變易則歸乎生成而自為常道若人事變易則固在上位者裁制之如何耳何則在位之人苟知其君子小人相易而為治亂則當常進用君子而擯斥小人則天下常治而無亂矣知其情偽相易而成利害當純用情實而黜去詐偽則所為常利而無害矣知其得失相易而成吉凶當就事之得而去事之失則其行事常吉而無凶矣是皆人事變易不可不慎也故大易之作專取變易之義謂之周易者自伏羲畫卦文王重之又從而為之彖辭至周公又為之爻辭仲尼又十翼之數聖相繼其道大備于周故曰周易謂之上經下經者自乾坤至坎離三十卦謂之上經自咸恆至未濟三十四卦謂之下經然則所以分上下二經者以簡帙重大故分之也乾坤者天地之象坎離者日月之象故取以為上經咸恆者夫婦之義既濟未濟人倫終始之道故取以為下經先儒亦常謂不分之即無損于義分之亦無害其實但以簡帙重大而分之也乾傳者乾卦名也傳傳也言傳述聖人之法以示萬世也
