body:
  text: 周易口義卷八宋胡瑗撰下經萃坤下兊上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往義曰按序卦云物相遇而後聚故受之以萃萃者聚也蓋言聖賢既相姤遇則天下之人得以會聚故以萃次于姤也然萃所以得亨者蓋君臣相遇民物和會當此之時其道得以大通其志得以上行故萃亨者此也王假有廟者廟貌也言聚先祖之神故謂之廟何則夫人之生則精神萃之于身及其死也魂氣歸于天形魄歸于地于此時也孝子慈孫雖有求見之志而不能見其容貌雖有虔奉之心而不得為之奉養是故聖人觀萃之卦假其萃聚之道設為廟祧以萃祖宗之精神于其間以奉四時之祭以盡孝子之心而施教于天下使天下之人當此萃聚之時皆知尊事其祖先也故萃聚之道莫大于此利見大人亨者夫小民蚩蚩不能自立是必得大有才德之人以仁義之道生成之然後得其所亨今萃聚之世民物和會故當利見大有才德之人然後民得以亨通矣利貞者君之所以得民民之所以從君必須利在于正道苟居上者不以正道而治之則民始雖衆多而聚終亦離叛矣是萃之道所利者惟在于正用大牲吉者夫君之所有天下者蓋由功業被于民而為天之所眷祐者也故孟子曰天與賢則與賢天與子則與子是則為人上者撫有萃聚之世皆由天所付與之也故王者當此萬物萃聚之世必用其碩大之牲為之享祀以答天所貺之命故得其吉也利有攸往者萃聚之世君臣會聚天下和同故聖賢君子必當往而康濟之使天下大得其亨通矣彖曰萃聚也順以説剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣義曰萃訓即聚也言天下君臣民物會聚之時也順以説者此就二體以言之下坤為順上兊為説是聖人在上能以仁義之道順民之欲説民之心使羣民亦以順説而相合也剛中而應故聚也者此指九五六二而言蓋五以剛德居中為萃之主下應六二柔正之臣是君臣之間倡而和令而行同德而治者也夫既順而説又剛而中有此四德之備然後天下之民因得而聚矣王假有廟致孝享也者言王者假立廟貌以聚先祖之精神以修四時之祭以盡孝子之心而示教于天下使皆能明享親之禮也利見大人聚以正也者言當此萃聚之時必須得大有才德之人以正道治之則天下可得而久大矣用大牲吉利有攸往順天命也者夫君者天之所以命也故代天理物以仁義之道生成天下之民使天下之民皆受其賜而會聚于時則王者用大牲之禮答天之意以順承天之所命也然利有攸往而言順天命者夫王者既代天理物則必往而康濟之所以順上天付與之命也觀其所聚而天地萬物之情可見矣者此廣明萃聚之義也夫天本居上地本在下及其隂陽相交萬物發生而萃聚此天地聚會之情也至于昆蟲草木亦各從其類故繫辭曰方以類聚物以羣分是也今此君臣民物各相萃聚之世聖人觀此萃聚之道則可以見天地萬物之情狀矣象曰澤上于地萃君子以除戎器戒不虞義曰上兊為澤下坤為地澤者水之所聚今澤處地之上是萃聚之義也除去也言君子之人當此萃聚之世民既和説海內晏然于是之時不可復用其兵是必韜藏其弓矢偃息其戈矛以示天下不復用兵也故昔者武王翦商之後載櫜弓矢倒載干戈歸馬于華山之陽放牛于桃林之野是所謂除去戎器者也然天下雖安忘戰必危故雖萃聚之世民已和會然不可不有所備蓋事久則弊隆極必替故聖人于是時亦常因民之隙訓習師旅以為國備而戒不虞至如堯舜商周之時可謂極治矣然猶立司馬司徒司空司冦之職以訓習兵戎以是觀之雖在萃聚之世至平之時亦當戒于不虞此乃聖人安不忘危存不忘亡之道也初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎象曰乃亂乃萃其志亂也義曰孚信也按此初六居萃聚之世上應于九四是以始初則以至信相待欲相萃聚然而六三以不正之身居其間上無其應又最比于四遂招誣謗之言以間于己是以初雖始有誠信以待于四今既為小人之所間則初六誠信之心不得其終也乃亂乃萃者謂六三既為間于初六不得與四相從是以初六心志必為惑亂也故曰乃亂然且當萃聚之世是上下皆相求萃聚之際初雖心志惑亂終得其萃故曰乃萃若號一握為笑者號謂號咷也一握謂掌握之間至淺末者也萃聚之世必上下相求和會然後必有所濟然此初雖與四為正應然為六三小人之所間厠于其間以疏隔于初使不得與四萃聚故始則有號咷之怨然四雖為三之所間隔于己而本與初為應故亦不至于深久雖初始則號咷然終得與四為之萃聚而有歡笑也勿恤往無咎者夫君子為小人之所疾害小人為君子之所決去此理之常也今初為六三小人之疏間于己為之讒謗然君子之心何必憂恤但執其正道以至誠公直而行往求于四之應則必無咎矣六二引吉無咎孚乃利用禴象曰引吉無咎中未變也義曰君子之進不可自媒以苟媚其君而幸其時之寵榮也是故君子懷忠信以待舉力行以待取是君子凡所進用必須有道待上之聘求然後往則得盡進身之道也今六二以隂居隂履得其中又上應九五中正之君然亦必待其君援引于己然後往之此所以得吉而無咎也孚乃利用禴者孚信也禴薄祭也夫君子之進必在乎誠信相交心志相接然後其道可以大行也今當萃聚之時君臣之間誠信既著心志既通則可以不煩外飾其道得行矣若夫君臣之間誠信未著心志未通而欲其道之大行則孔子所謂未信而諫則以為謗己者也蓋君臣相應則道可大行孚信中立則雖禴之薄祭亦可通于神明也象曰引吉無咎中未變也者言六二之所以待君之見引而後進者蓋守中正之道而不變不為富貴貧賤之所移待求而進是志未有變也六三萃如嗟如無攸利往無咎小吝象曰往無咎上巽也義曰如語辭也六三以隂居陽位不正也居下卦之上不中也以不中不正之身居于萃聚之世上無其應而欲親比于四然四本與初為正應是以不納于已既不見納是以嗟咨怨望復何所利哉往無咎小吝者萃聚之世上下相求以成萃聚然後事有所成今此六三雖無正應而四又不見納然當是萃聚之時捨其四之陽以類求類則往而應于上六亦免其咎然小有鄙吝者蓋上六亦隂以隂求隂所以小吝而已象曰往無咎上巽也者言六三捨九四而往應于上必無咎也何則蓋上六以隂爻在上隂為巽順必下接于己也九四大吉無咎象曰大吉無咎位不當也義曰萃聚之世衆隂皆欲萃于君而四以陽居隂在上卦之下不中不正而當衆隂之路是必有擅民之疑奪權之嫌故須內抱剛明之德外盡忠順之道使其事為大吉然後可以免咎故曰大吉無咎九五萃有位無咎匪孚元永貞悔亡象曰萃有位志未光也義曰萃聚之世天下之民皆遇聚歸于上今五有剛明之才居至尊之位當是時下有九四不正之臣據羣隂歸已之路而固塞之是使衆民皆歸于四而不歸于五故五所存者位與號耳無咎者以五雖有權臣在下侵權奪勢然本有剛明之才中正之德但其道不得以大行亦可以自得無咎也匪孚元永貞悔亡者言五雖有侵權之臣而使已之威賞號令不行于天下而不為天下之所信苟能自守永長貞正之德無私無陂久而不變則可以悔亡象曰萃有位志未光也者言五雖有其位而其道不得以大行而教化號令不能以及于天下不為天下之所信是其志未甚光大也上六齎咨涕洟無咎象曰齎咨涕洟未安上也義曰齎咨者嗟嘆之貌出自目曰涕出自鼻曰洟上六居卦之極上進無所往引退無所適當萃之時而又下無其應是以嗟嘆而涕洟以求其萃聚也然則得無咎者蓋六三以不正之身在下卦之上亦無其應是以與上以類求類此所以無咎也象曰齎咨涕洟未安上也者言上六所以齎咨涕洟者以不得其所而不安其居也升巽下坤上升元亨用見大人勿恤南征吉義曰按序卦云聚而上者謂之升故受之以升言物之衆萃自少而聚之于多自下而至于髙以升于上故以此升次于萃也然曰元亨者言聖賢之人升于上位必須有元大始生之德以生成天下之民物又有大亨之德以通濟天下之事然後得盡所以升上之道也用見大人勿恤者夫君子之升進雖有是大生大通之德然不可孑然而獨往必須用見大有才德之人以依附之然後升其髙位而不至于危可以永保其祿位復何有所憂恤哉南征吉者按此一卦上坤坤為西南之卦下巽巽為東南之卦上下皆是南方之位故曰南征夫聖賢之人居升進之時必附麗南方離明之主又取其往就南方長養寬平之地以生成天下則所行之道無不通濟故可以獲其吉也彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也義曰柔以時升者此釋卦名之義也巽在下坤在上二卦之體皆主柔順而又三隂在上得時而進亦猶賢人君子執柔順之道以其時之可進而進是得其升進之義也巽而順剛中而應是以大亨者此又以二體兼九二六五以釋元亨之義下體巽也上體順也剛中九二也應謂六五也夫君子必不可全任巽順之德若全任之則失于懦是必內有剛明之才外有柔順之行使剛不過亢柔不至懦而所為所行之事皆得其中正然而外既有柔順之德內有剛明之才苟或上無其應則亦不可得而升進故今又應于六五中正之君是當此之時君子皆得其升進之道以元大始生之德通濟于天下是以大亨也南征吉志行也者言君子之進既附麗其大人又即其南方生養寬平之地以生成于天下是所立之志所行之道皆得以大行矣象曰地中生木升君子以順德積小以髙大義曰坤為地巽為木夫木之生資于地始自芽蘖至把握積久以至合抱是升進之象也君子觀此象執柔順之德常積善道不矜細行以日繼月以月繼時以時繼歲至終身久而不變積小善以至大善由小賢以至大賢由大賢以至于聖皆從微而至著由小以至大故曰積小以髙大也初六允升大吉象曰允升大吉上合志也義曰允信也率從之稱也夫升進之時君子所志在于乘時以升進于其位而行其道也今初居巽之體處升進之始雖無其應然于九二同心合志以進于位為衆賢之先倡故賢人君子皆信而率從之以進于上君子之人既得升進則其道得以行其志得以伸其澤可以福于生靈其功業可以被于天下故吉之大者此也象曰允升大吉上合志也者初六當升進之時為升進之始雖上無應然與九二中正之賢合志而進使衆人亦率從于已而升進故得大吉也九二孚乃利用禴無咎象曰九二之孚有喜也義曰孚由中之信也禴春之薄祭也九二以剛陽之德處下卦之中而體居其巽是其剛不過亢柔不至弱執大中巽順而升者也而又上應六五之君以柔順而接納于已是升而得其時得其道者也以至于所行之道所為之事無不合于中夫君既以柔順而接納于下則下得盡其由中之信至誠之道以事其君若然以至信至誠而事其君則不假外物不須外貌而君自然信任矣亦若誠信立于中雖薄禴之祭亦可以通于鬼神也左傳所謂苟有明信雖澗溪沼沚之毛蘋蘩蕰藻之菜筐筥錡釡之器潢汙行潦之水可以薦于鬼神可以羞于王公是也無咎者九二以至誠之道奉于君而君任信之則是諫行言聽膏澤下于民以此為臣何咎之有象曰九二之孚有喜也者夫君臣相信以成天下之事以立太平之功是有喜慶之美也九三升虛邑象曰升虛邑無所疑也義曰九三以陽居陽履正者也而又有上六以為之應進不為小人之所阻礙退不為時之所凝滯而上六又為之引道上下相順無有疑間以是而升于君子之位若升虛邑然復何所疑哉六四王用亨于岐山吉無咎象曰王用亨于岐山順事也義曰王即文王也岐山文王所治之地也夫升進之道貴于柔順今此六四以隂居隂履得其正上比于六五是進得其位者也然比于六五柔弱之君又下乘衆陽剛強之臣六四執柔順之道率其剛強之臣以事其君故有文王之象昔商紂在上文王為西伯治于岐山之邑當此之時文王有聖人之才無聖人之位而以仁義之道生成其一國至如耕者九一罪人不孥仕者世祿關譏而不征市㕓而不稅發政施仁必先于窮民是以岐山之民皆得亨通故歸者如歸父母當是之際文王升進之道愈盛故曰王用亨于岐山也吉無咎者文王以仁義居人臣之位升進之道固已盛矣天下之心固已歸矣如是則幾于侵君之權擅君之民苟不以柔順之節奉于上則臣子之分虧而凶咎必至矣故文王能盡臣子之道執柔順之節率天下之民以服事于紂故得吉而無咎矣象曰王用亨于岐山順事也者言文王治岐山之地三分天下有其二且盡率其民以服事于紂不失臣子柔順之道是至順之事也六五貞吉升階象曰貞吉升階大得志也義曰階是尊者所居之地六五以隂居陽本失其正者也然升進之道貴于柔順今六五有柔順之道居得其中是有大中之德者也而又下有九二剛明中正之臣為之輔佐然所為之事患在于不正若能守之以正則可以獲吉而當至尊之位也象曰大得志也者若能守至正以居其位而治天下之民使皆受其賜則己之志大有所得也上六冥升利于不息之貞象曰冥升在上消不富也義曰冥者冥昧也夫升進之道至于五位大中之極也惟聖賢之人則不為情所遷不為情所誘進退存亡皆得其正可以進則進可以退則退可以止則止今此上六其性冥冥然無所知但知進而不知退知存而不知亡升而不已過于至尊之位失其大中之道而至于亢極故曰冥升也利于不息之貞者息長息也言雖冥昧不知其己以至于上若能知升而可以已知進而可以退謙虛消損不務長息以正自守則猶可獲其吉也象曰冥升在上消不富也者言上六既不達存亡之幾以至于上位固當消虛自損不為尊大以自至于富盛也困坎下兊上困亨貞大人吉無咎有言不信義曰按序卦云升而不已必困故受之以困言升進之道不可過極過極則窮困從而至矣至如天之道升而不已必至過亢之悔地之道升而不已必至龍戰之災以天地之道至大尚有困極況于人乎以人事言之是君子之人不得其位不逢其時其道不能行于天下而身至于窮困故曰困然得亨者言君子之道身雖困窮而道自亨何則夫君子之人以仁義道德充積于中不為窮達富貴患難以動其心是身雖處困而其道自得以亨通故孟子曰君子所性雖大行不加焉雖窮居不損焉此之謂也貞大人吉無咎者貞正也言小人居窮困之時憂愁迫蹙姦邪竊亂無所不至則其為禍也不可勝道矣惟君子處于窮困則能以聖賢之道自為之樂又能取正于大有德之人以為法則故所行無不得其道所以獲吉而無咎矣有言不信者夫聖賢之人居得其位行得其道不令而民自信不言而民自從其勢固然也至于窮困之時不得其位不能行其道雖有言可以為天下法而終不見信于人亦勢然也何則夫惟聖知聖惟賢知賢是君子當窮困之時豈能以言語見信于小人哉故孔子聖人也孟子賢人也困于衰周之時雖歷聘于諸國人皆謂之迂濶是有言而人終不見信之也彖曰困剛掩也險以説困而不失其所亨其惟君子乎貞大人吉以剛中也有言不信尚口乃窮也義曰剛掩也者此釋困卦之義也坎為陽兊為隂陽為剛君子之象隂為柔小人之象夫剛體本居于上柔體本居于下猶君子居上位以治于下小人居下位以奉于上今困之卦陽居下隂居上是剛為柔所掩君子為小人所蔽困之象也險以説困而不失其所亨其惟君子乎者此以二體言之下坎為險上兊為説言君子雖居窮困險難之時而能以聖人之道自説樂之則處險而不改其説是于困而不失其所以亨通之道非君子其能與于此貞大人吉以剛中也者即九二九五也言二五皆有剛明之德而又得其中是大有賢德之人也故君子居此困窮之時必當持正此大有德之人也有言不信尚口乃窮也者君子當是窮困之際道不得行言不見信苟尚口頰徒益至于窮困也象曰澤無水困君子以致命遂志義曰兊為澤坎為水夫水本聚于澤上而浸潤萬物今水反在澤下是萬物不被其潤澤猶君子之人所以居大位而澤天下之民今反在困窮之地是其道不及于天下此困之象也君子以致命遂志者命謂天之所命也致謂極盡之義言君子有仁義之道藴諸其身固當居大位處重權施其事業于天下以澤萬民則宜矣今居于窮困之間使其道不得以行是事非已招咎非己致匪人力所為蓋天命之使然也然而君子之心自達于性命之理不以困躓易其操不以貧賤變其節恬然自樂以遂其志也初六臀困于株木入于幽谷三歲不覿象曰入于幽谷幽不明也義曰臀者最處卑下之物也株木者枯老朽稿之木初六居困之始在陂險之下其體隂柔不能自濟雖上有九四為之應然為二所間隔又有六三上無其應下比于四初以三專侵已之正應是以已欲上進而不得又最在于下是猶困于枯稿之木更無生長繁盛之意也入于幽谷者初既居窮困之下不能自濟進不得已之應如入于幽暗深谷之中而無所明顯也三歲不覿者此爻窮困已甚雖有四之正應而為二三之所間使不得進而又在于下體難于上進至于三歲之間亦未得與四相見象曰入于幽谷幽不明也者初最居下如困于幽暗深谷之中無所明顯也九二困于酒食朱紱方來利用亨祀征凶無咎象曰困于酒食中有慶也義曰凡居窮困之時必有剛明之才然後能濟于世今九二以剛陽之質處下卦之中有剛明之德是能自濟者也既有剛明之德而能自濟則衆皆歸之歸之者衆則所奉者厚故困于酒食饜飫之象也朱紱方來者朱紱天子之服天子純朱紱方將也言九二既有剛明之才大中之德為衆人所歸則天子必委任之既委任之則降體貌以禮之厚恩命以尊寵之是天子寵命將至故曰朱紱方來利用享祀者凡易中言享祀之類皆謂以至誠上通于神明九二既為衆人所歸又為天子所任則必能進其至誠率天下之人以奉于上如享祀之時竭誠以通于神明也征凶無咎者以此九二其勢已尊其權已重其寵已隆人臣之分盡于此矣若不知止而復求其進凶禍必至矣夫凶禍之來皆已所招非他人所致復何咎于人哉此亦戒之之意也象曰困于酒食中有慶也者言九二有剛明之德居得其位而為天子所任得行其道于天下而有喜慶之事也六三困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乘剛也入于其宫不見其妻不祥也義曰石者堅頑之物也蒺藜者草之有刺者也大凡居困之際必有剛明中正之德乃能自濟今此六三以隂柔之質處于陽位是履不得其正過于六二是行不得其中以不中不正之身妄據崇髙之位上無其應當困之時上進則有九四之剛陽以隔塞其路故曰困于石下而欲守其位則乘于九二之剛夫九二以中正之才為己所乘陵則反害于己故曰據于蒺藜是進退皆不得其安也入于其宫不見其妻凶者言三以柔順不正之質進既不得行道退又不獲所安上又無正應以為己輔是其窮困至極則雖至親之人尚不可得而見之是猶入其宫而不見其妻此凶之道也故先聖亦繫此爻曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見耶象曰據于蒺藜乘剛也者言六三所以據于蒺藜者蓋乘九二之剛也不祥者祥善也以不見其妻而罹其凶是豈為祥善者哉九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也義曰徐徐者舒緩不敢決進也金者堅剛之物車者至剛載物而行者也謂九二也按此九四爻以陽居隂居非其位當困之時與初為正應然九二在下上無其應欲其比之固塞已路使不得以相會遇是以九四不可決然而行但徐徐然舒緩而圖之也吝鄙吝也以已有正應而為二所固塞是鄙吝之道也有終者九四既履非其正為二之所間隔然當困之時上下相求雖為二所隔而初六本與己為應但緩而圖之則初六終與己為之應也象曰來徐徐志在下者徐徐而來蓋本與初為正應是志在于下也雖不當位有與也者以陽居隂不當位者也然初六之隂本已之正應既為正應雖見隔于九二亦終有相與之道也九五劓刖困于赤紱乃徐有説利用祭祀象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也義曰劓者割鼻之刑也刖者斷足之刑也赤紱者諸侯之服也按毛詩車攻篇云赤紱金舄會同有繹是言諸侯來朝用此赤紱也此五所以言劓刖困于赤紱者言五居困之時衆所不附為困之主困之極者也夫居困之時衆所不附當寬其慈惠以仁義之道居已以下于人則人皆樂而歸之今不能寬其慈惠反以剛壯之道刑罰之威以服其人使民畏而從之欲天下諸侯皆從于己然後以威力服之非心服也故人必不從反為諸侯之所困也乃徐有説者言九五本居得其中又履得其正雖始失于威暴而為人所不從若能徐徐緩而圖之施德布惠則人必感恱而從矣然亦利用祭祀者言九五緩而圖之以有感恱之道必須盡其至誠以接天下猶祭祀之時盡其至誠以通于鬼神也然二云利用享祀五云利用祭祀者蓋至誠至信其禮則一但九二人臣之位九五人君之位居君臣之分尊卑之差豈可無别故二曰亨祀五曰祭祀也象曰劓刖志未得也者言五專尚劓刖威服于人而人心將不樂從故其志未有所得也乃徐有説以中直也者言五所以緩而圖之有感恱之道者由已居得其中行得其直故也利用祭祀受福也者九五若能盡其至誠以接于下猶祭祀以受福也上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也義曰葛藟者蔓生之藤臲卼者不安之地也言上以柔弱之質下無其應居于卦外極困之地不能自濟是以困于纏繞不得所安困之甚者也曰者思謀之辭凡吉凶悔吝生乎動者也上六既處極困則思謀其身處度其事動必有悔吝既動而有悔必當冒難而往以求其變通不顧險難決然而往則可獲其吉矣象曰困于葛藟未當也者上六居困極之地非所當居而已居之所以有纏繞之困也動悔有悔吉行也者上六既居難中不可不動必冒難而行則獲其吉也井巽下坎上井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶義曰按序卦云困乎上者必反下故受之以井蓋言君子之人升進不已則必至于窮困既困于上則必反而歸于下此井所以次于困也改邑不改井者邑者都邑人民之所聚居也井者是居其地而不可遷改也夫都邑民所居也則可以遷井之為德則不可遷夫邑之名猶君子之身井之義猶君子之德君子之身可貴可賤可富可貧可生可殺君子之道則不可為富貴貧賤生死所加損無喪無得者夫井之淵源終日汲之而不為之喪失雖終歲不汲亦不至于盈滿猶君子積其德于身至于用與不用乃君民之幸與不幸耳于君子之身何所損益哉往來井井者井所以汲水濟于時也往者取其井來者亦取其井往來之人莫不資其養蒙其利也猶君子之德所居之處逺邇之人皆受其賜以至鰥寡孤獨昆蟲草木無不被其澤也汔至亦未繘井羸其瓶凶者汔猶幾也將至之謂也繘者汲水之綆也羸者綰絆之謂瓶者汲水之器凡井之有濟人之功今水將至而綆未出于井則羸其瓶而傾覆之其澤不能及于人凶之道也猶君子以道德仁義正身履行本欲以濟衆也必須致于有位使其澤及于民物則功必有成也而反有至中道而自傾覆其德則澤反不能施天下亦凶之道也彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也義曰此先以二體明井之義也坎為水巽為木又為入木能入水而舉上其水井之象也井養而不窮者夫井泉源之所聚往者來者皆取以為養而無有窮盡也改邑不改井乃以剛中也者言都邑之人居可以遷井者掘地為之不可以遷猶君子身可以窮達德不可以移易若是惟二五能之二五以剛中之德則不為富貴貧賤生死之所移其德至造次顛沛之間未始變其道如井之不遷也汔至亦未繘井未有功也者言水汔至而綆未出于井其功未濟于人也羸其瓶是以凶也者所汲之綆既未出于井而又羸綰其瓶以傾覆其水如君子不能濟人而又傾敗其仁義中道而止是凶道也象曰木上有水井君子以勞民勸相義曰巽為木坎為水木能入水而舉上其水以濟于人有井之象君子法此井象以勞來安恤其民而勸相之勸者舉天下之賢才黜天下之不肖興庠序之教化施禮樂之道以勸天下之人使皆知遷善而逺罪也相助也謂勸農輕徭薄斂節儉國用所以助其生也既勞以安之又勸相以助其生是以仁義之道被于民得井之義也初六井泥不食舊井無禽象曰井泥不食下也舊井無禽時舍也義曰泥者水之滓穢也初六以隂柔之質滓穢沈滯居一卦之下上無其應其功不能及于上是井之滓穢沈滯至于為人之所不食也舊井者久廢之井也禽者至賤之物也久廢滓穢沈滯雖至賤之禽猶不向之則人不食可知矣以人事言之猶人不能修潔其已不能日新其德不務升進而自處于卑下之位為人所不與也象曰井泥不食下也者下謂處于卑下功不及于物也時舍者蓋利不被于人故為時人之所共棄舍也九二井谷射鮒甕敝漏象曰井谷射鮒無與也義曰谷者溪谷也鮒即鮒魚也積穢之所生甕者停水之器凡井之道所以汲取以濟于物今九二處下卦之中上無其應而下比于初猶溪之水下注射于積穢之物又如甕之敝敗其水下漏是皆言其功不能上濟于物也以人事言之君子之人有仁義之術可以濟于天下為生民之福而潛身晦迹以自卑下不務升進以行其道其澤不能及于物以是天下之所共不與者也九三井泄不食為我心惻可用汲王明並受其福象曰井泄不食行惻也求王明受福也義曰泄者清潔之貌言九三以陽爻居陽履得其正有剛明之才而在下體如井之清潔而不為人之所食亦若君子有仁義之術不為時君之所用惻者憂惻也言君子所憂者非憂其一身貧賤憂其君不堯舜憂其民不仁夀故其中心惻然蓋以其道德仁義不見用于上其澤不能及于天下也且井之清潔可用取汲而濟于物君子有道德可以升進而濟天下之民然所患者上無明君以察己之道德若王者有至聖聰明之資能察己之道德以升進于位而任用之使其道行于天下致君于堯舜躋民于仁夀則君臣上下罔不賴其德而受其福慶也象曰井泄不食行惻也者行者所行之道也蓋君子有致君經世之才今反不用則智謀不補于君膏澤不下于民故所以憂惻其道不行于時也受福者是君子必求明王以務升進于上使其道大行于天下則天下之人皆受其福慶也六四井甃無咎象曰井甃無咎修井也義曰甃者以砌纍而修補者也按此一爻以隂居隂處得其正能自修飾使其泉源清潔為人所食亦猶君子修潔其行有仁義之道可以濟于天下然位不得中尚未汲以濟于人是君子雖未見用亦可自守其正而獲無咎也九五井洌寒泉食象曰寒泉之食中正也義曰洌者清潔之貌按此一爻以陽居陽處得其正以剛居中清潔其行是猶井之有寒泉清潔不撓為時人所汲而食之以人事言之是聖賢之人居至尊之位有剛明中正之德有仁義之道可以為天下之法則可以生成天下之民以至往者來者皆得而濟之也故若井洌寒泉為時人之所共食也上六井收勿幕有孚元吉象曰元吉在上大成也義曰收者物之收成也幕者蓋幕也夫井之道以汲上濟人為功今上六以隂居隂而處一卦之上井道之大成者也猶賢人君子修仁藴義沛然發施天下而福蒼生是君子之道大成也勿幕者上六井道既成則當使天下之人往者來者汲之以得濟養故不可獨擅其利而蓋幕之也亦猶君子德行既成則當發施于天下使天下之人皆受其賜故不可遁于山林而獨善其身亦不可吝嗇所為而不施發也有孚元吉者夫井道大成則天下得汲其惠君子道成則天下得受其賜故為天下之人所信既能取信于天下所以獲元大之吉也革離下兊上革已日乃孚元亨利貞悔亡義曰按序卦云井道不可不革故受之以革凡井之經久必有壞敗故當淘治穢滓以革易其故使之鼎新此革所以次于井革者變革之義也夫天下暴亂人民塗炭是必有大聖之興起拯治天下革天下之命令使天下皆得其寧也已日乃孚者已日則事已成之日孚信也夫愚民知久陷于塗炭雖聖人興起亦未知聖人之所為猶恐未免于難故須聖人丁寧誥戒使民審知然後改正朔易服色殊徽號制作禮樂一新民之耳目使天下之人皆出孚信于上故即日不孚至于已日乃孚元亨利貞悔亡者元亨利貞天地生成之四德在聖人為仁義禮智言聖人為革之道至難必有是仁義禮智之四德以生成天下之民物然後合德于天地而可以無悔吝之道苟于四德有所不備則將自取悔吝者也彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以説大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉義曰水火相息者息滅也下離為火上兊為澤夫水本積于澤中火本炎上水火之性本不相得水遇火而消火遇水而滅是水火之性自然相息滅也二女同居其志不相得曰革者此困二體以言之離為中女兊為少女言女子之生雖同其居其志各有適人之道是其志自然不相得革之義也已日乃孚革而信之者夫民性之愚久處暴虐雖聖人興起以仁義之道生成之始皆出于塗炭然民尚未信聖人故當已事之日乃新更制作改變號令使決然無疑皆相信而從也文明以説大亨以正革而當其悔乃亡者文明離象也説兊象也大亨以正四德略舉之也言聖人既變暴亂之事于天下遂以文章光明之道感恱于民又有元亨利貞之四德以為革之道拯天下之難興天下之治皆順于道而當其理故其悔乃亡也天地革而四時成者此以下廣明革之義也夫天地之道寒暑相易隂陽相蕩故四時順其序而成其歲功也湯武革命順乎天而應乎人者夫桀紂之時天下暴亂民墜塗炭湯武憫生靈不獲其所于是興師振旅放桀伐紂以革其弊上以順于天下以應于民此湯武興治補弊救民于水火為王者能濟事之大者也革之時大矣哉者夫革變之時是則革故從新除苛解擾一新民之耳目以變時之號令拯天下塗炭之民而納之安泰之域其道至大其事至深非大有聖德之人則不可為故先聖所以重嘆之也象曰澤中有火革君子以治厯明時義曰水火之性不相得故有革之象也君子觀此革易之象以治其厯而明其時蓋天地之大不可以形究是故君子因為之厯數以推測其妙用究極其躔次考步其隂陽寒暑日月星辰風雨晦明以察天時之早晚以觀四時之代謝所以明示于天下使天下之四民因其時而興功業皆不失其早晚此王者治國之大法也初九鞏用黃牛之革象曰鞏用黃牛不可以有為也義曰鞏者固也黃者中也牛者至順之物也夫革之道不可驟有所為必須以仁義之道漸被于民以大中之道固結于下使民心信確順從于己然後可以大有為而行變革之事也今此初九居卦之始在革之初故不可驟然有所為是必先以大中之道至順之德以固于民使民固信于己順而從之然後可以為其改革更變之事也象曰鞏用黃牛不可以有為也者凡革之道必須德澤被于民已日然後可以革之也民固即日而未孚可遽革之乎故但可固守中順而結之未可大有所為六二已日乃革之征吉無咎象曰已日革之行有嘉也義曰初九在革之始不可驟然有所為是必先以大中之道固信于民使民信之然後為變革之事今此六二以隂居隂處得其中又得其正而又處離明之中能以大中之道變革于民民既信之所以得為革之事故曰已日乃革之征吉無咎者征行也言二既居離明之中能以大中之道革變于民夫以是而行則得其吉又何咎之有象曰已日革之行有嘉也者夫以離明之中行大中之道以變革于天下而民悉信之是所行皆嘉美之事而得其吉也九三征凶貞厲革言三就有孚象曰革言三就又何之矣義曰今觀此爻經文有所倒錯止依此文以解之則義無所當蓋當先云革言三就有孚後則曰征凶貞厲何以明之按此九三以陽居陽處得其正又在下卦之上處離明之極蓋離為火火性炎上上是兊兊為澤為水水火之性本不相得所以得變革之象也今九三既處離明之極體性炎上時為革道故上之三爻必須從而成就之其順從皆有誠實也猶聖人以離明之道變革所為除去天下之暴為衆人之所信從征凶貞厲者言九三既能革變其民天下之民既信而順不可更有所征行但守至正之道則可以盡變革之義也若復有所往必罹其凶而于正道言之是有危厲者也象曰革言三就又何之矣者之即往也天下之民既已革而順從當是時也復何所往哉九四悔亡有孚改命吉象曰改命之吉信志也義曰九四居非其正本有悔者也然以陽居隂非居剛亢而又在上卦之下當恱順之體下承于火火性炎上而九四能承其炎而變革前政之非故得悔亡也夫九四既非其正然則水火之際居變革之間能承此命以仁改暴以治易亂盡其至誠之心以改革其前非是以獲吉也象曰改命之吉信志也者言九四在澤之初居于水火之際而居非其正若能盡其至誠承此改革之命令變其已往之非信志而行無疑忌之心則獲其吉也可知矣九五大人虎變未占有孚象曰大人虎變其文炳也義曰大人者即大有才德之人也虎者攫搏之物而威稜可畏又有文采顯明著于外者也九五以陽居陽處得其位在上卦之中履其至尊為變革之主又有剛明之才以革去天下之暴亂以鼎新天下之號令新民視聽威德兼行為天下之所信逺近皆畏而革其非僻之心能使朝廷之間君臣上下皆有肅雍文章光明之美以發于外猶虎之有文采炳然著于外又有威稜使皆威信之是若非大德大才之人則曷致于此未占有孚者言九五以大中之道威信于天下以革去當時之弊亂使民信而從之不待占筮而自信矣象曰大人虎變其文炳也者言聖人革去天下之弊使朝廷君臣上下皆有文采又使逺者近者望而畏之如虎之文炳然而盛也上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也義曰夫為革之道必須以孚信固結于民故九五之爻為革之先倡以革變其天下之暴亂有才有位文章顯著而又可畏也今上六體是隂爻過于九五而革道已成且在上卦之極履非首倡又承水火變革之終是臣民之位也既在臣民之位則當盡其至正之道以輔從于九五則得為革之義使君子居之于此位則能輔于五亦能同為變革于天下雖使文章光顯亦不及于五不可謂之虎變但謂豹變而已言其變革之文蔚然其文采威稜次于虎者也小人革面者以君子居之則能豹變以小人居之則必包藏狠戾之心但飾其外文柔順其道以從于上故曰小人革面征凶居貞吉者征行也言上六在卦之極過于九五蓋在臣民之位當輔從于君不可更有所往若以臣民而行則必有猜疑之禍是有凶之道也苟能居是位而守其正則得其吉象曰君子豹變其文蔚也者言君子居此位輔從于五共為變革雖有文采但不及于虎止可如豹文之蔚然亦著見于外也順以從君者言小人但變革其外貌以順從于上而已鼎巽下離上鼎元吉亨義曰按序卦云革物莫若鼎故受之以鼎鼎者變生為熟革故取新之謂也言聖賢之人凡欲革天下之弊亂必須改正朔易服色殊徽號變禮樂以新天下之視聽故必法制齊明得其盡善盡美然後獲元大之吉其道是以亨通也彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨義曰鼎者鑄金所為而有法象者也以木巽火亨飪者此因二體以解鼎卦之象下巽巽為風上離離為火以木以風而入于火故有亨飪之象此鼎之用也聖人亨以享上帝者此以下廣明鼎卦之義言鼎之所以用者由木入火而成也故聖人亨之可以享祀于上帝也而大亨以養聖賢者言聖人大亨以養天下之賢使賢聖盡得其養然此所以言大亨者以天下之大四海之廣非一聖一賢之所能致又非一耳一目之所能察故聖人分其爵祿大其優寵以廣求天下之聖賢使皆得己之養為養之大莫大于此故曰大亨巽而耳目聰明者言聖人既盡養天下之賢又當以巽順之道下接之是以天下之賢者皆樂其所養盡其謀慮竭其忠信以輔于君以共成其政故得其天下之耳為己耳天下之目為己目以成己之聰明柔進而上行得中而應乎剛是以元亨者此指六五而言也夫五以柔順之道進而居至尊之位又在上體之中是所為之事得其中而又下應九二剛明之臣是聖賢相得君臣相會故能鼎新制作革去弊亂天下之事無不得其大通故曰是以元亨象曰木上有火鼎君子以正位凝命義曰凝成也言君子之人觀此木火亨飪之象凡欲鼎新法令革民弊亂以新天下耳目者必先正其至尊之位定其尊卑之分以凝成其命令而新其法制初六鼎顛趾利出否得妾以其子無咎象曰鼎顛趾未悖也利出否以從貴也義曰夫陽以生物為實隂以剝物為虛鼎之為器上虛而下實者也初六以隂柔之質而處一卦之下是鼎器反上實而下虛也既上實而下虛遂至鼎顛趾也利出否者夫否者否惡不善之物也鼎雖顛趾然利于出否去穢以納新也得妾以其子無咎者夫妾者至賤者也以至賤而為尊者之配升于貴位而為正室所以反得無咎者以其有子故也有子何也以其子能荷先祖之業承宗廟之重故得無咎則公羊所謂子以母貴母以子貴者此其義也其意若君子承弊亂之後思欲鼎新天下之事其所為雖有小害然利于覆去否穢建立新法以新天下之耳目終立天下之大功所以得其無咎象曰鼎顛趾未悖者夫鼎雖顛覆然能覆去否穢以納其新是其道未至于悖逆也利出否以從貴者夫既以顛出否穢以納其新又以妾為室而無咎以子之貴故也九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終無尤也義曰九二以剛陽之質處鼎之中是鼎有實物之象也夫鼎之實必有齊量不可以盈溢若遇其盈溢則有覆餗之凶君子之人雖有才德亦有分量若職事過其才分則有隳官之謗矣仇即謂五也疾謂三與四也言二雖應于五然以三四間隔其路使其君不得以他職事即加于己故己既得盡其才以事于上而無隳官之咎所以獲吉蓋有實之鼎不可復有所增才任已極不可復有所加故也象曰鼎有實慎所之也者言人才有大小若才不甚大而加其煩任重職則必有凶敗之至故宜慎其所之不可妄其所行也我仇有疾終無尤也者言我之仇雖為二陽所間而不能復加事于己則我終免曠官之尤悔矣九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也義曰九三以陽居陽自實也居下卦之上有耳之象也夫鼎之耳虛之所以容鉉也今革易其常道以實其耳不能受鉉者也鉉而不受鼎斯不舉矣是其行之所以窒塞也夫鼎而不舉行而窒塞雖有雉膏甘美之食焉得而食哉若君子之人以剛亢自處不能容受天下之賢故其行所以窒塞也夫既不能容受天下之賢雖天下有善謨善慮亦不可得而用矣方雨虧悔終吉者夫雨者隂陽相和而然也若能改革前非去其剛亢上以交于君下以來于賢則得虧損其悔而終獲其吉矣象曰鼎耳革失其義者言鼎必虛耳以待鉉而舉之今以陽居陽而自實是失其為鼎耳之義也九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也義曰九四居上卦之下鼎足之象也餗者鼎之美實渥者沾濡之貌夫鼎足所以上承于鼎以受其美實今九四以陽居隂居非其位不正者也以不正之質是不能上承于鼎斷折其足傾覆公家之美實不惟傾覆美實而又有沾濡其形體之凶若人臣智小德薄而切進于君當人主大任荷國家重責則必曠敗其職而傾覆公家之事不獨傾覆公家之事而又有刑戮及身受汚辱之禍凶之道也象曰覆公餗信如何者言禍及身信無可奈何也故先聖特繫此爻曰德薄而位尊智小而謀大力小而任重鮮不及矣言不勝其任也六五鼎黃耳金鉉利貞象曰鼎黃耳中以為實也義曰黃者中之象金者至剛之物鉉所以貫鼎耳而舉之謂九二也言六五以隂柔之質居大中之位能謙虛以下接于九二之剛猶鼎虛其耳以待其鉉而舉故今得金鉉貫其中而舉之以成鼎之道也以人事言之則是君虛謙而不自髙亢下接于天下賢明之臣使下之賢相率而歸以輔于己利貞者以六五雖有大中之道以下接于臣然以隂居陽履非其正而九二以陽居隂亦非其正也以不正之道相親比則不能無悔故聖人于此深戒之言利在其至正之道然後可以獲其吉也象曰鼎黃耳中以為實者言五以隂柔之質本非其實而能虛中以納物行大中之道以為其實也上九鼎玉鉉大吉無不利象曰玉鉉在上剛柔節也義曰玉者有堅剛之質而其色溫潤上九以陽居一卦之上處鼎道之成衆爻皆履剛而此一爻獨履六五之柔是剛柔相濟而有玉鉉舉鼎之象以人事言之是為人臣者有剛柔之德致君于堯舜三代之治成太平之化故能獲其大吉而無所不利也象曰玉鉉在上剛柔節者上九以剛陽之爻履六五柔順之質剛而不至于暴柔而不至于懦故所以致君于無為皆剛柔得其中節者也然六五言金鉉而上九言玉鉉者夫玉之性剛柔全也上九體陽而履柔剛柔全也故曰玉鉉六五以隂而乘陽差失其正其德未備故曰金鉉周易口義卷八
